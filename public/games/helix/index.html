<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WCGames - Helix Jump</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            color: #fff;
        }

        @keyframes move {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(100px, 50px) scale(1.2);
            }
        }

        /* Frosted Glass Texture (Noise/Grain) */
        .glass-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background:
                url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)"/></svg>'),
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.02) 0px, rgba(255, 255, 255, 0.02) 1px, transparent 1px, transparent 4px);
            opacity: 0.15;
            mix-blend-mode: overlay;
        }

        #ui {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
        }

        #score {
            font-size: 36px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8), 0 0 20px rgba(0, 255, 255, 0.4);
            letter-spacing: 2px;
        }

        #combo-ui {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            padding: 3px 12px;
            background: rgba(255, 0, 255, 0.2);
            border-left: 3px solid #ff00ff;
            backdrop-filter: blur(10px);
            font-size: 14px;
            font-weight: 700;
            color: #ff00ff;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
            display: none;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%);
            pointer-events: none;
        }

        @keyframes pulse {
            from {
                opacity: 0.8;
                transform: scale(1);
            }

            to {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        .wcg-overlay {
            background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(8px);
        }

        .wcg-popup {
            background: rgba(20, 20, 40, 0.4);
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1), inset 0 0 20px rgba(0, 255, 255, 0.05);
            padding: 40px;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .wcg-popup::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
            animation: scan 3s infinite;
        }

        @keyframes scan {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .wcg-popup h1 {
            font-size: 42px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            letter-spacing: 4px;
        }

        .wcg-popup p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 1px;
        }

        .wcg-popup button {
            background: transparent;
            border: 1px solid #ff00ff;
            color: #ff00ff;
            padding: 12px 40px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
        }

        .wcg-popup button:hover {
            background: #ff00ff;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.6);
            transform: translateY(-2px);
        }

        #level {
            font-size: 24px;
            opacity: 0.8;
            margin-top: 5px;
        }
    </style>
    <link rel="stylesheet" href="/shared/wcgames-style.css">
    <style>
        :root {
            --theme-color: #84cc16;
            --theme-glow: rgba(132, 204, 22, 0.4);
        }
    </style>
    <script src="/shared/wcgames-config.js"></script>
    <script src="/shared/wcgames-core.js"></script>
</head>

<body class="">
    <div class="glass-overlay"></div>

    <div id="ui">
        <div id="score">0</div>
    </div>
    <div id="combo-ui" class="wcg-combo">COMBO x2</div>

    <div id="start-screen" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="title">HELIX JUMP</h1>
            <p data-i18n="instruction">Fall through the gaps!<br>Don't touch the red zones.</p>
            <button onclick="WCGames.start()" data-i18n="play">PLAY</button>
        </div>
    </div>

    <div id="game-over" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="game_over">GAME OVER</h1>
            <p><span data-i18n="final_score">Score: </span><span id="final-score">0</span></p>
            <button onclick="WCGames.restart()" data-i18n="play_again">RETRY</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Post-processing for Neon Bloom -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script>
        // --- Constants ---
        const BALL_RADIUS = 0.35;
        const POLE_RADIUS = 1.2;
        const PLATFORM_WIDTH = 2;
        const FLOOR_HEIGHT = 4;
        const FALL_SPEED = 0.10; // Constant falling speed (replaces gravity)
        const BOUNCE_FORCE = 0.22;
        const BASE_GAP_SIZE = 1.5;
        const BASE_DANGER_PROB = 0.15;
        const MAX_PLATFORM_ROT_SPEED = 0.008; // Increased slightly for late game
        const ROTATION_START_INDEX = 5; // Rotation starts after 5 floors

        const COLORS = {
            bg: 0x0a0a0c,
            pole: 0x1e1b4b,  // Deep Purple
            ball: 0x00ffff,   // Cyan
            safe: 0xff00ff,   // Magenta
            danger: 0xff3300, // Red
            splat: 0x00ffff   // Match Ball
        };

        let scene, camera, renderer, composer;
        let ball, pole, backgroundGroup;
        let platforms = [];
        let splats = [];
        let skyscrapers = [], floatingShapes = [], dataLines = [], pulseRings = [];
        let score = 0;
        let gameState = 'START';
        let comboCount = 0;

        let ballY = 2;
        let ballDy = 0;
        let lastGeneratedY = 0;
        let lastPlatformRotation = 0; // Track rotation to ensure overlap

        // Shared Materials
        const splatMaterial = new THREE.MeshBasicMaterial({
            color: COLORS.splat,
            transparent: true,
            opacity: 0.8,
            depthWrite: false
        });

        // Input
        let lastX;
        let isDrag = false;

        // Audio
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = freq;
            osc.type = type;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
            osc.stop(audioCtx.currentTime + 0.1);
        }

        init();

        function init() {
            scene = new THREE.Scene();
            // scene.background = new THREE.Color(COLORS.bg); // Use CSS background
            scene.fog = new THREE.Fog(0x1a1a2e, 10, 60); // Brighter, further fog

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 8, 12); // Higher and slightly further for better top-down perspective
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); // Support transparency
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0); // Transparent canvas
            document.body.appendChild(renderer.domElement);

            // Light
            const dl = new THREE.DirectionalLight(0xffffff, 0.8);
            dl.position.set(5, 10, 5);
            scene.add(dl);
            scene.add(new THREE.AmbientLight(0xffffff, 0.7)); // Brighter ambient light

            // Objects
            ball = new THREE.Mesh(
                new THREE.SphereGeometry(BALL_RADIUS, 32, 32),
                new THREE.MeshStandardMaterial({
                    color: COLORS.ball,
                    emissive: COLORS.ball,
                    emissiveIntensity: 0.8, // Balanced
                    roughness: 0.2,
                    metalness: 0.8
                })
            );
            ball.position.set(0, ballY, POLE_RADIUS + PLATFORM_WIDTH / 2);
            scene.add(ball);

            createPole();
            createBackground();

            // Listeners
            window.addEventListener('pointerdown', e => { isDrag = true; lastX = e.clientX || e.touches[0].clientX; });
            window.addEventListener('pointerup', () => isDrag = false);
            window.addEventListener('pointermove', e => {
                if (!isDrag || gameState !== 'PLAYING') return;
                const x = e.clientX || e.touches[0].clientX;
                pole.rotation.y += (x - lastX) * 0.008; // Slightly smoother rotation (was 0.01)
                lastX = x;
            });
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Post-processing setup
            const renderScene = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                0.8, // Balanced strength (was 1.1)
                0.3, // radius
                0.3  // Balanced threshold (was 0.15)
            );

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // Start
            animate();
        }



        function createBackground() {
            backgroundGroup = new THREE.Group();
            scene.add(backgroundGroup);

            // 1. Digital Tunnel (Pulsing Rings)
            for (let i = 0; i < 30; i++) {
                const ringGeo = new THREE.TorusGeometry(18, 0.04, 8, 40);
                const ringMat = new THREE.MeshStandardMaterial({
                    color: 0x00ffff,
                    emissive: 0x00ffff,
                    emissiveIntensity: 2,
                    transparent: true,
                    opacity: 0.2
                });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2;
                ring.position.y = -i * 20;
                backgroundGroup.add(ring);
                pulseRings.push(ring);
            }

            // 2. Skyscrapers (Complex Geometry)
            const boxMat = new THREE.MeshStandardMaterial({
                color: 0x0a0a1a,
                roughness: 0.1,
                metalness: 1.0
            });

            for (let i = 0; i < 180; i++) {
                const h = 10 + Math.random() * 50;
                const w = 2 + Math.random() * 5;
                const type = Math.random();
                let geo;
                if (type < 0.7) geo = new THREE.BoxGeometry(w, h, w);
                else geo = new THREE.CylinderGeometry(w / 1.5, w / 1.5, h, 6);

                const building = new THREE.Mesh(geo, boxMat);
                const angle = Math.random() * Math.PI * 2;
                const dist = 40 + Math.random() * 60;
                building.position.set(Math.sin(angle) * dist, -i * 10 + (Math.random() * 20), Math.cos(angle) * dist);

                const wire = new THREE.LineSegments(
                    new THREE.EdgesGeometry(geo),
                    new THREE.LineBasicMaterial({ color: Math.random() < 0.5 ? 0x00ffff : 0xff00ff, transparent: true, opacity: 0.8 })
                );
                building.add(wire);
                backgroundGroup.add(building);
                skyscrapers.push(building);
            }

            // 3. Floating Neon Shapes
            const shapes = [new THREE.TetrahedronGeometry(1.2), new THREE.OctahedronGeometry(1.2), new THREE.IcosahedronGeometry(1.2)];
            for (let i = 0; i < 100; i++) {
                const geo = shapes[Math.floor(Math.random() * shapes.length)];
                const mat = new THREE.MeshStandardMaterial({
                    color: Math.random() < 0.5 ? 0x00ffff : 0xff00ff,
                    emissive: Math.random() < 0.5 ? 0x00ffff : 0xff00ff,
                    emissiveIntensity: 2.0,
                    wireframe: true
                });
                const shape = new THREE.Mesh(geo, mat);
                const angle = Math.random() * Math.PI * 2;
                const dist = 25 + Math.random() * 20;
                shape.position.set(Math.sin(angle) * dist, -i * 10, Math.cos(angle) * dist);
                shape.userData = { rotSpeed: 0.005 + Math.random() * 0.015 };
                backgroundGroup.add(shape);
                floatingShapes.push(shape);
            }

            // 4. Data Rain (Vertical Neon Lines)
            for (let i = 0; i < 150; i++) {
                const h = 5 + Math.random() * 15;
                const lineGeo = new THREE.CylinderGeometry(0.015, 0.015, h, 4);
                const lineMat = new THREE.MeshStandardMaterial({
                    color: 0x00ffff,
                    emissive: 0x00ffff,
                    emissiveIntensity: 3,
                    transparent: true,
                    opacity: 0.5
                });
                const line = new THREE.Mesh(lineGeo, lineMat);
                const angle = Math.random() * Math.PI * 2;
                const dist = 20 + Math.random() * 70;
                line.position.set(Math.sin(angle) * dist, Math.random() * -1000, Math.cos(angle) * dist);
                line.userData = { speed: 0.3 + Math.random() * 0.7 };
                backgroundGroup.add(line);
                dataLines.push(line);
            }

            // 5. Grid Floor
            const gridGeo = new THREE.PlaneGeometry(300, 300, 50, 50);
            const gridMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.1 });
            const grid = new THREE.Mesh(gridGeo, gridMat);
            grid.rotation.x = -Math.PI / 2;
            grid.position.y = -500;
            backgroundGroup.add(grid);
        }

        function createPole() {
            pole = new THREE.Group();
            scene.add(pole);

            // Core Cylinder
            const cyl = new THREE.Mesh(
                new THREE.CylinderGeometry(POLE_RADIUS, POLE_RADIUS, 2000, 32),
                new THREE.MeshStandardMaterial({
                    color: COLORS.pole,
                    emissive: 0x4c1d95, // Neon Glow
                    emissiveIntensity: 0.5,
                    roughness: 0.1,
                    metalness: 0.9
                })
            );
            cyl.position.y = -950;
            pole.add(cyl);

            // Initial Platforms
            for (let i = 0; i < 15; i++) {
                createFloor(i);
            }
            lastGeneratedY = 14;
        }

        function createFloor(index) {
            const y = -index * FLOOR_HEIGHT;
            const group = new THREE.Group();
            group.position.y = y;

            // Constrain rotation to ensure platforms overlap (stay "connected")
            // As the ball goes deeper (higher index), increase the offset range to make it harder
            const direction = Math.random() < 0.5 ? 1 : -1;
            const rangeScale = 1 + (index * 0.02); // 2% increase per level
            const offset = (0.5 + Math.random() * 0.8 * rangeScale) * direction;
            lastPlatformRotation += offset;
            group.rotation.y = lastPlatformRotation;

            const rotFactor = Math.max(0, Math.min(1, (index - ROTATION_START_INDEX) / 20));
            group.userData = {
                id: index,
                passed: false,
                rotSpeed: (Math.random() - 0.5) * 2 * MAX_PLATFORM_ROT_SPEED * rotFactor
            };

            // Progressive Difficulty Logic
            // Gap tightens slightly as you go deeper (min 1.1)
            const gapAngle = Math.max(1.1, BASE_GAP_SIZE - (index * 0.015));

            // Danger probability increases as you go deeper (max 0.4)
            const dangerProb = Math.min(0.4, BASE_DANGER_PROB + (index * 0.01));

            // Gap
            // We create a torus arc? No, Extrude arc.
            // Create full circle minus gap
            const shape = new THREE.Shape();
            const segments = 20;
            const startAngle = gapAngle / 2;
            const endAngle = Math.PI * 2 - gapAngle / 2;

            // Draw arc
            shape.absarc(0, 0, POLE_RADIUS + PLATFORM_WIDTH, startAngle, endAngle, false);
            shape.absarc(0, 0, POLE_RADIUS, endAngle, startAngle, true); // Inner hole

            const isDanger = index > 0 && Math.random() < dangerProb;
            const mat = new THREE.MeshStandardMaterial({
                color: isDanger ? COLORS.danger : COLORS.safe,
                emissive: isDanger ? COLORS.danger : COLORS.safe,
                emissiveIntensity: isDanger ? 0.4 : 0.5, // Balanced
                transparent: true,
                opacity: 1.0,
                roughness: 0.3,
                metalness: 0.7
            });
            const geo = new THREE.ExtrudeGeometry(shape, { depth: 0.2, bevelEnabled: false });

            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.userData = { isDanger };

            group.add(mesh);
            pole.add(group);
            platforms.push(group);
        }

        function createSplat(y, radiusFromCenter) {
            const geo = new THREE.CircleGeometry(BALL_RADIUS * 1.5, 16);
            const splat = new THREE.Mesh(geo, splatMaterial);
            splat.rotation.x = -Math.PI / 2;

            // Calculate position on the pole relative to global rotation
            const angle = -pole.rotation.y;
            splat.position.set(Math.sin(angle) * radiusFromCenter, y + 0.11, Math.cos(angle) * radiusFromCenter);

            pole.add(splat);
            splats.push(splat);

            if (splats.length > 20) {
                const old = splats.shift();
                safeRemove(old, pole);
            }
        }

        function safeRemove(obj, parent = scene) {
            if (!obj) return;

            // Recursive disposal of children
            if (obj.children && obj.children.length > 0) {
                for (let i = obj.children.length - 1; i >= 0; i--) {
                    safeRemove(obj.children[i], obj);
                }
            }

            if (obj.geometry) {
                obj.geometry.dispose();
            }

            if (obj.material) {
                if (Array.isArray(obj.material)) {
                    obj.material.forEach(m => m.dispose());
                } else {
                    obj.material.dispose();
                }
            }

            if (parent) parent.remove(obj);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (gameState === 'PLAYING') {
                // Ball Physics - Constant Speed (No Acceleration)
                if (ballDy > -FALL_SPEED) {
                    ballDy -= 0.02; // Quick transition to fall speed
                    if (ballDy < -FALL_SPEED) ballDy = -FALL_SPEED;
                }
                ballY += ballDy;

                // Camera Follow logic: Spring tension
                const targetCamY = ballY + 4;
                if (camera.position.y > targetCamY) {
                    camera.position.y += (targetCamY - camera.position.y) * 0.15; // Fast follow down
                } else {
                    camera.position.y += (targetCamY - camera.position.y) * 0.05; // Slow spring up
                }

                // Collision (Continuous / Swept)
                const prevY = ballY - ballDy;

                // Optimization: Only check platforms near the ball (within +/- 1 floor distance)
                platforms.forEach(p => {
                    const py = p.position.y;
                    if (Math.abs(py - ballY) > FLOOR_HEIGHT * 2) return;

                    // Check if we CROSSED the platform height this frame (falling down)
                    // Condition: Was above (or at) platform, now below platform.
                    // And ball is falling (ballDy < 0)
                    // We treat the platform as a thin plane for crossing check, 
                    // but we also want to respect the ball radius.
                    // Contact point is BallY - Radius.

                    const contactY_Prev = prevY - BALL_RADIUS;
                    const contactY_Curr = ballY - BALL_RADIUS;

                    // If we crossed the platform plane
                    if (contactY_Prev >= py && contactY_Curr <= py && ballDy < 0) {

                        // We think we hit. Now check angle.
                        // Calculate interpolated rotation? 
                        // For simplicity, use current frame rotation (high framerate assumes small change)

                        const ballAngle = -Math.PI / 2;
                        let relAngle = ballAngle - (pole.rotation.y + p.rotation.y);

                        relAngle = relAngle % (Math.PI * 2);
                        if (relAngle < 0) relAngle += Math.PI * 2;

                        // Progressive Gap Size for Collision Check
                        const currentGapSize = Math.max(1.1, BASE_GAP_SIZE - (p.userData.id * 0.015));
                        const start = currentGapSize / 2;
                        const end = Math.PI * 2 - currentGapSize / 2;

                        // In Solid Area?
                        if (relAngle > start && relAngle < end) {
                            // Hit Solid!

                            // Check Danger
                            const childMesh = p.children[0];
                            if (childMesh.userData.isDanger) {
                                gameOver();
                                return;
                            }

                            // Splat Decal
                            createSplat(py, POLE_RADIUS + PLATFORM_WIDTH / 2);

                            // Bounce
                            ballDy = BOUNCE_FORCE;
                            ballY = py + BALL_RADIUS; // Snap to surface to prevent sinking

                            // Screen Shake on big drop
                            if (comboCount > 1) {
                                // Break sound
                                playTone(400, 'square');
                            } else {
                                playTone(300, 'triangle');
                            }
                            comboCount = 0;
                        } else {
                            // Hit Gap! Pass through.
                            if (!p.userData.passed) {
                                p.userData.passed = true;
                                comboCount++;
                                score += comboCount; // Combo multiplier logic: sum of sequence
                                document.getElementById('score').textContent = score;

                                // Show/Update Combo UI
                                if (comboCount > 1) {
                                    const comboEl = document.getElementById('combo-ui');
                                    comboEl.textContent = `COMBO x${comboCount}`;
                                    comboEl.classList.add('wcg-visible');
                                    // Maintain horizontal centering from CSS and add a subtle scale
                                    comboEl.style.transform = `translateX(-50%) scale(${1 + comboCount * 0.02})`;
                                }

                                playTone(500 + comboCount * 100, 'sine');
                                WCGames.submitScore(score);
                            }
                        }
                    }
                });

                // Decay Combo UI
                const comboEl = document.getElementById('combo-ui');
                if (comboEl.classList.contains('wcg-visible') && ballDy >= 0) {
                    comboEl.classList.remove('wcg-visible');
                }

                splats.forEach(s => {
                    s.material.opacity = Math.max(0, s.material.opacity - 0.005); // Slowly fade
                });

                // Visibility / Highlighting Logic
                platforms.forEach(p => {
                    const dist = Math.abs(p.position.y - ballY);
                    const mesh = p.children[0];

                    // Fade out distant platforms but keep them visible (prediction)
                    // Immediate platform is semi-transparent to see through
                    if (ballY > p.position.y) {
                        // We are above this platform
                        if (dist < 2) {
                            // Currently bouncing on or passing this
                            mesh.material.opacity = 0.6; // X-ray vision for the floor you're on
                        } else if (dist < 15) {
                            mesh.material.opacity = 0.9;
                        } else {
                            mesh.material.opacity = 0.3; // Faint distant floors
                        }
                    } else {
                        // Already passed
                        mesh.material.opacity = 0.2;
                    }
                });

                ball.position.y = ballY;

                // Dynamic Generation: Generate more floors if ball is near the end
                const ballIndex = Math.floor(-ballY / FLOOR_HEIGHT);
                if (ballIndex + 10 > lastGeneratedY) {
                    for (let i = 0; i < 5; i++) {
                        lastGeneratedY++;
                        createFloor(lastGeneratedY);
                    }
                }

                // Update Platform Rotations
                platforms.forEach(p => {
                    if (p.userData && p.userData.rotSpeed) {
                        p.rotation.y += p.userData.rotSpeed;
                    }
                });

                // Recycling: Remove platforms that are far above the ball
                // (e.g., more than 8 floors above, which is usually off-camera and irrelevant)
                for (let i = platforms.length - 1; i >= 0; i--) {
                    const p = platforms[i];
                    if (p.position.y > ballY + FLOOR_HEIGHT * 8) {
                        safeRemove(p, pole);
                        platforms.splice(i, 1);
                    }
                }

                // Parallax Background movement
                if (backgroundGroup) {
                    backgroundGroup.position.y = ballY * 0.2;
                    backgroundGroup.rotation.y += 0.0005;

                    // Animate Rings
                    pulseRings.forEach((r, i) => {
                        r.scale.setScalar(1 + Math.sin(Date.now() * 0.001 + i) * 0.05);
                    });

                    // Animate Shapes
                    floatingShapes.forEach(s => {
                        s.rotation.x += s.userData.rotSpeed;
                        s.rotation.y += s.userData.rotSpeed;
                    });

                    // Animate Data Rain
                    dataLines.forEach(l => {
                        l.position.y -= l.userData.speed;
                        if (l.position.y < ballY - 50) l.position.y = ballY + 50;
                    });
                }

                if (ballY < -1800) ballY = 2; // Safety reset for much longer pole
            }

            composer.render();
        }

        function gameOver() {
            playTone(150, 'sawtooth');
            WCGames.gameOver(score);
        }

        function restartGame() {
            // Clean up 3D objects
            platforms.forEach(p => {
                p.children.forEach(c => safeRemove(c));
                scene.remove(p);
            });
            splats.forEach(s => safeRemove(s));
            if (pole) scene.remove(pole);

            // Clean up Background
            if (backgroundGroup) {
                backgroundGroup.children.forEach(child => {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) child.material.dispose();
                    if (child.children) {
                        child.children.forEach(c => {
                            if (c.geometry) c.geometry.dispose();
                            if (c.material) c.material.dispose();
                        });
                    }
                });
                scene.remove(backgroundGroup);
            }

            // Reset internal state
            platforms = [];
            splats = [];
            skyscrapers = [];
            floatingShapes = [];
            dataLines = [];
            pulseRings = [];
            score = 0;
            comboCount = 0;
            ballY = 2;
            ballDy = 0;
            lastGeneratedY = 0;
            lastPlatformRotation = 0;

            document.getElementById('score').textContent = score;
            // Combo UI special handling
            const comboUI = document.getElementById('combo-ui');
            if (comboUI) comboUI.style.display = 'none';

            // Reset Ball & Camera
            ball.position.set(0, ballY, POLE_RADIUS + PLATFORM_WIDTH / 2);
            camera.position.set(0, 8, 12);

            // Rebuild level
            createPole();
            createBackground();
        }

        // Initialize Shared Core
        WCGames.init({
            id: 'helix-jump',
            onStart: () => {
                gameState = 'PLAYING';
            },
            onRestart: () => {
                restartGame();
            },
            onGameOver: (s) => {
                gameState = 'OVER';
            }
        });
    </script>
