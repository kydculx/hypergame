<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Jump</title>
    <link rel="stylesheet" href="/shared/wcgames-style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --theme-color: #e52521;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #5c94fc;
            color: white;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        canvas {
            display: block;
            z-index: 5;
            position: relative;
        }

        #ui {
            position: absolute;
            top: 40px;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        #score {
            font-size: 40px;
            font-weight: 900;
            color: #f8e000;
            text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            font-family: 'Press Start 2P', monospace;
        }

        /* Classic 8-bit UI Overrides */
        .wcg-popup {
            background: #000000 !important;
            border: 6px solid #ffffff !important;
            box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.5) !important;
            border-radius: 0 !important;
            padding: 40px !important;
            text-transform: uppercase;
        }

        .wcg-popup h1 {
            color: #e52521 !important;
            text-shadow: 3px 3px 0 #fff !important;
            font-family: 'Press Start 2P', monospace !important;
            font-size: 30px !important;
            margin-bottom: 30px !important;
            background: none !important;
            -webkit-text-fill-color: initial !important;
            animation: none !important;
        }

        .wcg-popup p {
            color: #ffffff !important;
            font-family: 'Press Start 2P', monospace !important;
            font-size: 14px !important;
            line-height: 2 !important;
            text-shadow: none !important;
        }

        .wcg-popup button {
            background: #e52521 !important;
            color: #ffffff !important;
            font-family: 'Press Start 2P', monospace !important;
            font-size: 16px !important;
            border: 4px solid #ffffff !important;
            border-radius: 0 !important;
            box-shadow: inset -4px -4px 0 rgba(0, 0, 0, 0.3) !important;
            margin-top: 20px;
            padding: 15px 30px !important;
            text-transform: uppercase;
        }

        .wcg-popup button:active {
            transform: scale(0.95) !important;
            box-shadow: inset 4px 4px 0 rgba(0, 0, 0, 0.3) !important;
        }

        /* Remove old cyberpunk animations */
        .wcg-popup::before,
        .wcg-popup::after {
            display: none !important;
        }

        .glass-overlay {
            display: none !important;
        }
    </style>
    <script src="/shared/wcgames-core.js"></script>
</head>

<body>
    <div class="glass-overlay"></div>

    <div id="ui">
        <div id="score">0</div>
    </div>

    <div id="start-screen" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="title">SUPER JUMP</h1>
            <p data-i18n="instruction">Tap or Space to jump.<br><br>Avoid the pipes!</p>
            <button onclick="WCGames.start()" data-i18n="play">START</button>
        </div>
    </div>

    <div id="game-over" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="game_over">GAME OVER</h1>
            <p><span data-i18n="final_score">SCORE: </span><span id="final-score">0</span></p>
            <button onclick="WCGames.restart()" data-i18n="play_again">RETRY</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const finalScoreEl = document.getElementById('final-score');

        // Audio Manager
        class AudioManager {
            constructor() { this.ctx = null; }
            init() {
                if (this.ctx) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
            play(freq, type, dur, vol) {
                if (!this.ctx) return;
                if (this.ctx.state === 'suspended') this.ctx.resume();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                if (Array.isArray(freq)) {
                    osc.frequency.setValueAtTime(freq[0], this.ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(freq[1], this.ctx.currentTime + dur);
                } else {
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                }
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + dur);
            }
            jump() {
                // Rocket sputter/whoosh
                this.play([150, 60], 'sawtooth', 0.15, 0.1);
            }
            score(n) {
                // Classic Coin sound
                this.play(980, 'square', 0.1, 0.1);
                setTimeout(() => this.play(1300, 'square', 0.15, 0.1), 100);
            }
            hit() {
                // Heavy retro crunch/explosion
                this.play([200, 40], 'square', 0.3, 0.2);
                setTimeout(() => this.play([150, 30], 'sawtooth', 0.3, 0.2), 50);
            }
        }
        const audio = new AudioManager();

        // Game state
        let player = { x: 0, y: 0, radius: 14, velocity: 0 };
        let pipes = [], particles = [], stars = [];
        let frames = 0, score = 0, isGameOver = false, isStarted = false;
        let time = 0, screenShake = 0;
        const GRAVITY = 0.45, JUMP = -7.5, PIPE_GAP = 170, PIPE_SPEED = 3, PIPE_WIDTH = 55;

        // FPS Throttling for 60fps
        let lastTime = 0;
        const fpsInterval = 1000 / 60;

        // Init stars (Parallax layers)
        function initStars() {
            stars = [];
            for (let i = 0; i < 120; i++) {
                // Layer 1 (foreground/fast), Layer 2 (mid/medium), Layer 3 (background/slow)
                const layer = Math.random() > 0.8 ? 1 : (Math.random() > 0.5 ? 2 : 3);
                const sizeBase = layer === 1 ? 2.5 : (layer === 2 ? 1.5 : 0.8);
                const speedBase = layer === 1 ? 1.0 : (layer === 2 ? 0.5 : 0.15);

                stars.push({
                    x: Math.random() * 3000,
                    y: Math.random() * 2000,
                    size: Math.random() * 1.5 + sizeBase,
                    speed: Math.random() * 0.5 + speedBase,
                    twinkle: Math.random() * Math.PI * 2,
                    color: Math.random() > 0.9 ? '#ff00ff' : (Math.random() > 0.8 ? '#00ffff' : '#ffffff')
                });
            }
        }
        initStars();

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            player.x = canvas.width * 0.2;
            if (!isStarted) player.y = canvas.height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        function jump() {
            if (isGameOver || !isStarted) return;
            player.velocity = JUMP;
            audio.jump();
            // Spawn jump particles (Exhaust fire)
            for (let i = 0; i < 6; i++) {
                particles.push({
                    x: player.x - 10,
                    y: player.y + 5,
                    vx: (Math.random() - 0.5) * 3 - 2,
                    vy: Math.random() * 2 + 1,
                    life: 0.6 + Math.random() * 0.3,
                    color: Math.random() > 0.5 ? '#ffaa00' : '#ff0000', // Fire colors
                    size: Math.random() * 4 + 2
                });
            }
        }

        window.addEventListener('pointerdown', jump);
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); jump(); }
        });

        function createPipe() {
            const SECTIONS = 7;
            const sectionH = canvas.height / SECTIONS;
            // Gap can start at sections 2~5 (index 1~4), so sections 1 and 7 always have pipe
            const gapStart = Math.floor(Math.random() * 4) + 1; // 1,2,3,4
            const topH = gapStart * sectionH;
            const gapSize = sectionH * 2; // gap spans 2 sections
            const hue = (frames * 2) % 360;

            // Animation: only one side animates (top or bottom, never both)
            // Starts at 10%, increases 1% per score, capped at 60%
            const animChance = Math.min(1.0, 0.1 + score * 0.01);
            const animated = Math.random() < animChance;
            const animSide = Math.random() > 0.5 ? 'top' : 'bottom'; // which side moves
            const animSpeed = 1 + Math.random() * 2; // speed: 1~3
            const animAmp = sectionH * 0.8; // max grow/shrink amount
            const animPhase = Math.random() * Math.PI * 2; // random start phase

            pipes.push({
                x: canvas.width, topH, gapSize, hue, passed: false,
                baseTopH: topH, baseGapSize: gapSize,
                animated, animSide, animSpeed, animAmp, animPhase,
                hasPlant: Math.random() < 0.4, // 40% chance of a plant
                plantPhase: Math.random() * Math.PI * 2,
                plantHeight: 0
            });
        }

        function update() {
            if (isGameOver || !isStarted) return;
            time += 0.016;
            player.velocity += GRAVITY;
            player.y += player.velocity;

            // Screen boundaries
            if (player.y + player.radius > canvas.height || player.y - player.radius < 0) endGame();

            // Spawn pipes
            if (frames % 95 === 0) createPipe();

            // Update pipes
            const sectionH = canvas.height / 7;
            for (let i = pipes.length - 1; i >= 0; i--) {
                const p = pipes[i];
                p.x -= PIPE_SPEED;

                // Animate pipe
                if (p.animated) {
                    const wave = Math.sin(time * p.animSpeed + p.animPhase) * p.animAmp;
                    if (p.animSide === 'top') {
                        // Top pipe grows/shrinks, gap moves down/up
                        p.topH = p.baseTopH + wave;
                        // Clamp: section 1 must have pipe (topH >= sectionH)
                        p.topH = Math.max(sectionH, p.topH);
                        // Clamp: section 7 must have pipe (bottom pipe end <= canvas.height - sectionH)
                        p.topH = Math.min(canvas.height - sectionH - p.baseGapSize, p.topH);
                    } else {
                        // Bottom pipe grows/shrinks, gap size changes
                        const newGap = p.baseGapSize - wave;
                        // Clamp gap: keep reasonable and ensure section 7 has pipe
                        p.gapSize = Math.max(sectionH * 1.2, newGap);
                        p.gapSize = Math.min(canvas.height - p.topH - sectionH, p.gapSize);
                    }
                }

                // Collision detection properties
                const pr = player.radius - 2;

                // Plant update & collision
                if (p.hasPlant) {
                    p.plantPhase += 0.03;
                    // Oscillate plant height between -20 (hidden) and 50 (exposed)
                    p.plantHeight = Math.max(0, Math.sin(p.plantPhase) * 60);

                    if (p.plantHeight > 0) {
                        const plantX = p.x + 10;
                        const plantW = PIPE_WIDTH - 20;
                        const plantY = p.topH + p.gapSize - p.plantHeight;
                        if (player.x + pr > plantX && player.x - pr < plantX + plantW &&
                            player.y + pr > plantY && player.y - pr < p.topH + p.gapSize) {
                            endGame();
                        }
                    }
                }

                // Collision detection (circle vs rect)
                // Top pipe
                if (player.x + pr > p.x && player.x - pr < p.x + PIPE_WIDTH &&
                    player.y - pr < p.topH) endGame();
                // Bottom pipe
                if (player.x + pr > p.x && player.x - pr < p.x + PIPE_WIDTH &&
                    player.y + pr > p.topH + p.gapSize) endGame();

                // Score
                if (!p.passed && player.x > p.x + PIPE_WIDTH) {
                    p.passed = true;
                    score++;
                    scoreEl.textContent = score;
                    audio.score(score);
                }

                // Cleanup
                if (p.x + PIPE_WIDTH < -10) pipes.splice(i, 1);
            }

            // Trail particles (Smoke/Fire)
            if (frames % 2 === 0) {
                particles.push({
                    x: player.x - 12,
                    y: player.y + 2 + (Math.random() - 0.5) * 4,
                    vx: -2.5,
                    vy: (Math.random() - 0.5) * 1,
                    life: 0.4 + Math.random() * 0.3,
                    color: Math.random() > 0.4 ? '#888888' : '#ffaa00', // Smoke and fire
                    size: Math.random() * 3 + 2
                });
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.025;
                p.size *= 0.97;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Screen shake decay
            if (screenShake > 0) screenShake *= 0.9;

            frames++;
        }

        function drawStaticPipes() {
            // Unused in Mario theme. Replaced by Sky and Floor.
        }

        // Cloud generation and rendering
        function initClouds() {
            stars = []; // We reuse the 'stars' array for 'clouds' logic
            for (let i = 0; i < 5; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * (canvas.height * 0.4) + 20, // Top 40% of screen
                    speed: Math.random() * 0.3 + 0.1,
                    scale: Math.random() * 0.8 + 0.5
                });
            }
        }
        initClouds();

        function drawClouds() {
            stars.forEach(c => {
                c.x -= c.speed;
                if (c.x < -200) {
                    c.x = canvas.width + 100;
                    c.y = Math.random() * (canvas.height * 0.4) + 20;
                }

                ctx.save();
                ctx.translate(c.x, c.y);
                ctx.scale(c.scale, c.scale);
                ctx.fillStyle = "#ffffff";

                // Draw fluffy cloud clumps
                ctx.beginPath();
                ctx.arc(0, 0, 30, 0, Math.PI * 2);
                ctx.arc(35, -15, 40, 0, Math.PI * 2);
                ctx.arc(70, 0, 30, 0, Math.PI * 2);
                ctx.arc(35, 10, 30, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            });
        }

        function drawPipe(p) {
            const pipeColor = "#00a800";
            const border = "#000000";
            const highlight = "#5cf000";
            const shadow = "#005800";

            ctx.lineWidth = 3;
            // -- DRAW TOP PIPE --
            // Main body
            ctx.fillStyle = pipeColor;
            ctx.fillRect(p.x, 0, PIPE_WIDTH, p.topH - 24);
            ctx.strokeStyle = border;
            ctx.strokeRect(p.x, 0, PIPE_WIDTH, p.topH - 24);
            // Shading body
            ctx.fillStyle = highlight; ctx.fillRect(p.x + 4, 0, 8, p.topH - 24);
            ctx.fillStyle = shadow; ctx.fillRect(p.x + PIPE_WIDTH - 12, 0, 8, p.topH - 24);

            // Cap
            ctx.fillStyle = pipeColor;
            ctx.fillRect(p.x - 4, p.topH - 24, PIPE_WIDTH + 8, 24);
            ctx.strokeStyle = border;
            ctx.strokeRect(p.x - 4, p.topH - 24, PIPE_WIDTH + 8, 24);
            // Shading cap
            ctx.fillStyle = highlight; ctx.fillRect(p.x, p.topH - 24, 8, 24);
            ctx.fillStyle = shadow; ctx.fillRect(p.x + PIPE_WIDTH - 8, p.topH - 24, 8, 24);

            // -- DRAW BOTTOM PIPE --
            const botY = p.topH + p.gapSize;

            // -- DRAW PLANT (Behind bottom cap) --
            if (p.hasPlant && p.plantHeight > 0) {
                const px = p.x + PIPE_WIDTH / 2;
                const py = botY - p.plantHeight; // Top of the plant head

                // Stem
                ctx.fillStyle = '#00aa00';
                ctx.fillRect(px - 4, py + 10, 8, p.plantHeight);
                ctx.strokeStyle = '#000000';
                ctx.strokeRect(px - 4, py + 10, 8, p.plantHeight);

                // Head (Red bulb with white spots)
                ctx.fillStyle = '#cc0000';
                ctx.beginPath();
                ctx.arc(px, py + 15, 16, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(px - 6, py + 8, 3, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(px + 8, py + 12, 4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(px - 2, py + 22, 3, 0, Math.PI * 2); ctx.fill();

                // Mouth
                ctx.fillStyle = '#000000';
                ctx.beginPath(); // Open mouth pointing up
                ctx.arc(px, py + 5, 12, Math.PI * 1.1, Math.PI * 1.9);
                ctx.fill();

                // Teeth
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.moveTo(px - 10, py + 2); ctx.lineTo(px - 6, py + 7); ctx.lineTo(px - 2, py + 1); ctx.fill();
                ctx.beginPath(); ctx.moveTo(px - 2, py + 1); ctx.lineTo(px + 2, py + 7); ctx.lineTo(px + 6, py + 1); ctx.fill();
                ctx.beginPath(); ctx.moveTo(px + 6, py + 1); ctx.lineTo(px + 10, py + 7); ctx.lineTo(px + 12, py + 2); ctx.fill();
            }

            // Cap
            ctx.fillStyle = pipeColor;
            ctx.fillRect(p.x - 4, botY, PIPE_WIDTH + 8, 24);
            ctx.strokeStyle = border;
            ctx.strokeRect(p.x - 4, botY, PIPE_WIDTH + 8, 24);
            // Shading cap
            ctx.fillStyle = highlight; ctx.fillRect(p.x, botY, 8, 24);
            ctx.fillStyle = shadow; ctx.fillRect(p.x + PIPE_WIDTH - 8, botY, 8, 24);

            // Main body
            ctx.fillStyle = pipeColor;
            ctx.fillRect(p.x, botY + 24, PIPE_WIDTH, canvas.height - botY);
            ctx.strokeStyle = border;
            ctx.strokeRect(p.x, botY + 24, PIPE_WIDTH, canvas.height - botY);
            // Shading body
            ctx.fillStyle = highlight; ctx.fillRect(p.x + 4, botY + 24, 8, canvas.height - botY);
            ctx.fillStyle = shadow; ctx.fillRect(p.x + PIPE_WIDTH - 12, botY + 24, 8, canvas.height - botY);
        }

        function drawPlayer() {
            const px = player.x;
            const py = player.y;

            ctx.save();
            ctx.translate(px, py);

            // --- Rocket Backpack ---
            ctx.fillStyle = '#999999'; // Silver metal
            ctx.fillRect(-18, -12, 14, 20); // Main rocket body
            ctx.fillStyle = '#dddddd'; // Highlight
            ctx.fillRect(-14, -12, 4, 20);

            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            ctx.strokeRect(-18, -12, 14, 20);

            // Rocket Red Nose Cone
            ctx.fillStyle = '#ff2222';
            ctx.beginPath();
            ctx.moveTo(-18, -12);
            ctx.lineTo(-11, -22); // Pointy tip
            ctx.lineTo(-4, -12);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Rocket Engine Nozzle
            ctx.fillStyle = '#444444';
            ctx.fillRect(-15, 8, 8, 6);
            ctx.strokeRect(-15, 8, 8, 6);


            // --- The Snail ---

            // 1. Snail Body (Slime/Foot)
            ctx.fillStyle = '#ffcc66'; // Warm yellow/orange skin
            ctx.beginPath();
            // A long rounded pill shape for the body
            ctx.roundRect(-10, 8, 30, 10, 5);
            ctx.fill();
            ctx.stroke();

            // 2. Head / Neck
            ctx.beginPath();
            // Arching up from the front of the body
            ctx.arc(14, 6, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Smooth connection between head and body
            ctx.fillRect(8, 4, 8, 10);

            // 3. Snail Shell (Replacing generic circle with a detailed spiral)
            ctx.fillStyle = '#ff8800'; // Bright orange shell
            ctx.beginPath();
            ctx.arc(-2, -2, 14, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Shell Inner Spiral (Swirl)
            ctx.strokeStyle = '#cc0000'; // Dark red swirl
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(-2, -2, 8, -Math.PI / 2, Math.PI); // Inner loop
            ctx.arc(-2, -2, 4, Math.PI, Math.PI * 2.5); // Tighter loop
            ctx.stroke();

            // 4. Eyestalks (Antennae)
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;

            // Left stalk
            ctx.beginPath();
            ctx.moveTo(12, 0);
            ctx.lineTo(10, -8);
            ctx.stroke();
            // Right stalk
            ctx.beginPath();
            ctx.moveTo(18, 0);
            ctx.lineTo(22, -8);
            ctx.stroke();

            // 5. The Eyes (Bulbs at the end of stalks)
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(10, -10, 4, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(22, -10, 4, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

            // Pupils
            ctx.fillStyle = '#000000';
            ctx.beginPath(); ctx.arc(11, -10, 1.5, 0, Math.PI * 2); ctx.fill(); // Looking forward
            ctx.beginPath(); ctx.arc(23, -10, 1.5, 0, Math.PI * 2); ctx.fill();

            // 6. Cute little smile
            ctx.beginPath();
            ctx.arc(16, 8, 3, 0.1, Math.PI - 0.1);
            ctx.stroke();

            ctx.restore();
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        function drawFloorCeiling() {
            // Earth/Grass Ground Plane
            const groundY = canvas.height - 40;
            const scrollOffset = (frames * PIPE_SPEED) % 40;

            // Dirt Base
            ctx.fillStyle = "#c84c0c"; // Brown dirt
            ctx.fillRect(0, groundY, canvas.width, 40);

            // Grass top layer
            ctx.fillStyle = "#00a800"; // Green grass
            ctx.fillRect(0, groundY, canvas.width, 10);

            // Border between dirt/grass
            ctx.strokeStyle = "#000000";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.stroke();

            // Draw scrolling brick/dirt pattern
            ctx.fillStyle = "#fc9838";
            for (let x = -scrollOffset; x < canvas.width; x += 40) {
                // Top brick
                ctx.fillRect(x + 5, groundY + 15, 30, 8);
                // Bottom brick (offset)
                ctx.fillRect(x + 25, groundY + 28, 30, 8);
            }
        }

        function draw(timestamp) {
            requestAnimationFrame(draw);

            if (!lastTime) lastTime = timestamp;
            const elapsed = timestamp - lastTime;

            if (elapsed < fpsInterval) return;

            lastTime = timestamp - (elapsed % fpsInterval);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Screen shake
            if (screenShake > 0.5) {
                ctx.save();
                ctx.translate(
                    (Math.random() - 0.5) * screenShake,
                    (Math.random() - 0.5) * screenShake
                );
            }

            // Background layers
            drawClouds();

            // Pipes
            pipes.forEach(p => drawPipe(p));

            // Particles (behind player)
            drawParticles();

            // Player
            if (isStarted) drawPlayer();

            // Floor/ceiling neon lines
            drawFloorCeiling();

            if (screenShake > 0.5) ctx.restore();

            update();
        }

        function endGame() {
            if (isGameOver) return;
            isGameOver = true;
            screenShake = 15;
            audio.hit();
            // Death burst particles (Explosion)
            for (let i = 0; i < 30; i++) {
                const angle = (Math.PI * 2 / 30) * i;
                const speed = 2 + Math.random() * 5;
                particles.push({
                    x: player.x,
                    y: player.y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 0.8 + Math.random() * 0.4,
                    color: Math.random() > 0.6 ? '#ff0000' : (Math.random() > 0.3 ? '#ffaa00' : '#555555'),
                    size: Math.random() * 6 + 3
                });
            }
            finalScoreEl.textContent = score;
            WCGames.gameOver(score);
        }

        function resetGame() {
            isGameOver = false;
            isStarted = true;
            player.y = canvas.height / 2;
            player.velocity = 0;
            pipes = [];
            particles = [];
            frames = 0;
            score = 0;
            time = 0;
            screenShake = 0;
            scoreEl.textContent = '0';
        }

        WCGames.init({
            id: 'jump',
            onStart: () => { audio.init(); resetGame(); },
            onRestart: () => { audio.init(); resetGame(); }
        });

        draw();

        // Prevent context menu globally
        window.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
    <script src="/shared/i18n.js"></script>
</body>

</html>
