<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swarm Clash</title>
    <link rel="stylesheet" href="/shared/wcgames-style.css">
    <style>
        :root {
            --theme-color: #3b82f6;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #2a2c2b;
            /* Wasteland Dark Grey */
            color: white;
            font-family: 'Courier New', Courier, monospace;
            /* Retro 8-bit font style */
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        canvas {
            display: block;
            z-index: 5;
            position: relative;
        }

        /* 8-bit chunky UI overlay */
        #game-ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #000;
            /* Flat shadow instead of glow */
        }

        #ui-left {
            position: absolute;
            top: 75px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            z-index: 10;
        }

        #ui-right {
            position: absolute;
            top: 70px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            z-index: 10;
        }

        #ui-center {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            z-index: 10;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 4px;
            border: 3px solid #666;
            border-left-color: #aaa;
            border-top-color: #aaa;
            border-right-color: #333;
            border-bottom-color: #333;
            font-weight: 900;
            font-size: 18px;
            color: #ddd;
            min-width: 60px;
            text-align: center;
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
        }

        #blue-count {
            color: #60a5fa;
        }

        #red-count {
            color: #f87171;
        }

        /* Classic UI Overrides */
        .wcg-popup {
            background: #1e1e1e !important;
            border: 4px solid #444 !important;
            border-radius: 12px !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8) !important;
        }

        .wcg-popup h1 {
            color: #3b82f6 !important;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5) !important;
        }
    </style>
    <script src="/shared/wcgames-core.js"></script>
</head>

<body>
    <div id="ui-left">
        <div class="stat-box" style="color:#60a5fa;"><span id="blue-count">0</span></div>
    </div>
    <div id="ui-right">
        <div class="stat-box" style="color:#f87171;"><span id="red-count">0</span></div>
    </div>
    <div id="ui-center">
        <div class="stat-box"
            style="color:#fcd34d; border-color: #ca8a04; font-size: 22px; justify-content: center; gap: 15px;">
            <span id="score">0</span>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="title">Swarm Clash</h1>
            <p data-i18n="instruction">Drag to select units. Tap to move.</p>
            <button onclick="WCGames.start()" data-i18n="play">Start Battle</button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="game_over">Defeat</h1>
            <p><span data-i18n="final_score">Enemies Defeated: </span><span id="final-score">0</span></p>
            <button onclick="WCGames.restart()" data-i18n="play_again">Deploy Again</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // Optimize rendering by disabling transparency where unneeded

        let frames = 0;
        let score = 0;
        let isGameOver = false;
        let isStarted = false;

        // Input Selection State
        const selection = {
            active: false,
            startX: 0,
            startY: 0,
            endX: 0,
            endY: 0
        };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- INPUT HANDLING ---
        canvas.addEventListener('pointerdown', (e) => {
            if (!isStarted || isGameOver) return;

            // Check if we tapped or intent to drag. For now, assume a drag start.
            // If movement is very small, we treat it as a tap (Move Command) on pointerup.
            selection.active = true;
            selection.startX = e.clientX;
            selection.startY = e.clientY;
            selection.endX = e.clientX;
            selection.endY = e.clientY;
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!selection.active) return;
            selection.endX = e.clientX;
            selection.endY = e.clientY;
        });

        canvas.addEventListener('pointerup', (e) => {
            if (!selection.active) return;
            selection.active = false;

            const dx = selection.endX - selection.startX;
            const dy = selection.endY - selection.startY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 10) {
                // Treated as a TAP -> Issue Move Command
                issueMoveCommand(e.clientX, e.clientY);
            } else {
                // Treated as a DRAG -> Select Units
                processSelectionBox();
            }
        });

        // Prevent context menu
        window.addEventListener('contextmenu', e => e.preventDefault());

        // --- GAME CONFIGURATION ---

        // 유닛 공통 레벨링/밸런스 설정
        const BalanceConfig = {
            // 레벨별 크기 배율 (1레벨, 2레벨, 3레벨, 4레벨, 5레벨...)
            // 1.4는 기본 크기의 1.4배를 의미합니다.
            sizeScales: [1.0, 1.4, 1.8, 2.2, 2.6, 3.0, 3.4, 3.8, 4.2, 4.6, 5.0],

            // 레벨당 스탯(HP, 데미지) 증가 배율
            // 레벨 2는 레벨 1의 이 배수만큼 강해집니다.
            statMultiplierPerLevel: 2.0,

            // 플레이어 합체 설정
            playerMerge: {
                unitsRequired: 5,         // 합체에 필요한 동일 타입 & 레벨 유닛 수
                // 합체 보너스 (합쳐진 스탯의 몇 배가 될지 결정)
                // 현재 LevelScalingConfig.statMultiplierPerLevel과 연동됩니다.
                bonusScaling: 1.2   // (5배 / 5마리) -> 합체 시 레벨 5배 보수 유지
            }
        };

        // 공통 설정 (인간과 오크 모두에게 적용되는 기본값)
        const CommonConfig = {
            spawnRateSeconds: 1,         // 일반 유닛 소환 주기 (초 단위)
            spawnBatch: 1,               // 한 번 소환될 때 나오는 유닛 수
            bossSpawnRateSeconds: 30.0,  // 보스(Enhanced) 소환 주기 (초 단위)
            unitSize: 16,                // 기본 유닛 크기 배율
            speed: 1.0,                  // 이동 속도 배율
            baseMaxHp: 5000,             // 기지 체력
            probRanged: 0.15,            // 궁수 소환 확률 (15%)
            probTanker: 0.1,             // 방패병 소환 확률 (10%)
            probMage: 0.1,               // 마법사 소환 확률 (10%)
            probHealer: 0.1,             // 힐러 소환 확률 (10%) - 나머지 55%는 근접
            baseAttackRange: 175,        // 기지 대포 사거리
            baseAttackCooldown: 60,      // 기지 대포 발사 주기 (프레임)
            baseAttackDamage: 60,        // 기지 대포 데미지
            minSpawnRateSeconds: 0.1,    // 최소 스폰 주기 (0.1초 미만으로 작아지지 않음)
            reductionInterval: 100,      // 이 점수마다 스폰 주기 감소
            reductionAmount: 0.05        // 감소할 초 단위 시간
        };

        // 인간 진영 설정 (CommonConfig 상속)
        const PlayerConfig = Object.assign({}, CommonConfig);

        // 오크 진영 설정 (CommonConfig 상속 및 전용 레벨 밸런스 설정)
        const EnemyConfig = Object.assign({}, CommonConfig, {
            levelBalance: {
                Lv2: { scoreInterval: 200, probIncrement: 0.005, maxProb: 0.7 },
                Lv3: { scoreInterval: 500, probIncrement: 0.005, maxProb: 0.7 },
                Lv4: { scoreInterval: 1000, probIncrement: 0.005, maxProb: 0.7 },
                Lv5: { scoreInterval: 2000, probIncrement: 0.005, maxProb: 0.7 },
                Lv6: { scoreInterval: 5000, probIncrement: 0.005, maxProb: 0.7 },
                Lv7: { scoreInterval: 8000, probIncrement: 0.005, maxProb: 0.7 },
                Lv8: { scoreInterval: 10000, probIncrement: 0.005, maxProb: 0.7 },
                Lv9: { scoreInterval: 20000, probIncrement: 0.005, maxProb: 0.7 },
                Lv10: { scoreInterval: 30000, probIncrement: 0.005, maxProb: 0.7 },
            }
        });

        // 환경 변수 (중립 이벤트)
        const EnvironmentConfig = {
            lightningRateSeconds: 10,     // 번개가 내리치는 주기 (초 단위)
            lightningDamage: 100,         // 번개 Area of Effect 데미지
            lightningRadius: 60           // 번개 타격 범위
        };

        // 화면 레이아웃 및 영역 설정 (본기지를 기준으로 모두 설정)
        const LayoutConfig = {
            // 1. 본기지 위치 설정 (화면 양 끝 여백, Y축은 화면 높이 대비 비율)
            baseMarginX: 60,
            baseRatioY: 0.65,           // Lower base position for expansive flat plain (v5)

            // 2. 본기지 기준으로 리스폰 영역 상/하 (Y축 오프셋)
            spawnOffsetTop: -150,       // 스폰 허용 상단 끝
            spawnOffsetBottom: 150,     // 스폰 허용 하단 끝

            // 3. 본기지 기준으로 전투 영역 상/하 (Y축 오프셋 - 제한 범위)
            combatOffsetTop: -200,
            combatOffsetBottom: 200,

            // 4. 본기지 기준으로 합체할 영역 위치 및 크기 설정 (Player 전용)
            mergeOffsetX: -40,          // 기지 기준 X축 거리
            mergeOffsetY: 150,          // 기지 기준 Y축 상단 거리
            mergeWidth: 150,            // 영역 가로 폭
            mergeHeight: 150,           // 영역 세로 폭

            // 안전 구역(리스폰/합체)과 전투 구역을 나누는 X축 가이드라인 (기지 기준 X 오프셋)
            safeZoneWidth: 250
        };

        let MergeZone = { x: -1000, y: -1000, width: LayoutConfig.mergeWidth, height: LayoutConfig.mergeHeight }; // 초기화는 startGame() 에서

        const HORIZON_Y = 0.05 * canvas.height; // Lower horizon for deeper perspective (v5)

        // Unit Types
        const TYPE_MELEE = 0;
        const TYPE_RANGED = 1;
        const TYPE_ENHANCED = 2;
        const TYPE_TANKER = 3;
        const TYPE_MAGE = 4;
        const TYPE_HEALER = 5;

        let units = [];
        let particles = [];
        let projectiles = [];
        let lightnings = [];
        let playerBase = { x: 0, y: 0, hp: PlayerConfig.baseMaxHp, team: 0, cooldown: 0 };
        let enemyBase = { x: 0, y: 0, hp: EnemyConfig.baseMaxHp, team: 1, cooldown: 0 };

        // Sprite Caching
        const sprites = {};

        // Helper: Generate an offscreen canvas sprite from a string array
        function createSprite(w, h, palette, pixels) {
            const oc = document.createElement('canvas');
            oc.width = w; oc.height = h;
            const octx = oc.getContext('2d');
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const idx = pixels[y][x];
                    if (idx !== ' ') {
                        octx.fillStyle = palette[idx];
                        octx.fillRect(x, y, 1, 1);
                    }
                }
            }
            return oc;
        }

        const rng = (s) => { s = Math.sin(s) * 43758.5453; return s - Math.floor(s); };
        // Generate Sprites on boot
        function generateSprites() {
            // Palettes
            const pPal = {
                '0': '#00000033', // Shadow
                '1': '#1e3a8a', '2': '#3b82f6', '3': '#93c5fd', // Armor blue
                '4': '#fbbf24', '5': '#d97706', // Gold trim
                '6': '#fef08a', '7': '#78350f', // Face/Leather (Skin lighter)
                '8': '#ffffff', '9': '#ef4444', // White / Red plume
                // New high-fidelity colors
                'a': '#000000', // Solid Outline
                'b': '#ffffff', // Pure White
                'c': '#e5e7eb', // Bright Steel
                'd': '#9ca3af', // Mid Steel
                'e': '#4b5563', // Dark Steel
                'f': '#fcd34d', // Human Skin Light
                'g': '#b45309', // Dark Leather/Wood
                'h': '#fde047', // Bright Gold Highlight
                'i': '#3b82f6', // Player Blue Tabard
                'j': '#1e3a8a'  // Dark Blue Shadow
            };
            const ePal = {
                '0': '#00000033', // Shadow
                '1': '#450a0a', '2': '#991b1b', '3': '#ef4444', // Red Cloth/Armor
                '4': '#4ade80', '5': '#bef264', // Brighter Lime/Green Skin
                '6': '#1f2937', '7': '#4b5563', '8': '#9ca3af', // Iron/Armor/Axe
                '9': '#ffffff', // Bone/Eye
                // New high-fidelity colors
                'a': '#000000', // Solid Outline
                'b': '#ffffff', // Pure White/Teeth/Eyes
                'c': '#e5e7eb', // Bright Steel Scrap
                'd': '#9ca3af', // Mid Steel Scrap
                'e': '#4b5563', // Dark Iron
                'f': '#4ade80', // Orc Skin Light
                'g': '#166534', // Orc Skin Dark
                'h': '#ef4444', // Enemy Red Cloth
                'i': '#7f1d1d', // Dark Red Shadow
                'j': '#451a03'  // Dark Wood/Leather
            };

            // Helper to generate 3-frame animation set (spr1, spr2 for walk, sprAtk for attack)
            const createAnim = (w, h, pal, f1, f2, fAtk) => ({
                spr1: createSprite(w, h, pal, f1),
                spr2: createSprite(w, h, pal, f2),
                sprAtk: createSprite(w, h, pal, fAtk)
            });

            // === ULTRA-DETAILED 100x100 Canvas Sprites ===
            function build100x100Sprite(drawFunc) {
                const c = document.createElement('canvas');
                c.width = 100; c.height = 100;
                const ctx = c.getContext('2d');
                drawFunc(ctx);
                return c;
            }
            function createHighResAnim(d1, d2, d3) {
                return { spr1: build100x100Sprite(d1), spr2: build100x100Sprite(d2), sprAtk: build100x100Sprite(d3) };
            }
            // Shared helpers
            function drawJoint(ctx, x, y, r, c) { ctx.fillStyle = c; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill(); }
            function metalGrad(ctx, x, y, w, h) { const g = ctx.createLinearGradient(x, y, x + w, y); g.addColorStop(0, '#475569'); g.addColorStop(0.3, '#94a3b8'); g.addColorStop(0.6, '#cbd5e1'); g.addColorStop(1, '#64748b'); ctx.fillStyle = g; ctx.fillRect(x, y, w, h); }
            function armorGrad(ctx, x, y, w, h) { const g = ctx.createLinearGradient(x, y, x + w, y); g.addColorStop(0, '#1e3a8a'); g.addColorStop(0.4, '#2563eb'); g.addColorStop(0.7, '#3b82f6'); g.addColorStop(1, '#1e40af'); ctx.fillStyle = g; ctx.fillRect(x, y, w, h); }
            function drawBoot(ctx, x, y, flip) { ctx.fillStyle = '#78350f'; ctx.fillRect(x, y, 10, 8); ctx.fillStyle = '#92400e'; ctx.fillRect(x + (flip ? 0 : 6), y + 5, 4, 6); ctx.fillStyle = '#451a03'; ctx.fillRect(x, y + 8, 12, 4); }
            function drawFace(ctx, x, y, s) { ctx.fillStyle = '#fcd34d'; ctx.beginPath(); ctx.arc(x, y, s, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#fbbf24'; ctx.beginPath(); ctx.arc(x, y, s, -Math.PI, 0); ctx.fill();/* eye */ctx.fillStyle = '#000'; ctx.fillRect(x + s * 0.3, y - s * 0.2, s * 0.35, s * 0.25); ctx.fillStyle = '#fff'; ctx.fillRect(x + s * 0.35, y - s * 0.15, s * 0.15, s * 0.1); }

            // --- Humans (Blue) - Facing RIGHT ---

            // ========== WARRIOR ==========
            function drawWarriorBase(ctx, ox, oy, legOff) {
                // Shadow

                // Legs with joints
                ctx.fillStyle = '#334155'; ctx.fillRect(40 + ox, 75 + oy + legOff, 11, 18); ctx.fillRect(55 + ox, 75 + oy - legOff, 11, 18);
                drawJoint(ctx, 45 + ox, 75 + oy + legOff, 5, '#475569'); drawJoint(ctx, 60 + ox, 75 + oy - legOff, 5, '#475569');
                drawBoot(ctx, 38 + ox, 91 + oy + legOff, false); drawBoot(ctx, 54 + ox, 91 + oy - legOff, true);
                // Body armor with gradient
                armorGrad(ctx, 35 + ox, 38 + oy, 30, 38);
                // Shoulder pauldrons
                drawJoint(ctx, 35 + ox, 42 + oy, 8, '#475569'); drawJoint(ctx, 65 + ox, 42 + oy, 8, '#64748b');
                // Gold belt
                ctx.fillStyle = '#fbbf24'; ctx.fillRect(35 + ox, 70 + oy, 30, 4);
                ctx.fillStyle = '#f59e0b'; ctx.beginPath(); ctx.arc(50 + ox, 72 + oy, 3, 0, Math.PI * 2); ctx.fill();
                // Neck
                ctx.fillStyle = '#fcd34d'; ctx.fillRect(48 + ox, 32 + oy, 8, 8);
                // Helmet
                metalGrad(ctx, 38 + ox, 10 + oy, 28, 25);
                ctx.fillStyle = '#64748b'; ctx.beginPath(); ctx.arc(52 + ox, 22 + oy, 15, 0, Math.PI * 2); ctx.fill();
                // Visor slit
                ctx.fillStyle = '#0f172a'; ctx.fillRect(58 + ox, 18 + oy, 12, 4);
                ctx.fillStyle = '#fbbf24'; ctx.fillRect(58 + ox, 17 + oy, 12, 1); ctx.fillRect(58 + ox, 22 + oy, 12, 1);
                // Nose guard
                ctx.fillStyle = '#94a3b8'; ctx.fillRect(66 + ox, 14 + oy, 3, 12);
                // Red plume
                const pg = ctx.createLinearGradient(42 + ox, 0, 42 + ox, 18 + oy); pg.addColorStop(0, '#fca5a5'); pg.addColorStop(1, '#dc2626'); ctx.fillStyle = pg;
                ctx.beginPath(); ctx.moveTo(38 + ox, 18 + oy); ctx.quadraticCurveTo(35 + ox, 0, 55 + ox, 0); ctx.quadraticCurveTo(65 + ox, 5 + oy, 55 + ox, 18 + oy); ctx.fill();
                // Chest emblem
                ctx.fillStyle = '#fbbf24'; ctx.fillRect(46 + ox, 50 + oy, 3, 10); ctx.fillRect(43 + ox, 53 + oy, 9, 3);
            }
            function drawSword(ctx, x, y, angle) {
                ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
                metalGrad(ctx, -3, -55, 8, 50);
                ctx.fillStyle = '#e2e8f0'; ctx.fillRect(3, -55, 2, 50);
                ctx.fillStyle = '#fbbf24'; ctx.fillRect(-6, -5, 14, 4);
                ctx.fillStyle = '#dc2626'; ctx.beginPath(); ctx.arc(1, -5, 3, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#78350f'; ctx.fillRect(-2, 0, 6, 12);
                ctx.fillStyle = '#fbbf24'; ctx.beginPath(); ctx.arc(1, 12, 3, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
            sprites.pMelee = createHighResAnim(
                (ctx) => { drawWarriorBase(ctx, 0, 0, 0); drawSword(ctx, 72, 30, -0.1); },
                (ctx) => { drawWarriorBase(ctx, 0, -1, 3); drawSword(ctx, 72, 28, -0.15); },
                (ctx) => {
                    ctx.translate(5, 3); ctx.rotate(0.12); drawWarriorBase(ctx, 0, 0, 5);
                    // Horizontal thrust sword
                    ctx.save(); ctx.translate(70, 50); ctx.rotate(-Math.PI / 2 + 0.3);
                    metalGrad(ctx, -4, -60, 10, 55); ctx.fillStyle = '#e2e8f0'; ctx.fillRect(4, -60, 2, 55);
                    ctx.fillStyle = '#fbbf24'; ctx.fillRect(-7, -5, 16, 5); ctx.fillStyle = '#78350f'; ctx.fillRect(-2, 0, 6, 10); ctx.restore();
                    // Slash trail
                    ctx.globalAlpha = 0.3; ctx.strokeStyle = '#bfdbfe'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(75, 50, 25, -1, 0.5); ctx.stroke(); ctx.globalAlpha = 1;
                    ctx.resetTransform();
                }
            );

            // ========== ARCHER ==========
            function drawArcherBase(ctx, ox, oy, legOff) {

                // Legs
                ctx.fillStyle = '#78350f'; ctx.fillRect(35 + ox, 78 + oy + legOff, 9, 14); ctx.fillRect(48 + ox, 78 + oy - legOff, 9, 14);
                drawJoint(ctx, 39 + ox, 78 + oy + legOff, 4, '#92400e'); drawJoint(ctx, 52 + ox, 78 + oy - legOff, 4, '#92400e');
                drawBoot(ctx, 33 + ox, 90 + oy + legOff, false); drawBoot(ctx, 46 + ox, 90 + oy - legOff, true);
                // Green tunic body
                const tg = ctx.createLinearGradient(30 + ox, 35 + oy, 60 + ox, 35 + oy); tg.addColorStop(0, '#064e3b'); tg.addColorStop(0.5, '#065f46'); tg.addColorStop(1, '#047857'); ctx.fillStyle = tg;
