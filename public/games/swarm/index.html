<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarm Clash</title>
    <link rel="stylesheet" href="/shared/wcgames-style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            user-select: none;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            image-rendering: pixelated;
        }

        /* UI Styling */
        .wcg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 5;
        }

        #score-container {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .wcg-popup {
            background: rgba(12, 10, 9, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            color: #fff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 16px;
            font-weight: 900;
            letter-spacing: -0.04em;
        }

        p {
            color: #a8a29e;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(255, 255, 255, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading Animation */
        .loading::after {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #000;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="ui-layer">
        <div id="score-container">
            <span data-i18n="score">Score: </span><span id="score">0</span>
        </div>
    </div>

    <div id="start-screen" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="game_title">Swarm Clash</h1>
            <p data-i18n="game_desc">Lead your legion. Merge units in the ritual circle to level up. Surrender is not an
                option.</p>
            <button onclick="SwarmGame.start()" data-i18n="play" disabled class="loading">Loading Assets...</button>
        </div>
    </div>

    <div id="game-over" class="wcg-overlay" style="display: none;">
        <div class="wcg-popup">
            <h1 data-i18n="game_over">Defeat</h1>
            <p><span data-i18n="final_score">Score: </span><span id="final-score">0</span></p>
            <button onclick="WCGames.restart()" data-i18n="play_again">Deploy Again</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="/shared/wcgames-core.js"></script>
    <script src="game.js"></script>
    <script src="/shared/i18n.js"></script>
</body>

</html>
