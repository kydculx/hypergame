<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swarm Clash</title>
    <link rel="stylesheet" href="/shared/wcgames-style.css">
    <style>
        :root {
            --theme-color: #3b82f6;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #2a2c2b;
            /* Wasteland Dark Grey */
            color: white;
            font-family: 'Courier New', Courier, monospace;
            /* Retro 8-bit font style */
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        canvas {
            display: block;
            z-index: 5;
            position: relative;
        }

        /* 8-bit chunky UI overlay */
        #game-ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #000;
            /* Flat shadow instead of glow */
        }


        #ui-center {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            z-index: 10;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 4px;
            border: 3px solid #666;
            border-left-color: #aaa;
            border-top-color: #aaa;
            border-right-color: #333;
            border-bottom-color: #333;
            font-weight: 900;
            font-size: 18px;
            color: #ddd;
            min-width: 60px;
            text-align: center;
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
        }

        /* Classic UI Overrides */
        .wcg-popup {
            background: #1e1e1e !important;
            border: 4px solid #444 !important;
            border-radius: 12px !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8) !important;
        }

        .wcg-popup h1 {
            color: #3b82f6 !important;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5) !important;
        }

        button:disabled.loading {
            opacity: 0.6;
            cursor: not-allowed;
            color: #aaa !important;
            border-color: #555 !important;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 0.6;
            }
        }
    </style>
    <script src="/shared/wcgames-core.js"></script>
</head>

<body>
    <div id="ui-center">
        <div class="stat-box"
            style="color:#fcd34d; border-color: #ca8a04; font-size: 22px; justify-content: center; gap: 15px;">
            <span id="score">0</span>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="title">Swarm Clash</h1>
            <p data-i18n="instruction">Drag to select units. Tap to move.</p>
            <button onclick="WCGames.start()" data-i18n="play" disabled class="loading">Loading...</button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="game_over">Defeat</h1>
            <p><span data-i18n="final_score">Enemies Defeated: </span><span id="final-score">0</span></p>
            <button onclick="WCGames.restart()" data-i18n="play_again">Deploy Again</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // Optimize rendering by disabling transparency where unneeded

        let frames = 0;
        let lastTime = 0;
        const fpsInterval = 1000 / 60;
        let score = 0;
        let isGameOver = false;
        let isStarted = false;

        // Input Selection State
        const selection = {
            active: false,
            startX: 0,
            startY: 0,
            endX: 0,
            endY: 0
        };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Re-sync base positions on resize to maintain configured ratios
            if (isStarted) {
                playerBase.x = BASE_MARGIN_X;
                playerBase.y = canvas.height * BASE_RATIO_Y;
                enemyBase.x = canvas.width - BASE_MARGIN_X;
                enemyBase.y = canvas.height * BASE_RATIO_Y;

                // Also sync back to LayoutConfig if needed for other calculations
                LayoutConfig.baseMarginX = BASE_MARGIN_X;
                LayoutConfig.baseRatioY = BASE_RATIO_Y;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // --- INPUT HANDLING ---
        canvas.addEventListener('pointerdown', (e) => {
            if (!isStarted || isGameOver) return;

            // Check if we tapped or intent to drag. For now, assume a drag start.
            // If movement is very small, we treat it as a tap (Move Command) on pointerup.
            selection.active = true;
            selection.startX = e.clientX;
            selection.startY = e.clientY;
            selection.endX = e.clientX;
            selection.endY = e.clientY;
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!selection.active) return;
            selection.endX = e.clientX;
            selection.endY = e.clientY;
        });

        canvas.addEventListener('pointerup', (e) => {
            if (!selection.active) return;
            selection.active = false;

            const dx = selection.endX - selection.startX;
            const dy = selection.endY - selection.startY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 10) {
                // Treated as a TAP -> Issue Move Command
                issueMoveCommand(e.clientX, e.clientY);
            } else {
                // Treated as a DRAG -> Select Units
                processSelectionBox();
            }
        });

        // Prevent context menu
        window.addEventListener('contextmenu', e => e.preventDefault());

        // --- GAME CONFIGURATION ---

        // 유닛 공통 레벨링/밸런스 설정
        const BalanceConfig = {
            // 레벨별 크기 배율 (1레벨, 2레벨, 3레벨, 4레벨, 5레벨...)
            // 1.4는 기본 크기의 1.4배를 의미합니다.
            sizeScales: [1.0, 1.2, 1.4, 1.6, 1.8, 2.0, 2.2, 2.4, 2.6, 2.8, 3.0],

            // 레벨당 스탯(HP, 데미지) 증가 배율
            // 레벨 2는 레벨 1의 이 배수만큼 강해집니다.
            statMultiplierPerLevel: 2.0,

            // 플레이어 합체 설정
            playerMerge: {
                unitsRequired: 5,         // 합체에 필요한 동일 타입 & 레벨 유닛 수
                // 합체 보너스 (합쳐진 스탯의 몇 배가 될지 결정)
                // 현재 LevelScalingConfig.statMultiplierPerLevel과 연동됩니다.
                bonusScaling: 1.2   // (5배 / 5마리) -> 합체 시 레벨 5배 보수 유지
            }
        };

        // --- GLOBAL CONFIGURABLE CONSTANTS ---
        var BASE_MARGIN_X = 20; // Anchor Margin from edges
        var BASE_RATIO_Y = 0.7;  // Y position as ratio of height (0.0 to 1.0)
        const CommonConfig = {
            spawnRateSeconds: 1,         // 일반 유닛 소환 주기 (초 단위)
            spawnBatch: 1,               // 한 번 소환될 때 나오는 유닛 수
            unitSize: 16,                // 기본 유닛 크기 배율
            speed: 1.0,                  // 이동 속도 배율
            baseMaxHp: 5000,             // 기지 체력
            probRanged: 0.1,            // 궁수 소환 확률 (10%)
            probTanker: 0.1,             // 방패병 소환 확률 (10%)
            probMage: 0.1,               // 마법사 소환 확률 (10%)
            probHealer: 0.1,             // 힐러 소환 확률 (10%) - 나머지 60%는 근접
            baseAttackRange: 175,        // 기지 대포 사거리
            baseAttackCooldown: 60,      // 기지 대포 발사 주기 (프레임)
            baseAttackDamage: 60,        // 기지 대포 데미지
            minSpawnRateSeconds: 0.1,    // 최소 스폰 주기 (0.1초 미만으로 작아지지 않음)
            reductionInterval: 100,      // 이 점수마다 스폰 주기 감소
            reductionAmount: 0.05        // 감소할 초 단위 시간
        };

        // 인간 진영 설정 (CommonConfig 상속)
        const PlayerConfig = Object.assign({}, CommonConfig);

        // 오크 진영 설정 (CommonConfig 상속 및 전용 레벨 밸런스 설정)
        const EnemyConfig = Object.assign({}, CommonConfig, {
            levelBalance: {
                Lv2: { scoreInterval: 100, probIncrement: 0.005, maxProb: 0.7 },
                Lv3: { scoreInterval: 300, probIncrement: 0.005, maxProb: 0.7 },
                Lv4: { scoreInterval: 500, probIncrement: 0.005, maxProb: 0.7 },
                Lv5: { scoreInterval: 700, probIncrement: 0.005, maxProb: 0.7 },
                Lv6: { scoreInterval: 900, probIncrement: 0.005, maxProb: 0.7 },
                Lv7: { scoreInterval: 1100, probIncrement: 0.005, maxProb: 0.7 },
                Lv8: { scoreInterval: 1300, probIncrement: 0.005, maxProb: 0.7 },
                Lv9: { scoreInterval: 1500, probIncrement: 0.005, maxProb: 0.7 },
                Lv10: { scoreInterval: 1700, probIncrement: 0.005, maxProb: 0.7 },
            }
        });

        // 환경 변수 (중립 이벤트)
        const EnvironmentConfig = {
            lightningRateSeconds: 10,     // 번개가 내리치는 주기 (초 단위)
            lightningDamage: 100,         // 번개 Area of Effect 데미지
            lightningRadius: 60           // 번개 타격 범위
        };

        // 화면 레이아웃 및 영역 설정 (본기지를 기준으로 모두 설정)
        const LayoutConfig = {
            // 1. 본기지 위치 설정 (화면 양 끝 여백, Y축은 화면 높이 대비 비율)
            baseMarginX: BASE_MARGIN_X,
            baseRatioY: BASE_RATIO_Y,

            // 2. 본기지 기준으로 리스폰 영역 상/하 (Y축 오프셋)
            spawnOffsetTop: -150,       // 스폰 허용 상단 끝
            spawnOffsetBottom: 150,     // 스폰 허용 하단 끝

            // 3. 본기지 기준으로 전투 영역 상/하 (Y축 오프셋 - 제한 범위)
            combatOffsetTop: -200,
            combatOffsetBottom: 200,

            // 4. 본기지 기준으로 합체할 영역 위치 및 크기 설정 (Player 전용)
            mergeOffsetX: -20,          // 기지 기준 X축 거리
            mergeOffsetY: 100,          // 기지 기준 Y축 상단 거리
            mergeWidth: 150,            // 영역 가로 폭
            mergeHeight: 150,           // 영역 세로 폭

            // 안전 구역(리스폰/합체)과 전투 구역을 나누는 X축 가이드라인 (기지 기준 X 오프셋)
            safeZoneWidth: 250
        };

        let MergeZone = { x: -1000, y: -1000, width: LayoutConfig.mergeWidth, height: LayoutConfig.mergeHeight }; // 초기화는 startGame() 에서

        const HORIZON_Y = 0.05 * canvas.height; // Lower horizon for deeper perspective (v5)

        // Unit Types
        const TYPE_MELEE = 0;
        const TYPE_RANGED = 1;
        const TYPE_TANKER = 3;
        const TYPE_MAGE = 4;
        const TYPE_HEALER = 5;

        let units = [];
        let particles = [];
        let projectiles = [];
        let lightnings = [];
        let playerBase = { x: 0, y: 0, hp: PlayerConfig.baseMaxHp, team: 0, cooldown: 0 };

        // Sprite Caching
        const sprites = {};




        // Background grid tile (used for fallback background pattern)
        const bgC = document.createElement('canvas');
        bgC.width = 8; bgC.height = 8;
        const bgCtx = bgC.getContext('2d');
        bgCtx.fillStyle = "#1c1917";
        bgCtx.fillRect(0, 0, 8, 8);
        sprites.bgGrid = bgC;

        // --- High-Fidelity Canvas Battlefield Background ---
        // --- Static High-Fidelity Background Loader & Sprite System ---
        // Asset Preloading Logic
        let assetsLoaded = 0;
        const TOTAL_ASSETS = 12; // 1 Background + 1 Player Base + 10 Unit Sheets

        function checkAssetProgress() {
            assetsLoaded++;
            const startBtn = document.querySelector('#start-screen button');
            if (startBtn) {
                if (assetsLoaded < TOTAL_ASSETS) {
                    startBtn.disabled = true;
                    startBtn.classList.add('loading');
                    startBtn.innerText = `Loading... (${assetsLoaded}/${TOTAL_ASSETS})`;
                } else {
                    startBtn.disabled = false;
                    startBtn.classList.remove('loading');
                    // Use translated text if available
                    startBtn.innerText = (window.WCGamesTranslation && window.WCGamesTranslation.play) ? window.WCGamesTranslation.play : "Start Battle";
                }
            }
        }

        // Background
        const bgImg = new Image();
        bgImg.src = 'background_v5.png';
        bgImg.onload = () => { sprites.fullBg = bgImg; checkAssetProgress(); };
        bgImg.onerror = () => { console.error('Failed to load background'); checkAssetProgress(); };

        // Unified Sprite Sheet Loader
        function loadUnitSheet(team, type, filename, nfcFilename) {
            const img = new Image();
            img.src = filename;
            img.onerror = () => {
                if (nfcFilename && img.src !== nfcFilename) {
                    img.src = nfcFilename;
                } else {
                    console.error(`Failed to load unit sheet: ${filename}`);
                    checkAssetProgress();
                }
            };
            img.onload = () => {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = img.width;
                tempCanvas.height = img.height;
                const tctx = tempCanvas.getContext('2d');
                tctx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
                tctx.drawImage(img, 0, 0);
                const imgData = tctx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
                const data = imgData.data;

                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i + 1], b = data[i + 2];
                    if ((r > 150 && b > 150 && g < 150) || (r > 200 && b > 200 && g < 180)) {
                        data[i + 3] = 0;
                    } else {
                        const isGreyShadow = (Math.abs(r - 128) < 30 && Math.abs(g - 128) < 30 && Math.abs(b - 128) < 30);
                        const isOrcPurpleShadow = (Math.abs(r - 85) < 30 && Math.abs(g - 19) < 30 && Math.abs(b - 81) < 30);
                        if (isGreyShadow || isOrcPurpleShadow) {
                            data[i] = 0; data[i + 1] = 0; data[i + 2] = 0; data[i + 3] = 100;
                        }
                    }
                }
                tctx.putImageData(imgData, 0, 0);
                const key = (team === 0 ? 'p' : 'e') + type;
                sprites[key + 'Sheet'] = tempCanvas;
                sprites[key + 'Meta'] = { frameW: 552, frameH: 752, framesPerRow: 5 };
                checkAssetProgress();
            };
        }

        // Load all known unit sprite sheets
        const unitFiles = [
            { team: 0, type: TYPE_MELEE, file: '인간전사.png', nfc: '인간전사.png' },
            { team: 0, type: TYPE_RANGED, file: '인간궁수.png', nfc: '인간궁수.png' },
            { team: 0, type: TYPE_TANKER, file: '인간탱커.png', nfc: '인간탱커.png' },
            { team: 0, type: TYPE_MAGE, file: '인간법사.png', nfc: '인간법사.png' },
            { team: 0, type: TYPE_HEALER, file: '인간사제.png', nfc: '인간사제.png' },
            { team: 1, type: TYPE_MELEE, file: '오크전사.png', nfc: '오크전사.png' },
            { team: 1, type: TYPE_RANGED, file: '오크궁수.png', nfc: '오크궁수.png' },
            { team: 1, type: TYPE_TANKER, file: '오크탱커.png', nfc: '오크탱커.png' },
            { team: 1, type: TYPE_MAGE, file: '오크법사.png', nfc: '오크법사.png' },
            { team: 1, type: TYPE_HEALER, file: '오크사제.png', nfc: '오크사제.png' }
        ];

        unitFiles.forEach(u => loadUnitSheet(u.team, u.type, u.file, u.nfc));

        // Player Base
        const baseImg = new Image();
        baseImg.src = 'castle.png';
        baseImg.onload = () => {
            const c = document.createElement('canvas');
            c.width = baseImg.width; c.height = baseImg.height;
            const x = c.getContext('2d');
            x.drawImage(baseImg, 0, 0);
            try {
                const imgData = x.getImageData(0, 0, c.width, c.height);
                const d = imgData.data;
                for (let i = 0; i < d.length; i += 4) {
                    if (d[i] > 150 && d[i + 2] > 150 && d[i + 1] < 120) d[i + 3] = 0;
                }
                x.putImageData(imgData, 0, 0);
            } catch (e) {
                console.warn('[Sprites] Canvas taint on castle.png, skipping magenta removal:', e.message);
            }
            sprites.pBase = c;
            checkAssetProgress();
        };
        baseImg.onerror = () => {
            console.error('Failed to load castle.png');
            const c = document.createElement('canvas'); c.width = 128; c.height = 128;
            const x = c.getContext('2d');
            x.fillStyle = '#1e3a8a'; x.fillRect(0, 0, 128, 128);
            sprites.pBase = c;
            checkAssetProgress();
        };


        // Projectile for Ranged Units
        class Projectile {
            constructor(x, y, target, damage, team, speed = 5, isCannon = false, isMagic = false, isHeal = false) {
                this.x = x;
                this.y = y;
                this.startX = x;
                this.startY = y;
                this.z = 0; // Height for parabolic arc
                this.target = target;
                this.team = team;
                this.damage = damage;
                this.speed = speed;
                this.isCannon = isCannon;
                this.isMagic = isMagic;
                this.isHeal = isHeal;
                this.active = true;
            }
        }

        // Particle FX
        class Particle {
            constructor(x, y, color, isCross = false) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.life = 5 + Math.random() * 20;
                this.maxLife = this.life;
                this.color = color;
                this.isCross = isCross;
            }
        }

        // Simple data structure for Units to minimize GC pauses
        let unitIdCounter = 0;
        class Unit {
            constructor(x, y, team, type = TYPE_MELEE, level = 1, overrideStats = null) {
                this.id = unitIdCounter++;
                this.x = x;
                this.y = y;
                this.team = team; // 0 = Player (Blue), 1 = Enemy (Red)
                this.type = type; // 0=Melee, 1=Ranged, 2=Enhanced

                const conf = team === 0 ? PlayerConfig : EnemyConfig;
                // Base stats by type
                if (type === TYPE_MELEE) {
                    this.maxHp = 15;
                    this.damage = 3;
                    this.attackRange = conf.unitSize + 3;
                    this.speed = conf.speed;
                    this.cooldownMax = 30; // 0.5s
                    this.size = conf.unitSize;
                } else if (type === TYPE_RANGED) {
                    this.maxHp = 8;
                    this.damage = 2;
                    this.attackRange = 60;
                    this.speed = conf.speed * 0.8;
                    this.cooldownMax = 45; // 0.75s
                    this.size = conf.unitSize;
                } else if (type === TYPE_TANKER) {
                    this.maxHp = 50;
                    this.damage = 4;
                    this.attackRange = conf.unitSize + 5;
                    this.speed = conf.speed * 0.5;
                    this.cooldownMax = 40;
                    this.size = conf.unitSize * 1.5;
                } else if (type === TYPE_MAGE) {
                    this.maxHp = 6;
                    this.damage = 5;
                    this.attackRange = 100;
                    this.speed = conf.speed * 0.7;
                    this.cooldownMax = 60; // 1s
                    this.size = conf.unitSize;
                } else if (type === TYPE_HEALER) {
                    this.maxHp = 8;
                    this.damage = -5; // Negative damage implies healing
                    this.attackRange = 120;
                    this.speed = conf.speed * 0.9;
                    this.cooldownMax = 50;
                    this.size = conf.unitSize;
                } else if (type === TYPE_CAVALRY) {
                    this.maxHp = 25;
                    this.damage = 6;
                    this.attackRange = 45;
                    this.speed = conf.speed * 1.6;
                    this.cooldownMax = 40;
                    this.size = conf.unitSize * 1.3;
                }
                // Apply level-based scaling
                if (level > 1) {
                    const skillMult = Math.pow(BalanceConfig.statMultiplierPerLevel, level - 1);
                    this.maxHp = Math.ceil(this.maxHp * skillMult);
                    this.damage = Math.ceil(this.damage * skillMult);

                    // 레벨별 크기 배율 적용 (BalanceConfig.sizeScales 변수 사용)
                    const sizeScale = BalanceConfig.sizeScales[Math.min(level, BalanceConfig.sizeScales.length) - 1] || 1.0;
                    this.size = this.size * sizeScale;
                }

                if (overrideStats) {
                    if (overrideStats.maxHp !== undefined) this.maxHp = overrideStats.maxHp;
                    if (overrideStats.damage !== undefined) this.damage = overrideStats.damage;
                    if (overrideStats.size !== undefined) this.size = overrideStats.size;
                    this.hp = overrideStats.hp !== undefined ? overrideStats.hp : (overrideStats.maxHp !== undefined ? overrideStats.maxHp : this.maxHp);
                }

                this.level = level;
                this.hp = overrideStats ? overrideStats.hp : this.maxHp;
                this.vx = 0;
                this.vy = 0;
                this.targetX = null;
                this.targetY = null;

                // State: 0=Idle(Running Forward), 1=Moving(Commanded), 2=Attacking
                this.state = 0;
                this.selected = false;

                // Combat
                this.attackTarget = null;
                this.attackCooldown = 0;
            }
        }

        function issueMoveCommand(destX, destY) {
            let selectedCount = 0;
            for (let i = 0; i < units.length; i++) {
                if (units[i].selected && units[i].team === 0) {
                    selectedCount++;
                    // Add slight random offset so they don't all converge to the exact same pixel pixel-perfectly
                    units[i].targetX = destX + (Math.random() - 0.5) * 40;
                    units[i].targetY = destY + (Math.random() - 0.5) * 40;
                    units[i].state = 1; // Set state to MOVING
                    units[i].selected = false; // Deselect after issuing command
                }
            }
            // If no units are selected, we shouldn't do anything special (yet).
        }

        function processSelectionBox() {
            // Find bounding box limits
            const minX = Math.min(selection.startX, selection.endX);
            const maxX = Math.max(selection.startX, selection.endX);
            const minY = Math.min(selection.startY, selection.endY);
            const maxY = Math.max(selection.startY, selection.endY);

            for (let i = 0; i < units.length; i++) {
                const u = units[i];
                if (u.team === 0) {
                    // Check if unit center is inside the box
                    if (u.x >= minX && u.x <= maxX && u.y >= minY && u.y <= maxY) {
                        u.selected = true;
                    } else {
                        // Clear selection if it wasn't in the new box
                        u.selected = false;
                    }
                }
            }
        }

        function drawBackground() {
            // Keep it crispy pixel perfect
            ctx.imageSmoothingEnabled = false;

            // Draw Pre-rendered Battlefield Scene
            if (sprites.fullBg) {
                ctx.drawImage(sprites.fullBg, 0, 0, canvas.width, canvas.height);
            } else {
                // Fallback Tile Native Pattern
                const ptrn = ctx.createPattern(sprites.bgGrid, 'repeat');
                ctx.fillStyle = ptrn;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function update() {
            if (isGameOver || !isStarted) return;

            // Initialize player base on first frame
            if (frames === 0) {
                playerBase.x = LayoutConfig.baseMarginX;
                playerBase.y = canvas.height * LayoutConfig.baseRatioY;
            }



            // Simple Spatial Grid Partitioning (Grid size: 40x40)
            const CELL_SIZE = 40;
            const grid = {};
            const getGridKey = (x, y) => `${Math.floor(x / CELL_SIZE)},${Math.floor(y / CELL_SIZE)}`;

            // Populate Grid
            for (let i = 0; i < units.length; i++) {
                const u = units[i];
                if (u.hp <= 0) continue; // Skip dying
                const key = getGridKey(u.x, u.y);
                if (!grid[key]) grid[key] = [];
                grid[key].push(u);
            }

            // Spawning Logic (Batches for massive armies)
            const getDynamicRate = (conf) => {
                const reductionCount = Math.floor(score / conf.reductionInterval);
                const currentRate = conf.spawnRateSeconds - (reductionCount * conf.reductionAmount);
                return Math.max(conf.minSpawnRateSeconds, currentRate);
            };

            const pSpawnInterval = Math.max(1, Math.floor(getDynamicRate(PlayerConfig) * 60));
            const eSpawnInterval = Math.max(1, Math.floor(getDynamicRate(EnemyConfig) * 60));

            // 리스폰 영역 설정 (본기지 Y값 기준)
            const pSpawnMinY = playerBase.y + LayoutConfig.spawnOffsetTop;
            const pSpawnMaxY = playerBase.y + LayoutConfig.spawnOffsetBottom;
            // Enemy spawn Y — use fixed center area (no enemy base)
            const eSpawnCenterY = canvas.height * LayoutConfig.baseRatioY;
            const eSpawnMinY = eSpawnCenterY + LayoutConfig.spawnOffsetTop;
            const eSpawnMaxY = eSpawnCenterY + LayoutConfig.spawnOffsetBottom;

            // Helper to determine spawn type based on Config probabilities
            const getSpawnType = (conf) => {
                const r = Math.random();
                if (r < conf.probRanged) return TYPE_RANGED;
                if (r < (conf.probRanged + conf.probTanker)) return TYPE_TANKER;
                if (r < (conf.probRanged + conf.probTanker + conf.probMage)) return TYPE_MAGE;
                if (r < (conf.probRanged + conf.probTanker + conf.probMage + conf.probHealer)) return TYPE_HEALER;
                return TYPE_MELEE;
            };

            // Player Spawn
            if (frames % pSpawnInterval === 0) {
                for (let b = 0; b < PlayerConfig.spawnBatch; b++) {
                    const psx = -40 + Math.random() * -40; // Spawns between -40 and -80
                    const psy = pSpawnMinY + Math.random() * (pSpawnMaxY - pSpawnMinY);
                    const pu = new Unit(psx, psy, 0, getSpawnType(PlayerConfig));
                    units.push(pu);
                }
                if (Math.random() > 0.5) WCGames.Audio.play([600, 200], 'square', 0.05, 0.02);
            }

            // Enemy Spawn
            if (frames % eSpawnInterval === 0) {
                for (let b = 0; b < EnemyConfig.spawnBatch; b++) {
                    const esx = canvas.width + 40 + Math.random() * 40; // Spawns between width+40 and width+80
                    const esy = eSpawnMinY + Math.random() * (eSpawnMaxY - eSpawnMinY);

                    // Determine enemy level based on score
                    let spawnLevel = 1;
                    const lb = EnemyConfig.levelBalance;

                    // Check from highest level to lowest
                    const levels = ["Lv10", "Lv9", "Lv8", "Lv7", "Lv6", "Lv5", "Lv4", "Lv3", "Lv2"];
                    const levelNums = [10, 9, 8, 7, 6, 5, 4, 3, 2];

                    for (let i = 0; i < levels.length; i++) {
                        const cfg = lb[levels[i]];
                        const prob = Math.min(cfg.maxProb, (score / cfg.scoreInterval) * cfg.probIncrement);
                        if (Math.random() < prob) {
                            spawnLevel = levelNums[i];
                            break;
                        }
                    }

                    const eu = new Unit(esx, esy, 1, getSpawnType(EnemyConfig), spawnLevel);
                    units.push(eu);
                }
                if (Math.random() > 0.5) WCGames.Audio.play([600, 200], 'square', 0.05, 0.02);
            }

            // Score = seconds survived
            if (frames % 60 === 0) score++;

            // Game Over: only when player base falls
            if (playerBase.hp <= 0) {
                endGame(false);
                return;
            }

            // Base Cannon Logic (player base only)
            const base = playerBase;
            if (base.cooldown > 0) base.cooldown--;
            if (base.hp > 0 && base.cooldown === 0) {
                const config = PlayerConfig;
                let closestEnemy = null;
                let closestDistSq = config.baseAttackRange * config.baseAttackRange;
                for (let i = 0; i < units.length; i++) {
                    const u = units[i];
                    if (u.team === 1 && u.hp > 0) {
                        const dx = u.x - base.x;
                        const dy = u.y - base.y;
                        const distSq = dx * dx + dy * dy;
                        if (distSq < closestDistSq) { closestDistSq = distSq; closestEnemy = u; }
                    }
                }
                if (closestEnemy) {
                    projectiles.push(new Projectile(base.x, base.y, closestEnemy, config.baseAttackDamage, 0, 12, true));
                    base.cooldown = config.baseAttackCooldown;
                    WCGames.Audio.play([200, 100], 'square', 0.2, 0.1);
                }
            }

            // Environmental Event: Random Lightning Strike
            const lightningInterval = Math.max(1, Math.floor(EnvironmentConfig.lightningRateSeconds * 60));
            if (frames > 0 && frames % lightningInterval === 0) {
                // Lightning strikes a random location on the terrain, not necessarily on a unit
                const targetX = Math.random() * canvas.width;
                // Constraints match the depth clamping for units (0.35 to 0.66 of height)
                const minY = canvas.height * 0.55;
                const maxY = canvas.height * 0.85;

                const targetY = minY + Math.random() * (maxY - minY);

                lightnings.push({ x: targetX, y: targetY, life: 15, maxLife: 15 });

                // Electric Zap ("찌직") - Sharp, high frequency crackle sequence (Volume halved)
                WCGames.Audio.play([2000, 800], 'sawtooth', 0.15, 0.1);
                setTimeout(() => WCGames.Audio.play([1500, 200], 'square', 0.3, 0.15), 40);
                setTimeout(() => WCGames.Audio.play([800, 50], 'sawtooth', 0.35, 0.2), 90);

                // AOE Damage Application (Friendly Fire enabled)
                for (let i = 0; i < units.length; i++) {
                    const u = units[i];
                    const dist = Math.sqrt(Math.pow(u.x - targetX, 2) + Math.pow(u.y - targetY, 2));
                    if (dist < EnvironmentConfig.lightningRadius) {
                        u.hp -= EnvironmentConfig.lightningDamage;
                        if (u.hp <= 0) u.killedByLightning = true;
                        // Spark particles indicating hit
                        for (let k = 0; k < 3; k++) particles.push(new Particle(u.x, u.y, "#fef08a"));
                    }
                }
            }

            // Auto-Merge Zone Logic
            if (isStarted && MergeZone.x !== -1000) {
                const mergeGroups = {};
                for (let i = 0; i < units.length; i++) {
                    const u = units[i];
                    if (u.team === 0 && u.hp > 0) {
                        // Elliptical boundary check (Perspective Magic Circle - 0.35x squash)
                        const centerX = MergeZone.x + MergeZone.width / 2;
                        const centerY = MergeZone.y + MergeZone.height / 2;
                        const dx = u.x - centerX;
                        const dy = u.y - centerY;
                        const rx = MergeZone.width / 2;
                        const ry = rx * 0.35; // Match visual 0.35x squash

                        if ((dx * dx) / (rx * rx) + (dy * dy) / (ry * ry) <= 1.2) { // 1.2 for slight buffer 
                            const key = u.type + "_" + u.level;
                            if (!mergeGroups[key]) mergeGroups[key] = [];
                            mergeGroups[key].push(u);
                        }
                    }
                }

                for (const key in mergeGroups) {
                    if (mergeGroups[key].length >= BalanceConfig.playerMerge.unitsRequired) {
                        const targets = mergeGroups[key].slice(0, BalanceConfig.playerMerge.unitsRequired);
                        const baseType = targets[0].type;
                        const newLevel = targets[0].level + 1;
                        let centerX = 0;
                        let centerY = 0;
                        let totalHp = 0;
                        let totalMaxHp = 0;
                        let totalDmg = 0;
                        let sumArea = 0;

                        for (const u of targets) {
                            centerX += u.x;
                            centerY += u.y;
                            totalHp += u.hp;
                            totalMaxHp += u.maxHp;
                            totalDmg += u.damage;
                            sumArea += (u.size * u.size);
                            u.hp = 0; // Destroy component unit
                        }
                        centerX /= targets.length;
                        centerY /= targets.length;

                        // Apply balancing multiplier for the new merged unit
                        const finalHp = Math.ceil(totalHp * BalanceConfig.playerMerge.bonusScaling);
                        const finalMaxHp = Math.ceil(totalMaxHp * BalanceConfig.playerMerge.bonusScaling);
                        const finalDmg = Math.ceil(totalDmg * BalanceConfig.playerMerge.bonusScaling);

                        // Size is now automatically handled by the Unit constructor using level scaling (1.05x)
                        const overrideStats = { hp: finalHp, maxHp: finalMaxHp, damage: finalDmg };
                        const mergedUnit = new Unit(centerX, centerY, 0, baseType, newLevel, overrideStats);
                        mergedUnit.state = 0; // Ensure it auto-moves forward
                        units.push(mergedUnit);

                        // Flashy visual and sound
                        WCGames.Audio.play([150, 400], 'square', 0.4, 0.4);
                        for (let i = 0; i < 20; i++) {
                            particles.push({
                                x: centerX + (Math.random() - 0.5) * 40,
                                y: centerY + (Math.random() - 0.5) * 40,
                                vx: (Math.random() - 0.5) * 8,
                                vy: (Math.random() - 0.5) * 8 - 3,
                                life: Math.random() * 20 + 20,
                                color: '#fcd34d' // Gold particles
                            });
                        }
                    }
                }
            }

            // Physics & State Update
            for (let i = units.length - 1; i >= 0; i--) {
                const u = units[i];



                // Combat & Target Acquisition
                if (u.attackCooldown > 0) u.attackCooldown--;

                // Base Attack Logic Check First
                let attackingBase = false;
                // Player units stop at right edge (no enemy base to attack)
                if (u.team === 0 && u.x > canvas.width - 40) {
                    u.state = 0; // idle near right edge, just defend
                    attackingBase = false;
                } else if (u.team === 1 && u.x < playerBase.x + 80 && Math.abs(u.y - playerBase.y) < 150) {
                    u.attackTarget = playerBase;
                    u.state = 2; // ATTACKING
                    attackingBase = true;
                }

                // If IDLE or MOVING and not attacking base, check for nearby enemies to intercept
                // Performance: Throttling targeting logic to run every 10 frames per unit
                if (!attackingBase && (u.state === 0 || u.state === 1) && (frames + u.id) % 10 === 0) {
                    let closestEnemy = null;
                    const aggroRange = u.type === TYPE_RANGED ? 120 : 80; // Aggro range
                    let closestDistSq = aggroRange * aggroRange;

                    // Check own cell and 8 adjacent neighbors
                    const cx = Math.floor(u.x / CELL_SIZE);
                    const cy = Math.floor(u.y / CELL_SIZE);

                    for (let nx = cx - 1; nx <= cx + 1; nx++) {
                        for (let ny = cy - 1; ny <= cy + 1; ny++) {
                            const neighbors = grid[`${nx},${ny}`];
                            if (!neighbors) continue;

                            for (let j = 0; j < neighbors.length; j++) {
                                const n = neighbors[j];

                                if (u.type === TYPE_HEALER) {
                                    // Healer logic: Find closest ALLY that is missing HP
                                    if (n.team === u.team && n.hp > 0 && n.hp < n.maxHp && n !== u) {
                                        const dx = n.x - u.x;
                                        const dy = n.y - u.y;
                                        const distSq = dx * dx + dy * dy;
                                        if (distSq < closestDistSq) {
                                            closestDistSq = distSq;
                                            closestEnemy = n; // Resusing variable for closest target
                                        }
                                    }
                                } else {
                                    // Normal combat logic: Find closest ENEMY
                                    if (n.team !== u.team && n.hp > 0) {
                                        const dx = n.x - u.x;
                                        const dy = n.y - u.y;
                                        const distSq = dx * dx + dy * dy;
                                        if (distSq < closestDistSq) {
                                            closestDistSq = distSq;
                                            closestEnemy = n;
                                        }
                                    }
                                }
                            }
                        }
                    }

                    if (closestEnemy) {
                        u.attackTarget = closestEnemy;
                        u.state = 2; // ATTACKING
                    }
                }

                // Apply perspective scaling to movement speed
                const scaleFactor = 0.5 + (u.y / canvas.height) * 0.7;
                let adjSpeed = u.speed * scaleFactor;

                if (u.state === 0) { // IDLE (Running Forward)
                    const dir = u.team === 0 ? 1 : -1; // Player right, Enemy left
                    u.vx = adjSpeed * dir * 0.5;
                    // Slightly trend towards base Y
                    const centerDir = (playerBase.y - u.y) * 0.001;
                    u.vy = centerDir;
                } else if (u.state === 1) { // MOVING (Commanded)
                    if (u.targetX !== null && u.targetY !== null) {
                        const dx = u.targetX - u.x;
                        const dy = u.targetY - u.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < adjSpeed) {
                            // Arrived
                            u.x = u.targetX;
                            u.y = u.targetY;
                            u.state = 0; // Return to IDLE mode (auto-push forward)
                            u.targetX = null;
                            u.targetY = null;
                            u.vx = 0;
                            u.vy = 0;
                        } else {
                            // Move towards target
                            u.vx = (dx / dist) * adjSpeed * 1.5; // Comanded units run slightly faster
                            u.vy = (dy / dist) * adjSpeed * 1.5;
                        }
                    } else {
                        u.state = 0; // Fallback to IDLE if no target
                    }
                } else if (u.state === 2) { // ATTACKING
                    if (u.attackTarget && u.attackTarget.hp > 0) {
                        const target = u.attackTarget;
                        const dx = target.x - u.x;
                        const dy = target.y - u.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        // Scale attack range to perspective X axis
                        const effRange = u.attackRange * scaleFactor;

                        if (dist < effRange) {
                            u.vx = 0; u.vy = 0; // Stop moving to hit
                            if (u.attackCooldown <= 0) {
                                if (u.type === TYPE_RANGED) {
                                    projectiles.push(new Projectile(u.x, u.y, target, u.damage, u.team, 4));
                                    if (Math.random() > 0.8) WCGames.Audio.play([800, 600], 'triangle', 0.1, 0.05);
                                } else if (u.type === TYPE_MAGE) {
                                    projectiles.push(new Projectile(u.x, u.y, target, u.damage, u.team, 3, false, true));
                                    if (Math.random() > 0.4) WCGames.Audio.play([800, 1500], 'sine', 0.05, 0.05);
                                } else if (u.type === TYPE_HEALER) {
                                    projectiles.push(new Projectile(u.x, u.y, target, u.damage, u.team, 3.5, false, false, true));
                                    if (Math.random() > 0.3) WCGames.Audio.play([1200, 1600], 'sine', 0.05, 0.05);
                                } else {
                                    // Melee Hit (Fiery Explosion + Slash)
                                    target.hp -= u.damage;
                                    const exColor = u.team === 0 ? "#60a5fa" : "#fb923c"; // Orange for enemy, Light Blue for player
                                    for (let k = 0; k < 3; k++) particles.push(new Particle((u.x + target.x) / 2, (u.y + target.y) / 2, exColor));

                                    // Melee Slash Particle (White streak)
                                    const slash = new Particle((u.x + target.x) / 2, (u.y + target.y) / 2, "#ffffff");
                                    slash.vx = (u.team === 0 ? 1 : -1) * 5;
                                    slash.vy = (Math.random() - 0.5) * 5;
                                    slash.life = 10;
                                    particles.push(slash);

                                    if (Math.random() > 0.8) WCGames.Audio.play([150, 50], 'sawtooth', 0.05, 0.05);
                                }
                                u.attackCooldown = u.cooldownMax;
                            }
                        } else {
                            // Chase target
                            u.vx = (dx / dist) * adjSpeed * 1.2;
                            u.vy = (dy / dist) * adjSpeed * 1.2;
                        }
                    } else {
                        u.attackTarget = null;
                        u.state = 0; // Target died, return to IDLE forward push
                    }
                }

                u.x += u.vx;
                u.y += u.vy;

                // Simple Flocking (Separation)
                for (let j = 0; j < units.length; j++) {
                    const other = units[j];
                    if (i !== j && other.team === u.team) {
                        const conf = u.team === 0 ? PlayerConfig : EnemyConfig;
                        const dx = u.x - other.x;
                        const dy = u.y - other.y;
                        const distSq = dx * dx + dy * dy;
                        if (distSq < (conf.unitSize) * (conf.unitSize)) {
                            u.x += dx * 0.02; // Reduced push to allow tighter clusters
                            u.y += dy * 0.02;
                        }
                    }
                }

                // Depth clamping so units don't walk into the sky or bottom 1/3
                const minY = playerBase.y + LayoutConfig.combatOffsetTop;
                const maxY = playerBase.y + LayoutConfig.combatOffsetBottom;
                if (u.y < minY && u.hp > 0) u.y = minY;
                if (u.y > maxY && u.hp > 0) u.y = maxY;

                // X-axis clamping to keep units within screen bounds
                if (u.hp > 0) {
                    if (u.x < 0) u.x = 0;
                    if (u.x > canvas.width) u.x = canvas.width;
                }

                // Basic bounds check to prevent memory leaks from wandering units or death
                if (u.x < -150 || u.x > canvas.width + 150 || u.hp <= 0) {
                    if (u.hp <= 0) {
                        // Dead
                        if (u.team === 1 && !u.killedByLightning) {
                            // Kill-based score removed in favor of survival time
                        }
                        u.selected = false; // Ensure dead units drop selection

                        // Death Explosion
                        const dieColor = u.team === 0 ? "#3b82f6" : "#ef4444";
                        for (let k = 0; k < 8; k++) particles.push(new Particle(u.x, u.y, dieColor));

                        if (Math.random() > 0.8) WCGames.Audio.play([100, 30], 'square', 0.05, 0.1);
                    }
                    units.splice(i, 1);
                }
            }

            // Projectile Updates
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                if (!p.active || !p.target || p.target.hp <= 0) {
                    projectiles.splice(i, 1);
                    continue;
                }

                const dx = p.target.x - p.x;
                const dy = p.target.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < p.speed) {
                    // Hit
                    if (p.isHeal) {
                        // Healing logic
                        p.target.hp += Math.abs(p.damage);
                        if (p.target.hp > p.target.maxHp) p.target.hp = p.target.maxHp;

                        // Healing Particles (Green crosses or sparks)
                        for (let k = 0; k < 6; k++) {
                            const hpPart = new Particle(p.target.x, p.target.y - 10, "#4ade80", true);
                            hpPart.vy = -0.5 - Math.random() * 1.5; // Float upwards slower
                            hpPart.vx = (Math.random() - 0.5) * 1.5; // Less horizontal variance
                            hpPart.life = 30 + Math.random() * 15; // Lasts longer
                            particles.push(hpPart);
                        }
                        if (Math.random() > 0.5) WCGames.Audio.play([1500, 2000], 'sine', 0.1, 0.05); // Tiny heal chime
                    } else {
                        // Damage logic
                        p.target.hp -= p.damage;
                        const sparkColor = p.team === 0 ? "#93c5fd" : "#fca5a5";
                        for (let k = 0; k < 2; k++) particles.push(new Particle(p.target.x, p.target.y - 10, sparkColor)); // tiny spark

                        if (p.isCannon) {
                            for (let k = 0; k < 6; k++) particles.push(new Particle(p.target.x, p.target.y, "#fef08a")); // Larger explosion
                            WCGames.Audio.play([100, 50], 'sawtooth', 0.2, 0.1); // Impact sound
                        } else if (p.isMagic) {
                            for (let k = 0; k < 8; k++) particles.push(new Particle(p.target.x, p.target.y - 15, p.team === 0 ? "#60a5fa" : "#fbbf24")); // Magic burst
                            if (Math.random() > 0.5) WCGames.Audio.play([1200, 400], 'sine', 0.1, 0.05);
                        } else {
                            if (Math.random() > 0.8) WCGames.Audio.play([400, 100], 'sawtooth', 0.05, 0.02);
                        }
                    }

                    p.active = false;
                    projectiles.splice(i, 1);
                } else {
                    p.x += (dx / dist) * p.speed;
                    p.y += (dy / dist) * p.speed;

                    // Projectile Trail for cannons
                    if (p.isCannon && frames % 2 === 0) {
                        const trailColor = p.team === 0 ? "rgba(96, 165, 250, 0.5)" : "rgba(244, 63, 94, 0.5)";
                        particles.push(new Particle(p.x, p.y - p.z, trailColor));
                    } else if (p.isMagic && frames % 2 === 0) {
                        const trailColor = p.team === 0 ? "#bfdbfe" : "#fef08a";
                        const magPart = new Particle(p.x, p.y - p.z, trailColor);
                        magPart.life = 10;
                        magPart.vy = -1;
                        particles.push(magPart);
                    } else if (p.isHeal && frames % 3 === 0) {
                        const trailColor = "#4ade80"; // Green spark trail
                        const healPart = new Particle(p.x, p.y - p.z, trailColor);
                        healPart.life = 12;
                        healPart.vy = -0.5;
                        particles.push(healPart);
                    }

                    // Calculate Parabolic Arc (Z-axis)
                    // Progress from 0.0 to 1.0 based on distance traveled vs total distance
                    const totalDist = Math.sqrt(Math.pow(p.target.x - p.startX, 2) + Math.pow(p.target.y - p.startY, 2));
                    const currentDist = Math.sqrt(Math.pow(p.x - p.startX, 2) + Math.pow(p.y - p.startY, 2));
                    let progress = currentDist / Math.max(1, totalDist);
                    progress = Math.max(0, Math.min(1, progress));

                    // Standard Parabola: y = 4h * p * (1-p) -> peaks at height 'h' when progress 'p' is 0.5
                    // Dynamic peak height based on travel distance (longer shot = higher arc)
                    const peakHeight = Math.min(60, Math.max(15, totalDist * 0.25));
                    p.z = peakHeight * 4 * progress * (1 - progress);
                }
            }

            // Update UI
            if (frames % 15 === 0) {
                score = Math.floor(frames / 60); // Survival time in seconds
                document.getElementById('score').textContent = score; // Added alive score tracking
            }

            frames++;
        }

        function draw(timestamp) {
            requestAnimationFrame(draw);

            if (!lastTime) lastTime = timestamp;
            const elapsed = timestamp - lastTime;

            if (elapsed < fpsInterval) return;

            // Optimization for high-refresh monitors: snap lastTime to exact interval
            lastTime = timestamp - (elapsed % fpsInterval);

            drawBackground();

            if (isStarted) {
                // // Pre - draw ground effects(Attack Ranges) before anything else
                // ctx.lineWidth = 1;
                // ctx.setLineDash([5, 10]);
                // ctx.strokeStyle = "rgba(59, 130, 246, 0.3)"; // Player Base Range (Blue)
                // ctx.beginPath();
                // ctx.arc(playerBase.x, playerBase.y, PlayerConfig.baseAttackRange, 0, Math.PI * 2);
                // ctx.stroke();
                // ctx.strokeStyle = "rgba(239, 68, 68, 0.3)"; // Enemy Base Range (Red)
                // ctx.beginPath();
                // ctx.stroke();
                // ctx.setLineDash([]);

                // // // Draw Safe Zone Shading (Soot and Dust Overlay)
                // const boundaryX = playerBase.x + LayoutConfig.safeZoneWidth;
                // ctx.fillStyle = "rgba(64, 64, 64, 0.2)"; // Dark charcoal/soot dust
                // ctx.fillRect(0, playerBase.y + LayoutConfig.combatOffsetTop, boundaryX, LayoutConfig.combatOffsetBottom - LayoutConfig.combatOffsetTop);

                // // Draw Combat / Respawn Boundary Line
                // ctx.lineWidth = 3;
                // ctx.setLineDash([25, 20]); // Long, heavy spectral dashes
                // ctx.strokeStyle = "rgba(163, 163, 163, 0.5)"; // Iron grey (Neutral-400)

                // // // Vertical Line
                // ctx.beginPath();
                // ctx.moveTo(boundaryX, playerBase.y + LayoutConfig.combatOffsetTop);
                // ctx.lineTo(boundaryX, playerBase.y + LayoutConfig.combatOffsetBottom);
                // ctx.stroke();

                // // // Horizontal Lines (Top and Bottom of combat lane)
                // ctx.beginPath();
                // ctx.moveTo(0, playerBase.y + LayoutConfig.combatOffsetTop);
                // ctx.lineTo(canvas.width, playerBase.y + LayoutConfig.combatOffsetTop);
                // ctx.moveTo(0, playerBase.y + LayoutConfig.combatOffsetBottom);
                // ctx.lineTo(canvas.width, playerBase.y + LayoutConfig.combatOffsetBottom);
                // ctx.stroke();

                // ctx.setLineDash([]);


                // Auto-Merge Zone (Mysterious Magic Circle with Perspective)
                if (MergeZone.x !== -1000) {
                    const cx = MergeZone.x + MergeZone.width / 2;
                    const cy = MergeZone.y + MergeZone.height / 2;
                    const rx = MergeZone.width / 2;
                    // Enforce 0.35x perspective squash (Flat on ground)
                    const ry = rx * 0.35;
                    const pulse = Math.sin(frames * 0.05) * 0.2 + 0.8;
                    const rot = frames * 0.02;

                    ctx.save();
                    ctx.setLineDash([]);

                    // 0. Base "Height" Layering (Stacking thin ellipses for depth)
                    for (let i = 4; i >= 1; i--) {
                        ctx.strokeStyle = `rgba(180, 83, 9, ${0.12 * (1 / i)})`;
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.ellipse(cx, cy + (i * 1.5), rx, ry, 0, 0, Math.PI * 2);
                        ctx.stroke();
                    }

                    // 1. Outer Glow Base
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "rgba(251, 191, 36, 0.4)";
                    ctx.fillStyle = "rgba(251, 191, 36, 0.08)";
                    ctx.strokeStyle = "rgba(251, 191, 36, 0.45)";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();

                    // 2. Rotating Outer Rune Ring
                    ctx.shadowBlur = 5;
                    ctx.strokeStyle = `rgba(251, 191, 36, ${0.4 * pulse})`;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.ellipse(cx, cy, rx * 0.9, ry * 0.9, 0, 0, Math.PI * 2);
                    ctx.stroke();

                    // Rune Ticks (Foreshortened)
                    for (let i = 0; i < 16; i++) {
                        const angle = rot + (i * Math.PI * 2) / 16;
                        const tx1 = cx + Math.cos(angle) * (rx * 0.85);
                        const ty1 = cy + Math.sin(angle) * (ry * 0.85);
                        const tx2 = cx + Math.cos(angle) * (rx * 0.95);
                        const ty2 = cy + Math.sin(angle) * (ry * 0.95);
                        ctx.beginPath();
                        ctx.moveTo(tx1, ty1);
                        ctx.lineTo(tx2, ty2);
                        ctx.stroke();
                    }

                    // 3. Inner Magic Geometry (Foreshortened Diamond)
                    ctx.strokeStyle = `rgba(251, 191, 36, ${0.5 * pulse})`;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    for (let i = 0; i < 4; i++) {
                        const angle = -rot * 1.5 + (i * Math.PI * 2) / 4;
                        const px = cx + Math.cos(angle) * rx * 0.65;
                        const py = cy + Math.sin(angle) * ry * 0.65;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.stroke();

                    // 4. Center Core
                    const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, rx * 0.5);
                    gradient.addColorStop(0, `rgba(255, 255, 255, ${0.7 * pulse})`);
                    gradient.addColorStop(0.4, `rgba(251, 191, 36, ${0.3 * pulse})`);
                    gradient.addColorStop(1, "rgba(251, 191, 36, 0)");
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.ellipse(cx, cy, rx * 0.5, ry * 0.5, 0, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();
                    ctx.shadowBlur = 0;
                }

                // Unified Depth Sorting list (Y-axis)
                // This guarantees that layers between factions, units, and bases are rendered perfectly.
                const renderQueue = [];
                renderQueue.push({ isBase: true, team: 0, obj: playerBase, y: playerBase.y });

                for (let i = 0; i < units.length; i++) {
                    renderQueue.push({ isBase: false, team: units[i].team, obj: units[i], y: units[i].y });
                }

                renderQueue.sort((a, b) => a.y - b.y);

                // Draw sorted objects
                for (let i = 0; i < renderQueue.length; i++) {
                    const r = renderQueue[i];

                    if (r.isBase) {
                        const spr = r.team === 0 ? sprites.pBase : sprites.eBase;
                        const baseScale = 1 + (r.obj.y / canvas.height) * 1;

                        // Use natural aspect ratio if image is loaded, otherwise fallback ratio
                        const naturalW = spr && spr.width ? spr.width : 128;
                        const naturalH = spr && spr.height ? spr.height : 128;
                        const drawW = 220 * baseScale;
                        const drawH = drawW * (naturalH / naturalW);
                        const drawY = r.obj.y - drawH + 20;

                        const bx = - drawW / 1.3;//r.team === 0 ? 0 : canvas.width - drawW;

                        // ctx.imageSmoothingEnabled = true;
                        // ctx.imageSmoothingQuality = 'low';

                        ctx.drawImage(spr, bx, drawY, drawW, drawH);

                        ctx.imageSmoothingEnabled = false;

                        // Base HP Bars (Polished design, lower position)
                        const hpW = canvas.width * 0.7; // Slightly narrower for cleaner look
                        const hpH = 10;
                        const hpY = 100;
                        const x = canvas.width / 2 - hpW / 2;
                        const maxHp = r.team === 0 ? PlayerConfig.baseMaxHp : EnemyConfig.baseMaxHp;
                        const curHp = r.obj.hp;
                        const fillW = Math.max(0, curHp / maxHp) * hpW;

                        // 1. Draw Container (Border & Background)
                        ctx.fillStyle = "rgba(0,0,0,0.6)";
                        ctx.strokeStyle = "rgba(255,255,255,0.2)";
                        ctx.lineWidth = 1;
                        ctx.fillRect(x, hpY, hpW, hpH);
                        ctx.strokeRect(x, hpY, hpW, hpH);

                        // 2. Draw Gradient Fill
                        const grad = ctx.createLinearGradient(x, 0, x + hpW, 0);
                        if (r.team === 0) {
                            grad.addColorStop(0, "#1e40af"); // Deep Blue
                            grad.addColorStop(0.5, "#3b82f6"); // Bright Blue
                            grad.addColorStop(1, "#60a5fa"); // Light Blue
                        } else {
                            grad.addColorStop(0, "#991b1b"); // Deep Red
                            grad.addColorStop(0.5, "#ef4444"); // Bright Red
                            grad.addColorStop(1, "#f87171"); // Light Red
                        }

                        ctx.fillStyle = grad;
                        ctx.fillRect(x + 1, hpY + 1, Math.max(0, fillW - 2), hpH - 2);

                        // 3. Optional Gloss Shine
                        ctx.fillStyle = "rgba(255,255,255,0.15)";
                        ctx.fillRect(x + 1, hpY + 1, Math.max(0, fillW - 2), hpH / 2 - 1);
                    } else {
                        const u = r.obj;
                        // Performance: Culling units outside viewport
                        if (u.x < -100 || u.x > canvas.width + 100) continue;

                        const scaleFactor = 0.5 + 0.7 * ((u.y - HORIZON_Y) / (canvas.height - HORIZON_Y));
                        const sz = u.size * 2 * scaleFactor;
                        const drawW = sz;
                        const drawH = sz;
                        const visualOffsetY = drawH * 0.95;

                        // Drop Shadow removed as requested

                        let sprSet = null;
                        const prefix = (u.team === 0 ? 'p' : 'e') + u.type;
                        const isSpriteSheet = sprites[prefix + 'Sheet'] && sprites[prefix + 'Meta'];

                        // Fallback sprSet for units not yet in sprite sheets (like Cavalry)
                        if (!isSpriteSheet) {
                            if (u.team === 0) {
                                sprSet = sprites.pMelee;
                                if (u.type === TYPE_RANGED) sprSet = sprites.pRanged;
                                else if (u.type === TYPE_TANKER) sprSet = sprites.pMelee;
                                else if (u.type === TYPE_MAGE) sprSet = sprites.pMage;
                                else if (u.type === TYPE_HEALER) sprSet = sprites.pHealer;
                                else if (u.type === TYPE_CAVALRY) sprSet = sprites.pCavalry;
                            } else {
                                sprSet = sprites.eMelee;
                                if (u.type === TYPE_RANGED) sprSet = sprites.eRanged;
                                else if (u.type === TYPE_TANKER) sprSet = sprites.eMelee;
                                else if (u.type === TYPE_MAGE) sprSet = sprites.eMage;
                                else if (u.type === TYPE_HEALER) sprSet = sprites.eHealer;
                                else if (u.type === TYPE_CAVALRY) sprSet = sprites.eCavalry;
                            }
                        }

                        let spr = (sprSet && sprSet.spr1) ? sprSet.spr1 : null;
                        const time = Date.now();
                        let frameIdx = 0;
                        let rowIdx = 0;

                        const moving = (Math.abs(u.vx) + Math.abs(u.vy)) > 0.1;

                        if (!moving) {
                            frameIdx = 0;
                        } else {
                            if (isSpriteSheet) {
                                // 5-frame walk animation
                                frameIdx = Math.floor(time / 100) % 5;
                            } else {
                                // Classic 2-frame canvas animation
                                const frame = Math.floor(time / 150) % 2;
                                spr = (sprSet && frame === 0) ? sprSet.spr1 : (sprSet ? sprSet.spr2 : null);
                            }
                        }

                        // Attack Logic Overrides
                        if (u.state === 2 && u.attackCooldown > 0) {
                            const t = u.attackCooldown / u.cooldownMax;

                            if (isSpriteSheet) {
                                rowIdx = 1; // Second row is Attack
                                frameIdx = Math.min(4, Math.floor((1 - t) * 5));
                            } else {
                                if (sprSet && t > 0.6) spr = sprSet.sprAtk;
                            }
                        }

                        if (isSpriteSheet) {
                            const sheet = sprites[prefix + 'Sheet'];
                            const meta = sprites[prefix + 'Meta'];
                            const sx = frameIdx * meta.frameW;
                            const sy = rowIdx * meta.frameH;
                            const aspectRatio = meta.frameH / meta.frameW;
                            const sheetH = drawW * aspectRatio;

                            ctx.save();
                            ctx.translate(u.x, u.y);
                            if (u.team === 1) ctx.scale(-1, 1); // Flip Orcs back to face Left
                            ctx.drawImage(
                                sheet,
                                sx, sy, meta.frameW, meta.frameH,
                                -drawW / 2, -sheetH, drawW, sheetH
                            );
                            ctx.restore();
                        } else if (spr) {
                            ctx.save();
                            ctx.translate(u.x, u.y);
                            ctx.drawImage(spr, -drawW / 2, -drawH, drawW, drawH);
                            ctx.restore();
                        }

                        if (u.selected) {
                            ctx.strokeStyle = "#a7f3d0";
                            ctx.lineWidth = 1;
                            ctx.strokeRect(u.x - drawW / 2 - 2, u.y - visualOffsetY - 2, drawW + 4, drawH + 4);
                        }

                        if (u.hp < u.maxHp) {
                            const barW = (u.type === TYPE_TANKER ? 24 : 16) * scaleFactor;
                            const offY = visualOffsetY + 5;
                            ctx.fillStyle = "rgba(0,0,0,0.8)";
                            ctx.fillRect(u.x - barW / 2, u.y - offY - 3, barW, 3);
                            ctx.fillStyle = u.team === 0 ? "#86efac" : "#fb7185";
                            // Fixing "strange graph" rendering error preventing negative width
                            ctx.fillRect(u.x - barW / 2, u.y - offY - 3, Math.max(0, u.hp / u.maxHp) * barW, 3);
                        }

                        if (u.level > 1) {
                            const offY = visualOffsetY + 15;
                            ctx.fillStyle = "#fcd34d";
                            ctx.font = "bold 12px Courier New";
                            ctx.textAlign = "center";
                            ctx.fillText("Lv" + u.level, u.x, u.y - offY);
                        }
                    }
                }

                // Draw Projectiles
                for (let i = 0; i < projectiles.length; i++) {
                    const p = projectiles[i];
                    const pScale = (p.y - HORIZON_Y) / (canvas.height - HORIZON_Y);
                    const pSize = 3 * pScale;

                    // Projectile ground shadow removed as requested

                    // Arrow/Cannon body offset by Z
                    if (p.isCannon) {
                        ctx.fillStyle = p.team === 0 ? "#60a5fa" : "#f43f5e";
                        ctx.beginPath();
                        ctx.arc(p.x, p.y - p.z, pSize * 2, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (p.isMagic) {
                        // Glowing orb
                        ctx.save();
                        ctx.shadowColor = p.team === 0 ? "#60a5fa" : "#fbbf24";
                        ctx.shadowBlur = 10;
                        ctx.fillStyle = "#ffffff";
                        ctx.beginPath();
                        ctx.arc(p.x, p.y - p.z, pSize * 1.5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    } else if (p.isHeal) {
                        // Healing orb (emerald cross or glow)
                        ctx.save();
                        ctx.shadowColor = "#4ade80";
                        ctx.shadowBlur = 8;
                        ctx.fillStyle = "#bbf7d0";
                        ctx.fillRect((p.x - pSize), (p.y - p.z - pSize * 2), pSize * 2, pSize * 4);
                        ctx.fillRect((p.x - pSize * 2), (p.y - p.z - pSize), pSize * 4, pSize * 2);
                        ctx.restore();
                    } else {
                        ctx.fillStyle = p.team === 0 ? "#22d3ee" : "#f97316";
                        ctx.fillRect(p.x - pSize / 2, p.y - p.z - pSize / 2, pSize, pSize);
                    }
                }

                // Draw Lightning Effect
                for (let i = lightnings.length - 1; i >= 0; i--) {
                    const l = lightnings[i];
                    // Global flash overlay for the first 3 frames
                    if (l.life > l.maxLife - 3) {
                        ctx.strokeStyle = "rgba(255,255,255,0.8)";
                        ctx.lineWidth = 15;
                    } else {
                        ctx.strokeStyle = `rgba(167, 243, 208, ${l.life / l.maxLife})`; // Lightning color
                        ctx.lineWidth = 2 + (l.life / l.maxLife) * 8;
                    }

                    // Draw jagged lightning bolt
                    ctx.beginPath();
                    const startX = l.x;
                    const startY = -20;
                    ctx.moveTo(startX, startY);
                    let cx = startX;
                    let cy = startY;
                    while (cy < l.y) {
                        cx += (Math.random() - 0.5) * 40; // horizontal jitter
                        cy += 30 + Math.random() * 40; // drop down 30-70px
                        if (cy > l.y) {
                            cx = l.x; // Force connection to exact target point
                            cy = l.y;
                        }
                        ctx.lineTo(cx, cy);
                    }
                    ctx.stroke();

                    // Global flash overlay for the first 3 frames
                    if (l.life > l.maxLife - 3) {
                        ctx.fillStyle = "rgba(255,255,255,0.4)";
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                    }

                    l.life--;
                    if (l.life <= 0) lightnings.splice(i, 1);
                }

                // Draw & Update Particles (Fiery/Energy sparks)
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;

                    ctx.globalAlpha = p.life / p.maxLife;

                    // Explosive flash at start of life (Don't flash for crosses)
                    if (p.life > p.maxLife * 0.7 && !p.isCross) {
                        ctx.fillStyle = "#ffffff";
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 2 * (p.life / p.maxLife), 0, Math.PI * 2); // Reduced from 4
                        ctx.fill();
                    }

                    ctx.fillStyle = p.color;
                    const pScale = (p.y - HORIZON_Y) / (canvas.height - HORIZON_Y);

                    if (p.isCross) {
                        const sz = 2.0 * pScale; // thickness
                        const len = 6.0 * pScale; // length
                        ctx.fillRect(p.x - sz / 2, p.y - len / 2, sz, len); // Vertical bar
                        ctx.fillRect(p.x - len / 2, p.y - sz / 2, len, sz); // Horizontal bar
                    } else {
                        const pSize = 2 * pScale;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, pSize, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    if (p.life <= 0) particles.splice(i, 1);
                }
                ctx.globalAlpha = 1.0;

                // Draw drag selection box as the topmost UI layer
                if (selection.active) {
                    const x = Math.min(selection.startX, selection.endX);
                    const y = Math.min(selection.startY, selection.endY);
                    const w = Math.abs(selection.endX - selection.startX);
                    const h = Math.abs(selection.endY - selection.startY);

                    ctx.fillStyle = "rgba(167, 243, 208, 0.2)";
                    ctx.fillRect(x, y, w, h);
                    ctx.strokeStyle = "#10b981";
                    ctx.lineWidth = 2;
                    ctx.setLineDash([8, 8]);
                    ctx.strokeRect(x, y, w, h);
                    ctx.setLineDash([]);
                }
            }

            update();
        }

        function endGame(playerWon) {
            if (isGameOver) return;
            isGameOver = true;

            // Adjust Game Over Text based on win/loss
            const titleEl = document.querySelector('#game-over h1');
            const translations = window.WCGamesTranslation || {};

            if (playerWon) {
                titleEl.textContent = translations.victory || "VICTORY";
                titleEl.style.color = "#34d399";
                // Win bonus removed or adjusted to survival theme
            } else {
                titleEl.textContent = translations.defeat || "DEFEAT";
                titleEl.style.color = "#f87171";
            }

            document.getElementById('final-score').textContent = score;
            WCGames.gameOver(score);
        }

        function resetGame() {
            isGameOver = false;
            isStarted = true;
            frames = 0;
            score = 0;
            document.getElementById('score').textContent = '0';

            // Reset entities
            units = [];
            particles = [];
            projectiles = [];
            lightnings = [];
            // 기지 위치 초기화 (위치 설정 변수 기반)
            playerBase.x = LayoutConfig.baseMarginX;
            playerBase.y = canvas.height * LayoutConfig.baseRatioY;

            playerBase.hp = PlayerConfig.baseMaxHp;
            playerBase.cooldown = 0;
            selection.active = false;

            // Define Auto-Merge zone near Player Base using Layout config variables
            MergeZone.width = LayoutConfig.mergeWidth;
            MergeZone.height = LayoutConfig.mergeHeight;
            MergeZone.x = playerBase.x + LayoutConfig.mergeOffsetX;
            MergeZone.y = playerBase.y + LayoutConfig.mergeOffsetY;
        }

        WCGames.init({
            id: 'swarm',
            onStart: () => { WCGames.Audio.init(); resetGame(); },
            onRestart: () => { WCGames.Audio.init(); resetGame(); }
        });

        requestAnimationFrame(draw);
    </script>
    <script src="/shared/i18n.js"></script>
</body>
