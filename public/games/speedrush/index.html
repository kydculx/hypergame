<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WCGames - Speed Rush</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/wcgames-style.css">
    <style>
        /* --- DESIGN SYSTEM --- */
        :root {
            --accent: #00f3ff;
            --bg: #000;
            --surface: #111;
            --text: #fff;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        /* Background layer simplified to black */
        .grid-bg {
            display: none;
        }

        canvas {
            display: block;
            z-index: 5;
            position: relative;
        }

        /* --- HUD & UI --- */
        #ui {
            position: fixed;
            top: 40px;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        #score {
            font-size: 40px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.8), 0 0 20px rgba(0, 243, 255, 0.4);
            transition: transform 0.1s ease-out;
        }

        /* --- VIRTUAL JOYSTICK --- */
        #joystick-area {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 240px;
            height: 80px;
            z-index: 20;
            display: none;
            /* Keep hidden, using full screen touch now */
            touch-action: none;
            user-select: none;
            pointer-events: none;
            /* Disable interaction on UI element itself */
        }

        #joystick-base {
            width: 240px;
            height: 12px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            position: absolute;
            top: 34px;
            left: 0;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
        }

        #joystick-knob {
            width: 60px;
            height: 60px;
            background: rgba(0, 243, 255, 0.9);
            border: 2px solid #fff;
            border-radius: 50%;
            position: absolute;
            left: 90px;
            /* center (240-60)/2 */
            top: 10px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 1);
            transition: transform 0.05s linear;
        }

        /* --- OVERLAYS & POPUPS --- */
        .wcg-overlay {
            background: rgba(5, 5, 15, 0.8);
            backdrop-filter: blur(10px);
        }

        .wcg-popup {
            background: rgba(10, 5, 25, 0.85);
            border: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow:
                0 0 30px rgba(255, 170, 0, 0.1),
                inset 0 0 20px rgba(0, 243, 255, 0.05),
                0 0 100px rgba(0, 0, 0, 0.8);
            padding: 70px 90px;
            position: relative;
            backdrop-filter: blur(20px);
            clip-path: polygon(0 30px, 30px 0, 100% 0, 100% calc(100% - 30px), calc(100% - 30px) 100%, 0 100%);
            animation: popupAppear 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            border-top: 3px solid #ffaa00;
            border-bottom: 3px solid #00f3ff;
            transform-style: preserve-3d;
        }

        @keyframes popupAppear {
            0% {
                transform: scale(0.8) translateY(50px);
                opacity: 0;
                filter: blur(10px);
            }

            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
                filter: blur(0);
            }
        }

        /* Elaborate corner brackets */
        .wcg-popup::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 48%, rgba(0, 243, 255, 0.1) 49%, rgba(0, 243, 255, 0.1) 51%, transparent 52%);
            background-size: 10px 10px;
            pointer-events: none;
            z-index: -1;
            opacity: 0.3;
        }

        .wcg-popup::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px #00f3ff, 0 0 40px #ffaa00;
            animation: scanline 3s linear infinite;
            opacity: 0.6;
            pointer-events: none;
        }

        @keyframes scanline {
            0% {
                transform: translateY(-50px);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(300px);
                opacity: 0;
            }
        }

        /* Title with chromatic aberration */
        .wcg-popup h1 {
            font-size: 56px;
            margin-bottom: 25px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 8px;
            font-weight: 900;
            position: relative;
            text-shadow:
                0 0 10px rgba(255, 170, 0, 0.8),
                3px 0px 0px rgba(255, 170, 0, 0.8),
                -3px 0px 0px rgba(0, 243, 255, 0.8);
            animation: glitch 5s infinite;
        }

        @keyframes glitch {

            0%,
            96%,
            100% {
                transform: translate(0, 0);
                opacity: 1;
            }

            97% {
                transform: translate(-5px, 2px);
                opacity: 0.8;
                text-shadow: -3px 0px 0px rgba(255, 170, 0, 0.8), 3px 0px 0px rgba(0, 243, 255, 0.8);
            }

            98% {
                transform: translate(5px, -2px);
                opacity: 0.9;
            }

            99% {
                transform: translate(-2px, 2px);
                opacity: 0.8;
                text-shadow: 3px 0px 0px rgba(255, 170, 0, 0.8), -3px 0px 0px rgba(0, 243, 255, 0.8);
            }
        }

        .wcg-popup p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
        }

        .wcg-popup button {
            background: linear-gradient(90deg, rgba(255, 170, 0, 0.1), rgba(0, 243, 255, 0.1));
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 5px solid #ffaa00;
            border-right: 5px solid #00f3ff;
            color: #fff;
            padding: 18px 70px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 22px;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            z-index: 1;
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            text-transform: uppercase;
            overflow: hidden;
        }

        .wcg-popup button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transform: skewX(-25deg);
            transition: left 0.5s ease;
        }

        .wcg-popup button:hover::before {
            left: 200%;
            transition: left 0.5s ease;
        }

        .wcg-popup button:hover {
            background: linear-gradient(90deg, rgba(255, 170, 0, 0.3), rgba(0, 243, 255, 0.3));
            color: #ffffff;
            box-shadow:
                0 0 20px rgba(255, 170, 0, 0.5),
                inset 0 0 10px rgba(0, 243, 255, 0.5);
            transform: scale(1.05) translateY(-2px);
            text-shadow: 0 0 10px #fff, 0 0 20px #00f3ff;
            border-left-color: #fff;
            border-right-color: #fff;
        }
    </style>
    <script src="/shared/wcgames-config.js"></script>
    <script src="/shared/wcgames-core.js"></script>
</head>

<body>
    <div class="grid-bg"></div>

    <!-- HUD -->
    <div id="ui">
        <div id="score">0</div>
        <!-- Shield Stack HUD -->
        <div id="shield-ui"
            style="display:inline-flex; align-items:center; justify-content:center; gap: 10px; color:#00ffff; font-family:'Orbitron', sans-serif; font-size:24px; font-weight:900; letter-spacing:2px; text-shadow: 0 0 10px #00ffff; margin-top: 10px;">
            <svg viewBox="0 0 100 120"
                style="width:24px; height:24px; fill:rgba(0, 255, 255, 0.4); stroke:#00ffff; stroke-width:8; filter: drop-shadow(0 0 5px #00ffff);">
                <path d="M50 5 L95 25 L85 85 L50 115 L15 85 L5 25 Z" />
            </svg>
            <span>x <span id="shield-count">0</span></span>
        </div>
    </div>

    <!-- VIRTUAL JOYSTICK -->
    <div id="joystick-area">
        <div id="joystick-base"></div>
        <div id="joystick-knob"></div>
    </div>

    <!-- SYSTEM OVERLAYS -->
    <div id="start-screen" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="title">SPEED RUSH</h1>
            <p data-i18n="instruction">Steer left/right to dodge<br>Barricades and collect Shields.</p>
            <button onclick="WCGames.start()" data-i18n="play">INITIATE</button>
        </div>
    </div>

    <div id="game-over" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="game_over">MISSION COMPLETE</h1>
            <p><span data-i18n="final_score">Total Items: </span><span id="final-score">0</span></p>
            <button onclick="WCGames.restart()" data-i18n="play_again">START AGAIN</button>
        </div>
    </div>

    <!-- ENGINE DEPENDENCIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
        /**
         * SPEED RUSH - REFACTORED ENGINE
         * Senior Level Codebase following SRP & Naming Conventions
         */

        /* --- 1. CONFIGURATION & CONSTANTS --- */
        const COLORS = {
            bg: 0x201435,           // 짙은 보라색/인디고 (일러스트 베이스)
            accents: [0x00f3ff, 0xff00ff, 0xffcc00, 0x00ff66],
            player: 0xffffff,
            spike: 0xff3366,
            grid: 0x00f3ff,
            obstacles: [0xff3366, 0xff9933, 0x33ff99, 0x9933ff, 0x00ccff, 0xffff33]
        };

        const CONFIG = {
            playerXRatio: 0.00,        // 플레이어 X축 위치 비율
            baseZ: 12,                // 기본 카메라 Z 깊이
            BPM: 140,                 // 게임 리듬 (BPM)
            // 성능 설정 (가시거리 및 최적화)
            visibilityRoad: 400,       // 도로 가시거리 (앞쪽)
            visibilityBuildings: 400,  // 건물 가시거리 (앞쪽)
            cleanupDistance: 100,      // 지나간 오브젝트 제거 거리 (뒤쪽)
            // 비주얼 튜닝 (빛 번짐 및 환경)
            bloomStrength: 1.2,       // 빛 번짐(블룸) 강도 상향 (일러스트 느낌)
            bloomRadius: 0.2,         // 블룸 반경 (퍼짐 정도)
            bloomThreshold: 0.15,     // 블룸 활성 임계값 (더 많이 번지게)
            fogDensity: 0.005,       // 안개 밀도
            ambientLightIntensity: 1.5, // 주변광 밝기 상향 (색감 강조)
            dirLightIntensity: 1.0,   // 직사광 밝기
            // 건물 생성 규칙
            buildingWidthRange: [10, 40],     // 건물 너비 범위 [최소, 최대]
            buildingHeightRange: [200, 300], // 건물 높이 범위 [최소, 최대]
            buildingDepthRange: [1, 10],     // 건물 깊이 범위 [최소, 최대]
            buildingSpawnRate: 0.2,          // 건물 생성 빈도 상향 (0.5 -> 0.2, 낮을수록 더 많이 생성)
            neonIntensity: 2.0,              // 건물 네온 윤곽선 밝기 (블러 효과 영향)
            neonLineWidth: 0.5,              // 건물 네온 윤곽선 두께 (메쉬 프레임 방식)
            windowIntensity: 2.5,             // 건물 창문 밝기 상향
            // 카메라 설정 (사이버카 시점 최적화)
            cameraPos: { x: -20, y: 8, z: 0 },
            cameraLookAt: { x: -2, y: 1, z: 0 },
            // 도로 생성 조건
            roadSpawnStep: 2,                // 도로 생성 간격
            roadSpawnAhead: 600,             // 앞쪽 도로 미리 생성 거리
            roadWidth: 10,                    // 도로 너비
            roadThickness: 0.5,               // 도로 두께 (가시성 및 안정성 상향)
            roadInitialStart: -100,          // 초기 도로 시작점
            roadInitialEnd: 500,              // 초기 도로 끝점
            // 도로 곡률 (회전/굴곡)
            // 도로 곡률 설정 (확률 및 세그먼트 기반)
            pathYRange: { min: -50, max: 50 }, // 상하 굴곡 범위
            pathYProb: 0.2,                   // 상하 곡선 발생 확률 (0~1)
            pathYFreq: 0.005,                 // 세그먼트 길이 역수 (곡선 유지 시간)
            pathZRange: { min: -50, max: 50 }, // 좌우 회전 범위
            pathZProb: 0.2,                   // 좌우 곡선 발생 확률 (0~1)
            pathZFreq: 0.005,                 // 세그먼트 길이 역수
            pathRollRange: { min: -1, max: 1 }, // 회전(뱅킹) 범위
            pathRollProb: 0.1,                // 뱅킹 발생 확률 (0~1)
            pathRollFreq: 0.005,               // 세그먼트 길이 역수
            // 속도 및 가속도 설정
            baseSpeed: 2.0,                   // 초기 이동 속도
            timeAccel: 40,                    // 가속도 계수 (초 단위, 클수록 천천히 빨라짐)
            // 장애물 생성 설정 (거리에 비례해 난이도 증가)
            obstacleGapMax: 500,              // 초반 바리케이트 사이의 최대 거리(m)
            obstacleGapMin: 200,              // 후반 바리케이트 사이의 최소 거리(m) (난이도 max 도달 시)
            obstacleStartScore: 1000,         // 바리케이트가 나타나기 시작하는 점수(m)
            obstacleMaxScore: 10000,          // 난이도가 최고조(최소 간격)에 달하는 점수(m)
            // 추락 애니메이션 (회전 속도 조절)
            fallRotationAccel: 2.0,           // 추락 시 회전 가속도 (초당 증가 폭)
            fallRotationMax: 8.0,             // 추락 시 최대 회전 속도 제한 (너무 빨리 도는 것 방지)
            fallPitchMulti: 1.5,              // 앞으로 고꾸라지는(Pitch) 속도 배수
            fallRollMulti: 2.5                // 옆으로 구르는(Roll) 속도 배수
        };

        const BEAT_LEN = 60 / CONFIG.BPM;

        /* --- 2. GLOBAL STATE --- */
        let scene, camera, renderer, composer, bloomPass, player, playerContainer, worldGroup, backgroundGroup;
        let items = [], particles = [], backgroundBuildings = [];
        let roadChunks = [], obstacles = [];
        let score = 0, gameState = 'START', sector = 0;
        let currentSafeSide = 1; // 1 for Right, -1 for Left
        let trackProgress = 0; // Current world-space X position
        let worldX = 0; // Cumulative world distance traveled
        let startWorldX = 0; // Offset for distance traveled during START menu
        let velocityY = 0, isGrounded = true, playerJumpY = 0.5;
        let lateralOffset = 0, targetLateralOffset = 0, joystickValue = 0;
        let fallForwardSpeed = 0;
        let fallLateralSpeed = 0;
        let fallRotationSpeed = 0;
        let gameOverSpeed = 0; // Tracks deceleration speed when game is over
        let playerWheels = [], playerNeonBody = null, playerShield = null;
        let time = 0, beatTimer = 0, beatPulse = 0, cameraShake = 0;
        let shieldCount = 0, cameraFovOffset = 0;



        /* --- 3. GEOMETRY TEMPLATES & SHARED RESOURCES --- */
        const itemGeo = new THREE.SphereGeometry(0.5, 16, 16);
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const octaGeo = new THREE.OctahedronGeometry(0.6);
        const icosaGeo = new THREE.IcosahedronGeometry(0.6);
        const tetraGeo = new THREE.TetrahedronGeometry(0.7);

        /* --- 4. SHARED RESOURCES (OPTIMIZATION) --- */
        const unitBoxGeo = new THREE.BoxGeometry(1, 1, 1);
        const unitEdgesGeo = new THREE.EdgesGeometry(unitBoxGeo);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x111122, metalness: 0.8, roughness: 0.2 });
        const sharedMaterials = {};
        const lineMaterials = {};
        let lastBuildingXLeft = -100;
        let lastBuildingXRight = -100;

        /* --- 4. MATH & LOGIC HELPERS --- */
        // Deterministic hash based on segment index
        function LogicHash(i) {
            const x = Math.sin(i) * 10000;
            return x - Math.floor(x);
        }

        function LogicGetSegmentValue(x, freq, range, prob, seedOffset = 0) {
            const segment = Math.floor(x * freq);
            const fract = (x * freq) - segment;

            // Current segment random value
            const h1 = LogicHash(segment + seedOffset);
            const val1 = h1 < prob ? (LogicHash(segment + seedOffset + 11) * 2 - 1) : 0;

            // Next segment random value
            const h2 = LogicHash(segment + seedOffset + 1);
            const val2 = h2 < prob ? (LogicHash(segment + seedOffset + 12) * 2 - 1) : 0;

            // Smoothly interpolate between segments (S-curve)
            const t = fract * fract * (3 - 2 * fract);
            const rawVal = val1 + (val2 - val1) * t;

            const r = range.max - range.min;
            return range.min + (rawVal * 0.5 + 0.5) * r;
        }

        function LogicGetWorldTrackY(x) {
            return LogicGetSegmentValue(x, CONFIG.pathYFreq, CONFIG.pathYRange, CONFIG.pathYProb, 100);
        }

        function LogicGetWorldTrackZ(x) {
            return LogicGetSegmentValue(x, CONFIG.pathZFreq, CONFIG.pathZRange, CONFIG.pathZProb, 200);
        }

        function LogicGetWorldTrackRoll(x) {
            return LogicGetSegmentValue(x, CONFIG.pathRollFreq, CONFIG.pathRollRange, CONFIG.pathRollProb, 300);
        }

        function LogicGetWorldTrackVector(x) {
            const eps = 0.1;
            const p0 = new THREE.Vector3(x, LogicGetWorldTrackY(x), LogicGetWorldTrackZ(x));
            const p1 = new THREE.Vector3(x + eps, LogicGetWorldTrackY(x + eps), LogicGetWorldTrackZ(x + eps));
            const tan = p1.clone().sub(p0).normalize();
            const roll = LogicGetWorldTrackRoll(x);

            // Generate stable right-handed basis (X=tan, Y=up, Z=side)
            let upRef = new THREE.Vector3(0, 1, 0);
            if (Math.abs(tan.dot(upRef)) > 0.95) upRef.set(0, 0, 1);

            // Side = tan x upRef
            const side = new THREE.Vector3().crossVectors(tan, upRef).normalize();
            // Up = side x tan (Right-handed)
            const up = new THREE.Vector3().crossVectors(side, tan).normalize();

            // Apply roll to basis
            const finalSide = side.clone().multiplyScalar(Math.cos(roll)).add(up.clone().multiplyScalar(Math.sin(roll)));
            const finalUp = up.clone().multiplyScalar(Math.cos(roll)).sub(side.clone().multiplyScalar(Math.sin(roll)));

            return {
                pos: p0,
                tan: tan,  // Forward (X)
                side: finalSide, // Right (Z)
                up: finalUp,   // Up (Y)
                roll: roll
            };
        }

        function LogicGetSharedMaterial(color, opacity = 1, emissive = false, wireframe = false, emissiveIntensity = 1) {
            const key = `${color}_${opacity}_${emissive}_${wireframe}_${emissiveIntensity}`;
            if (!sharedMaterials[key]) {
                const params = {
                    color: color,
                    transparent: opacity < 1,
                    opacity: opacity,
                    wireframe: wireframe
                };
                if (emissive) {
                    params.emissive = color;
                    params.emissiveIntensity = emissiveIntensity;
                }
                if (wireframe || emissive) {
                    // Use Standard for emissive to allow intensity control for bloom "blur"
                    params.metalness = 0;
                    params.roughness = 1;
                    sharedMaterials[key] = new THREE.MeshStandardMaterial(params);
                } else {
                    // Optimization: Matte finish (No reflections)
                    params.metalness = 0.0;
                    params.roughness = 1.0;
                    // Safari/Apple Fix: Polygon offset to prevent Z-fighting on decorations
                    params.polygonOffset = true;
                    params.polygonOffsetFactor = 1;
                    params.polygonOffsetUnits = 1;
                    sharedMaterials[key] = new THREE.MeshStandardMaterial(params);
                }
            }
            return sharedMaterials[key];
        }

        function LogicGetSharedLineMaterial(color, opacity = 1, intensity = 1) {
            const key = `${color}_${opacity}_${intensity}`;
            if (!lineMaterials[key]) {
                const finalColor = new THREE.Color(color).multiplyScalar(intensity);
                lineMaterials[key] = new THREE.LineBasicMaterial({
                    color: finalColor,
                    transparent: opacity < 1,
                    opacity: opacity
                });
            }
            return lineMaterials[key];
        }

        /**
         * --- 5. MESH BUILDERS ---
         * 12개의 얇은 박스를 사용하여 사선 없는 굵은 네온 프레임을 생성합니다.
         */
        function LogicCreateMeshFrame(w, h, d, thickness, material) {
            const group = new THREE.Group();
            const hw = w / 2, hh = h / 2, hd = d / 2;

            // X-axis edges
            const geomX = unitBoxGeo;
            const meshX = new THREE.Mesh(geomX, material);
            meshX.scale.set(w, thickness, thickness);
            [
                [0, hh, hd], [0, -hh, hd], [0, hh, -hd], [0, -hh, -hd]
            ].forEach(p => { const e = meshX.clone(); e.position.set(...p); group.add(e); });

            // Y-axis edges
            const meshY = new THREE.Mesh(geomX, material);
            meshY.scale.set(thickness, h, thickness);
            [
                [hw, 0, hd], [-hw, 0, hd], [hw, 0, -hd], [-hw, 0, -hd]
            ].forEach(p => { const e = meshY.clone(); e.position.set(...p); group.add(e); });

            // Z-axis edges
            const meshZ = new THREE.Mesh(geomX, material);
            meshZ.scale.set(thickness, thickness, d);
            [
                [hw, hh, 0], [-hw, hh, 0], [hw, -hh, 0], [-hw, -hh, 0]
            ].forEach(p => { const e = meshZ.clone(); e.position.set(...p); group.add(e); });

            return group;
        }

        function LogicCreateCyberCar() {
            const group = new THREE.Group();
            playerWheels = [];

            // 1. Bottom Chassis (Carbon Fiber style)
            const chassis = new THREE.Mesh(unitBoxGeo, LogicGetSharedMaterial(0x0a0a0f, 1, false));

            chassis.position.y = 0.15;

            // DEBUG HITBOX (Car) - Red Wireframe (Hidden)
            // Width(Z) = 1.3, Length(X) = 2.6, Height(Y) = ~1.0
            const carHitboxMat = new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true, transparent: true, opacity: 0.8, visible: false });
            const carHitbox = new THREE.Mesh(unitBoxGeo, carHitboxMat);

            const bodyCol = 0x00ffff;

            const spoilerGeo = new THREE.BoxGeometry(0.8, 0.05, 1.4);

            const support1 = new THREE.Mesh(unitBoxGeo, LogicGetSharedMaterial(0x111122, 1, false));

            [

        /* --- 6. INITIALIZATION & RESIZE --- */
        function DrawInitializeScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(COLORS.bg);

            const aspect = window.innerWidth / window.innerHeight;
            // Safari/Apple Fix: Increase near plane to 1.0 for better depth precision
            camera = new THREE.PerspectiveCamera(75, aspect, 1.0, 1000);
            camera.position.set(CONFIG.cameraPos.x, CONFIG.cameraPos.y, CONFIG.cameraPos.z);
            camera.lookAt(CONFIG.cameraLookAt.x, CONFIG.cameraLookAt.y, CONFIG.cameraLookAt.z);

            // Safari/Apple Fix: Enable logarithmicDepthBuffer
            renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: true,
                logarithmicDepthBuffer: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            document.body.appendChild(renderer.domElement);

            // 블룸 포스트프로세싱: 강도 상향 및 임계점 하향으로 "블러(Blur)" 효과 강화
            const bloomResolution = 0.5;
            composer = new THREE.EffectComposer(renderer);
            composer.addPass(new THREE.RenderPass(scene, camera));
            bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth * bloomResolution, window.innerHeight * bloomResolution),
                CONFIG.bloomStrength,
                CONFIG.bloomRadius,
                CONFIG.bloomThreshold
            );
            composer.addPass(bloomPass);

            scene.fog = new THREE.FogExp2(COLORS.bg, CONFIG.fogDensity);

            const ambient = new THREE.AmbientLight(0xffffff, CONFIG.ambientLightIntensity);
            scene.add(ambient);
            const dirLight = new THREE.DirectionalLight(0xffffff, CONFIG.dirLightIntensity);
            dirLight.position.set(5, 10, 5);
            scene.add(dirLight);

            worldGroup = new THREE.Group();
            scene.add(worldGroup);

            backgroundGroup = new THREE.Group();
            scene.add(backgroundGroup);

            DrawInitFloor();
            DrawInitCityBackground();

            playerContainer = new THREE.Group();
            playerContainer.position.set(-6, -1.5, 0);

            player = LogicCreateCyberCar();
            playerContainer.add(player);
            scene.add(playerContainer);

            window.addEventListener('resize', DrawResize);

            DrawResize();
            LogicMainLoop();
        }

        function DrawResize() {
            const aspect = window.innerWidth / window.innerHeight;
            if (camera) {
                camera.aspect = aspect;
                camera.updateProjectionMatrix();
            }
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (composer) {
                composer.setSize(window.innerWidth, window.innerHeight);
                composer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
                if (bloomPass) {
                    const bloomResolution = 0.25;
                    bloomPass.resolution.set(Math.max(1, Math.floor(window.innerWidth * bloomResolution)), Math.max(1, Math.floor(window.innerHeight * bloomResolution)));
                }
            }
            playerContainer.position.set(-6, -1.5, 0);
        }

        /* --- 7. ENVIRONMENT GENERATION --- */
        function LogicSpawnWorldChunk(wx) {
            const step = CONFIG.roadSpawnStep;
            const roadLen = step + 0.4;
            const roadWidth = CONFIG.roadWidth;

            const vec = LogicGetWorldTrackVector(wx);

            const chunkGroup = new THREE.Group();
            chunkGroup.position.copy(vec.pos);

            // Align segment: Road local X is length (tan), Y is thickness (up), Z is width (side)
            const mat = new THREE.Matrix4().makeBasis(vec.tan, vec.up, vec.side);
            chunkGroup.quaternion.setFromRotationMatrix(mat);

            // Apply road offset (relative to local road Up)
            // Road surface exactly at vec.pos (y=0 in aligned space)
            const yOffset = -(CONFIG.roadThickness / 2);
            chunkGroup.position.add(vec.up.clone().multiplyScalar(yOffset));

            // Road Surface
            const road = new THREE.Mesh(unitBoxGeo, LogicGetSharedMaterial(0x050515, 1, false));
            road.scale.set(roadLen, CONFIG.roadThickness, roadWidth);
            chunkGroup.add(road);

            // Neon Rails (사이버 네온 강화)
            const accentColor = COLORS.accents[sector % 4];
            const railMat = LogicGetSharedMaterial(accentColor, 1, true, false, 2.0);
            [-1, 1].forEach(side => {
                const rail = new THREE.Mesh(unitBoxGeo, railMat);
                rail.scale.set(roadLen, 0.3, 0.15);
                rail.position.set(0, 0.1, side * (roadWidth / 2));
                chunkGroup.add(rail);
            });

            // Center Dashes (Rhythmic)
            if (Math.floor(wx / step) % 5 === 0) {
                const dash = new THREE.Mesh(unitBoxGeo, LogicGetSharedMaterial(0xffffff, 1, true, false, 2.0));
                dash.scale.set(roadLen * 0.8, 0.05, 0.1);
                dash.position.set(0, 0.06, 0);
                chunkGroup.add(dash);
            }

            worldGroup.add(chunkGroup);
            roadChunks.push(chunkGroup);

            // 3. Spawn Buildings near this road segment (사이버 도시 스타일)
            if (Math.random() > CONFIG.buildingSpawnRate) { // Even more throttled spawn rate
                const count = 1; // Single building per segment
                for (let i = 0; i < count; i++) {
                    // 사이버 도시 네온 팔레트 (시안, 마젠타, 전기파랑, 보라)
                    const neonColors = [0x00f3ff, 0xff00ff, 0x0066ff, 0x9933ff];
                    const w = CONFIG.buildingWidthRange[0] + Math.random() * (CONFIG.buildingWidthRange[1] - CONFIG.buildingWidthRange[0]);
                    const h = CONFIG.buildingHeightRange[0] + Math.random() * (CONFIG.buildingHeightRange[1] - CONFIG.buildingHeightRange[0]);
                    const d = CONFIG.buildingDepthRange[0] + Math.random() * (CONFIG.buildingDepthRange[1] - CONFIG.buildingDepthRange[0]);

                    const buildingRoot = new THREE.Group();

                    // 건물 본체: 일러스트 느낌의 짙은 보라/인디고
                    const bodyCol = 0x2d1b4d;
                    const mainBody = new THREE.Mesh(unitBoxGeo, LogicGetSharedMaterial(bodyCol, 1.0, false));
                    mainBody.scale.set(w, h, d);
                    buildingRoot.add(mainBody);

                    // Building Outline (Mesh Wireframe for Bloom)
                    // Building Outline (Thick Mesh Frame - No Diagonals)
                    const neonColor = neonColors[Math.floor(Math.random() * neonColors.length)];
                    const wireMat = LogicGetSharedMaterial(neonColor, 1.0, true, false, CONFIG.neonIntensity);
                    const frame = LogicCreateMeshFrame(w, h, d, CONFIG.neonLineWidth, wireMat);
                    buildingRoot.add(frame);

                    // 실루엣 타입 (기존 + 일러스트 특화 타입)
                    const buildingType = Math.random();
                    if (buildingType < 0.2) {
                        // 타입 A: 칼날형 (Blade/Foil) - 이미 w,d가 정해졌으므로 h를 강조하거나 w를 크게 조정
                        // 특별히 할 것 없음, 기본 monolith가 Blade 느낌을 줄 수 있도록 w/d 비율 유도
                    } else if (buildingType < 0.45) {
                        // 타입 B: 옥상 한 단 줄어든 타워 (Setback)
                        const topW = w * (0.5 + Math.random() * 0.2);
                        const topH = h * (0.1 + Math.random() * 0.1);
                        const topD = d * (0.5 + Math.random() * 0.2);
                        const topBox = new THREE.Mesh(unitBoxGeo, LogicGetSharedMaterial(bodyCol, 1.0, false));
                        topBox.scale.set(topW / w, topH / h, topD / d);
                        topBox.position.set(0, 0.5 + (topH / h) / 2, 0);
                        topBox.frustumCulled = false;
                        mainBody.add(topBox);

                        const frameParams = [topW, topH, topD, CONFIG.neonLineWidth, wireMat];
                        const topFrame = LogicCreateMeshFrame(...frameParams);
                        topFrame.position.set(0, (h / 2) + (topH / 2), 0);
                        buildingRoot.add(topFrame);
                    } else if (buildingType < 0.65) {
                        // 타입 C: 상단 좁아진 계단식 (Taper)
                        const taper = 0.7 + Math.random() * 0.2;
                        const topBox = new THREE.Mesh(unitBoxGeo, LogicGetSharedMaterial(bodyCol, 1.0, false));
                        topBox.scale.set(taper, 0.4, taper);
                        topBox.position.set(0, 0.5 + 0.2, 0);
                        topBox.frustumCulled = false;
                        mainBody.add(topBox);

                        const frameParams = [w * taper, h * 0.4, d * taper, CONFIG.neonLineWidth, wireMat];
                        const topFrame = LogicCreateMeshFrame(...frameParams);
                        topFrame.position.set(0, (h * 0.2) + (h / 2), 0);
                        buildingRoot.add(topFrame);
                    } else if (buildingType < 0.85) {
                        // 타입 D: 쌍둥이 타워 (Twin Towers)
                        const towerW = w * 0.35;
                        const towerH = h * (0.2 + Math.random() * 0.2);
                        const towerD = d * 0.7;
                        [0.25, -0.25].forEach(xOff => {
                            const tower = new THREE.Mesh(unitBoxGeo, LogicGetSharedMaterial(bodyCol, 1.0, false));
                            tower.scale.set(towerW / w, towerH / h, towerD / d);
                            tower.position.set(xOff, 0.5 + (towerH / h) / 2, 0);
                            tower.frustumCulled = false;
                            mainBody.add(tower);

                            const tFrame = LogicCreateMeshFrame(towerW, towerH, towerD, CONFIG.neonLineWidth, wireMat);
                            tFrame.position.set(xOff * w, (h / 2) + (towerH / 2), 0);
                            buildingRoot.add(tFrame);
                        });
                    } else {
                        // 타입 E: 경사 지붕 느낌 (Sloped Style - 3단 계단으로 시뮬레이션)
                        for (let s = 1; s <= 3; s++) {
                            const sTaper = 1.0 - (s * 0.25);
                            const sH = h * 0.1;
                            const step = new THREE.Mesh(unitBoxGeo, LogicGetSharedMaterial(bodyCol, 1.0, false));
                            step.scale.set(sTaper, sH / h, sTaper);
                            step.position.set(0, 0.5 + (s * sH / h) - (sH / h / 2), 0);
                            step.frustumCulled = false;
                            mainBody.add(step);

                            const sFrame = LogicCreateMeshFrame(w * sTaper, sH, d * sTaper, CONFIG.neonLineWidth, wireMat);
                            sFrame.position.set(0, (h / 2) + (s * sH) - (sH / 2), 0);
                            buildingRoot.add(sFrame);
                        }
                    }

                    // --- 일러스트 디테일 추가: 노란 창문과 네온 밴드 ---
                    const winMat = LogicGetSharedMaterial(0xffcc00, 1, true, false, 2.0); // 따뜻한 빛
                    const bandMat = LogicGetSharedMaterial(neonColor, 1, true, false, 1.5);
                    bandMat.polygonOffset = true;
                    bandMat.polygonOffsetFactor = -2;
                    bandMat.polygonOffsetUnits = -2;

                    // 1. 노란 창문들 (랜덤 그룹)
                    const winGroupCount = 2 + Math.floor(Math.random() * 3);
                    for (let g = 0; g < winGroupCount; g++) {
                        const yBase = -0.4 + Math.random() * 0.8;
                        const xOffset = (Math.random() - 0.5) * 0.4;
                        const winRows = 2 + Math.floor(Math.random() * 2);
                        const winCols = 1 + Math.floor(Math.random() * 2);

                        for (let r = 0; r < winRows; r++) {
                            for (let c = 0; c < winCols; c++) {
                                [-0.505, 0.505].forEach(zSide => {
                                    const windowMesh = new THREE.Mesh(unitBoxGeo, winMat);
                                    windowMesh.scale.set(0.08, 0.05, 0.01);
                                    windowMesh.position.set(xOffset + c * 0.12, yBase + r * 0.08, zSide);
                                    windowMesh.frustumCulled = false;
                                    mainBody.add(windowMesh);
                                });
                            }
                        }
                    }

                    // 2. 가로 네온 밴드
                    const bandCount = 1 + Math.floor(Math.random() * 2);
                    for (let b = 0; b < bandCount; b++) {
                        const bandY = -0.3 + Math.random() * 0.6;
                        [-0.502, 0.502].forEach(zSide => {
                            const band = new THREE.Mesh(unitBoxGeo, bandMat);
                            band.scale.set(0.98, 0.015, 1.0);
                            band.position.set(0, bandY, zSide);
                            band.frustumCulled = false;
                            mainBody.add(band);
                        });
                    }

                    // 옥상: 안테나 1~2개
                    const antCount = 1 + Math.floor(Math.random() * 2);
                    for (let a = 0; a < antCount; a++) {
                        const antH = 8 + Math.random() * 12;
                        const antScaleX = (0.055 + Math.random() * 0.025); // 더 두껍게 (컬링 방지)
                        const antScaleZ = (0.055 + Math.random() * 0.025);
                        const ant = new THREE.Mesh(unitBoxGeo, LogicGetSharedMaterial(neonColor, 1, true, false, 2.5));
                        ant.scale.set(antScaleX, antH / h, antScaleZ);
                        ant.position.set((Math.random() - 0.5) * 0.6, 0.5 + (antH / h) / 2, (Math.random() - 0.5) * 0.6);
                        ant.frustumCulled = false;
                        mainBody.add(ant);
                    }

                    // 옥상 모서리 네온 라이트 (2개만: 대각 한 쌍)
                    const lightMat = LogicGetSharedMaterial(neonColor, 1, true, false, 2.8);
                    [[-0.45, 0.48, -0.45], [0.45, 0.48, 0.45]].forEach(([ox, oy, oz]) => {
                        const light = new THREE.Mesh(unitBoxGeo, lightMat);
                        light.scale.set(0.08, 0.055, 0.08); // 더 두껍게 (컬링 방지)
                        light.position.set(ox, oy, oz);
                        light.frustumCulled = false;
                        mainBody.add(light);
                    });

                    const side = Math.random() > 0.5 ? 1 : -1;
                    const minGap = 5; // Minimum buffer between buildings
                    const lastX = (side === 1) ? lastBuildingXRight : lastBuildingXLeft;

                    // Ensure we don't overlap with the previous building on this side
                    if (wx < lastX + w + minGap) {
                        return; // Skip spawning this segment to avoid overlap
                    }

                    // Update tracker for the chosen side
                    if (side === 1) lastBuildingXRight = wx;
                    else lastBuildingXLeft = wx;

                    const distZ = side * (25 + Math.random() * 55); // 더 가까이 배치 (35~100 -> 25~80)
                    const wy = LogicGetWorldTrackY(wx) - (h / 2) + 20 + Math.random() * 40; // 높이 다양성 조정
                    const wz = LogicGetWorldTrackZ(wx) + distZ;

                    buildingRoot.position.set(wx, wy, wz);
                    buildingRoot.frustumCulled = false; // 프러스텀 경계에서 깜빡임 방지
                    backgroundGroup.add(buildingRoot);
                    backgroundBuildings.push(buildingRoot);
                }
            }
        }

        function DrawInitFloor() {
            // Initial burst of chunks
            for (let x = CONFIG.roadInitialStart; x < CONFIG.roadInitialEnd; x += CONFIG.roadSpawnStep) {
                LogicSpawnWorldChunk(x);
            }
        }

        function DrawInitCityBackground() {
            // NO-OP: Handled by LogicSpawnWorldChunk
        }

        let lastSpawnX = CONFIG.roadInitialEnd;
        function LogicUpdateWorld(worldX) {
            // Spawn new chunks ahead in discrete steps
            const step = CONFIG.roadSpawnStep;
            while (lastSpawnX < worldX + CONFIG.roadSpawnAhead) {
                LogicSpawnWorldChunk(lastSpawnX);
                lastSpawnX += step;
            }

            // Cleanup old buildings far behind
            for (let i = backgroundBuildings.length - 1; i >= 0; i--) {
                const b = backgroundBuildings[i];
                const dx = b.position.x - worldX;
                // Configurable building visibility
                b.visible = (dx > -100 && dx < CONFIG.visibilityBuildings);
                // Configurable cleanup
                if (dx < -CONFIG.cleanupDistance) {
                    scene.remove(b);
                    backgroundBuildings.splice(i, 1);
                }
            }
            // Cleanup old road chunks
            for (let i = roadChunks.length - 1; i >= 0; i--) {
                const c = roadChunks[i];
                const dx = c.position.x - worldX;
                // Configurable road visibility
                c.visible = (dx > -100 && dx < CONFIG.visibilityRoad);
                // Configurable cleanup
                if (dx < -CONFIG.cleanupDistance) {
                    worldGroup.remove(c);
                    roadChunks.splice(i, 1);
                }
            }
            // Cleanup old obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const o = obstacles[i];
                const dx = o.position.x - worldX;
                o.visible = (dx > -100 && dx < CONFIG.visibilityRoad);
                if (dx < -CONFIG.cleanupDistance) {
                    worldGroup.remove(o);
                    obstacles.splice(i, 1);
                }
            }
        }

        function LogicSpawnParticles(x, y, count, color, isExplosion = false) {
            const mat = LogicGetSharedMaterial(color, 0.8);
            for (let i = 0; i < count; i++) {
                const p = new THREE.Mesh(boxGeo, mat);
                p.scale.setScalar(0.15);
                p.position.set(x, y, (Math.random() - 0.5) * 1);
                const v = isExplosion ?
                    new THREE.Vector3((Math.random() - 0.5) * 0.4, (Math.random() - 0.5) * 0.4, (Math.random() - 0.5) * 0.4) :
                    new THREE.Vector3((Math.random() - 0.8) * 0.2, Math.random() * 0.2, 0);
                p.userData = { vel: v, life: 1.0 };
                scene.add(p);
                particles.push(p);
            }
        }

        let sharedShieldTexture = null;
        function getShieldTexture() {
            if (sharedShieldTexture) return sharedShieldTexture;
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = '900 180px "Orbitron", sans-serif';

            // Cyberpunk Shield Polygon
            // ctx.shadowColor = '#00ffff';
            // ctx.shadowBlur = 20; // Removed blur as requested
            ctx.fillStyle = 'rgba(0, 255, 255, 0.2)';
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 12;

            ctx.beginPath();
            ctx.moveTo(128, 40);
            ctx.lineTo(210, 60);
            ctx.lineTo(190, 160);
            ctx.lineTo(128, 220);
            ctx.lineTo(66, 160);
            ctx.lineTo(46, 60);
            ctx.closePath();

            ctx.fill();
            ctx.stroke();

            // Inner details
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(128, 60);
            ctx.lineTo(128, 200);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(80, 100);
            ctx.lineTo(176, 100);
            ctx.stroke();

            sharedShieldTexture = new THREE.CanvasTexture(canvas);
            return sharedShieldTexture;
        }

        // Reserved for future item textures

        function LogicSpawnItem(x) {
            const m = new THREE.Group();

            const type = 'SHIELD';
            m.userData = { type: type };

            const spriteMaterial = new THREE.SpriteMaterial({
                map: getShieldTexture(),
                color: 0xffffff,
                transparent: true,
                blending: THREE.AdditiveBlending
            });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.position.y = 0.5; // Offset slightly up from the ground
            m.add(sprite);

            // DEBUG HITBOX (Item) - Green Wireframe (Hidden)
            // The item logic checks: Width(X) = 1.2, Length(Z) = 1.2, Height(Y) = 1.2
            const itemHitboxMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true, transparent: true, opacity: 0.8, visible: false });
            const itemHitbox = new THREE.Mesh(unitBoxGeo, itemHitboxMat);
            // Changed from a flat plane to a perfect square/cube
            itemHitbox.scale.set(1.2, 1.2, 1.2);
            itemHitbox.position.y = 0.5; // Center Y is 0.5
            m.add(itemHitbox);

            const wx = x;
            const vec = LogicGetWorldTrackVector(wx);

            // Guide the player into the safe side of the track to avoid upcoming obstacles
            // Divide the road into 2 lanes (Left: -1, Right: 1)
            // Left lane center: -roadWidth / 4
            // Right lane center: +roadWidth / 4
            // currentSafeSide represents the safe lane (-1 or 1)
            const laneOffsetAmount = CONFIG.roadWidth / 4;
            const targetLaneX = currentSafeSide * laneOffsetAmount;

            // Float higher above road and offset to the exact lane center
            m.position.copy(vec.pos)
                .add(vec.up.clone().multiplyScalar(1.2))
                .add(vec.side.clone().multiplyScalar(targetLaneX));

            const target = vec.pos.clone().add(vec.tan);
            m.lookAt(target);

            // Scale to be visible
            m.scale.set(2.5, 2.5, 2.5);

            worldGroup.add(m);
            m.renderOrder = 10;
            items.push(m);
        }

        function LogicSpawnObstacle(x) {
            const m = new THREE.Group();

            // Barricade visual (blocks 1/2 of the road)
            const barricadeWidth = CONFIG.roadWidth / 2;

            // If currentSafeSide is -1 (Left), barricade should be on Right.
            // If currentSafeSide is 1 (Right), barricade should be on Left.
            const isLeft = (currentSafeSide === 1);

            // Road edges are at -CONFIG.roadWidth/2 and +CONFIG.roadWidth/2
            const sideOffset = isLeft
                ? (-CONFIG.roadWidth / 2 + barricadeWidth / 2)
                : (CONFIG.roadWidth / 2 - barricadeWidth / 2);

            // 1. Collision Box (MUST BE child[0] based on LogicMainLoop)
            // DEBUG HITBOX (Barricade) - Yellow Wireframe (Hidden)
            // Logic checks: Length(X) = 0.7, Width(Z) = barricadeWidth, Height(Y) = 2.3
            const obsHitboxMat = new THREE.MeshBasicMaterial({ color: 0xffff00, wireframe: true, transparent: true, opacity: 0.8, visible: false });
            const hitBox = new THREE.Mesh(unitBoxGeo, obsHitboxMat);
            hitBox.scale.set(0.7, 2.3, barricadeWidth);
            hitBox.position.set(0, 1.15, sideOffset); // Y center is roughly half height
            m.add(hitBox);

            // Base stands (solid grey, no emissive)
            const standMat = LogicGetSharedMaterial(0x444444, 1.0, false);

            const stand1 = new THREE.Mesh(unitBoxGeo, standMat);
            stand1.scale.set(0.6, 1.8, 0.6);
            stand1.position.set(0, 0.9, sideOffset - barricadeWidth / 2 + 0.3);
            m.add(stand1);

            const stand2 = new THREE.Mesh(unitBoxGeo, standMat);
            stand2.scale.set(0.6, 1.8, 0.6);
            stand2.position.set(0, 0.9, sideOffset + barricadeWidth / 2 - 0.3);
            m.add(stand2);

            // Crossbars (Yellow/Black hazard pattern, solid, no glow)
            const matYellow = LogicGetSharedMaterial(0xffcc00, 1.0, false);
            const matBlack = LogicGetSharedMaterial(0x111111, 1.0, false);

            const segments = 8;
            const segWidth = barricadeWidth / segments;
            for (let i = 0; i < segments; i++) {
                const segMat = (i % 2 === 0) ? matYellow : matBlack;

                // Top bar
                const tBar = new THREE.Mesh(unitBoxGeo, segMat);
                tBar.scale.set(0.7, 0.4, segWidth);
                tBar.position.set(0, 1.4, sideOffset - barricadeWidth / 2 + segWidth / 2 + i * segWidth);
                m.add(tBar);

                // Bottom bar
                const bBar = new THREE.Mesh(unitBoxGeo, segMat);
                bBar.scale.set(0.7, 0.4, segWidth);
                bBar.position.set(0, 0.6, sideOffset - barricadeWidth / 2 + segWidth / 2 + i * segWidth);
                m.add(bBar);
            }

            const wx = x;
            const vec = LogicGetWorldTrackVector(wx);

            m.position.copy(vec.pos).add(vec.up.clone().multiplyScalar(0.0));
            // Rotate to align with road
            const alignMat = new THREE.Matrix4().makeBasis(vec.tan, vec.up, vec.side);
            m.quaternion.setFromRotationMatrix(alignMat);

            worldGroup.add(m);
            obstacles.push(m);

            // Decide the NEXT sequence's safe lane (-1 or 1)
            currentSafeSide = Math.random() > 0.5 ? -1 : 1;
        }

        /* --- 7. GAMEPLAY MECHANICS --- */

        const CyberAudio = {
            engineOsc: null,
            engineGain: null,
            init() {
                if (!WCGames.Audio.ctx) return;
                try {
                    const ctx = WCGames.Audio.ctx;
                    if (this.engineOsc) return;
                    this.engineOsc = ctx.createOscillator();
                    this.engineOsc.type = 'sawtooth';
                    this.engineGain = ctx.createGain();
                    this.engineGain.gain.value = 0;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 600;
                    this.engineOsc.connect(filter);
                    filter.connect(this.engineGain);
                    this.engineGain.connect(ctx.destination);
                    this.engineOsc.start();
                } catch (e) { }
            },
            update(speed, gameState) {
                if (!this.engineOsc || !WCGames.Audio.ctx) return;
                const ctx = WCGames.Audio.ctx;
                if (gameState === 'PLAYING') {
                    this.engineOsc.frequency.setTargetAtTime(50 + speed * 15, ctx.currentTime, 0.1);
                    this.engineGain.gain.setTargetAtTime(0.12, ctx.currentTime, 0.1);
                } else {
                    this.engineGain.gain.setTargetAtTime(0, ctx.currentTime, 0.2);
                }
            },
            playBeat() {
                // Background beat sound removed per user request
            },
            playBoost() {
                WCGames.Audio.play([200, 2400], 'sawtooth', 0.7, 0.2);
                WCGames.Audio.play([400, 3200], 'square', 0.5, 0.15);
            },
            playJump() {
                WCGames.Audio.play([300, 1200], 'sine', 0.4, 0.2);
                WCGames.Audio.play([200, 800], 'triangle', 0.5, 0.1);
            },
            playCrash() {
                WCGames.Audio.play([150, 40], 'sawtooth', 0.8, 0.4);
                WCGames.Audio.play([250, 50], 'square', 0.6, 0.3);
            }
        };

        function LogicGameOver(currentSpeed = 1.0) {
            if (gameState === 'OVER') return;
            gameState = 'OVER';
            cameraShake = 0.6;
            // player.visible = false; // Don't hide the player instantly so we can see them slide to a stop!
            document.getElementById('joystick-area').style.display = 'none';

            // Capture the speed at the exact moment of game over
            gameOverSpeed = currentSpeed;

            LogicSpawnParticles(playerContainer.position.x, playerContainer.position.y, 30, COLORS.spike, true);

            // Show UI via SDK
            CyberAudio.playCrash();
            WCGames.gameOver(Math.floor(score));
        }

        /* --- 8. MAIN ENGINE LOOP --- */
        let animationId;
        function LogicMainLoop(timestamp) {
            animationId = requestAnimationFrame(LogicMainLoop);

            const dt = WCGames.updateDelta();
            const frameFactor = dt / (1 / 60);

            // BPM Engine
            beatTimer += dt;
            if (beatTimer >= BEAT_LEN) {
                beatTimer = 0;
                beatPulse = 1.0;
                if (gameState === 'PLAYING') {
                    CyberAudio.playBeat();
                }
            }
            beatPulse *= Math.pow(0.92, frameFactor);

            // Apply FOV warp effect smoothly
            if (Math.abs(camera.fov - (75 + cameraFovOffset)) > 0.1) {
                camera.fov = 75 + cameraFovOffset;
                camera.updateProjectionMatrix();
            }

            // Acceleration based on actual gameplay distance (ignoring START screen rolling)
            const effectiveDistance = gameState !== 'START' ? (worldX - startWorldX) : 0;
            const speedDistance = Math.min(10000, effectiveDistance); // Speed maxes out at 10,000m
            const baseSpeed = (CONFIG.baseSpeed + (speedDistance / (CONFIG.timeAccel * 60)));
            let speed = baseSpeed * frameFactor;

            // Decelerate if game is over
            if (gameState === 'OVER') {
                gameOverSpeed *= 0.95; // Friction multiplier
                speed = gameOverSpeed;
            }

            CyberAudio.update(speed, gameState);

            if (gameState === 'PLAYING') {
                // Grounding and falling logic is evaluated after lateral movement computation

                // AAA Car Animations: Wheel Rotation & Underglow Pulse
                const wheelSpeed = -speed * 4;
                playerWheels.forEach(w => w.rotation.z += wheelSpeed);
                if (playerNeonBody) {
                    playerNeonBody.emissiveIntensity = 2.0 + Math.sin(time * 10) * 0.5;
                }
                if (playerShield && playerShield.visible) {
                    playerShield.rotation.x += dt * 2.0;
                    playerShield.rotation.y += dt * 1.5;
                    playerShield.rotation.z += dt * 1.0;
                    // Pulse scale slightly
                    const s = 1.0 + Math.sin(time * 8) * 0.05;
                    playerShield.scale.set(s, s, s);
                }

                // Score based directly on distance traveled since PLAYING started
                score = effectiveDistance;
                document.getElementById('score').textContent = Math.floor(score) + "m";
                document.getElementById('score').style.transform = `scale(${1 + beatPulse * 0.2})`;

                const newSector = Math.floor(score / 5000);
                if (newSector !== sector) {
                    sector = newSector;
                    const c = COLORS.accents[sector % 4];
                    document.documentElement.style.setProperty('--accent', '#' + c.toString(16).padStart(6, '0'));
                }
            }

            // World Movement (Always run in PLAYING or START)
            if (isGrounded || gameState === 'START') {
                worldX += speed;
            } else if (gameState === 'PLAYING') {
                // When falling (but still PLAYING and alive), use physics speed
                fallForwardSpeed = fallForwardSpeed * 0.99;
                worldX += fallForwardSpeed;
            } else if (gameState === 'OVER') {
                // When game over (due to crash or fall depth reached), slide to a stop
                worldX += speed;
            }
            const playerX = worldX - 6; // Player is conceptually at -6 from the camera focal point
            const vecPlayer = LogicGetWorldTrackVector(playerX);
            const vecWorld = LogicGetWorldTrackVector(worldX);

            // 1. World Group Alignment (Camera focus point)
            const matWorld = new THREE.Matrix4().makeBasis(vecWorld.tan, vecWorld.up, vecWorld.side);
            const worldQuat = new THREE.Quaternion().setFromRotationMatrix(matWorld).invert();
            worldGroup.quaternion.copy(worldQuat);
            const worldOffset = vecWorld.pos.clone().applyQuaternion(worldGroup.quaternion).negate();
            worldGroup.position.copy(worldOffset);

            backgroundGroup.rotation.copy(worldGroup.rotation);
            backgroundGroup.position.copy(worldGroup.position);

            // 2. Player Alignment (Relative to World Group)
            const localPlayerPos = vecPlayer.pos.clone().applyQuaternion(worldQuat).add(worldGroup.position);
            const sceneRoadUp = vecPlayer.up.clone().applyQuaternion(worldQuat);
            const sceneRoadSide = vecPlayer.side.clone().applyQuaternion(worldQuat);

            // Update lateral position based on joystick
            // Allow the car to steer significantly outside the physical road (which is ~10 width on each side)
            const maxLateral = (CONFIG.roadWidth / 2) + 10.0; // 10 + 10 = 20 max offset (way off the road)
            targetLateralOffset = -joystickValue * maxLateral;

            // Sluggish steering if airborne, tight steering on ground
            if (isGrounded) {
                lateralOffset += (targetLateralOffset - lateralOffset) * 10 * dt;
                // Capture current momentum for when we fall
                fallForwardSpeed = speed;
                fallLateralSpeed = (targetLateralOffset - lateralOffset) * 2;
            } else {
                // When falling, maintain lateral momentum and IGNORE joystick
                lateralOffset += fallLateralSpeed * dt;

                // Cap the lateral offset so the car drops naturally outside the road, 
                // but not infinitely far. (User requested: 2x the car width distance from edge)
                const carWidth = 1.3;
                const absoluteMaxLateral = (CONFIG.roadWidth / 2) + (carWidth * 2.0);
                if (lateralOffset > absoluteMaxLateral) lateralOffset = absoluteMaxLateral;
                if (lateralOffset < -absoluteMaxLateral) lateralOffset = -absoluteMaxLateral;
            }

            if (gameState === 'PLAYING') {
                // The road width is CONFIG.roadWidth (10). Edges are -5 and +5.
                // The car's visual outer wheel edge is at Z = 0.7 (position) + 0.35 (radius) = 1.05
                // The car's visual total width is 2.1
                // We want to fall if 1/4 of the total width (2.1 * 0.25 = 0.525) is hanging off the edge.
                // So the center of the car can be at most: (roadWidth / 2) - 0.525
                const maxSafeLateral = (CONFIG.roadWidth / 2) - 0.8;
                if (Math.abs(lateralOffset) > maxSafeLateral) {
                    if (isGrounded) {
                        isGrounded = false;
                        // Give it just enough outward push to visually clear the road edge cleanly
                        fallLateralSpeed = Math.sign(lateralOffset) * 10;
                        velocityY = -2; // Start the drop immediately
                    }
                } else {
                    // Safe over the road
                    if (!isGrounded && velocityY <= 0 && playerJumpY <= 0.5 && playerJumpY > -1.5) {
                        isGrounded = true; // Safe landing
                        playerContainer.rotation.set(0, 0, 0); // Flat on land
                        fallRotationSpeed = 0;
                    }
                }

                if (isGrounded) {
                    playerJumpY = 0.5;
                    velocityY = 0;
                } else {
                    velocityY -= 60.0 * dt; // Stronger Gravity for a heavier, scarier drop
                    playerJumpY += velocityY * dt;

                    if (Math.abs(lateralOffset) > maxSafeLateral) {
                        // Natural Tumbling rotation when falling off the track
                        const fallSide = Math.sign(lateralOffset);
                        fallRotationSpeed += CONFIG.fallRotationAccel * dt;
                        if (fallRotationSpeed > CONFIG.fallRotationMax) {
                            fallRotationSpeed = CONFIG.fallRotationMax;
                        }
                        playerContainer.rotateX(fallRotationSpeed * CONFIG.fallPitchMulti * dt);
                        playerContainer.rotateZ(-fallSide * fallRotationSpeed * CONFIG.fallRollMulti * dt);
                    } else {
                        // Airborne jump rotation (pitch nose up slightly, then down)
                        playerContainer.rotation.set(-velocityY * 0.02, 0, 0);
                    }

                    if (playerJumpY < -20) {
                        LogicGameOver(speed);
                    }
                }
            }

            // Base position on road surface, offset by jump height and lateral position
            // playerJumpY is height relative to road surface (base 0.5 = sitting on top)
            playerContainer.position.copy(localPlayerPos)
                .add(sceneRoadUp.multiplyScalar(playerJumpY))
                // Apply lateral offset along the side vector (inverted for correct left/right mapping)
                .add(sceneRoadSide.multiplyScalar(-lateralOffset));

            // Player Rotation Alignment (Right-handed X-Forward)
            if (isGrounded) {
                const matPlayer = new THREE.Matrix4().makeBasis(vecPlayer.tan, vecPlayer.up, vecPlayer.side);
                const playerQuat = new THREE.Quaternion().setFromRotationMatrix(matPlayer);
                playerContainer.quaternion.copy(worldQuat).multiply(playerQuat);
            }

            if (gameState === 'PLAYING') {
                const playerPos = playerContainer.position;
                const tempVec = new THREE.Vector3();

                for (let i = items.length - 1; i >= 0; i--) {
                    const o = items[i];
                    // Removed spinning animation as requested

                    if (o.position.x < worldX - 20) {
                        worldGroup.remove(o); items.splice(i, 1);
                        continue;
                    }

                    // 1. Car Dimensions: Length(Z-ish) = 2.6 (half = 1.3), Width(X-ish) = 1.3 (half = 0.65)
                    // 2. Item ("B" Sprite) Dimensions: Visual scale is 2.5, but Hitbox is a 1.2 cube. Width/Height/Length = 1.2 (half = 0.6).
                    // Note: lookAt makes item's local -Z forward and local X right.
                    const itemHalfWidth = 0.6;
                    const itemHalfLength = 0.6;
                    const carHalfWidth = 0.65;
                    const carHalfLength = 1.3;

                    const localP = o.worldToLocal(playerPos.clone());

                    // Lateral overlap
                    const hitX = Math.abs(localP.x) < (itemHalfWidth + carHalfWidth);
                    // Longitudinal overlap + Speed stretch to prevent skipping frames (now accounting for item depth)
                    const hitZ = Math.abs(localP.z) < (itemHalfLength + carHalfLength + (speed * 1.5));
                    // Vertical overlap (Item Center: +0.5, Height: 1.2 -> 0.5 +/- 0.6) vs (Car Height: 0.15 ... up to ~1.0)
                    const hitY = localP.y > -0.1 && localP.y < 1.1;

                    if (hitX && hitZ && hitY) {
                        if (o.userData.type === 'SHIELD') {
                            shieldCount++;
                            document.getElementById('shield-count').textContent = shieldCount;
                            CyberAudio.playBoost();
                            if (playerShield) playerShield.visible = true;
                        }
                        worldGroup.remove(o);
                        items.splice(i, 1);
                    }
                }

                // Obstacle Collision
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obs = obstacles[i];
                    if (obs.position.x < worldX - 20) {
                        worldGroup.remove(obs); obstacles.splice(i, 1);
                        continue;
                    }

                    if (obs.children.length > 0) {
                        const localP = obs.worldToLocal(playerPos.clone());
                        const boxZ = obs.children[0].position.z; // sideOffset
                        // Retrieve the dynamic width of this specific barricade from its hitbox scale
                        const barricadeWidth = obs.children[0].scale.z;

                        // 1. Car Dimensions: Length(X) = 2.6 (half = 1.3), Width(Z) = 1.3 (half = 0.65)
                        // 2. Barricade Dimensions: Length(X) = ~0.7 (crossbars) (half = 0.35). Width(Z) = barricadeWidth (half = barricadeWidth/2)
                        // Note: Obstacle local X is forward/backward, local Z is left/right.
                        const barricadeHalfLength = 0.35;
                        const carHalfLength = 1.3;
                        const carHalfWidth = 0.65;

                        // Check X (longitudinal overlap + speed stretch to prevent skipping)
                        const hitX = Math.abs(localP.x) < (barricadeHalfLength + carHalfLength) + (speed * 1.5);
                        // Check Z (lateral overlap)
                        const hitZ = Math.abs(localP.z - boxZ) < (barricadeWidth / 2) + carHalfWidth;
                        // Check Y (height overlap vs Barricade stands ~ 1.8 height)
                        const hitY = localP.y < 1.8 + 0.5;

                        if (hitX && hitZ && hitY) {
                            if (shieldCount > 0) {
                                shieldCount--;
                                document.getElementById('shield-count').textContent = shieldCount;
                                if (shieldCount === 0 && playerShield) playerShield.visible = false;

                                worldGroup.remove(obs);
                                obstacles.splice(i, 1);
                                CyberAudio.playJump(); // Break sound

                                continue;
                            } else {
                                LogicGameOver(speed);
                                break;
                            }
                        }
                    }
                }

                // Spawn Logic (maintain objects up to 300m ahead)
                let lastObjX = Math.max(worldX + 100, window.lastTrackedSpawnX || 0); // Track empty space
                if (items.length > 0) lastObjX = Math.max(lastObjX, items[items.length - 1].position.x);
                if (obstacles.length > 0) lastObjX = Math.max(lastObjX, obstacles[obstacles.length - 1].position.x);

                if (lastObjX < worldX + 300) {
                    const nextSpawnX = lastObjX + 40 + Math.random() * 40;
                    window.lastTrackedSpawnX = nextSpawnX; // Advance the spawn frontier even if we spawn nothing

                    let canSpawnObstacle = true;
                    if (obstacles.length > 0) {
                        const lastObs = obstacles[obstacles.length - 1];

                        // Calculate dynamic gap based on an exponential curve to stay sparse early, then get very frequent later
                        let progress = (score - CONFIG.obstacleStartScore) / (CONFIG.obstacleMaxScore - CONFIG.obstacleStartScore);
                        progress = Math.max(0, Math.min(1, progress)); // clamp 0 to 1

                        // Use a power of 2.5 to make it drop slowly at first, then sharply at the end (최종적으로 자주 나옴)
                        const difficultyCurve = Math.pow(progress, 2.5);
                        const currentMinGap = CONFIG.obstacleGapMax - (difficultyCurve * (CONFIG.obstacleGapMax - CONFIG.obstacleGapMin));

                        if (nextSpawnX - lastObs.position.x < currentMinGap) {
                            canSpawnObstacle = false;
                        }
                    }

                    // Also scale the probability of choosing an obstacle vs an empty space based on the same curve
                    let progressProb = (score - CONFIG.obstacleStartScore) / (CONFIG.obstacleMaxScore - CONFIG.obstacleStartScore);
                    progressProb = Math.max(0, Math.min(1, progressProb));
                    const difficultyCurveProb = Math.pow(progressProb, 2);
                    // Start at sparse probability, scale up to very dense
                    const obsProbThreshold = 0.6 - (difficultyCurveProb * 0.5); // Drops from 0.6 to 0.1 (meaning up to 90% spawn chance)

                    if (canSpawnObstacle && Math.random() > obsProbThreshold && score > CONFIG.obstacleStartScore) {
                        LogicSpawnObstacle(nextSpawnX);
                    } else {
                        // Shield power-ups (e.g. 5% chance to spawn when there is no obstacle)
                        if (Math.random() > 0.95) {
                            LogicSpawnItem(nextSpawnX);
                        }
                    }
                }
            }

            LogicUpdateWorld(worldX);

            // FX Updates
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.position.add(p.userData.vel);
                p.userData.life -= 0.02;
                p.scale.setScalar(p.userData.life * 0.15);
                if (p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); }
            }

            DrawMainRender();
        }

        function DrawMainRender() {
            const shakeOffset = (Math.random() - 0.5) * cameraShake;
            camera.position.set(
                CONFIG.cameraPos.x + shakeOffset,
                CONFIG.cameraPos.y + shakeOffset,
                CONFIG.cameraPos.z + shakeOffset
            );
            camera.lookAt(CONFIG.cameraLookAt.x, CONFIG.cameraLookAt.y, CONFIG.cameraLookAt.z);
            cameraShake *= 0.9;
            composer.render(); // 블룸 적용 (반해상도·파라미터 조정으로 깜빡임 완화)
        }

        /* --- 11. SYSTEM INTEGRATION --- */
        WCGames.init({
            id: 'speedrush',
            onStart: () => {
                WCGames.Audio.init();
                CyberAudio.init();
                gameState = 'PLAYING'; player.visible = true; playerJumpY = 0.5;
                startWorldX = worldX; // Record where the player started to ignore START screen distance
                score = 0;
                document.getElementById('start-screen').classList.remove('visible');
            },
            onRestart: () => {
                if (animationId) cancelAnimationFrame(animationId);
                // Safe clear worldGroup and backgroundGroup
                while (worldGroup.children.length > 0) {
                    const child = worldGroup.children[0];
                    if (child.geometry && child.geometry !== unitBoxGeo) child.geometry.dispose();
                    worldGroup.remove(child);
                }
                while (backgroundGroup.children.length > 0) {
                    const child = backgroundGroup.children[0];
                    if (child.geometry && child.geometry !== unitBoxGeo) child.geometry.dispose();
                    backgroundGroup.remove(child);
                }

                // Clear UI FX in scene
                particles.forEach(p => { if (p && p.geometry && p.geometry !== unitBoxGeo) p.geometry.dispose(); scene.remove(p); });

                items = []; particles = []; backgroundBuildings = []; roadChunks = []; obstacles = [];
                score = 0; sector = 0; gameState = 'PLAYING';
                worldX = 0; startWorldX = 0; lastSpawnX = CONFIG.roadInitialEnd;
                window.lastTrackedSpawnX = 0; // Clear item/obstacle spawn frontier tracking
                lastBuildingXLeft = -100; lastBuildingXRight = -100;

                shieldCount = 0; cameraFovOffset = 0;
                document.getElementById('shield-count').textContent = '0';
                if (playerShield) playerShield.visible = false;

                camera.fov = 75; camera.updateProjectionMatrix();
                time = 0; beatTimer = 0; beatPulse = 0;

                playerJumpY = 0.5; player.visible = true; velocityY = 0; isGrounded = true;
                player.rotation.set(0, 0, 0);
                joystickValue = 0; lateralOffset = 0; targetLateralOffset = 0;
                fallForwardSpeed = 0; fallLateralSpeed = 0; fallRotationSpeed = 0;
                currentSafeSide = Math.random() > 0.5 ? -1 : 1; // Start in a random left/right lane

                DrawInitFloor();
                document.getElementById('game-over').classList.remove('visible');

                // Resume the core engine loop
                LogicMainLoop();
            }
        });

        DrawInitializeScene();

        /* --- 10. INPUT HANDLING --- */
        // Full-Screen Drag Input Listeners
        let isDraggingJoystick = false;
        let dragStartX = 0;
        let lastJoystickValue = 0;

        function startDrag(clientX) {
            if (gameState !== 'PLAYING') return;
            isDraggingJoystick = true;
            dragStartX = clientX;
            // When starting a new drag, we "capture" the current lateral offset intent
            // so jumping around the screen doesn't instantly snap the car back to center.
            // But for a simple absolute mapping, we can just center around the touch point.
        }

        function updateDrag(clientX) {
            if (!isDraggingJoystick) return;
            // Increased the divisor from 3 to 2.2 to make the steering feel heavier/less sensitive
            const maxTravel = window.innerWidth / 2.2;
            let diffX = clientX - dragStartX;

            // Limit travel
            if (diffX > maxTravel) diffX = maxTravel;
            if (diffX < -maxTravel) diffX = -maxTravel;

            joystickValue = diffX / maxTravel; // -1 to 1
        }

        function endDrag() {
            isDraggingJoystick = false;
            joystickValue = 0; // Return to center when released
        }

        // Apply events to the entire window/document for full-screen control
        window.addEventListener('mousedown', (e) => {
            // Ignore UI clicks
            if (e.target.tagName === 'BUTTON') return;
            startDrag(e.clientX);
        });
        window.addEventListener('mousemove', (e) => {
            updateDrag(e.clientX);
        });
        window.addEventListener('mouseup', endDrag);

        window.addEventListener('touchstart', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            startDrag(e.touches[0].clientX);
        }, { passive: true });
        window.addEventListener('touchmove', (e) => {
            updateDrag(e.touches[0].clientX);
        }, { passive: true });
        window.addEventListener('touchend', endDrag);

        window.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
    <script src="/shared/i18n.js"></script>
    <script>
        // Custom Speed Rush i18n override to replace 'Booster/부스터' with 'Shield/쉴드'
        window.addEventListener('DOMContentLoaded', () => {
            const instEl = document.querySelector('[data-i18n="instruction"]');
            if (instEl) {
                const observer = new MutationObserver(() => {
                    if (instEl.innerHTML.includes('부스터')) {
                        instEl.innerHTML = instEl.innerHTML.replace('부스터', '쉴드');
                    } else if (instEl.innerHTML.includes('Boosters')) {
                        instEl.innerHTML = instEl.innerHTML.replace('Boosters', 'Shields');
                    }
                });
                observer.observe(instEl, { childList: true, characterData: true, subtree: true });
            }
        });
    </script>
