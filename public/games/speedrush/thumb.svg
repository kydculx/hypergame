<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Grid floor -->
  <g opacity="0.15" stroke="#00f3ff" stroke-width="0.5">
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="260" x2="400" y2="260"/>
    <line x1="0" y1="280" x2="400" y2="280"/>
    <line x1="50" y1="220" x2="50" y2="300"/>
    <line x1="150" y1="220" x2="150" y2="300"/>
    <line x1="250" y1="220" x2="250" y2="300"/>
    <line x1="350" y1="220" x2="350" y2="300"/>
  </g>

  <!-- Ground line -->
  <line x1="0" y1="240" x2="400" y2="240" stroke="#00f3ff" stroke-width="2" opacity="0.4" filter="url(#glow)"/>

  <!-- Player cube -->
  <g transform="translate(120, 210)" filter="url(#glow)">
    <rect x="0" y="0" width="24" height="24" fill="#fff" stroke="#00f3ff" stroke-width="1"/>
    <rect x="2" y="2" width="20" height="20" fill="none" stroke="#00f3ff" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- Spike obstacle -->
  <g transform="translate(250, 210)" filter="url(#glow)">
    <polygon points="12,0 24,24 0,24" fill="#ff3366"/>
    <polygon points="12,4 20,24 4,24" fill="none" stroke="#ff6699" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- Another obstacle -->
  <g transform="translate(320, 210)" filter="url(#glow)">
    <rect x="0" y="4" width="20" height="20" fill="#9933ff" transform="rotate(45, 10, 14)"/>
  </g>

  <!-- Speed lines -->
  <line x1="100" y1="225" x2="60" y2="225" stroke="#fff" stroke-width="1" opacity="0.2"/>
  <line x1="95" y1="232" x2="50" y2="232" stroke="#fff" stroke-width="1" opacity="0.15"/>
  <line x1="90" y1="219" x2="55" y2="219" stroke="#fff" stroke-width="0.5" opacity="0.1"/>
</svg>
