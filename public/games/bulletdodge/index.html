<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Bullet Dodge</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/wcgames-style.css">
    <style>
        :root {
            --theme-color: #ef4444;
            --theme-glow: rgba(239, 68, 68, 0.4);
            --bg-overlay: rgba(5, 5, 16, 0.85);
            --bg-popup: rgba(10, 12, 30, 0.9);
        }

        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(ellipse at 30% 20%, #1a0a2e 0%, #050510 50%, #0a0a1a 100%);
            color: white;
            font-family: 'Orbitron', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        /* Scrolling starfield + tactical grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                /* Tactical grid */
                linear-gradient(rgba(56, 189, 248, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.04) 1px, transparent 1px),
                /* Stars layer 1 (bright) */
                radial-gradient(1.5px 1.5px at 25px 45px, #fff, transparent),
                radial-gradient(1px 1px at 75px 120px, rgba(255, 255, 255, 0.9), transparent),
                radial-gradient(1.2px 1.2px at 140px 30px, #fff, transparent),
                radial-gradient(1px 1px at 180px 160px, rgba(200, 220, 255, 0.8), transparent),
                /* Stars layer 2 (dim) */
                radial-gradient(0.8px 0.8px at 50px 90px, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(0.8px 0.8px at 110px 70px, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(0.8px 0.8px at 160px 140px, rgba(180, 200, 255, 0.3), transparent);
            background-size:
                60px 60px, 60px 60px,
                200px 200px, 200px 200px, 200px 200px, 200px 200px,
                300px 300px, 300px 300px, 300px 300px;
            animation: starScroll 40s linear infinite;
            z-index: -2;
        }

        @keyframes starScroll {
            to {
                background-position:
                    0 60px, 60px 0,
                    0 200px, 0 200px, 0 200px, 0 200px,
                    0 150px, 0 150px, 0 150px;
            }
        }

        /* Danger vignette */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at center, transparent 30%, rgba(5, 5, 16, 0.9) 100%),
                radial-gradient(ellipse at 70% 80%, rgba(239, 68, 68, 0.06) 0%, transparent 60%);
            z-index: -1;
            pointer-events: none;
        }

        /* HUD Score */
        #ui {
            position: absolute;
            top: 15px;
            width: 100%;
            pointer-events: none;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #score-display {
            font-family: 'Orbitron', monospace;
            font-size: 48px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 4px;
            text-shadow:
                0 0 8px rgba(56, 189, 248, 0.8),
                0 0 20px rgba(56, 189, 248, 0.4),
                0 0 40px rgba(56, 189, 248, 0.2);
        }

        #game-canvas {
            display: block;
            z-index: 5;
            position: relative;
        }

        /* --- Popup theme overrides --- */
        .wcg-overlay {
            background: var(--bg-overlay) !important;
            backdrop-filter: blur(8px) !important;
        }

        .wcg-popup {
            background: var(--bg-popup) !important;
            border: 1px solid rgba(239, 68, 68, 0.2) !important;
            border-top: 1px solid rgba(239, 68, 68, 0.35) !important;
            box-shadow:
                0 25px 60px rgba(0, 0, 0, 0.8),
                0 0 60px rgba(239, 68, 68, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.05) !important;
        }

        .wcg-popup h1 {
            font-family: 'Orbitron', sans-serif !important;
            letter-spacing: 3px !important;
            background: linear-gradient(135deg, #fff 30%, #ef4444) !important;
            -webkit-background-clip: text !important;
            background-clip: text !important;
        }

        .wcg-popup p {
            font-family: 'Orbitron', sans-serif !important;
            font-size: 13px !important;
            letter-spacing: 1px !important;
            color: #64748b !important;
        }

        .wcg-popup button {
            font-family: 'Orbitron', sans-serif !important;
            letter-spacing: 2px !important;
            border-color: var(--theme-color) !important;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.3), inset 0 0 12px rgba(239, 68, 68, 0.15) !important;
        }

        .wcg-popup button:hover {
            background: var(--theme-color) !important;
            color: #fff !important;
            box-shadow: 0 0 40px var(--theme-color), inset 0 0 20px rgba(255, 255, 255, 0.3) !important;
        }
    </style>
    <script src="/shared/wcgames-core.js"></script>
</head>

<body>
    <div id="ui">
        <div id="score-display">0.00</div>
    </div>

    <div id="start-screen" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="title">BULLET DODGE</h1>
            <p data-i18n="instruction">Swipe to move.<br>Survive the barrage!</p>
            <button onclick="WCGames.start()" data-i18n="play">SURVIVE</button>
        </div>
    </div>

    <div id="game-over" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="game_over">DESTROYED</h1>
            <p><span data-i18n="final_score">Time: </span><span id="final-score">0.00</span></p>
            <button onclick="WCGames.restart()" data-i18n="play_again">RETRY</button>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');

        let width, height;

        // Audio Synthesizer
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        class SoundFX {
            static engineNoise = null;
            static engineFilter = null;
            static engineGain = null;

            static createWhiteNoise() {
                const bufferSize = audioCtx.sampleRate * 2; // 2 seconds of noise
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                return buffer;
            }

            static playTone(freq, type, duration, vol = 0.1) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            }

            static start() {
                this.playTone(400, 'sine', 0.1, 0.1);
                setTimeout(() => this.playTone(600, 'sine', 0.2, 0.1), 100);

                // Start continuous engine noise (swoosh effect)
                if (this.engineNoise) {
                    this.engineNoise.stop();
                    this.engineNoise.disconnect();
                }

                this.engineNoise = audioCtx.createBufferSource();
                this.engineNoise.buffer = this.createWhiteNoise();
                this.engineNoise.loop = true;

                this.engineFilter = audioCtx.createBiquadFilter();
                this.engineFilter.type = 'lowpass';
                this.engineFilter.frequency.setValueAtTime(200, audioCtx.currentTime); // Base muffled sound

                this.engineGain = audioCtx.createGain();
                this.engineGain.gain.setValueAtTime(0, audioCtx.currentTime); // Start silent

                this.engineNoise.connect(this.engineFilter);
                this.engineFilter.connect(this.engineGain);
                this.engineGain.connect(audioCtx.destination);
                this.engineNoise.start();
            }

            static updateEngine(speedPercentage) {
                if (!this.engineFilter || !this.engineGain) return;

                // Muffled wind/thrust at low speed, sharp swoosh at high speed
                const targetFreq = 200 + (speedPercentage * 1800); // 200Hz -> 2000Hz sweep
                const targetVol = speedPercentage * 0.4; // Max volume for the swoosh

                this.engineFilter.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.05);
                this.engineGain.gain.setTargetAtTime(targetVol, audioCtx.currentTime, 0.05);
            }

            static explosion() {
                if (this.engineGain) {
                    this.engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05); // Fade out engine
                }
                this.playTone(150, 'sawtooth', 0.4, 0.3);
                setTimeout(() => this.playTone(80, 'square', 0.6, 0.4), 100);
                setTimeout(() => this.playTone(40, 'sawtooth', 0.8, 0.4), 200);
            }
        }

        // Game State
        let isPlaying = false;
        let startTime = 0;
        let survivedTime = 0;
        let animationId;

        // Entities
        let player = { x: 0, y: 0, radius: 10, speed: 6, vx: 0, vy: 0, angle: -Math.PI / 2, isShielded: false, trail: [] };
        let bullets = [];
        let particles = [];

        // Difficulty controls
        let spawnRate = 30; // frames
        let frameCount = 0;
        let difficultyMultiplier = 1;

        // Virtual Joystick
        let isDragging = false;
        let joystickCenter = { x: 0, y: 0 };
        let currentTouch = { x: 0, y: 0 };

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            if (!isPlaying) {
                player.x = width / 2;
                player.y = height / 2;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // Input handling
        function handleInputStart(x, y) {
            if (!isPlaying) return;
            isDragging = true;
            joystickCenter = { x, y };
            currentTouch = { x, y };
        }

        function handleInputMove(x, y) {
            if (!isDragging || !isPlaying) return;
            currentTouch = { x, y };

            // Calculate direction and magnitude from virtual joystick center
            let dx = currentTouch.x - joystickCenter.x;
            let dy = currentTouch.y - joystickCenter.y;
            let distance = Math.hypot(dx, dy);

            // Normalize and apply max speed if moving
            const maxRadius = 50; // Max joystick drag distance to reach max speed
            let speedPercentage = Math.min(distance / maxRadius, 1);

            if (distance > 0) {
                player.vx = (dx / distance) * player.speed * speedPercentage;
                player.vy = (dy / distance) * player.speed * speedPercentage;
            }

            // Make the joystick dynamically follow if dragged too far (floating joystick pattern)
            if (distance > maxRadius) {
                joystickCenter.x = currentTouch.x - (dx / distance) * maxRadius;
                joystickCenter.y = currentTouch.y - (dy / distance) * maxRadius;
            }
        }

        function handleInputEnd() {
            isDragging = false;
            player.vx = 0;
            player.vy = 0;
        }

        // Mouse Events
        canvas.addEventListener('mousedown', (e) => handleInputStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => handleInputMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleInputEnd);
        window.addEventListener('mouseleave', handleInputEnd);

        // Touch Events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInputStart(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handleInputMove(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        window.addEventListener('touchend', (e) => {
            e.preventDefault();
            handleInputEnd();
        });

        function spawnBullet() {
            let side = Math.floor(Math.random() * 4);
            let x, y, vx, vy;
            let speed = (3 + Math.random() * 4) * difficultyMultiplier;
            let radius = 4 + Math.random() * 6;

            // 0: top, 1: right, 2: bottom, 3: left
            if (side === 0) {
                x = Math.random() * width;
                y = -radius;
                vx = (Math.random() - 0.5) * speed;
                vy = speed;
            } else if (side === 1) {
                x = width + radius;
                y = Math.random() * height;
                vx = -speed;
                vy = (Math.random() - 0.5) * speed;
            } else if (side === 2) {
                x = Math.random() * width;
                y = height + radius;
                vx = (Math.random() - 0.5) * speed;
                vy = -speed;
            } else {
                x = -radius;
                y = Math.random() * height;
                vx = speed;
                vy = (Math.random() - 0.5) * speed;
            }

            // Aiming towards player occasionally
            const aimChance = Math.min(0.3 + (survivedTime / 60), 0.8);
            if (Math.random() < aimChance) {
                let angle = Math.atan2(player.y - y, player.x - x);
                // add some noise so it's not perfect aiming
                angle += (Math.random() - 0.5) * 0.4;
                vx = Math.cos(angle) * speed;
                vy = Math.sin(angle) * speed;
            }

            bullets.push({ x, y, vx, vy, radius, color: '#ef4444' });
        }

        function spawnParticles(x, y, color) {
            for (let i = 0; i < 30; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12,
                    life: 1,
                    color
                });
            }
        }

        function update() {
            if (!isPlaying) return;

            // Time
            survivedTime = (Date.now() - startTime) / 1000;
            scoreDisplay.innerText = survivedTime.toFixed(2);

            // Difficulty curve
            difficultyMultiplier = 1 + (survivedTime / 20); // Speed scales up every 20s
            // Spawn rate gets faster, minimum 5 frames
            spawnRate = Math.max(5, Math.floor(25 - (survivedTime / 2)));

            if (Math.abs(player.vx) > 0.1 || Math.abs(player.vy) > 0.1) {
                player.angle = Math.atan2(player.vy, player.vx);
            }

            player.x += player.vx;
            player.y += player.vy;

            // Audio feedback based on velocity percentage (0 to 1)
            const currentSpeedMag = Math.hypot(player.vx, player.vy);
            SoundFX.updateEngine(currentSpeedMag / player.speed);

            // Boundaries
            player.x = Math.max(player.radius, Math.min(width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(height - player.radius, player.y));

            // Bullets
            frameCount++;
            if (frameCount >= spawnRate) {
                spawnBullet();
                frameCount = 0;

                // Spawn extra bullets based on time
                if (survivedTime > 15 && Math.random() > 0.5) spawnBullet();
                if (survivedTime > 30) spawnBullet();
                if (survivedTime > 60) { spawnBullet(); spawnBullet(); }
            }

            // Shield logic for first 2 seconds
            player.isShielded = survivedTime < 2;

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;

                // Remove off-screen bullets
                if (b.x < -100 || b.x > width + 100 || b.y < -100 || b.y > height + 100) {
                    bullets.splice(i, 1);
                    continue;
                }

                // Collision
                let dx = player.x - b.x;
                let dy = player.y - b.y;
                let dist = Math.hypot(dx, dy);

                // Smaller hitbox for player core
                if (dist < (player.radius * 0.6) + b.radius && !player.isShielded) {
                    gameOver();
                }
            }

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            if (!isPlaying && particles.length === 0) return;

            // Draw player core glow
            if (isPlaying) {
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius + 5, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(56, 189, 248, 0.2)';
                ctx.fill();
            }

            // Draw player spaceship & Engine Booster
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);

            // Engine Booster Fire
            if (isPlaying && (Math.abs(player.vx) > 0.5 || Math.abs(player.vy) > 0.5)) {
                const speedMag = Math.hypot(player.vx, player.vy);
                const flicker = Math.random() * 5;
                const extension = (speedMag / player.speed) * 15 + flicker; // Grows based on speed + flicker

                ctx.beginPath();
                ctx.moveTo(-player.radius * 0.5, 0); // Start at back indent
                ctx.lineTo(-player.radius - extension, -player.radius * 0.4); // Top edge of flame
                ctx.lineTo(-player.radius * 1.5 - extension * 1.5, 0); // Tip of flame (further back)
                ctx.lineTo(-player.radius - extension, player.radius * 0.4); // Bottom edge of flame
                ctx.closePath();

                // Main flame
                ctx.fillStyle = 'rgba(239, 68, 68, 0.8)';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ef4444'; // Red glow
                ctx.fill();

                // Inner hot core
                ctx.beginPath();
                ctx.moveTo(-player.radius * 0.5, 0);
                ctx.lineTo(-player.radius - extension * 0.4, -player.radius * 0.2);
                ctx.lineTo(-player.radius * 1.2 - extension * 0.8, 0);
                ctx.lineTo(-player.radius - extension * 0.4, player.radius * 0.2);
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 0;
                ctx.fill();
            }

            // Spaceship body (vector design)
            ctx.beginPath();
            ctx.moveTo(player.radius * 1.5, 0); // Nose
            ctx.lineTo(-player.radius, player.radius * 0.8); // Right Wing
            ctx.lineTo(-player.radius * 0.5, 0); // Back indent
            ctx.lineTo(-player.radius, -player.radius * 0.8); // Left Wing
            ctx.closePath();

            ctx.fillStyle = '#1e3a8a'; // Dark blue interior
            ctx.fill();

            ctx.strokeStyle = '#38bdf8'; // Neon blue outline
            ctx.lineWidth = 2;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#38bdf8';
            ctx.stroke();

            // Cockpit
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(player.radius * 0.5, 0);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.restore();

            // Draw Laser Bullets
            for (let b of bullets) {
                let angle = Math.atan2(b.vy, b.vx);
                let length = b.radius * 3; // Elongate the laser

                ctx.save();
                ctx.translate(b.x, b.y);
                ctx.rotate(angle);

                // Outer glow & body
                ctx.beginPath();
                ctx.roundRect(-length, -b.radius, length * 2, b.radius * 2, b.radius);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.shadowBlur = 15;
                ctx.shadowColor = b.color;
                ctx.fill();

                // Inner bright core
                ctx.beginPath();
                ctx.roundRect(-length * 0.8, -b.radius * 0.4, length * 1.6, b.radius * 0.8, b.radius * 0.4);
                ctx.fillStyle = b.color;
                ctx.shadowBlur = 0;
                ctx.fill();

                // White hot center
                ctx.beginPath();
                ctx.roundRect(-length * 0.5, -b.radius * 0.2, length, b.radius * 0.4, b.radius * 0.2);
                ctx.fillStyle = '#fff';
                ctx.fill();

                ctx.restore();
            }

            // Draw Particles
            for (let p of particles) {
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // Draw Virtual Joystick (debug/visual feedback)
            if (isDragging && isPlaying) {
                ctx.beginPath();
                ctx.arc(joystickCenter.x, joystickCenter.y, 50, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(currentTouch.x, currentTouch.y, 20, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(joystickCenter.x, joystickCenter.y);
                ctx.lineTo(currentTouch.x, currentTouch.y);
                ctx.strokeStyle = 'rgba(56, 189, 248, 0.4)';
                ctx.lineWidth = 3;
                ctx.stroke();
            }
        }

        function gameLoop() {
            update();
            draw();
            if (isPlaying || particles.length > 0) {
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        function initGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            SoundFX.start();

            player.x = width / 2;
            player.y = height / 2;
            player.vx = 0;
            player.vy = 0;
            player.angle = -Math.PI / 2;
            player.trail = [];
            isDragging = false;

            bullets = [];
            particles = [];
            frameCount = 0;
            difficultyMultiplier = 1;
            spawnRate = 30;

            startTime = Date.now();
            isPlaying = true;

            cancelAnimationFrame(animationId);
            gameLoop();
        }

        function gameOver() {
            isPlaying = false;
            SoundFX.explosion();
            spawnParticles(player.x, player.y, '#38bdf8');
            spawnParticles(player.x, player.y, '#fff');

            const finalTime = (Date.now() - startTime) / 1000;
            document.getElementById('final-score').innerText = finalTime.toFixed(2);

            const finalScore = Math.floor(finalTime * 100);
            WCGames.gameOver(finalScore);
        }

        WCGames.init({
            id: 'bullet-dodge',
            onStart: initGame,
            onRestart: initGame
        });

        resize();
        setTimeout(draw, 100);
    </script>

    <script src="/shared/i18n.js"></script>
</body>

</html>
