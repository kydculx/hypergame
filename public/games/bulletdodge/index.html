<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Bullet Dodge</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/wcgames-style.css">
    <style>
        :root {
            --theme-color: #ef4444;
            --theme-glow: rgba(239, 68, 68, 0.4);
            --bg-overlay: rgba(5, 5, 16, 0.85);
            --bg-popup: rgba(10, 12, 30, 0.9);
        }

        /* Deep space background */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #0c0a1f 0%, #020205 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Base atmosphere: Nebulas and Vignette (Grid Removed) */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                /* Danger/Vignette overlay */
                radial-gradient(circle at center, transparent 50%, rgba(2, 2, 5, 0.4) 100%),
                radial-gradient(ellipse at 70% 80%, rgba(239, 68, 68, 0.04) 0%, transparent 60%),
                /* Nebula glows */
                radial-gradient(circle at 20% 30%, rgba(56, 189, 248, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
            background-size: 100% 100%;
            animation: nebulaPulse 10s ease-in-out infinite alternate;
            z-index: -2;
        }

        @keyframes nebulaPulse {
            from {
                filter: brightness(1) saturate(1);
            }

            to {
                filter: brightness(1.2) saturate(1.1);
            }
        }

        /* Twinkling and randomly scattered stars */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background:
                /* Variety of stars at different offsets and larger sizes */
                radial-gradient(2px 2px at 20px 30px, #fff, transparent),
                radial-gradient(3.5px 3.5px at 150px 80px, #fff, transparent),
                radial-gradient(1.5px 1.5px at 280px 140px, #fff, transparent),
                radial-gradient(4px 4px at 60px 250px, #fff, transparent),
                radial-gradient(2.2px 2.2px at 210px 320px, #fff, transparent),
                radial-gradient(3px 3px at 30px 420px, #fff, transparent),
                radial-gradient(1.8px 1.8px at 350px 480px, #fff, transparent);
            background-size: 500px 600px;
            animation:
                starScroll 35s linear infinite,
                twinkle 4s ease-in-out infinite alternate;
            z-index: -1;
            opacity: 0.7;
            pointer-events: none;
        }

        @keyframes starScroll {
            from {
                background-position: 0 0, 0 0, 0 0;
            }

            to {
                background-position: 0 300px, 0 400px, 0 200px;
            }
        }

        @keyframes twinkle {
            0% {
                opacity: 0.4;
                transform: scale(0.98);
            }

            50% {
                opacity: 0.9;
                transform: scale(1);
            }

            100% {
                opacity: 0.6;
                transform: scale(1.02);
            }
        }

        /* HUD Score */
        #ui {
            position: absolute;
            top: 15px;
            width: 100%;
            pointer-events: none;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #score-display {
            font-family: 'Orbitron', monospace;
            font-size: 48px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 4px;
            text-shadow:
                0 0 8px rgba(56, 189, 248, 0.8),
                0 0 20px rgba(56, 189, 248, 0.4),
                0 0 40px rgba(56, 189, 248, 0.2);
        }

        #game-canvas {
            display: block;
            z-index: 5;
            position: relative;
        }

        /* --- Popup theme overrides --- */
        .wcg-overlay {
            background: var(--bg-overlay) !important;
            backdrop-filter: blur(8px) !important;
        }

        .wcg-popup {
            background: var(--bg-popup) !important;
            border: 1px solid rgba(239, 68, 68, 0.2) !important;
            border-top: 1px solid rgba(239, 68, 68, 0.35) !important;
            box-shadow:
                0 25px 60px rgba(0, 0, 0, 0.8),
                0 0 60px rgba(239, 68, 68, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.05) !important;
        }

        .wcg-popup h1 {
            font-family: 'Orbitron', sans-serif !important;
            letter-spacing: 3px !important;
            background: linear-gradient(135deg, #fff 30%, #ef4444) !important;
            -webkit-background-clip: text !important;
            background-clip: text !important;
        }

        .wcg-popup p {
            font-family: 'Orbitron', sans-serif !important;
            font-size: 13px !important;
            letter-spacing: 1px !important;
            color: #64748b !important;
        }

        .wcg-popup button {
            font-family: 'Orbitron', sans-serif !important;
            letter-spacing: 2px !important;
            border-color: var(--theme-color) !important;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.3), inset 0 0 12px rgba(239, 68, 68, 0.15) !important;
        }

        .wcg-popup button:hover {
            background: var(--theme-color) !important;
            color: #fff !important;
            box-shadow: 0 0 40px var(--theme-color), inset 0 0 20px rgba(255, 255, 255, 0.3) !important;
        }
    </style>
    <script src="/shared/wcgames-core.js"></script>
</head>

<body>
    <div id="ui">
        <div id="score-display">0.00</div>
        <div id="shield-container"
            style="display: none; align-items: center; gap: 5px; margin-top: 5px; color: #0ea5e9; font-weight: bold; text-shadow: 0 0 10px #0ea5e9;">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path
                    d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2.18l7 3.12v4.7c0 4.67-3.13 8.35-7 9.55-3.87-1.2-7-4.88-7-9.55V6.3l7-3.12z" />
            </svg>
            <span id="shield-count">0</span>
        </div>
    </div>

    <div id="start-screen" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="title">BULLET DODGE</h1>
            <p data-i18n="instruction">Swipe to move.<br>Survive the barrage!</p>
            <button onclick="WCGames.start()" ontouchstart="WCGames.start()" data-i18n="play">SURVIVE</button>
        </div>
    </div>

    <div id="game-over" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="game_over">DESTROYED</h1>
            <p><span data-i18n="final_score">Time: </span><span id="final-score">0.00</span></p>
            <button onclick="WCGames.restart()" ontouchstart="WCGames.restart()" data-i18n="play_again">RETRY</button>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script>
        // Polyfill/Fallback for roundRect (compatibility for older mobile browsers)
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                this.closePath();
                return this;
            };
        }

        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');

        let width, height;

        // Audio Synthesizer
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        class SoundFX {
            static engineNoise = null;
            static engineFilter = null;
            static engineGain = null;

            static whiteNoiseBuffer = null;

            static createWhiteNoise() {
                if (this.whiteNoiseBuffer) return this.whiteNoiseBuffer;
                const bufferSize = audioCtx.sampleRate * 2;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                this.whiteNoiseBuffer = buffer;
                return buffer;
            }

            static playTone(freq, type, duration, vol = 0.1) {
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

                    gain.gain.setValueAtTime(vol > 0 ? vol : 0.001, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);

                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + duration);

                    osc.onended = () => {
                        gain.disconnect();
                        osc.disconnect();
                    };
                } catch (e) {
                    console.warn("Audio play failed:", e);
                }
            }

            static start() {
                this.playTone(400, 'sine', 0.1, 0.1);
                setTimeout(() => this.playTone(600, 'sine', 0.2, 0.1), 100);

                // Start continuous engine noise (swoosh effect)
                if (this.engineNoise) {
                    this.engineNoise.stop();
                    this.engineNoise.disconnect();
                }

                this.engineNoise = audioCtx.createBufferSource();
                this.engineNoise.buffer = this.createWhiteNoise();
                this.engineNoise.loop = true;

                this.engineFilter = audioCtx.createBiquadFilter();
                this.engineFilter.type = 'lowpass';
                this.engineFilter.frequency.setValueAtTime(200, audioCtx.currentTime); // Base muffled sound

                this.engineGain = audioCtx.createGain();
                this.engineGain.gain.setValueAtTime(0, audioCtx.currentTime); // Start silent

                this.engineNoise.connect(this.engineFilter);
                this.engineFilter.connect(this.engineGain);
                this.engineGain.connect(audioCtx.destination);
                this.engineNoise.start();
            }

            static updateEngine(speedPercentage) {
                if (!this.engineFilter || !this.engineGain || audioCtx.state !== 'running') return;

                // Muffled wind/thrust at low speed, sharp swoosh at high speed
                const targetFreq = 200 + (speedPercentage * 1800); // 200Hz -> 2000Hz sweep
                const targetVol = speedPercentage * 0.15; // Max volume for the swoosh

                this.engineFilter.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.05);
                this.engineGain.gain.setTargetAtTime(targetVol, audioCtx.currentTime, 0.05);
            }

            static explosion() {
                this.playTone(150, 'sawtooth', 0.3, 0.2);
                setTimeout(() => this.playTone(80, 'square', 0.4, 0.2), 50);
            }

            static playGameOver() {
                if (this.engineGain) {
                    this.engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
                }

                // 1. Initial Impact (Explosion)
                const noise = audioCtx.createBufferSource();
                noise.buffer = this.createWhiteNoise();
                const noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'lowpass';
                noiseFilter.frequency.setValueAtTime(1000, audioCtx.currentTime);
                noiseFilter.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 1.5);

                const noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                noiseGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);

                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noise.start();

                noise.onended = () => {
                    noiseGain.disconnect();
                    noiseFilter.disconnect();
                    noise.disconnect();
                };

                // 2. Dramatic Descending Siren
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 2);

                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2);

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 2);

                osc.onended = () => {
                    gain.disconnect();
                    osc.disconnect();
                };
            }
        }

        // Game State
        let isPlaying = false;
        let startTime = 0;
        let survivedTime = 0;
        let animationId;

        // Entities
        let player = { x: 0, y: 0, radius: 10, speed: 6, vx: 0, vy: 0, angle: -Math.PI / 2, isShielded: false, shields: 0, trail: [] };
        let bullets = [];
        let items = [];
        let particles = [];

        // Difficulty controls
        let spawnRate = 30; // frames
        let itemSpawnRate = 60 * 5; // Once every 15s roughly
        let frameCount = 0;
        let itemFrameCount = 0;
        let difficultyMultiplier = 1;

        // Virtual Joystick
        let isDragging = false;
        let joystickCenter = { x: 0, y: 0 };
        let currentTouch = { x: 0, y: 0 };

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            if (!isPlaying) {
                player.x = width / 2;
                player.y = height / 2;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // Input handling
        function handleInputStart(x, y) {
            if (!isPlaying) return;
            isDragging = true;
            joystickCenter = { x, y };
            currentTouch = { x, y };
        }

        function handleInputMove(x, y) {
            if (!isDragging || !isPlaying) return;
            currentTouch = { x, y };

            // Calculate direction and magnitude from virtual joystick center
            let dx = currentTouch.x - joystickCenter.x;
            let dy = currentTouch.y - joystickCenter.y;
            let distance = Math.hypot(dx, dy);

            // Normalize and apply max speed if moving
            const maxRadius = 50; // Max joystick drag distance to reach max speed
            let speedPercentage = Math.min(distance / maxRadius, 1);

            if (distance > 0) {
                player.vx = (dx / distance) * player.speed * speedPercentage;
                player.vy = (dy / distance) * player.speed * speedPercentage;
            }

            // Make the joystick dynamically follow if dragged too far (floating joystick pattern)
            if (distance > maxRadius) {
                joystickCenter.x = currentTouch.x - (dx / distance) * maxRadius;
                joystickCenter.y = currentTouch.y - (dy / distance) * maxRadius;
            }
        }

        function handleInputEnd() {
            isDragging = false;
            player.vx = 0;
            player.vy = 0;
        }

        // Mouse Events
        canvas.addEventListener('mousedown', (e) => handleInputStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => handleInputMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleInputEnd);
        window.addEventListener('mouseleave', handleInputEnd);

        // Touch Events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInputStart(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        window.addEventListener('touchmove', (e) => {
            if (isPlaying) e.preventDefault();
            handleInputMove(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        window.addEventListener('touchend', (e) => {
            if (isPlaying) e.preventDefault();
            handleInputEnd();
        });

        function spawnBullet() {
            let side = Math.floor(Math.random() * 4);
            let x, y, vx, vy;
            let speed = ((3 + Math.random() * 4) * difficultyMultiplier) / 2;
            let radius = 4 + Math.random() * 6;

            // 0: top, 1: right, 2: bottom, 3: left
            if (side === 0) {
                x = Math.random() * width;
                y = -radius;
                vx = (Math.random() - 0.5) * speed;
                vy = speed;
            } else if (side === 1) {
                x = width + radius;
                y = Math.random() * height;
                vx = -speed;
                vy = (Math.random() - 0.5) * speed;
            } else if (side === 2) {
                x = Math.random() * width;
                y = height + radius;
                vx = (Math.random() - 0.5) * speed;
                vy = -speed;
            } else {
                x = -radius;
                y = Math.random() * height;
                vx = speed;
                vy = (Math.random() - 0.5) * speed;
            }

            // Aiming towards player occasionally
            const aimChance = Math.min(0.3 + (survivedTime / 60), 0.8);
            if (Math.random() < aimChance) {
                let angle = Math.atan2(player.y - y, player.x - x);
                // add some noise so it's not perfect aiming
                angle += (Math.random() - 0.5) * 0.4;
                vx = Math.cos(angle) * speed;
                vy = Math.sin(angle) * speed;
            }

            bullets.push({ x, y, vx, vy, radius, color: '#ef4444' });
        }

        function spawnItem() {
            let side = Math.floor(Math.random() * 4);
            let x, y, vx, vy;
            let speed = 2;
            let radius = 12;

            if (side === 0) {
                x = Math.random() * width; y = -radius; vx = (Math.random() - 0.5) * 2; vy = speed;
            } else if (side === 1) {
                x = width + radius; y = Math.random() * height; vx = -speed; vy = (Math.random() - 0.5) * 2;
            } else if (side === 2) {
                x = Math.random() * width; y = height + radius; vx = (Math.random() - 0.5) * 2; vy = -speed;
            } else {
                x = -radius; y = Math.random() * height; vx = speed; vy = (Math.random() - 0.5) * 2;
            }

            items.push({ x, y, vx, vy, radius, type: 'shield', color: '#0ea5e9' });
        }

        function spawnParticles(x, y, color) {
            for (let i = 0; i < 30; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12,
                    life: 1,
                    color
                });
            }
        }

        function update() {
            if (!isPlaying) return;

            // Time
            survivedTime = (Date.now() - startTime) / 1000;
            scoreDisplay.innerText = survivedTime.toFixed(2);

            // Difficulty curve
            difficultyMultiplier = Math.min(6, 1 + (survivedTime / 20)); // Capped at 6x (approx 100s)
            // Spawn rate gets faster, minimum 5 frames
            spawnRate = Math.max(5, Math.floor(25 - (survivedTime / 2)));

            if (Math.abs(player.vx) > 0.1 || Math.abs(player.vy) > 0.1) {
                player.angle = Math.atan2(player.vy, player.vx);
            }

            player.x += player.vx;
            player.y += player.vy;

            // Audio feedback based on velocity percentage (0 to 1)
            const currentSpeedMag = Math.hypot(player.vx, player.vy);
            SoundFX.updateEngine(currentSpeedMag / player.speed);

            // Boundaries
            player.x = Math.max(player.radius, Math.min(width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(height - player.radius, player.y));

            // Bullets
            frameCount++;
            if (frameCount >= spawnRate) {
                spawnBullet();
                frameCount = 0;

                // Spawn extra bullets based on time
                if (survivedTime > 15 && Math.random() > 0.5) spawnBullet();
                if (survivedTime > 30) spawnBullet();
                if (survivedTime > 60) { spawnBullet(); spawnBullet(); }
            }

            // Item Spawning
            itemFrameCount++;
            if (itemFrameCount >= itemSpawnRate) {
                spawnItem();
                itemFrameCount = 0;
            }

            // Shield logic for first 2 seconds (respawn shield)
            player.isShielded = survivedTime < 2;

            // Items movement and collection
            for (let i = items.length - 1; i >= 0; i--) {
                let it = items[i];
                it.x += it.vx;
                it.y += it.vy;

                if (it.x < -50 || it.x > width + 50 || it.y < -50 || it.y > height + 50) {
                    items.splice(i, 1);
                    continue;
                }

                let dx = player.x - it.x;
                let dy = player.y - it.y;
                let dist = Math.hypot(dx, dy);

                if (dist < player.radius + it.radius) {
                    if (it.type === 'shield') {
                        player.shields++;
                        updateShieldHUD();
                        SoundFX.playTone(800, 'sine', 0.1, 0.2);
                        setTimeout(() => SoundFX.playTone(1200, 'sine', 0.2, 0.1), 50);
                    }
                    items.splice(i, 1);
                }
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;

                // Remove off-screen bullets
                if (b.x < -100 || b.x > width + 100 || b.y < -100 || b.y > height + 100) {
                    bullets.splice(i, 1);
                    continue;
                }

                // Collision
                let dx = player.x - b.x;
                let dy = player.y - b.y;
                let dist = Math.hypot(dx, dy);

                // Smaller hitbox for player core
                if (dist < (player.radius * 0.6) + b.radius && !player.isShielded) {
                    if (player.shields > 0) {
                        player.shields--;
                        updateShieldHUD();
                        bullets.splice(i, 1);
                        spawnParticles(b.x, b.y, b.color);
                        SoundFX.explosion(); // Minor feedback
                        continue;
                    }
                    gameOver();
                }
            }

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            if (!isPlaying && particles.length === 0) return;

            // 1. Draw Shield (Energy Field) - Below Player
            if (isPlaying && player.shields > 0) {
                const pulse = Math.sin(Date.now() / 150) * 2;
                const r = player.radius + 12 + pulse;

                // Outer glow
                ctx.beginPath();
                ctx.arc(player.x, player.y, r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(14, 165, 233, 0.2)';
                ctx.fill();

                // Hexagonal mesh effect (Solid shield look)
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(Date.now() / 1000);
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    let angle = (i / 6) * Math.PI * 2;
                    let x = Math.cos(angle) * r;
                    let y = Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.strokeStyle = 'rgba(14, 165, 233, 0.8)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Inner shimmering ring
                ctx.beginPath();
                ctx.arc(0, 0, r - 4, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.setLineDash([5, 10]);
                ctx.lineDashOffset = Date.now() / 20;
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();
            }

            // 2. Draw Player spaceship & Engine Booster
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);

            // Engine Booster Fire
            if (isPlaying && (Math.abs(player.vx) > 0.5 || Math.abs(player.vy) > 0.5)) {
                const speedMag = Math.hypot(player.vx, player.vy);
                const flicker = Math.random() * 5;
                const extension = (speedMag / player.speed) * 15 + flicker;

                ctx.beginPath();
                ctx.moveTo(-player.radius * 0.5, 0);
                ctx.lineTo(-player.radius - extension, -player.radius * 0.4);
                ctx.lineTo(-player.radius * 1.5 - extension * 1.5, 0);
                ctx.lineTo(-player.radius - extension, player.radius * 0.4);
                ctx.closePath();

                ctx.fillStyle = 'rgba(239, 68, 68, 0.8)';
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(-player.radius * 0.5, 0);
                ctx.lineTo(-player.radius - extension * 0.4, -player.radius * 0.2);
                ctx.lineTo(-player.radius * 1.2 - extension * 0.8, 0);
                ctx.lineTo(-player.radius - extension * 0.4, player.radius * 0.2);
                ctx.fillStyle = '#fff';
                ctx.fill();
            }

            // Spaceship body
            ctx.beginPath();
            ctx.moveTo(player.radius * 1.5, 0);
            ctx.lineTo(-player.radius, player.radius * 0.8);
            ctx.lineTo(-player.radius * 0.5, 0);
            ctx.lineTo(-player.radius, -player.radius * 0.8);
            ctx.closePath();
            ctx.fillStyle = '#1e3a8a';
            ctx.fill();
            ctx.strokeStyle = '#38bdf8';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Cockpit
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(player.radius * 0.5, 0);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.restore();

            // 3. Draw Laser Bullets
            for (let b of bullets) {
                let angle = Math.atan2(b.vy, b.vx);
                let length = b.radius * 3;

                ctx.save();
                ctx.translate(b.x, b.y);
                ctx.rotate(angle);

                ctx.beginPath();
                ctx.roundRect(-length, -b.radius, length * 2, b.radius * 2, b.radius);
                ctx.fillStyle = b.color;
                ctx.globalAlpha = 0.3;
                ctx.fill();
                ctx.globalAlpha = 1;

                ctx.beginPath();
                ctx.roundRect(-length * 0.8, -b.radius * 0.4, length * 1.6, b.radius * 0.8, b.radius * 0.4);
                ctx.fillStyle = '#fff';
                ctx.fill();

                ctx.restore();
            }

            // 4. Draw Items
            for (let it of items) {
                ctx.save();
                ctx.translate(it.x, it.y);
                const time = Date.now() / 500;
                ctx.rotate(time);

                const pulse = Math.sin(Date.now() / 300) * 3;
                ctx.beginPath();
                ctx.arc(0, 0, it.radius + pulse, 0, Math.PI * 2);
                const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, it.radius + pulse);
                grad.addColorStop(0, 'rgba(14, 165, 233, 0.6)');
                grad.addColorStop(1, 'rgba(14, 165, 233, 0)');
                ctx.fillStyle = grad;
                ctx.fill();

                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    let angle = (i / 6) * Math.PI * 2;
                    let x = Math.cos(angle) * it.radius * 0.8;
                    let y = Math.sin(angle) * it.radius * 0.8;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fillStyle = '#1e3a8a';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(0, 0, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();

                for (let i = 0; i < 3; i++) {
                    const orbAngle = time * 2 + (i * Math.PI * 2 / 3);
                    const orbX = Math.cos(orbAngle) * (it.radius + 5);
                    const orbY = Math.sin(orbAngle) * (it.radius + 5);
                    ctx.beginPath();
                    ctx.arc(orbX, orbY, 2, 0, Math.PI * 2);
                    ctx.fillStyle = '#0ea5e9';
                    ctx.fill();
                }
                ctx.restore();
            }

            // 5. Draw Particles
            for (let p of particles) {
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
            }
            ctx.globalAlpha = 1;

        }

        function gameLoop() {
            update();
            draw();
            if (isPlaying || particles.length > 0) {
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        function initGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            SoundFX.start();

            player.x = width / 2;
            player.y = height / 2;
            player.vx = 0;
            player.vy = 0;
            player.angle = -Math.PI / 2;
            player.trail = [];
            player.shields = 0;
            updateShieldHUD();
            isDragging = false;

            bullets = [];
            items = [];
            particles = [];
            frameCount = 0;
            itemFrameCount = 0;
            difficultyMultiplier = 1;
            spawnRate = 30;

            WCGames.hideAllPopups();
            startTime = Date.now();
            isPlaying = true;

            cancelAnimationFrame(animationId);
            gameLoop();
        }

        function updateShieldHUD() {
            try {
                const container = document.getElementById('shield-container');
                const count = document.getElementById('shield-count');
                if (!container || !count) return;

                if (player.shields > 0) {
                    container.style.display = 'flex';
                    count.textContent = player.shields;
                } else {
                    container.style.display = 'none';
                }
            } catch (e) {
                console.warn("HUD update failed:", e);
            }
        }

        function gameOver() {
            isPlaying = false;
            SoundFX.playGameOver();
            spawnParticles(player.x, player.y, '#38bdf8');
            spawnParticles(player.x, player.y, '#fff');

            const finalTime = (Date.now() - startTime) / 1000;

            // Show popup first
            WCGames.showPopup('game-over');

            // Set score after a tiny delay to ensure the popup is fully initialized
            setTimeout(() => {
                const scoreEl = document.getElementById('final-score');
                if (scoreEl) scoreEl.innerText = finalTime.toFixed(2);
            }, 50);

            const finalScore = Math.floor(finalTime * 100);
            WCGames.gameOver(finalScore);
        }

        WCGames.init({
            id: 'bullet-dodge',
            onStart: initGame,
            onRestart: initGame
        });

        resize();
        setTimeout(draw, 100);

        // Prevent context menu globally
        window.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>

    <script src="/shared/i18n.js"></script>
</body>

</html>
