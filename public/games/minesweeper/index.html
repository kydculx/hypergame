<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Minesweeper</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --bg-color: #0f1123;
            --cell-bg: rgba(255, 255, 255, 0.05);
            --cell-hover: rgba(14, 165, 233, 0.2);
            --cell-revealed: rgba(14, 165, 233, 0.1);
            --border-color: rgba(14, 165, 233, 0.3);
            --glow-color: rgba(14, 165, 233, 0.5);
            --bomb-color: #ef4444;
            --bomb-glow: rgba(239, 68, 68, 0.8);
            --text-color: #e2e8f0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 50% 100%, rgba(14, 165, 233, 0.15) 0%, transparent 50%),
                linear-gradient(rgba(14, 165, 233, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(14, 165, 233, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            background-position: 0 0, 0 0, 0 0;
            animation: bgScroll 20s linear infinite;
            color: var(--text-color);
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
        }

        @keyframes bgScroll {
            0% {
                background-position: 0 0, 0 0, 0 0;
            }

            100% {
                background-position: 0 0, 0 40px, 40px 0;
            }
        }

        /* Scanline effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1;
            opacity: 0.3;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(26, 27, 46, 0.8);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.15);
            backdrop-filter: blur(10px);
        }

        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        #score-display {
            font-size: 56px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px #38bdf8, 0 0 20px #38bdf8;
            margin-top: 5px;
        }

        #mines-display {
            font-size: 18px;
            font-weight: bold;
            color: #f59e0b;
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 16px;
            border-radius: 20px;
            border: 1px solid rgba(245, 158, 11, 0.3);
            backdrop-filter: blur(5px);
        }

        .grid {
            display: grid;
            gap: 2px;
            background: var(--border-color);
            padding: 2px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.2);
        }

        .cell {
            width: 30px;
            height: 30px;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        @media (max-width: 400px) {
            .cell {
                width: 25px;
                height: 25px;
                font-size: 16px;
            }
        }

        .cell:not(.revealed):hover {
            background: var(--cell-hover);
            box-shadow: inset 0 0 10px var(--glow-color);
        }

        .cell.revealed {
            background: #0f172a;
            cursor: default;
        }

        .cell.bomb {
            background: rgba(239, 68, 68, 0.2);
            color: var(--bomb-color);
            text-shadow: 0 0 10px var(--bomb-glow);
            box-shadow: inset 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .cell.flagged {
            color: #f59e0b;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.8);
        }

        .num-1 {
            color: #3b82f6;
            text-shadow: 0 0 8px #3b82f6;
        }

        .num-2 {
            color: #22c55e;
            text-shadow: 0 0 8px #22c55e;
        }

        .num-3 {
            color: #ef4444;
            text-shadow: 0 0 8px #ef4444;
        }

        .num-4 {
            color: #a855f7;
            text-shadow: 0 0 8px #a855f7;
        }

        .num-5 {
            color: #f59e0b;
            text-shadow: 0 0 8px #f59e0b;
        }

        .num-6 {
            color: #06b6d4;
            text-shadow: 0 0 8px #06b6d4;
        }

        .num-7 {
            color: #f43f5e;
            text-shadow: 0 0 8px #f43f5e;
        }

        .num-8 {
            color: #64748b;
            text-shadow: 0 0 8px #64748b;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 17, 35, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            backdrop-filter: blur(5px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .title {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.6));
        }

        .btn {
            padding: 12px 32px;
            font-size: 20px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            color: white;
            background: rgba(14, 165, 233, 0.2);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.2);
        }

        .btn:hover {
            background: rgba(14, 165, 233, 0.4);
            box-shadow: 0 0 25px rgba(14, 165, 233, 0.6);
            transform: scale(1.05);
        }

        #game-over-title {
            font-size: 40px;
        }
    </style>


<!-- WCGames Popup Theming -->
<style id="wcgames-popup-theme">
    :root {
        --theme-color: #3b82f6 !important;
        --theme-glow: rgba(59, 130, 246, 0.4) !important;
    }
    
    /* Strict override for the overlay containers */
    .wcg-overlay {
        position: fixed !important;
        inset: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        max-width: none !important;
        background: rgba(10, 11, 26, 0.7) !important;
        backdrop-filter: blur(5px) !important;
        -webkit-backdrop-filter: blur(5px) !important;
        display: flex !important; /* Force flex, we manage vis via opacity */
        align-items: center !important;
        justify-content: center !important;
        z-index: 9999 !important;
        opacity: 0 !important;
        pointer-events: none !important;
        transition: opacity 0.3s ease !important;
        border: none !important;
        transform: none !important;
        padding: 0 !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        margin: 0 !important;
        text-align: center !important;
    }

    /* ONLY show if has .wcg-visible */
    .wcg-overlay.wcg-visible {
        opacity: 1 !important;
        pointer-events: auto !important;
    }
    
    /* The Glassmorphism Popup Box */
    .wcg-popup {
        background: rgba(15, 17, 35, 0.85) !important;
        backdrop-filter: blur(16px) !important;
        -webkit-backdrop-filter: blur(16px) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-top: 1px solid rgba(255, 255, 255, 0.2) !important;
        border-radius: 24px !important;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 40px var(--theme-glow) !important;
        padding: 40px 30px !important;
        width: 85% !important;
        max-width: 400px !important;
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        transform: scale(0.95) translateY(10px);
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
        box-sizing: border-box !important;
    }

    /* Popup entry animation */
    .wcg-overlay.wcg-visible .wcg-popup {
        transform: scale(1) translateY(0);
    }

    /* Typography inside popup */
    .wcg-popup h1, .wcg-popup h2, .wcg-popup .title {
        font-family: 'Inter', 'Orbitron', 'Segoe UI', sans-serif !important;
        font-size: 36px !important;
        font-weight: 900 !important;
        margin: 0 0 16px 0 !important;
        color: #fff !important;
        background: linear-gradient(to bottom right, #fff, var(--theme-color)) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        filter: drop-shadow(0 0 10px var(--theme-glow)) !important;
        line-height: 1.2 !important;
        border: none !important;
    }

    .wcg-popup p, .wcg-popup .instructions, .wcg-popup div[style*="font-size: 24px"], .wcg-popup div:not(.title):not(.btn) {
        font-family: 'Inter', sans-serif !important;
        font-size: 16px !important;
        color: #cbd5e1 !important;
        line-height: 1.6 !important;
        margin: 0 0 32px 0 !important;
        max-width: 100% !important;
        text-shadow: none !important;
        font-weight: 400 !important;
        background: none !important;
        -webkit-text-fill-color: initial !important;
        filter: none !important;
    }
    
    .wcg-popup div[style*="font-size: 24px"] {
        font-size: 20px !important;
        color: #fff !important;
        font-weight: 700 !important;
        margin-bottom: 30px !important;
    }
    .wcg-popup div[style*="font-size: 24px"] span, .wcg-popup #final-score {
        color: var(--theme-color) !important;
    }

    /* Buttons */
    .wcg-popup button, .wcg-popup .btn, .wcg-popup .start-btn, .wcg-popup .btn-start, .wcg-popup .btn-restart {
        font-family: 'Inter', 'Orbitron', sans-serif !important;
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid var(--theme-color) !important;
        color: #fff !important;
        font-size: 18px !important;
        font-weight: 700 !important;
        padding: 16px 40px !important;
        border-radius: 100px !important;
        cursor: pointer !important;
        letter-spacing: 1px !important;
        box-shadow: 0 0 20px var(--theme-glow), inset 0 0 10px var(--theme-glow) !important;
        transition: all 0.2s ease !important;
        margin: 0 !important;
        width: 100% !important;
        max-width: 250px !important;
        -webkit-text-fill-color: initial !important;
    }

    .wcg-popup button:hover, .wcg-popup .btn:hover, .wcg-popup .start-btn:hover, .wcg-popup .btn-start:hover, .wcg-popup .btn-restart:hover {
        background: var(--theme-color) !important;
        color: #0f1123 !important;
        box-shadow: 0 0 30px var(--theme-color), inset 0 0 15px rgba(255, 255, 255, 0.5) !important;
        transform: scale(1.05) translateY(-2px) !important;
    }

    .wcg-popup button:active, .wcg-popup .btn:active, .wcg-popup .start-btn:active, .wcg-popup .btn-start:active, .wcg-popup .btn-restart:active {
        transform: scale(0.95) !important;
    }

    /* Anti-FOUC safeguard: hide target popups until themed */
    body:not(.wcg-ready) #start-screen,
    body:not(.wcg-ready) #game-over,
    body:not(.wcg-ready) #game-over-screen {
        opacity: 0 !important;
        pointer-events: none !important;
        visibility: hidden !important;
    }
</style>
<script>
document.addEventListener('DOMContentLoaded', () => {
    ['start-screen', 'game-over', 'game-over-screen'].forEach(id => {
        const el = document.getElementById(id);
        if(!el) return;
        
        // 1. Wrap content natively
        if(!el.querySelector('.wcg-popup')) {
             const popup = document.createElement('div');
             popup.className = 'wcg-popup';
             while(el.firstChild) popup.appendChild(el.firstChild);
             el.appendChild(popup);
        }

        // 2. Discover initial visibility state BEFORE applying overlay
        const comp = window.getComputedStyle(el);
        let isVisible = (comp.display !== 'none' && comp.opacity !== '0' && comp.visibility !== 'hidden') || el.classList.contains('active');
        
        if (isVisible) {
            el.classList.add('wcg-visible');
        }

        // 3. Apply the flex override overlay class
        el.classList.add('wcg-overlay');

        // 4. Setup MutationObserver to watch the game's native logic
        const observer = new MutationObserver((mutations) => {
            let visibilityChanged = false;
            let shouldBeVisible = el.classList.contains('wcg-visible');

            mutations.forEach((mutation) => {
                if (mutation.attributeName === 'class') {
                    if (el.classList.contains('active')) {
                        shouldBeVisible = true;
                    } else if (mutation.oldValue && mutation.oldValue.match(/\bactive\b/) && !el.classList.contains('active')) {
                        shouldBeVisible = false;
                    }
                }
                if (mutation.attributeName === 'style') {
                    if (el.style.display === 'none' || el.style.opacity === '0') {
                        shouldBeVisible = false;
                    } else if (el.style.display === 'block' || el.style.display === 'flex' || el.style.opacity === '1') {
                        shouldBeVisible = true;
                    }
                }
            });

            if (shouldBeVisible !== el.classList.contains('wcg-visible')) {
                if (shouldBeVisible) {
                    el.classList.add('wcg-visible');
                } else {
                    el.classList.remove('wcg-visible');
                }
            }
        });
        observer.observe(el, { attributes: true, attributeOldValue: true, attributeFilter: ['class', 'style'] });
    });
    
    // Reveal the completely themed popups
    document.body.classList.add('wcg-ready');
});
</script>
<!-- End WCGames Popup Theming -->
</head>

<body>

    <div class="overlay active" id="start-screen">
        <div class="title" data-i18n="title">NEON<br>SWEEPER</div>
        <div class="instructions" data-i18n="instruction"
            style="max-width: 400px; text-align: center; margin-bottom: 30px; line-height: 1.5; color: #94a3b8; font-size: 16px;">
            Instructions go here
        </div>
        <button class="btn" id="start-btn" data-i18n="play">PLAY</button>
    </div>

    <div class="overlay" id="game-over-screen">
        <div class="title" id="game-over-title" data-i18n="game_over"
            style="color: #ef4444; background: none; -webkit-text-fill-color: #ef4444; filter: drop-shadow(0 0 20px rgba(239, 68, 68, 0.8));">
            GAME OVER</div>
        <div style="font-size: 24px; margin-bottom: 30px; color: #38bdf8; text-shadow: 0 0 10px #38bdf8;">
            <span data-i18n="final_score">Time: </span><span id="final-score">0</span>
        </div>
        <button class="btn" id="restart-btn" data-i18n="play_again">Try Again</button>
    </div>

    <div id="ui">
        <div id="score-display">0</div>
        <div id="mines-display">💣 <span id="mine-count">0</span></div>
    </div>

    <div class="game-container">
        <div class="grid" id="grid"></div>
    </div>

    <script>
        const ROWS = 10;
        const COLS = 10;
        const MINES = 15;

        let grid = [];
        let numRevealed = 0;
        let flagsPlaced = 0;
        let gameOver = false;
        let timeElapsed = 0;
        let timerInterval = null;
        let firstClick = true;

        const gridElement = document.getElementById('grid');
        const mineCountElement = document.getElementById('mine-count');
        const scoreElement = document.getElementById('score-display');

        // Simple Sound Synthesizer using Web Audio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        class SoundFX {
            static playTone(freq, type, duration, vol = 0.1) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            }

            static click() { this.playTone(400, 'sine', 0.1, 0.05); }
            static flag() { this.playTone(800, 'triangle', 0.15, 0.08); }
            static unflag() { this.playTone(600, 'triangle', 0.15, 0.08); }
            static explosion() {
                this.playTone(100, 'sawtooth', 0.5, 0.2);
                setTimeout(() => this.playTone(50, 'square', 0.8, 0.3), 50);
            }
            static win() {
                this.playTone(400, 'sine', 0.2, 0.1);
                setTimeout(() => this.playTone(600, 'sine', 0.2, 0.1), 150);
                setTimeout(() => this.playTone(800, 'sine', 0.4, 0.15), 300);
            }
        }

        gridElement.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;

        // Handle context menu to prevent default right click
        document.addEventListener('contextmenu', event => event.preventDefault());

        function initGame() {
            if (timerInterval) clearInterval(timerInterval);
            gridElement.innerHTML = '';
            grid = [];
            numRevealed = 0;
            flagsPlaced = 0;
            timeElapsed = 0;
            gameOver = false;
            firstClick = true;
            updateStats();

            // Create grid cells
            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.r = r;
                    cell.dataset.c = c;

                    // Events
                    cell.addEventListener('mousedown', (e) => handleCellClick(r, c, e));
                    // Touch support for long press flagging
                    let touchTimer;
                    cell.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        touchTimer = setTimeout(() => {
                            handleRightClick(r, c);
                            touchTimer = null;
                        }, 500); // 500ms long press sets flag
                    });
                    cell.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        if (touchTimer) {
                            clearTimeout(touchTimer);
                            if (!gameOver) handleLeftClick(r, c);
                        }
                    });

                    gridElement.appendChild(cell);
                    row.push({
                        element: cell,
                        isMine: false,
                        revealed: false,
                        flagged: false,
                        neighborMines: 0
                    });
                }
                grid.push(row);
            }
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timeElapsed = 0;
            updateStats();
            timerInterval = setInterval(() => {
                if (!gameOver) {
                    timeElapsed++;
                    updateStats();
                }
            }, 1000);
        }

        function placeMines(firstR, firstC) {
            let placed = 0;
            while (placed < MINES) {
                let r = Math.floor(Math.random() * ROWS);
                let c = Math.floor(Math.random() * COLS);
                // Don't place mine on first clicked cell or if already a mine
                if (!grid[r][c].isMine && !(r === firstR && c === firstC)) {
                    grid[r][c].isMine = true;
                    placed++;
                }
            }
            calculateNeighbors();
        }

        function calculateNeighbors() {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c].isMine) continue;
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            let nr = r + dr, nc = c + dc;
                            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc].isMine) {
                                count++;
                            }
                        }
                    }
                    grid[r][c].neighborMines = count;
                }
            }
        }

        function handleCellClick(r, c, e) {
            if (gameOver) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (e.button === 2) {
                handleRightClick(r, c);
            } else {
                handleLeftClick(r, c);
            }
        }

        function handleLeftClick(r, c) {
            let cell = grid[r][c];
            if (cell.revealed || cell.flagged || gameOver) return;

            if (firstClick) {
                placeMines(r, c);
                firstClick = false;
                startTimer();
            }

            if (cell.isMine) {
                triggerGameOver(false);
            } else {
                SoundFX.click();
                reveal(r, c);
                checkWin();
            }
        }

        function handleRightClick(r, c) {
            let cell = grid[r][c];
            if (cell.revealed || gameOver) return;

            cell.flagged = !cell.flagged;
            cell.element.innerText = cell.flagged ? '🚩' : '';
            if (cell.flagged) {
                SoundFX.flag();
                cell.element.classList.add('flagged');
                flagsPlaced++;
            } else {
                SoundFX.unflag();
                cell.element.classList.remove('flagged');
                flagsPlaced--;
            }
            updateStats();
        }

        function reveal(r, c) {
            if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
            let cell = grid[r][c];
            if (cell.revealed || cell.flagged) return;

            cell.revealed = true;
            cell.element.classList.add('revealed');
            numRevealed++;

            if (cell.neighborMines > 0) {
                cell.element.innerText = cell.neighborMines;
                cell.element.classList.add(`num-${cell.neighborMines}`);
            } else {
                // Flood fill
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        reveal(r + dr, c + dc);
                    }
                }
            }
        }

        function checkWin() {
            if (numRevealed === (ROWS * COLS) - MINES) {
                triggerGameOver(true);
            }
        }

        function triggerGameOver(isWin) {
            gameOver = true;

            if (isWin) SoundFX.win();
            else SoundFX.explosion();

            // Reveal all mines
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let cell = grid[r][c];
                    if (cell.isMine) {
                        cell.element.classList.add('revealed', 'bomb');
                        cell.element.innerText = '💣';
                    }
                }
            }

            setTimeout(() => {
                const title = document.getElementById('game-over-title');
                if (isWin) {
                    title.innerText = "YOU WIN!";
                    title.style.color = "#22c55e";
                    title.style.webkitTextFillColor = "#22c55e";
                    title.style.filter = "drop-shadow(0 0 20px rgba(34, 197, 94, 0.8))";
                } else {
                    title.innerText = "GAME OVER";
                    title.style.color = "#ef4444";
                    title.style.webkitTextFillColor = "#ef4444";
                    title.style.filter = "drop-shadow(0 0 20px rgba(239, 68, 68, 0.8))";
                }

                document.getElementById('final-score').innerText = timeElapsed;
                document.getElementById('game-over-screen').classList.add('active');
            }, 1000);

            // Post score to parent window IMMEDIATELY if the player wins
            // Don't wait for the 1s timeout, as the user might close the window
            try {
                if (isWin) {
                    console.log(`[Minesweeper] Win! Posting score to parent: ${-timeElapsed}`);
                    window.parent.postMessage({ type: 'GAME_OVER', score: -timeElapsed }, '*');
                }
            } catch (e) { }
        }

        function updateStats() {
            mineCountElement.innerText = Math.max(0, MINES - flagsPlaced);
            scoreElement.innerText = timeElapsed;
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            SoundFX.click();
            document.getElementById('start-screen').classList.remove('active');
            initGame();
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            SoundFX.click();
            document.getElementById('game-over-screen').classList.remove('active');
            initGame();
        });

        // Initial setup
        initGame();
    </script>

    <script src="/shared/i18n.js"></script>
</body>

</html>
