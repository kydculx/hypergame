<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Minesweeper</title>
    <link rel="stylesheet" href="/shared/wcgames-style.css">
    <style>
        :root {
            --theme-color: #3b82f6;
            --theme-glow: rgba(59, 130, 246, 0.4);
            --cell-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(59, 130, 246, 0.3);
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #050510;
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #ui {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        #score-display {
            font-size: 56px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px var(--theme-glow);
        }

        #mines-display {
            font-size: 18px;
            font-weight: bold;
            color: #f59e0b;
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 16px;
            border-radius: 20px;
            border: 1px solid rgba(245, 158, 11, 0.3);
            display: inline-block;
            margin-top: 10px;
        }

        .game-container {
            position: relative;
            z-index: 5;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.3);
        }

        .grid {
            display: grid;
            gap: 2px;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px;
            border-radius: 12px;
        }

        .cell {
            width: 32px;
            height: 32px;
            background: rgba(15, 23, 42, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
        }

        .cell:hover:not(.revealed) {
            background: var(--theme-glow);
            transform: scale(1.1);
            z-index: 2;
        }

        .cell.revealed {
            background: rgba(15, 23, 42, 0.4);
            cursor: default;
        }

        .cell.bomb {
            color: #ef4444;
            text-shadow: 0 0 10px #ef4444;
        }

        .cell.flagged {
            color: #f59e0b;
        }

        .num-1 {
            color: #3b82f6;
        }

        .num-2 {
            color: #22c55e;
        }

        .num-3 {
            color: #ef4444;
        }

        .num-4 {
            color: #a855f7;
        }

        .num-5 {
            color: #f59e0b;
        }

        .num-6 {
            color: #06b6d4;
        }

        /* Essential Animations for Neon feel */
        @keyframes reveal-flash {
            0% {
                background: #fff;
                transform: scale(1.1);
                box-shadow: 0 0 20px #fff;
            }

            100% {
                background: rgba(15, 23, 42, 0.4);
                transform: scale(1);
                box-shadow: none;
            }
        }

        .revealed-flash {
            animation: reveal-flash 0.3s ease-out forwards;
        }

        @keyframes flag-ripple {
            0% {
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.6);
            }

            100% {
                box-shadow: 0 0 0 15px transparent;
            }
        }

        .flag-ripple {
            animation: flag-ripple 0.4s ease-out forwards;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
        }

        #danger-vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            background: radial-gradient(circle at center, transparent 40%, rgba(239, 68, 68, 0.2) 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .bomb-hit #danger-vignette {
            opacity: 1;
        }

        /* Circuit Board (PCB) Atmosphere - Brightened */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                /* Circuit traces (horizontal/vertical) - Higher Opacity */
                linear-gradient(90deg, rgba(59, 130, 246, 0.08) 1px, transparent 1px) 0 0 / 40px 40px,
                linear-gradient(rgba(59, 130, 246, 0.08) 1px, transparent 1px) 0 0 / 40px 40px,
                /* Thicker support traces */
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 2px, transparent 2px) 20px 20px / 120px 120px,
                linear-gradient(rgba(59, 130, 246, 0.03) 2px, transparent 2px) 20px 20px / 120px 120px,
                /* Base Glow - Slightly lighter for visibility */
                radial-gradient(circle at 50% 50%, #0a0a25 0%, #030308 100%);
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background:
                /* Circuit 'Nodes' or 'Chips' - More Vibrant */
                radial-gradient(circle at 2px 2px, rgba(59, 130, 246, 0.25) 1.5px, transparent 1.5px) 0 0 / 40px 40px,
                /* Glowing data flow pulses - Sharper */
                linear-gradient(45deg, transparent 45%, rgba(59, 130, 246, 0.15) 50%, transparent 55%);
            background-size: 40px 40px, 200% 200%;
            z-index: -1;
            animation: circuitPulse 8s linear infinite;
            opacity: 0.8;
            pointer-events: none;
        }

        @keyframes circuitPulse {
            0% {
                background-position: 0 0, 0% 0%;
            }

            100% {
                background-position: 0 0, 100% 100%;
            }
        }
    </style>
    <script src="/shared/wcgames-core.js"></script>
</head>

<body>
    <div id="danger-vignette"></div>

    <div id="ui">
        <div id="score-display">0</div>
        <div id="mines-display">💣 <span id="mine-count">15</span></div>
    </div>

    <div class="game-container">
        <div class="grid" id="grid"></div>
    </div>

    <div id="start-screen" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="title">MINESWEEPER</h1>
            <p data-i18n="instruction">Clear the grid.<br>Avoid the hidden mines!</p>
            <button onclick="WCGames.start()" data-i18n="play">SWEEP</button>
        </div>
    </div>

    <div id="game-over" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 id="over-title">GAME OVER</h1>
            <p><span data-i18n="final_score">Time: </span><span id="final-score">0</span>s</p>
            <button onclick="WCGames.restart()" data-i18n="play_again">RETRY</button>
        </div>
    </div>

    <script>
        // Audio Synthesizer
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        class SoundFX {
            static playTone(freq, type, duration, vol = 0.1) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            }

            static reveal() { this.playTone(600 + Math.random() * 200, 'sine', 0.1, 0.05); }
            static flag() { this.playTone(300, 'triangle', 0.1, 0.1); }

            static explosion() {
                this.playTone(100, 'sawtooth', 0.5, 0.3);
                setTimeout(() => this.playTone(60, 'square', 0.8, 0.3), 100);
            }

            static victory() {
                const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
                notes.forEach((note, i) => {
                    setTimeout(() => this.playTone(note, 'sine', 0.4, 0.1), i * 150);
                });
            }
        }

        const ROWS = 10, COLS = 10, MINES = 15;
        let grid = [], revealedCount = 0, flagsCount = 0, isGameOver = false, time = 0, timer = null, initial = true;

        const gridEl = document.getElementById('grid');
        const scoreEl = document.getElementById('score-display');
        const mineEl = document.getElementById('mine-count');
        const finalEl = document.getElementById('final-score');
        const titleEl = document.getElementById('over-title');

        gridEl.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;

        function init() {
            gridEl.innerHTML = ''; grid = []; revealedCount = 0; flagsCount = 0; time = 0; isGameOver = false; initial = true;
            document.body.classList.remove('bomb-hit', 'shake');
            if (timer) clearInterval(timer);
            scoreEl.textContent = '0'; mineEl.textContent = MINES;

            for (let r = 0; r < ROWS; r++) {
                grid[r] = [];
                for (let c = 0; c < COLS; c++) {
                    const el = document.createElement('div');
                    el.className = 'cell';

                    let touchTimer = null;
                    let moved = false;

                    el.addEventListener('touchstart', (e) => {
                        if (isGameOver || grid[r][c].revealed) return;
                        moved = false;
                        touchTimer = setTimeout(() => {
                            flagCell(r, c);
                            touchTimer = null;
                        }, 500);
                    }, { passive: true });

                    el.addEventListener('touchmove', () => {
                        if (touchTimer) {
                            clearTimeout(touchTimer);
                            touchTimer = null;
                        }
                        moved = true;
                    }, { passive: true });

                    el.addEventListener('touchend', (e) => {
                        if (touchTimer) {
                            clearTimeout(touchTimer);
                            touchTimer = null;
                            if (!moved) clickCell(r, c);
                        }
                        if (e.cancelable) e.preventDefault();
                    });

                    el.addEventListener('click', () => {
                        // Desktop click
                        clickCell(r, c);
                    });

                    el.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        flagCell(r, c);
                    });

                    gridEl.appendChild(el);
                    grid[r][c] = { el, mine: false, revealed: false, flagged: false, n: 0 };
                }
            }
        }

        function clickCell(r, c) {
            if (isGameOver || grid[r][c].flagged || grid[r][c].revealed) return;
            if (initial) {
                placeMines(r, c); initial = false;
                timer = setInterval(() => { time++; scoreEl.textContent = time; }, 1000);
            }

            const cell = grid[r][c];
            if (cell.mine) {
                endGame(false);
            } else {
                reveal(r, c);
                if (revealedCount === ROWS * COLS - MINES) endGame(true);
            }
        }

        function placeMines(exR, exC) {
            let placed = 0;
            while (placed < MINES) {
                const r = Math.floor(Math.random() * ROWS), c = Math.floor(Math.random() * COLS);
                if (!grid[r][c].mine && (r !== exR || c !== exC)) {
                    grid[r][c].mine = true; placed++;
                }
            }
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c].mine) continue;
                    let n = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            const nr = r + dr, nc = c + dc;
                            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc].mine) n++;
                        }
                    }
                    grid[r][c].n = n;
                }
            }
        }

        function reveal(r, c) {
            if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
            const cell = grid[r][c];
            if (cell.revealed || cell.flagged) return;

            cell.revealed = true;
            cell.el.classList.add('revealed', 'revealed-flash');
            revealedCount++;
            SoundFX.reveal();
            if (cell.n > 0) {
                cell.el.textContent = cell.n; cell.el.classList.add(`num-${cell.n}`);
            } else {
                for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) reveal(r + dr, c + dc);
            }
        }

        function flagCell(r, c) {
            if (isGameOver || grid[r][c].revealed) return;
            const cell = grid[r][c];
            cell.flagged = !cell.flagged;
            cell.el.textContent = cell.flagged ? '🚩' : '';
            cell.el.classList.toggle('flagged', cell.flagged);

            if (cell.flagged) {
                cell.el.classList.remove('flag-ripple');
                void cell.el.offsetWidth; // trigger reflow
                cell.el.classList.add('flag-ripple');
            }

            flagsCount += cell.flagged ? 1 : -1;
            mineEl.textContent = Math.max(0, MINES - flagsCount);
            SoundFX.flag();
        }

        function endGame(win) {
            isGameOver = true;
            clearInterval(timer);
            const t = window.WCGamesTranslation || {};
            titleEl.textContent = win ? (t.mission_clear || "MISSION CLEAR") : (t.game_over || "GAME OVER");
            titleEl.style.color = win ? "#22c55e" : "#ef4444";
            finalEl.textContent = time;

            if (win) {
                SoundFX.victory();
            } else {
                document.body.classList.add('bomb-hit', 'shake');
                SoundFX.explosion();
                setTimeout(() => document.body.classList.remove('shake'), 500);
            }

            grid.flat().forEach(cell => {
                if (cell.mine) {
                    cell.el.textContent = '💣';
                    cell.el.classList.add('revealed', 'bomb');
                }
            });

            setTimeout(() => {
                const rankingScore = win ? time : 0;
                WCGames.gameOver(rankingScore);
            }, 1000);
        }

        WCGames.init({
            id: 'minesweeper',
            onStart: () => { init(); },
            onRestart: () => { init(); }
        });

        init();

        // Prevent context menu globally (Copy/Paste popups on mobile)
        window.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
    <script src="/shared/i18n.js"></script>
</body>

</html>
