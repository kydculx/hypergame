<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon 2048</title>
    <link rel="stylesheet" href="/shared/wcgames-style.css">
    <style>
        :root {
            --bg-color: #050510;
            --grid-bg: rgba(255, 255, 255, 0.03);
            --cell-bg: rgba(0, 0, 0, 0.4);
            --text-color: #ffffff;
            --theme-color: #0ea5e9;
            --theme-glow: rgba(14, 165, 233, 0.4);

            /* Refined Neon HSL Palette */
            --tile-2: hsl(200, 95%, 60%);
            --tile-4: hsl(210, 95%, 55%);
            --tile-8: hsl(230, 90%, 65%);
            --tile-16: hsl(260, 90%, 65%);
            --tile-32: hsl(280, 85%, 60%);
            --tile-64: hsl(300, 85%, 55%);
            --tile-128: hsl(320, 85%, 60%);
            --tile-256: hsl(340, 90%, 60%);
            --tile-512: hsl(0, 95%, 60%);
            --tile-1024: hsl(40, 95%, 55%);
            --tile-2048: hsl(50, 95%, 50%);
            --tile-super: hsl(160, 95%, 50%);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Ambient scanline overlay */
        .glass-overlay::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            opacity: 0.3;
        }

        header {
            position: absolute;
            top: 60px;
            z-index: 10;
        }

        .score-container {
            text-align: center;
        }

        .score-label {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .score-value {
            font-size: 64px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px var(--theme-glow);
            letter-spacing: -2px;
        }

        #game-container {
            position: relative;
            background: var(--grid-bg);
            padding: 12px;
            border-radius: 24px;
            width: 90vw;
            max-width: 420px;
            aspect-ratio: 1 / 1;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
            height: 100%;
        }

        .cell {
            background-color: var(--cell-bg);
            border-radius: 12px;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.4);
        }

        .tile-container {
            position: absolute;
            top: 12px;
            left: 12px;
            width: calc(100% - 24px);
            height: calc(100% - 24px);
            pointer-events: none;
        }

        .tile {
            position: absolute;
            transition: transform 0.18s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tile-inner {
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            font-weight: 900;
            color: #fff;
            width: 100%;
            height: 100%;
            font-family: 'Inter', system-ui, sans-serif;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        /* Shine effect for high value tiles */
        .tile-inner::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 45%, rgba(255, 255, 255, 0.1) 50%, transparent 55%);
            animation: shine 4s infinite linear;
            pointer-events: none;
        }

        @keyframes shine {
            from {
                transform: translateX(-100%) translateY(-100%);
            }

            to {
                transform: translateX(100%) translateY(100%);
            }
        }

        @keyframes pop {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            70% {
                transform: scale(1.15);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .tile-new .tile-inner {
            animation: pop 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes merge {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(1.2);
                filter: brightness(1.5);
            }

            100% {
                transform: scale(1);
            }
        }

        .tile-merged .tile-inner {
            animation: merge 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Particle styles */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            z-index: 100;
        }

        .controls-hint {
            position: absolute;
            bottom: 40px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div class="aurora-bg">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2"></div>
        <div class="aurora-blob blob-3"></div>
    </div>
    <div class="glass-overlay"></div>

    <header>
        <div class="score-container">
            <div class="score-label" data-i18n="score_label">Score</div>
            <div class="score-value" id="score">0</div>
        </div>
    </header>

    <script src="/shared/wcgames-config.js"></script>
    <script src="/shared/wcgames-core.js"></script>

    <div id="game-container">
        <div class="grid">
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
        </div>
        <div class="tile-container" id="tile-container"></div>
    </div>

    <div class="controls-hint" data-i18n="controls_hint">Swipe or Use Arrows</div>

    <div id="start-screen" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="title">NEON 2048</h1>
            <p data-i18n="instruction">Merge the numbers to reach 2048!</p>
            <button onclick="WCGames.start()" data-i18n="play">SWIPE TO START</button>
        </div>
    </div>

    <div id="game-over" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="game_over">MISSION END</h1>
            <p><span data-i18n="final_score">Final Score: </span><span id="final-score">0</span></p>
            <button onclick="WCGames.restart()" data-i18n="play_again">REBOOT</button>
        </div>
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'move') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.08);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                osc.start(now); osc.stop(now + 0.08);
            } else if (type === 'merge') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'over') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(110, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.6);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.6);
                osc.start(now); osc.stop(now + 0.6);
            }
        }

        const SIZE = 4;
        let grid = [], score = 0, gameOver = false, isStarted = false, tileIdCounter = 0, pendingDestroy = [];

        const tileContainer = document.getElementById('tile-container');
        const scoreEl = document.getElementById('score');
        const finalScoreEl = document.getElementById('final-score');

        function getTileStyle(val) {
            const map = {
                2: 'var(--tile-2)', 4: 'var(--tile-4)', 8: 'var(--tile-8)',
                16: 'var(--tile-16)', 32: 'var(--tile-32)', 64: 'var(--tile-64)',
                128: 'var(--tile-128)', 256: 'var(--tile-256)', 512: 'var(--tile-512)',
                1024: 'var(--tile-1024)', 2048: 'var(--tile-2048)'
            };
            const bg = map[val] || 'var(--tile-super)';
            return {
                bg,
                glow: `0 0 20px ${bg.replace('hsl', 'hsla').replace(')', ', 0.5)')}`,
                size: val < 100 ? '42px' : val < 1000 ? '36px' : '28px'
            };
        }

        function init() {
            grid = Array(SIZE).fill().map(() => Array(SIZE).fill(null));
            score = 0; gameOver = false; tileIdCounter = 0;
            scoreEl.textContent = '0'; tileContainer.innerHTML = '';
            addRandomTile(); addRandomTile();
        }

        function createTile(val) {
            return { val, id: `t-${tileIdCounter++}`, isNew: true, isMerged: false };
        }

        function addRandomTile() {
            const empty = [];
            for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (!grid[r][c]) empty.push({ r, c });
            if (empty.length) {
                const { r, c } = empty[Math.floor(Math.random() * empty.length)];
                grid[r][c] = createTile(Math.random() < 0.9 ? 2 : 4);
                render();
            }
        }

        function render() {
            const tSize = (tileContainer.clientWidth - (12 * (SIZE - 1))) / SIZE;
            const getPos = (i) => i * (tSize + 12);

            // Animate active tiles
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const t = grid[r][c];
                    if (t) {
                        let el = document.getElementById(t.id);
                        if (!el) {
                            el = document.createElement('div');
                            el.id = t.id; el.className = 'tile';
                            const inner = document.createElement('div');
                            inner.className = 'tile-inner';
                            el.appendChild(inner);
                            el.style.width = el.style.height = `${tSize}px`;
                            el.style.transform = `translate(${getPos(c)}px, ${getPos(r)}px)`;
                            tileContainer.appendChild(el);
                        } else {
                            el.style.transform = `translate(${getPos(c)}px, ${getPos(r)}px)`;
                        }

                        const style = getTileStyle(t.val);
                        const inner = el.firstChild;
                        inner.style.backgroundColor = style.bg;
                        inner.style.boxShadow = style.glow;
                        inner.style.fontSize = style.size;
                        inner.textContent = t.val;

                        if (t.isNew) { el.classList.add('tile-new'); t.isNew = false; setTimeout(() => el.classList.remove('tile-new'), 300); }
                        if (t.isMerged) {
                            el.classList.add('tile-merged'); t.isMerged = false;
                            createParticles(getPos(c) + tSize / 2, getPos(r) + tSize / 2, style.bg);
                            setTimeout(() => el.classList.remove('tile-merged'), 300);
                        }
                    }
                }
            }

            // Animate tiles marked for destruction to their merge target
            pendingDestroy.forEach(({ id, r, c }) => {
                const el = document.getElementById(id);
                if (el) {
                    el.style.transform = `translate(${getPos(c)}px, ${getPos(r)}px)`;
                    el.style.zIndex = '1';
                    setTimeout(() => el.remove(), 180);
                }
            });
            pendingDestroy = [];
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.backgroundColor = color;
                p.style.width = p.style.height = `${Math.random() * 6 + 4}px`;
                p.style.left = `${x}px`; p.style.top = `${y}px`;
                p.style.boxShadow = `0 0 10px ${color}`;
                tileContainer.appendChild(p);

                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 50 + 20;
                const tx = Math.cos(angle) * dist, ty = Math.sin(angle) * dist;

                p.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], { duration: 600, easing: 'cubic-bezier(0, .9, .57, 1)' }).onfinish = () => p.remove();
            }
        }

        function processLine(line, r, c, dr, dc, isHorizontal) {
            let filtered = line.filter(item => item.tile !== null);
            let result = [];

            for (let i = 0; i < filtered.length; i++) {
                if (i + 1 < filtered.length && filtered[i].tile.val === filtered[i + 1].tile.val) {
                    // Merge!
                    const val = filtered[i].tile.val * 2;
                    const nt = createTile(val);
                    nt.isNew = false; nt.isMerged = true;
                    score += val;

                    // The result index will be result.length
                    const targetIdx = result.length;

                    // Convert line index to absolute grid coordinates
                    const getCoords = (idx) => {
                        if (isHorizontal) return { r: r, c: (dc > 0 ? idx : SIZE - 1 - idx) };
                        return { r: (dr > 0 ? idx : SIZE - 1 - idx), c: c };
                    };

                    const destination = getCoords(targetIdx);
                    pendingDestroy.push({ id: filtered[i].tile.id, r: destination.r, c: destination.c });
                    pendingDestroy.push({ id: filtered[i + 1].tile.id, r: destination.r, c: destination.c });

                    result.push(nt);
                    i++;
                } else {
                    result.push(filtered[i].tile);
                }
            }
            while (result.length < SIZE) result.push(null);
            return result;
        }

        function move(dir) {
            if (gameOver) return;
            const oldStr = JSON.stringify(grid.map(r => r.map(t => t?.val)));

            if (dir === 'left' || dir === 'right') {
                for (let r = 0; r < SIZE; r++) {
                    const line = [];
                    for (let c = 0; c < SIZE; c++) {
                        const colIdx = dir === 'left' ? c : SIZE - 1 - c;
                        line.push({ tile: grid[r][colIdx], c: colIdx });
                    }
                    const res = processLine(line, r, null, null, dir === 'left' ? 1 : -1, true);
                    for (let c = 0; c < SIZE; c++) {
                        const colIdx = dir === 'left' ? c : SIZE - 1 - c;
                        grid[r][colIdx] = res[c];
                    }
                }
            } else {
                for (let c = 0; c < SIZE; c++) {
                    const line = [];
                    for (let r = 0; r < SIZE; r++) {
                        const rowIdx = dir === 'up' ? r : SIZE - 1 - r;
                        line.push({ tile: grid[rowIdx][c], r: rowIdx });
                    }
                    const res = processLine(line, null, c, dir === 'up' ? 1 : -1, null, false);
                    for (let r = 0; r < SIZE; r++) {
                        const rowIdx = dir === 'up' ? r : SIZE - 1 - r;
                        grid[rowIdx][c] = res[r];
                    }
                }
            }

            if (oldStr !== JSON.stringify(grid.map(r => r.map(t => t?.val)))) {
                scoreEl.textContent = score;
                WCGames.submitScore(score);
                if (pendingDestroy.length) playSound('merge'); else playSound('move');
                render();
                setTimeout(() => {
                    addRandomTile();
                    if (!grid.flat().includes(null)) {
                        let canMove = false;
                        for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
                            if (c < SIZE - 1 && grid[r][c]?.val === grid[r][c + 1]?.val) canMove = true;
                            if (r < SIZE - 1 && grid[r][c]?.val === grid[r + 1][c]?.val) canMove = true;
                        }
                        if (!canMove) { gameOver = true; playSound('over'); finalScoreEl.textContent = score; WCGames.gameOver(score); }
                    }
                }, 100);
            }
        }

        window.addEventListener('keydown', (e) => {
            initAudio();
            if (e.key === 'ArrowLeft') move('left');
            if (e.key === 'ArrowRight') move('right');
            if (e.key === 'ArrowUp') move('up');
            if (e.key === 'ArrowDown') move('down');
        });

        let tsX, tsY;
        document.addEventListener('touchstart', e => { initAudio(); tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; });
        document.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - tsX, dy = e.changedTouches[0].clientY - tsY;
            if (Math.abs(dx) > Math.abs(dy)) { if (Math.abs(dx) > 30) move(dx > 0 ? 'right' : 'left'); }
            else { if (Math.abs(dy) > 30) move(dy > 0 ? 'down' : 'up'); }
        });

        WCGames.init({ id: '2048', onStart: () => { isStarted = true; init(); }, onRestart: () => init() });
        setTimeout(render, 50);

        // Prevent context menu globally
        window.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
    <script src="/shared/i18n.js"></script>
</body>

</html>
