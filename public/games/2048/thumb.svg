<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f1123"/>
            <stop offset="100%" stop-color="#1e1b4b"/>
        </linearGradient>
        <linearGradient id="tile2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0ea5e9"/>
            <stop offset="100%" stop-color="#2563eb"/>
        </linearGradient>
        <linearGradient id="tile2048" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ec4899"/>
            <stop offset="100%" stop-color="#a855f7"/>
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="15" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="glowSmall" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="100%" height="100%" fill="url(#bg)"/>
    
    <!-- Grid Base -->
    <rect x="50" y="50" width="300" height="200" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    
    <!-- Empty Slots -->
    <rect x="70" y="70" width="70" height="70" rx="12" fill="rgba(0,0,0,0.3)"/>
    <rect x="70" y="160" width="70" height="70" rx="12" fill="rgba(0,0,0,0.3)"/>
    <rect x="260" y="70" width="70" height="70" rx="12" fill="rgba(0,0,0,0.3)"/>
    
    <!-- Blue Glow Tile -->
    <g transform="translate(165, 70)">
        <rect width="70" height="70" rx="12" fill="url(#tile2)" opacity="0.4" filter="url(#glow)"/>
        <rect width="70" height="70" rx="12" fill="url(#tile2)" stroke="#fff" stroke-width="1" stroke-opacity="0.3"/>
        <text x="35" y="44" font-family="system-ui, sans-serif" font-weight="900" font-size="28" fill="#ffffff" text-anchor="middle" filter="url(#glowSmall)">8</text>
    </g>

    <!-- Hot Pink / Purple Glow Tile -->
    <g transform="translate(165, 160)">
        <rect width="70" height="70" rx="12" fill="url(#tile2048)" opacity="0.6" filter="url(#glow)"/>
        <rect width="70" height="70" rx="12" fill="url(#tile2048)" stroke="#fff" stroke-width="1.5" stroke-opacity="0.5"/>
        <text x="35" y="44" font-family="system-ui, sans-serif" font-weight="900" font-size="22" fill="#ffffff" text-anchor="middle" filter="url(#glowSmall)">2048</text>
    </g>
    
    <!-- Light Reflection -->
    <path d="M 50 50 L 350 50 L 350 120 C 250 180 150 100 50 130 Z" fill="rgba(255,255,255,0.03)" style="mix-blend-mode: overlay;"/>
</svg>
