<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1123"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Grid background -->
  <rect x="80" y="40" width="240" height="220" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Row 1 -->
  <rect x="95" y="55" width="50" height="50" rx="10" fill="rgba(0,0,0,0.4)"/>
  <rect x="155" y="55" width="50" height="50" rx="10" fill="#0ea5e9" filter="url(#glow)"/>
  <text x="180" y="88" font-family="system-ui" font-weight="900" font-size="22" fill="#fff" text-anchor="middle">4</text>
  <rect x="215" y="55" width="50" height="50" rx="10" fill="#10b981" filter="url(#glow)"/>
  <text x="240" y="88" font-family="system-ui" font-weight="900" font-size="22" fill="#fff" text-anchor="middle">8</text>
  <rect x="275" y="55" width="50" height="50" rx="10" fill="rgba(0,0,0,0.4)"/>

  <!-- Row 2 -->
  <rect x="95" y="115" width="50" height="50" rx="10" fill="#f59e0b" filter="url(#glow)"/>
  <text x="120" y="148" font-family="system-ui" font-weight="900" font-size="18" fill="#fff" text-anchor="middle">64</text>
  <rect x="155" y="115" width="50" height="50" rx="10" fill="rgba(0,0,0,0.4)"/>
  <rect x="215" y="115" width="50" height="50" rx="10" fill="#0ea5e9" filter="url(#glow)"/>
  <text x="240" y="148" font-family="system-ui" font-weight="900" font-size="22" fill="#fff" text-anchor="middle">2</text>
  <rect x="275" y="115" width="50" height="50" rx="10" fill="rgba(0,0,0,0.4)"/>

  <!-- Row 3 -->
  <rect x="95" y="175" width="50" height="50" rx="10" fill="rgba(0,0,0,0.4)"/>
  <rect x="155" y="175" width="50" height="50" rx="10" fill="#ec4899" filter="url(#glow)"/>
  <text x="180" y="207" font-family="system-ui" font-weight="900" font-size="14" fill="#fff" text-anchor="middle">512</text>
  <rect x="215" y="175" width="50" height="50" rx="10" fill="rgba(0,0,0,0.4)"/>
  <rect x="275" y="175" width="50" height="50" rx="10" fill="#a855f7" filter="url(#glow)"/>
  <text x="300" y="207" font-family="system-ui" font-weight="900" font-size="12" fill="#fff" text-anchor="middle">2048</text>
</svg>
