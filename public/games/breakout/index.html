<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Breakout</title>
    <link rel="stylesheet" href="/shared/wcgames-style.css">
    <style>
        :root {
            --theme-color: #10b981;
            --theme-glow: rgba(16, 185, 129, 0.4);
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #050510;
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        canvas {
            display: block;
            z-index: 5;
            position: relative;
        }

        #ui {
            position: absolute;
            top: 40px;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        #score {
            font-size: 48px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px var(--theme-glow), 0 0 40px var(--theme-glow);
        }
    </style>
    <script src="/shared/wcgames-core.js"></script>
</head>

<body>
    <!-- Aurora Background Layers -->
    <div class="aurora-bg">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2" style="background: var(--theme-color); opacity: 0.3;"></div>
        <div class="aurora-blob blob-3"></div>
    </div>
    <div class="glass-overlay"></div>

    <div id="ui">
        <div id="score">0</div>
    </div>

    <div id="start-screen" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="title">NEON BREAKOUT</h1>
            <p data-i18n="instruction">Smash all the bricks!<br>Catch power-ups to grow.</p>
            <button onclick="WCGames.start()" data-i18n="play">PLAY</button>
        </div>
    </div>

    <div id="game-over" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="game_over">GAME OVER</h1>
            <p><span data-i18n="final_score">Score: </span><span id="final-score">0</span></p>
            <button onclick="WCGames.restart()" data-i18n="play_again">RETRY</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        /* ───────────────────────────────────────────────────────────
           1. VARIABLES & CONSTANTS
           ─────────────────────────────────────────────────────────── */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        let PADDLE_WIDTH = 120;
        let targetPaddleWidth = 120;
        let basePaddleWidth = 120;
        const PADDLE_HEIGHT = 14;
        const BALL_RADIUS = 7;
        const BRICK_ROWS = 8;
        const BRICK_COLS = 10;
        const BRICK_PADDING = 4;
        const BRICK_OFFSET_TOP = 120;
        const PADDLE_OFFSET_BOTTOM = 100;
        const MAX_BALLS = 10;
        const MAX_GHOST_BALLS = 1;

        const ITEM_SPAWN_CHANCE = 0.1;
        const PROB_WIDE = 0.7;
        const PROB_MULTI = 0.2;
        const PROB_GHOST = 0.1;

        const NEON_COLORS = [
            { fill: '#ff3366', glow: 'rgba(255,51,102,0.4)', grad: null },
            { fill: '#ff00ff', glow: 'rgba(255,0,255,0.4)', grad: null },
            { fill: '#cc33ff', glow: 'rgba(204,51,255,0.4)', grad: null },
            { fill: '#9933ff', glow: 'rgba(153,51,255,0.4)', grad: null },
            { fill: '#6666ff', glow: 'rgba(102,102,255,0.4)', grad: null },
            { fill: '#3399ff', glow: 'rgba(51,153,255,0.4)', grad: null },
            { fill: '#00ccff', glow: 'rgba(0,204,255,0.4)', grad: null },
            { fill: '#00ffcc', glow: 'rgba(0,255,204,0.4)', grad: null }
        ];

        let score = 0, isGameOver = false, isStarted = false;
        let paddleX = 0;
        let balls = [], bricks = [], particles = [], items = [], stars = [], floatingTexts = [];
        let level = 1, combo = 0, time = 0, screenShake = 0;

        /* ───────────────────────────────────────────────────────────
           2. CLASSES
           ─────────────────────────────────────────────────────────── */
        class AudioManager {
            constructor() { this.ctx = null; }
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            }
            play(freq, type, dur, vol) {
                if (!this.ctx || this.ctx.state === 'suspended') return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                if (Array.isArray(freq)) {
                    osc.frequency.setValueAtTime(freq[0], this.ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(freq[1], this.ctx.currentTime + dur);
                } else {
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                }
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + dur);
            }
            hit(row, comboVal = 0) { this.play(400 + row * 80 + comboVal * 30, 'triangle', 0.08, 0.12 + Math.min(comboVal * 0.01, 0.1)); }
            paddle() { this.play(220, 'square', 0.06, 0.1); }
            wall() { this.play(300, 'sine', 0.05, 0.08); }
            powerup() { this.play(800, 'sine', 0.15, 0.15); setTimeout(() => this.play(1000, 'sine', 0.1, 0.1), 60); }
            lose() { this.play([300, 60], 'sawtooth', 0.5, 0.2); }
        }
        const audio = new AudioManager();

        /* ───────────────────────────────────────────────────────────
           3. DATA (LEVEL PATTERNS)
           ─────────────────────────────────────────────────────────── */
        const LEVEL_PATTERNS = [
            ['1111111111', '1111111111', '1111111111', '1111111111', '1111111111', '1111111111', '1111111111', '1111111111'],
            ['1010101010', '0101010101', '1010101010', '0101010101', '1010101010', '0101010101', '1010101010', '0101010101'],
            ['0110000110', '1111001111', '1111111111', '1111111111', '0111111110', '0011111100', '0001111000', '0000110000'],
            ['0000110000', '0001111000', '0011111100', '0111111110', '1111111111', '0000000000', '0000000000', '0000000000'],
            ['1000000001', '0100000010', '0010000100', '0001111000', '0001111000', '0010000100', '0100000010', '1000000001'],
            ['1000000001', '1100000011', '0100000010', '0110000110', '0010000100', '0011001100', '0001001000', '0000110000'],
            ['1100000011', '1100000011', '1100000011', '1100000011', '1100000011', '1100000011', '1100000011', '1100000011'],
            ['0000000000', '0110000110', '0110000110', '0000000000', '0000110000', '1000000001', '0111111110', '0000000000'],
            ['0000110000', '0001111000', '0011111100', '0111111110', '1111111111', '0111111110', '0011111100', '0001111000'],
            ['1010101010', '1010101010', '1010101010', '1010101010', '1010101010', '1010101010', '1010101010', '1010101010'],
            ['1111111111', '0000000000', '1111111111', '0000000000', '1111111111', '0000000000', '1111111111', '0000000000'],
            ['1111111111', '1000000001', '1000000001', '1000000001', '1000000001', '1000000001', '1000000001', '1111111111'],
            ['1111111111', '0111111110', '0011111100', '0001111000', '0001111000', '0001111000', '0000110000', '0000110000'],
            ['0000110000', '0000110000', '0001111000', '0001111000', '0001111000', '0011111100', '0111111110', '1111111111'],
            ['0000110000', '0000110000', '0000110000', '1111111111', '1111111111', '0000110000', '0000110000', '0000110000'],
            ['1000000000', '1100000000', '1110000000', '1111000000', '1111100000', '1111110000', '1111111000', '1111111100'],
            ['1100000011', '1100000011', '1100000011', '1100000011', '1100000011', '1100000011', '0111111110', '0011111100'],
            ['0010000100', '0001001000', '0011111100', '0110110110', '1111111111', '1011111101', '1010000101', '0001111000'],
            ['0000011111', '0000111110', '0001111100', '0011111000', '0111110000', '0011111000', '0001111100', '0000111110'],
            ['0011111100', '0100000010', '1011111101', '1010000101', '1010000101', '1011111101', '0100000010', '0011111100']
        ];

        /* ───────────────────────────────────────────────────────────
           4. INITIALIZATION & CORE FUNCTIONS
           ─────────────────────────────────────────────────────────── */
        function initStars() {
            stars = [];
            for (let i = 0; i < 50; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 0.5 + 0.1,
                    hue: Math.random() * 60 + 180
                });
            }
        }

        function initBricks() {
            const brickWidth = (canvas.width - (BRICK_COLS + 1) * BRICK_PADDING) / BRICK_COLS;
            const brickHeight = 20;
            bricks = [];

            NEON_COLORS.forEach(nc => {
                nc.grad = ctx.createLinearGradient(0, 0, 0, brickHeight);
                nc.grad.addColorStop(0, nc.fill);
                nc.grad.addColorStop(1, nc.glow);
            });

            const patternIndex = (level - 1) % LEVEL_PATTERNS.length;
            const currentPattern = LEVEL_PATTERNS[patternIndex];

            for (let c = 0; c < BRICK_COLS; c++) {
                bricks[c] = [];
                for (let r = 0; r < BRICK_ROWS; r++) {
                    const isActive = currentPattern[r][c] === '1';
                    bricks[c][r] = { status: isActive ? 1 : 0, color: NEON_COLORS[r % NEON_COLORS.length], hit: 0 };
                }
            }
        }

        function resetBall() {
            const speed = 4 + (level * 0.5);
            balls = [{
                x: canvas.width / 2,
                y: canvas.height - PADDLE_OFFSET_BOTTOM - PADDLE_HEIGHT - 50,
                dx: speed * 0.7,
                dy: -speed * 0.7,
                trail: []
            }];
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const wasWide = targetPaddleWidth > basePaddleWidth + 1;
            basePaddleWidth = canvas.width * 0.2;

            if (!isStarted || isGameOver) {
                targetPaddleWidth = basePaddleWidth;
                PADDLE_WIDTH = basePaddleWidth;
                paddleX = (canvas.width - PADDLE_WIDTH) / 2;
                initBricks();
                resetBall();
                initStars();
            } else {
                targetPaddleWidth = wasWide ? basePaddleWidth * 1.6 : basePaddleWidth;
                PADDLE_WIDTH = targetPaddleWidth;
                paddleX = Math.max(0, Math.min(canvas.width - PADDLE_WIDTH, paddleX));
            }
        }
        window.addEventListener('resize', resize);

        /* ───────────────────────────────────────────────────────────
           5. GAMEPLAY LOGIC (INPUT, SPAWNING, COLLISION)
           ─────────────────────────────────────────────────────────── */
        function handleAction(e) {
            if (isGameOver || !isStarted) return;
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            paddleX = clientX - PADDLE_WIDTH / 2;
            paddleX = Math.max(0, Math.min(canvas.width - PADDLE_WIDTH, paddleX));
        }
        window.addEventListener('mousemove', handleAction);
        window.addEventListener('touchmove', handleAction, { passive: false });

        function spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 4;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 0.5 + Math.random() * 0.5,
                    color,
                    size: 1.5 + Math.random() * 3
                });
            }
        }

        function spawnItem(x, y) {
            const rand = Math.random();
            let type = 'WIDE';

            if (rand < PROB_WIDE) {
                type = 'WIDE';
            } else if (rand < PROB_WIDE + PROB_MULTI) {
                type = 'MULTI';
            } else {
                // Check current ghost ball count
                const currentGhostBalls = balls.filter(b => b.isGhost).length;
                if (currentGhostBalls >= MAX_GHOST_BALLS) {
                    type = 'WIDE'; // Fallback to WIDE if max ghosts reached
                } else {
                    type = 'GHOST';
                }
            }

            items.push({ x, y, vy: 2.5, type, pulse: 0 });
        }

        function collisionDetection() {
            const brickWidth = (canvas.width - (BRICK_COLS + 1) * BRICK_PADDING) / BRICK_COLS;
            const brickHeight = 20;

            for (let i = balls.length - 1; i >= 0; i--) {
                const ball = balls[i];
                for (let c = 0; c < BRICK_COLS; c++) {
                    for (let r = 0; r < BRICK_ROWS; r++) {
                        const b = bricks[c][r];
                        if (b.status === 1) {
                            const bx = c * (brickWidth + BRICK_PADDING) + BRICK_PADDING;
                            const by = r * (brickHeight + BRICK_PADDING) + BRICK_OFFSET_TOP;

                            const currentRadius = ball.isGhost ? BALL_RADIUS * 2 : BALL_RADIUS;
                            if (
                                ball.x + currentRadius > bx &&
                                ball.x - currentRadius < bx + brickWidth &&
                                ball.y + currentRadius > by &&
                                ball.y - currentRadius < by + brickHeight
                            ) {
                                if (!ball.isGhost) {
                                    ball.dy = -ball.dy;
                                    combo++;
                                    score += combo;

                                    if (combo > 1) {
                                        floatingTexts.push({
                                            x: bx + brickWidth / 2,
                                            y: by,
                                            text: `${combo} COMBO!`,
                                            life: 1.0,
                                            color: b.color.fill
                                        });
                                    }
                                } else {
                                    score += 1; // Ghost ball only gives base point, no combo
                                }
                                b.status = 0;
                                b.hit = time;
                                scoreEl.textContent = score;
                                audio.hit(r, combo);
                                WCGames.submitScore(score);
                                screenShake = Math.min(8, combo * 0.5);

                                // Spawn particles matching brick color
                                spawnParticles(bx + brickWidth / 2, by + brickHeight / 2, b.color.fill, 8);

                                if (Math.random() < ITEM_SPAWN_CHANCE) spawnItem(bx + brickWidth / 2, by + brickHeight / 2);

                                if (bricks.every(col => col.every(br => br.status === 0))) {
                                    level++;
                                    initBricks();
                                }
                            }
                        }
                    }
                }
            }
        }

        function update() {
            if (!isStarted || isGameOver) return;
            time += 0.016;

            // Smooth Paddle Resize (from center)
            const diff = (targetPaddleWidth - PADDLE_WIDTH) * 0.1;
            PADDLE_WIDTH += diff;
            paddleX -= diff / 2; // Adjust position to grow/shrink from center

            const speed = 4 + (level * 0.5);
            for (let i = balls.length - 1; i >= 0; i--) {
                const ball = balls[i];
                ball.x += ball.dx;
                ball.y += ball.dy;

                ball.trail.push({ x: ball.x, y: ball.y, life: 1 });
                if (ball.trail.length > 12) ball.trail.shift();

                const currentRadius = ball.isGhost ? BALL_RADIUS * 2 : BALL_RADIUS;

                if (ball.x + currentRadius > canvas.width) {
                    ball.x = canvas.width - currentRadius;
                    ball.dx = -Math.abs(ball.dx);
                    audio.wall();
                } else if (ball.x - currentRadius < 0) {
                    ball.x = currentRadius;
                    ball.dx = Math.abs(ball.dx);
                    audio.wall();
                }
                if (ball.y - currentRadius < 0) {
                    ball.y = currentRadius;
                    ball.dy = Math.abs(ball.dy);
                    audio.wall();
                } else if (
                    ball.y + currentRadius >= canvas.height - PADDLE_OFFSET_BOTTOM &&
                    ball.y - currentRadius <= canvas.height - PADDLE_OFFSET_BOTTOM + PADDLE_HEIGHT &&
                    ball.dy > 0 // only collide when falling down
                ) {
                    if (ball.x + currentRadius > paddleX && ball.x - currentRadius < paddleX + PADDLE_WIDTH) {
                        const hitPos = (ball.x - (paddleX + PADDLE_WIDTH / 2)) / (PADDLE_WIDTH / 2);
                        ball.dx = speed * hitPos;
                        ball.dy = -speed;
                        combo = 0;
                        audio.paddle();
                        spawnParticles(ball.x, ball.y, '#00ffcc', 5);
                    }
                }

                // Remove if it falls completely off screen
                if (ball.y > canvas.height + 20) {
                    balls.splice(i, 1);
                }
            }

            if (balls.length === 0) {
                isGameOver = true;
                screenShake = 15;
                audio.lose();
                document.getElementById('final-score').textContent = score;
                WCGames.gameOver(score);
            }

            // Items
            items.forEach((item, i) => {
                item.y += item.vy;
                item.pulse += 0.1;
                const itemRadius = 10;

                if (
                    item.y + itemRadius >= canvas.height - PADDLE_OFFSET_BOTTOM &&
                    item.y - itemRadius <= canvas.height - PADDLE_OFFSET_BOTTOM + PADDLE_HEIGHT &&
                    item.x + itemRadius > paddleX &&
                    item.x - itemRadius < paddleX + PADDLE_WIDTH
                ) {
                    if (item.type === 'WIDE') {
                        targetPaddleWidth = basePaddleWidth * 1.6;
                        setTimeout(() => targetPaddleWidth = basePaddleWidth, 8000);
                    } else if (item.type === 'MULTI') {
                        // MULTI: split ALL current normal balls, up to MAX_BALLS
                        const currentCount = balls.length;
                        for (let b = 0; b < currentCount; b++) {
                            if (balls.length >= MAX_BALLS) break;
                            const orig = balls[b];
                            if (orig.isGhost) continue; // Only split normal balls
                            balls.push({
                                x: orig.x,
                                y: orig.y,
                                dx: -orig.dx + (Math.random() - 0.5),
                                dy: orig.dy,
                                trail: [],
                                isGhost: orig.isGhost
                            });
                        }
                    } else if (item.type === 'GHOST') {
                        // GHOST: spawn a penetrating ball from the paddle
                        balls.push({
                            x: paddleX + PADDLE_WIDTH / 2,
                            y: canvas.height - PADDLE_OFFSET_BOTTOM - PADDLE_HEIGHT - 5,
                            dx: (Math.random() > 0.5 ? 4 : -4),
                            dy: -5,
                            trail: [],
                            isGhost: true
                        });
                    }
                    items.splice(i, 1);
                    audio.powerup();
                    const color = item.type === 'WIDE' ? '#f59e0b' : (item.type === 'GHOST' ? '#c026d3' : '#3b82f6');
                    spawnParticles(item.x, item.y, color, 10);
                } else if (item.y > canvas.height) items.splice(i, 1);
            });

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.05; // subtle gravity
                p.life -= 0.03;
                p.size *= 0.98;
                if (p.life <= 0) particles.splice(i, 1);
            }

            if (screenShake > 0) screenShake *= 0.9;

            collisionDetection();
        }

        // ─── Drawing Functions ───
        function drawGrid() {
            // Draw background stars
            ctx.globalCompositeOperation = 'lighter';
            stars.forEach(s => {
                s.y += s.speed;
                if (s.y > canvas.height) {
                    s.y = 0;
                    s.x = Math.random() * canvas.width;
                }
                const dist = Math.abs(s.y - canvas.height / 2);
                const alpha = Math.max(0.1, 1 - (dist / (canvas.height / 2)));

                ctx.fillStyle = `hsla(${s.hue}, 100%, 70%, ${alpha})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalCompositeOperation = 'source-over';

            // Draw scrolling grid
            const scrollY = (time * 20) % 40;
            ctx.strokeStyle = 'rgba(0, 255, 200, 0.04)';
            ctx.lineWidth = 1;
            for (let y = -scrollY; y < canvas.height; y += 40) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
            for (let x = 0; x < canvas.width; x += 40) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
        }

        function drawBricks() {
            const brickWidth = (canvas.width - (BRICK_COLS + 1) * BRICK_PADDING) / BRICK_COLS;
            const brickHeight = 20;
            ctx.globalCompositeOperation = 'source-over';

            bricks.forEach((col, c) => {
                col.forEach((b, r) => {
                    if (b.status === 1) {
                        const bx = c * (brickWidth + BRICK_PADDING) + BRICK_PADDING;
                        const by = r * (brickHeight + BRICK_PADDING) + BRICK_OFFSET_TOP;
                        const nc = b.color;
                        const radius = 3;

                        ctx.save();
                        ctx.translate(bx, by);

                        // Draw path once
                        ctx.beginPath();
                        ctx.moveTo(radius, 0);
                        ctx.lineTo(brickWidth - radius, 0);
                        ctx.quadraticCurveTo(brickWidth, 0, brickWidth, radius);
                        ctx.lineTo(brickWidth, brickHeight - radius);
                        ctx.quadraticCurveTo(brickWidth, brickHeight, brickWidth - radius, brickHeight);
                        ctx.lineTo(radius, brickHeight);
                        ctx.quadraticCurveTo(0, brickHeight, 0, brickHeight - radius);
                        ctx.lineTo(0, radius);
                        ctx.quadraticCurveTo(0, 0, radius, 0);
                        ctx.closePath();

                        // Fast glow effect (layers instead of shadowBlur)
                        ctx.fillStyle = nc.glow;
                        ctx.fill(); // Base padding layer

                        ctx.globalCompositeOperation = 'lighter';
                        ctx.fillStyle = nc.grad;
                        ctx.fill();

                        ctx.globalCompositeOperation = 'source-over';
                        ctx.strokeStyle = nc.fill;
                        ctx.lineWidth = 1.5;
                        ctx.stroke();

                        // Inner shine
                        ctx.fillStyle = 'rgba(255,255,255,0.15)';
                        ctx.fillRect(2, 1, brickWidth - 4, brickHeight * 0.35);

                        ctx.restore();
                    }
                });
            });
        }

        function drawPaddle() {
            const py = canvas.height - PADDLE_OFFSET_BOTTOM + PADDLE_HEIGHT / 2;
            const pulse = Math.sin(time * 6) * 0.2 + 0.8;

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // The core path of the paddle (a horizontal line with rounded caps)
            ctx.beginPath();
            ctx.moveTo(paddleX + PADDLE_HEIGHT / 2, py);
            ctx.lineTo(paddleX + PADDLE_WIDTH - PADDLE_HEIGHT / 2, py);

            ctx.globalCompositeOperation = 'lighter';

            // Layer 1: Outer thick glow (Bloom)
            ctx.strokeStyle = `rgba(0, 255, 204, ${pulse * 0.15})`;
            ctx.lineWidth = PADDLE_HEIGHT + 24;
            ctx.stroke();

            // Layer 2: Mid neon aura
            ctx.strokeStyle = `rgba(0, 255, 204, ${pulse * 0.4})`;
            ctx.lineWidth = PADDLE_HEIGHT + 10;
            ctx.stroke();

            // Layer 3: Inner intense glow
            ctx.strokeStyle = `rgba(0, 255, 255, ${pulse * 0.8})`;
            ctx.lineWidth = PADDLE_HEIGHT;
            ctx.stroke();

            ctx.globalCompositeOperation = 'source-over';

            // Layer 4: Solid bright white core
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = PADDLE_HEIGHT - 6;
            ctx.stroke();

            // Reset lineCap for other drawing functions
            ctx.lineCap = 'butt';
        }

        function drawBalls() {
            balls.forEach(ball => {
                // Trail with Wiggle Effect
                ctx.globalCompositeOperation = 'lighter';
                ball.trail.forEach((t, index) => {
                    t.life -= 0.08;
                    const alpha = Math.max(0, t.life * (ball.isGhost ? 0.3 : 0.5));
                    const size = BALL_RADIUS * Math.max(0.1, t.life) * (ball.isGhost ? 1.2 : 1);

                    // Wiggle math: sin wave based on time + index offset, scaled by age (older trail wiggles more)
                    const wiggleAmt = (1 - t.life) * 5;
                    const wiggleX = Math.sin(time * 15 + index * 0.5) * wiggleAmt;
                    const wiggleY = Math.cos(time * 15 + index * 0.5) * wiggleAmt;

                    ctx.beginPath();
                    ctx.arc(t.x + wiggleX, t.y + wiggleY, size, 0, Math.PI * 2);
                    ctx.fillStyle = ball.isGhost ? `rgba(217, 70, 239, ${alpha})` : `rgba(0, 255, 204, ${alpha})`;
                    ctx.fill();
                });

                // Ball body
                ctx.globalCompositeOperation = 'source-over';

                const currentRadius = ball.isGhost ? BALL_RADIUS * 2 : BALL_RADIUS;

                // Outer glow
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, currentRadius + (ball.isGhost ? 4 : 2), 0, Math.PI * 2);
                ctx.fillStyle = ball.isGhost ? 'rgba(192, 38, 211, 0.5)' : 'rgba(0, 255, 204, 0.4)';
                ctx.fill();

                // Core
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, currentRadius - (ball.isGhost ? 1 : 0), 0, Math.PI * 2);
                ctx.fillStyle = ball.isGhost ? '#fdf4ff' : '#ffffff';
                ctx.fill();
            });
        }

        function drawItems() {
            ctx.globalCompositeOperation = 'lighter';
            items.forEach(item => {
                let glow = '#3b82f6';
                let label = 'M';
                if (item.type === 'WIDE') {
                    glow = '#f59e0b';
                    label = 'W';
                } else if (item.type === 'GHOST') {
                    glow = '#c026d3';
                    label = 'G';
                }

                const pulse = Math.sin(item.pulse) * 2;
                const size = 10 + pulse;

                ctx.strokeStyle = glow;
                ctx.lineWidth = 2;

                // Diamond shape
                ctx.beginPath();
                ctx.moveTo(item.x, item.y - size);
                ctx.lineTo(item.x + size, item.y);
                ctx.lineTo(item.x, item.y + size);
                ctx.lineTo(item.x - size, item.y);
                ctx.closePath();
                ctx.stroke();

                // Fast glow fill
                ctx.fillStyle = glow + '55';
                ctx.fill();

                // Label
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 9px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(label, item.x, item.y + 3);
                ctx.globalCompositeOperation = 'lighter';
            });
            ctx.globalCompositeOperation = 'source-over';
        }

        function drawParticles() {
            ctx.globalCompositeOperation = 'lighter';
            particles.forEach(p => {
                ctx.globalAlpha = p.life < 0 ? 0 : p.life;
                ctx.fillStyle = p.color;

                // Fast dot instead of shadowBlur
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * 1.5, 0, Math.PI * 2);
                ctx.fill();

                // Core
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * 0.5, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            ctx.globalCompositeOperation = 'source-over';
        }

        function drawFloatingTexts() {
            ctx.globalCompositeOperation = 'source-over';
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                const ft = floatingTexts[i];
                ft.y -= 1; // move up gently
                ft.life -= 0.015; // fade out

                if (ft.life <= 0) {
                    floatingTexts.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.globalAlpha = Math.max(0, ft.life);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 20px "Inter", sans-serif';
                ctx.textAlign = 'center';

                // Neon glow for text
                ctx.shadowBlur = 10;
                ctx.shadowColor = ft.color;

                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.restore();
            }
        }

        function drawBoundaryLines() {
            ctx.globalCompositeOperation = 'lighter';

            // Bottom danger line
            const grad = ctx.createLinearGradient(0, 0, canvas.width, 0);
            grad.addColorStop(0, 'rgba(255, 51, 102, 0)');
            grad.addColorStop(0.5, 'rgba(255, 51, 102, 0.4)');
            grad.addColorStop(1, 'rgba(255, 51, 102, 0)');

            ctx.strokeStyle = grad;
            ctx.lineWidth = 2; // Thicker for visibility without blur
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 1);
            ctx.lineTo(canvas.width, canvas.height - 1);
            ctx.stroke();

            // Bottom glow overlay
            ctx.lineWidth = 6;
            ctx.strokeStyle = 'rgba(255, 51, 102, 0.15)';
            ctx.stroke();

            // Top line
            const grad2 = ctx.createLinearGradient(0, 0, canvas.width, 0);
            grad2.addColorStop(0, 'rgba(0, 255, 200, 0)');
            grad2.addColorStop(0.5, 'rgba(0, 255, 200, 0.3)');
            grad2.addColorStop(1, 'rgba(0, 255, 200, 0)');

            ctx.strokeStyle = grad2;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 1);
            ctx.lineTo(canvas.width, 1);
            ctx.stroke();

            // Top glow overlay
            ctx.lineWidth = 6;
            ctx.strokeStyle = 'rgba(0, 255, 200, 0.1)';
            ctx.stroke();

            ctx.globalCompositeOperation = 'source-over';
        }

        /* ───────────────────────────────────────────────────────────
           6. UPDATE & DRAW CORE
           ─────────────────────────────────────────────────────────── */
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!isStarted || isGameOver) {
                requestAnimationFrame(draw);
                return;
            }

            update();

            if (screenShake > 0.5) {
                ctx.save();
                ctx.translate(
                    (Math.random() - 0.5) * screenShake,
                    (Math.random() - 0.5) * screenShake
                );
            }

            drawGrid();
            drawBricks();
            drawParticles();
            drawFloatingTexts();
            drawItems();
            drawBalls();
            drawPaddle();
            drawBoundaryLines();

            if (screenShake > 0.5) ctx.restore();

            requestAnimationFrame(draw);
        }

        /* ───────────────────────────────────────────────────────────
           7. LIFECYCLE & WCGAMES ENGINE
           ─────────────────────────────────────────────────────────── */
        function startGame() {
            audio.init();
            isStarted = true;
            isGameOver = false;
            resize();
        }

        function restartGame() {
            score = 0; level = 1; combo = 0;
            items = []; particles = []; floatingTexts = [];
            targetPaddleWidth = basePaddleWidth; PADDLE_WIDTH = basePaddleWidth;
            scoreEl.textContent = '0';
            isStarted = false;
            isGameOver = false;
            resize();
        }

        WCGames.init({
            id: 'breakout',
            onStart: startGame,
            onRestart: restartGame
        });

        resize();
        draw();

        // Prevent context menu globally
        window.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
    <script src="/shared/i18n.js"></script>
</body>

</html>
