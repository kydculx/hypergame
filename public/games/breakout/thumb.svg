<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1123"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Brick rows -->
  <g filter="url(#glow)">
    <!-- Row 1 -->
    <rect x="40" y="40" width="55" height="20" rx="4" fill="#ef4444"/>
    <rect x="105" y="40" width="55" height="20" rx="4" fill="#f97316"/>
    <rect x="170" y="40" width="55" height="20" rx="4" fill="#eab308"/>
    <rect x="235" y="40" width="55" height="20" rx="4" fill="#22c55e"/>
    <rect x="300" y="40" width="55" height="20" rx="4" fill="#3b82f6"/>

    <!-- Row 2 -->
    <rect x="40" y="68" width="55" height="20" rx="4" fill="#ec4899"/>
    <rect x="105" y="68" width="55" height="20" rx="4" fill="#ef4444"/>
    <rect x="170" y="68" width="55" height="20" rx="4" fill="#f97316"/>
    <rect x="235" y="68" width="55" height="20" rx="4" fill="#eab308"/>
    <rect x="300" y="68" width="55" height="20" rx="4" fill="#22c55e"/>

    <!-- Row 3 (some missing) -->
    <rect x="40" y="96" width="55" height="20" rx="4" fill="#8b5cf6"/>
    <rect x="170" y="96" width="55" height="20" rx="4" fill="#ec4899"/>
    <rect x="300" y="96" width="55" height="20" rx="4" fill="#3b82f6"/>
  </g>

  <!-- Ball -->
  <circle cx="200" cy="200" r="8" fill="#fff" filter="url(#glow)"/>

  <!-- Ball trail -->
  <line x1="200" y1="200" x2="170" y2="130" stroke="#fff" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>

  <!-- Paddle -->
  <rect x="150" y="260" width="80" height="14" rx="7" fill="#0ea5e9" filter="url(#glow)"/>
  <rect x="155" y="262" width="70" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
</svg>
