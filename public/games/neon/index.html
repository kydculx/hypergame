<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Jump</title>
    <link rel="stylesheet" href="/shared/wcgames-style.css">
    <style>
        :root {
            --theme-color: #ec4899;
            --theme-glow: rgba(236, 72, 153, 0.4);
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #050510;
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            user-select: none;
            touch-action: none;
        }

        canvas {
            display: block;
            z-index: 5;
            position: relative;
        }

        #ui {
            position: absolute;
            top: 40px;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        #score {
            font-size: 60px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px var(--theme-glow), 0 0 40px var(--theme-glow);
        }
    </style>
    <script src="/shared/wcgames-core.js"></script>
</head>

<body>
    <!-- Aurora Background Layers -->
    <div class="aurora-bg">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2" style="background: var(--theme-color); opacity: 0.3;"></div>
        <div class="aurora-blob blob-3"></div>
    </div>
    <div class="glass-overlay"></div>

    <div id="ui">
        <div id="score">0</div>
    </div>

    <div id="start-screen" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="title">NEON JUMP</h1>
            <p data-i18n="instruction">Tap or Space to jump.<br>Avoid the neon pipes!</p>
            <button onclick="WCGames.start()" data-i18n="play">PLAY</button>
        </div>
    </div>

    <div id="game-over" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="game_over">GAME OVER</h1>
            <p><span data-i18n="final_score">Final Score: </span><span id="final-score">0</span></p>
            <button onclick="WCGames.restart()" data-i18n="play_again">RETRY</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const finalScoreEl = document.getElementById('final-score');

        // Audio Manager
        class AudioManager {
            constructor() { this.ctx = null; }
            init() {
                if (this.ctx) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
            play(freq, type, dur, vol) {
                if (!this.ctx) return;
                if (this.ctx.state === 'suspended') this.ctx.resume();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                if (Array.isArray(freq)) {
                    osc.frequency.setValueAtTime(freq[0], this.ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(freq[1], this.ctx.currentTime + dur);
                } else {
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                }
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + dur);
            }
            jump() { this.play(520, 'sine', 0.1, 0.15); }
            score(n) {
                this.play(660 + (n % 12) * 30, 'sine', 0.12, 0.15);
                setTimeout(() => this.play(880 + (n % 12) * 30, 'sine', 0.1, 0.1), 50);
            }
            hit() { this.play([300, 60], 'sawtooth', 0.4, 0.2); }
        }
        const audio = new AudioManager();

        // Game state
        let player = { x: 0, y: 0, radius: 14, velocity: 0 };
        let pipes = [], particles = [], stars = [];
        let frames = 0, score = 0, isGameOver = false, isStarted = false;
        let time = 0, screenShake = 0;
        const GRAVITY = 0.45, JUMP = -7.5, PIPE_GAP = 170, PIPE_SPEED = 3, PIPE_WIDTH = 55;

        // Init stars
        function initStars() {
            stars = [];
            for (let i = 0; i < 80; i++) {
                stars.push({
                    x: Math.random() * 2000,
                    y: Math.random() * 2000,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 0.5 + 0.2,
                    twinkle: Math.random() * Math.PI * 2
                });
            }
        }
        initStars();

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            player.x = canvas.width * 0.2;
            if (!isStarted) player.y = canvas.height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        function jump() {
            if (isGameOver || !isStarted) return;
            player.velocity = JUMP;
            audio.jump();
            // Spawn jump particles
            for (let i = 0; i < 6; i++) {
                particles.push({
                    x: player.x,
                    y: player.y + player.radius,
                    vx: (Math.random() - 0.5) * 3,
                    vy: Math.random() * 2 + 1,
                    life: 0.6 + Math.random() * 0.3,
                    color: Math.random() > 0.5 ? '#ff00ff' : '#ff66cc',
                    size: Math.random() * 4 + 2
                });
            }
        }

        window.addEventListener('pointerdown', jump);
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); jump(); }
        });

        function createPipe() {
            const SECTIONS = 7;
            const sectionH = canvas.height / SECTIONS;
            // Gap can start at sections 2~5 (index 1~4), so sections 1 and 7 always have pipe
            const gapStart = Math.floor(Math.random() * 4) + 1; // 1,2,3,4
            const topH = gapStart * sectionH;
            const gapSize = sectionH * 2; // gap spans 2 sections
            const hue = (frames * 2) % 360;

            // Animation: only one side animates (top or bottom, never both)
            // Starts at 10%, increases 1% per score, capped at 60%
            const animChance = Math.min(1.0, 0.1 + score * 0.01);
            const animated = Math.random() < animChance;
            const animSide = Math.random() > 0.5 ? 'top' : 'bottom'; // which side moves
            const animSpeed = 1 + Math.random() * 2; // speed: 1~3
            const animAmp = sectionH * 0.8; // max grow/shrink amount
            const animPhase = Math.random() * Math.PI * 2; // random start phase

            pipes.push({
                x: canvas.width, topH, gapSize, hue, passed: false,
                baseTopH: topH, baseGapSize: gapSize,
                animated, animSide, animSpeed, animAmp, animPhase
            });
        }

        function update() {
            if (isGameOver || !isStarted) return;
            time += 0.016;
            player.velocity += GRAVITY;
            player.y += player.velocity;

            // Screen boundaries
            if (player.y + player.radius > canvas.height || player.y - player.radius < 0) endGame();

            // Spawn pipes
            if (frames % 95 === 0) createPipe();

            // Update pipes
            const sectionH = canvas.height / 7;
            for (let i = pipes.length - 1; i >= 0; i--) {
                const p = pipes[i];
                p.x -= PIPE_SPEED;

                // Animate pipe
                if (p.animated) {
                    const wave = Math.sin(time * p.animSpeed + p.animPhase) * p.animAmp;
                    if (p.animSide === 'top') {
                        // Top pipe grows/shrinks, gap moves down/up
                        p.topH = p.baseTopH + wave;
                        // Clamp: section 1 must have pipe (topH >= sectionH)
                        p.topH = Math.max(sectionH, p.topH);
                        // Clamp: section 7 must have pipe (bottom pipe end <= canvas.height - sectionH)
                        p.topH = Math.min(canvas.height - sectionH - p.baseGapSize, p.topH);
                    } else {
                        // Bottom pipe grows/shrinks, gap size changes
                        const newGap = p.baseGapSize - wave;
                        // Clamp gap: keep reasonable and ensure section 7 has pipe
                        p.gapSize = Math.max(sectionH * 1.2, newGap);
                        p.gapSize = Math.min(canvas.height - p.topH - sectionH, p.gapSize);
                    }
                }

                // Collision detection (circle vs rect)
                const pr = player.radius - 2;
                // Top pipe
                if (player.x + pr > p.x && player.x - pr < p.x + PIPE_WIDTH &&
                    player.y - pr < p.topH) endGame();
                // Bottom pipe
                if (player.x + pr > p.x && player.x - pr < p.x + PIPE_WIDTH &&
                    player.y + pr > p.topH + p.gapSize) endGame();

                // Score
                if (!p.passed && player.x > p.x + PIPE_WIDTH) {
                    p.passed = true;
                    score++;
                    scoreEl.textContent = score;
                    audio.score(score);
                }

                // Cleanup
                if (p.x + PIPE_WIDTH < -10) pipes.splice(i, 1);
            }

            // Trail particles
            if (frames % 2 === 0) {
                particles.push({
                    x: player.x - player.radius,
                    y: player.y + (Math.random() - 0.5) * 10,
                    vx: -1.5,
                    vy: (Math.random() - 0.5) * 1,
                    life: 0.4 + Math.random() * 0.3,
                    color: '#ff00ff',
                    size: Math.random() * 3 + 1
                });
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.025;
                p.size *= 0.97;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Screen shake decay
            if (screenShake > 0) screenShake *= 0.9;

            frames++;
        }

        function drawGrid() {
            const gridSize = 50;
            const scrollOffset = (frames * 1.5) % gridSize;
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.06)';
            ctx.lineWidth = 1;

            // Horizontal lines
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            // Vertical lines (scrolling)
            for (let x = -scrollOffset; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
        }

        function drawStars() {
            stars.forEach(s => {
                s.x -= s.speed;
                s.twinkle += 0.03;
                if (s.x < 0) s.x = canvas.width;
                const alpha = 0.3 + Math.sin(s.twinkle) * 0.2;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y % canvas.height, s.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawPipe(p) {
            const glow = `hsl(${p.hue}, 100%, 60%)`;
            const glowDark = `hsl(${p.hue}, 100%, 30%)`;

            // Top pipe
            const topGrad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_WIDTH, 0);
            topGrad.addColorStop(0, glowDark);
            topGrad.addColorStop(0.5, glow);
            topGrad.addColorStop(1, glowDark);
            ctx.fillStyle = topGrad;
            ctx.fillRect(p.x, 0, PIPE_WIDTH, p.topH);

            // Top pipe border glow
            ctx.strokeStyle = glow;
            ctx.lineWidth = 2;
            ctx.shadowBlur = 15;
            ctx.shadowColor = glow;
            ctx.strokeRect(p.x, 0, PIPE_WIDTH, p.topH);

            // Top pipe cap
            ctx.fillStyle = glow;
            ctx.fillRect(p.x - 5, p.topH - 8, PIPE_WIDTH + 10, 8);
            ctx.strokeRect(p.x - 5, p.topH - 8, PIPE_WIDTH + 10, 8);

            // Bottom pipe
            const botY = p.topH + p.gapSize;
            const botGrad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_WIDTH, 0);
            botGrad.addColorStop(0, glowDark);
            botGrad.addColorStop(0.5, glow);
            botGrad.addColorStop(1, glowDark);
            ctx.fillStyle = botGrad;
            ctx.fillRect(p.x, botY, PIPE_WIDTH, canvas.height - botY);

            // Bottom pipe border glow
            ctx.strokeRect(p.x, botY, PIPE_WIDTH, canvas.height - botY);

            // Bottom pipe cap
            ctx.fillRect(p.x - 5, botY, PIPE_WIDTH + 10, 8);
            ctx.strokeRect(p.x - 5, botY, PIPE_WIDTH + 10, 8);

            ctx.shadowBlur = 0;
        }

        function drawPlayer() {
            const pulse = Math.sin(time * 8) * 0.2 + 0.8;
            const px = player.x;
            const py = player.y;
            const r = player.radius;

            // Outer glow
            ctx.shadowBlur = 25;
            ctx.shadowColor = '#ff00ff';

            // Glow ring
            ctx.beginPath();
            ctx.arc(px, py, r + 4, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, 0, 255, ${pulse * 0.4})`;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Main body (gradient)
            const grad = ctx.createRadialGradient(px - 3, py - 3, 0, px, py, r);
            grad.addColorStop(0, '#ff88dd');
            grad.addColorStop(0.6, '#ff00ff');
            grad.addColorStop(1, '#aa00aa');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(px, py, r, 0, Math.PI * 2);
            ctx.fill();

            // Border
            ctx.strokeStyle = '#ff66ff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Inner highlight
            ctx.beginPath();
            ctx.arc(px - 3, py - 4, r * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 200, 255, 0.4)';
            ctx.fill();

            ctx.shadowBlur = 0;
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        function drawFloorCeiling() {
            // Top line
            const grad1 = ctx.createLinearGradient(0, 0, canvas.width, 0);
            grad1.addColorStop(0, 'rgba(0, 255, 255, 0)');
            grad1.addColorStop(0.5, 'rgba(0, 255, 255, 0.6)');
            grad1.addColorStop(1, 'rgba(0, 255, 255, 0)');
            ctx.strokeStyle = grad1;
            ctx.lineWidth = 2;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00ffff';
            ctx.beginPath();
            ctx.moveTo(0, 1);
            ctx.lineTo(canvas.width, 1);
            ctx.stroke();

            // Bottom line
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 1);
            ctx.lineTo(canvas.width, canvas.height - 1);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Screen shake
            if (screenShake > 0.5) {
                ctx.save();
                ctx.translate(
                    (Math.random() - 0.5) * screenShake,
                    (Math.random() - 0.5) * screenShake
                );
            }

            // Background layers
            drawGrid();
            drawStars();

            // Pipes
            pipes.forEach(p => drawPipe(p));

            // Particles (behind player)
            drawParticles();

            // Player
            if (isStarted) drawPlayer();

            // Floor/ceiling neon lines
            drawFloorCeiling();

            if (screenShake > 0.5) ctx.restore();

            update();
            requestAnimationFrame(draw);
        }

        function endGame() {
            if (isGameOver) return;
            isGameOver = true;
            screenShake = 15;
            audio.hit();
            // Death burst particles
            for (let i = 0; i < 20; i++) {
                const angle = (Math.PI * 2 / 20) * i;
                const speed = 2 + Math.random() * 4;
                particles.push({
                    x: player.x,
                    y: player.y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 0.8 + Math.random() * 0.4,
                    color: Math.random() > 0.5 ? '#ff00ff' : '#00ffff',
                    size: Math.random() * 5 + 2
                });
            }
            finalScoreEl.textContent = score;
            WCGames.gameOver(score);
        }

        function resetGame() {
            isGameOver = false;
            isStarted = true;
            player.y = canvas.height / 2;
            player.velocity = 0;
            pipes = [];
            particles = [];
            frames = 0;
            score = 0;
            time = 0;
            screenShake = 0;
            scoreEl.textContent = '0';
        }

        WCGames.init({
            id: 'neon',
            onStart: () => { audio.init(); resetGame(); },
            onRestart: () => { audio.init(); resetGame(); }
        });

        draw();
    </script>
    <script src="/shared/i18n.js"></script>
</body>

</html>
