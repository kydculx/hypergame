<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Neon tunnel walls -->
  <line x1="60" y1="280" x2="140" y2="20" stroke="#00f0ff" stroke-width="3" opacity="0.6" filter="url(#neon)"/>
  <line x1="340" y1="280" x2="260" y2="20" stroke="#00f0ff" stroke-width="3" opacity="0.6" filter="url(#neon)"/>

  <!-- Horizontal neon rings -->
  <ellipse cx="200" cy="240" rx="130" ry="30" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.3" filter="url(#neon)"/>
  <ellipse cx="200" cy="180" rx="100" ry="22" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.4" filter="url(#neon)"/>
  <ellipse cx="200" cy="120" rx="70" ry="16" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.5" filter="url(#neon)"/>
  <ellipse cx="200" cy="70" rx="40" ry="10" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.6" filter="url(#neon)"/>

  <!-- Player ball -->
  <circle cx="230" cy="200" r="12" fill="#fff" filter="url(#neon)"/>
  <circle cx="230" cy="200" r="8" fill="#00f0ff"/>

  <!-- Speed lines -->
  <line x1="170" y1="210" x2="130" y2="230" stroke="#fff" stroke-width="1" opacity="0.15"/>
  <line x1="180" y1="220" x2="140" y2="245" stroke="#fff" stroke-width="1" opacity="0.1"/>
</svg>
