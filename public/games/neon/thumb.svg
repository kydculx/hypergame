<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#190033"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="50%" stop-color="#0088ff"/>
      <stop offset="100%" stop-color="#00ffff"/>
    </linearGradient>
    <filter id="neonPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="12" result="blur2"/>
      <feGaussianBlur stdDeviation="24" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGlow)"/>
  
  <!-- Cyberpunk grid overlay -->
  <g stroke="#ff00ff" stroke-width="1.5" opacity="0.15" stroke-dasharray="3,3">
    <!-- Horizontal lines -->
    <line x1="0" y1="50" x2="400" y2="50"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
    <!-- Diagonal perspective lines -->
    <line x1="200" y1="300" x2="-100" y2="0"/>
    <line x1="200" y1="300" x2="50" y2="0"/>
    <line x1="200" y1="300" x2="200" y2="0"/>
    <line x1="200" y1="300" x2="350" y2="0"/>
    <line x1="200" y1="300" x2="500" y2="0"/>
  </g>

  <!-- Glowing neon pipes -->
  <g filter="url(#neonCyan)">
    <!-- Top pipe left -->
    <rect x="0" y="0" width="130" height="40" fill="transparent" stroke="#00ffff" stroke-width="3"/>
    <rect x="0" y="0" width="130" height="40" fill="#003344" opacity="0.5"/>
    <rect x="120" y="-10" width="15" height="60" fill="transparent" stroke="#00ffff" stroke-width="4"/>
    
    <!-- Top pipe right -->
    <rect x="270" y="0" width="130" height="40" fill="transparent" stroke="#00ffff" stroke-width="3"/>
    <rect x="270" y="0" width="130" height="40" fill="#003344" opacity="0.5"/>
    <rect x="260" y="-10" width="15" height="60" fill="transparent" stroke="#00ffff" stroke-width="4"/>

    <!-- Bottom pipe left -->
    <rect x="0" y="220" width="160" height="80" fill="transparent" stroke="#00ffff" stroke-width="3"/>
    <rect x="0" y="220" width="160" height="80" fill="#003344" opacity="0.5"/>
    <rect x="150" y="210" width="15" height="100" fill="transparent" stroke="#00ffff" stroke-width="4"/>

    <!-- Bottom pipe right -->
    <rect x="280" y="160" width="120" height="140" fill="transparent" stroke="#00ffff" stroke-width="3"/>
    <rect x="280" y="160" width="120" height="140" fill="#003344" opacity="0.5"/>
    <rect x="270" y="150" width="15" height="160" fill="transparent" stroke="#00ffff" stroke-width="4"/>
  </g>

  <!-- Glowing Jump Trails -->
  <path d="M 120 220 Q 150 150 200 90" fill="none" stroke="#ff00ff" stroke-width="8" stroke-linecap="round" opacity="0.6" filter="url(#neonPink)"/>
  <path d="M 130 230 Q 160 160 210 100" fill="none" stroke="#ff00ff" stroke-width="4" stroke-linecap="round" opacity="0.8" filter="url(#neonPink)"/>
  <path d="M 140 240 Q 170 170 220 110" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  
  <!-- The Jumping Neon Ball -->
  <circle cx="210" cy="100" r="26" fill="#ff00ff" filter="url(#neonPink)"/>
  <circle cx="210" cy="100" r="16" fill="#ff66ff"/>
  <circle cx="210" cy="100" r="8" fill="#ffffff"/>

  <!-- Speed Action Lines inside trail -->
  <line x1="220" y1="120" x2="190" y2="170" stroke="#ffffff" stroke-width="3" opacity="0.8" />
  <line x1="235" y1="110" x2="205" y2="160" stroke="#ffffff" stroke-width="2" opacity="0.5" />
  <line x1="250" y1="100" x2="220" y2="150" stroke="#ffffff" stroke-width="1.5" opacity="0.3" />
  
  <!-- Overlay spark particles -->
  <circle cx="230" cy="80" r="4" fill="#ffffff" filter="url(#neonPink)" opacity="0.9"/>
  <circle cx="180" cy="120" r="3" fill="#ffffff" filter="url(#neonPink)" opacity="0.9"/>
  <circle cx="260" cy="130" r="5" fill="#ffffff" filter="url(#neonPink)" opacity="0.8"/>
  <circle cx="210" cy="60" r="3" fill="#ffffff" filter="url(#neonPink)" opacity="0.9"/>
  <circle cx="150" cy="160" r="2" fill="#ffffff" filter="url(#neonPink)" opacity="0.9"/>
  <circle cx="130" cy="190" r="3.5" fill="#ffffff" filter="url(#neonPink)" opacity="0.8"/>
</svg>
