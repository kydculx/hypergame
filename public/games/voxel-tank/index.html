<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>탱크 온라인</title>
    <link rel="stylesheet" href="/shared/wcgames-style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #1a1a1a;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* UI Overlays */
        #hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 5;
            color: white;
        }

        #scoreboard {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            color: white;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
            z-index: 5;
            min-width: 150px;
        }

        .scoreboard-item {
            display: flex;
            justify-content: space-between;
            font-family: inherit;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        }

        .hp-bar-container {
            width: 200px;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        #hp-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff4d4d, #ff8080);
            transition: width 0.3s ease-out;
        }

        #status-text {
            margin-top: 5px;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* Mobile Controls */
        #joystick-left,
        #joystick-right {
            position: absolute;
            bottom: 50px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
            touch-action: none;
        }

        #joystick-left {
            left: 40px;
        }

        #joystick-right {
            right: 40px;
        }

        /* Hide mobile controls on desktop (precise pointers) */
        @media (pointer: fine) {

            #joystick-left,
            #joystick-right {
                display: none;
            }
        }

        .joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: none;
            /* Only show in specific modes if needed */
        }
    </style>
</head>

<body class="wcg-ready">
    <div id="hud">
        <div class="hp-bar-container">
            <div id="hp-fill"></div>
        </div>
        <div id="status-text">HP: 100 / 100</div>
    </div>
    <div id="scoreboard"></div>

    <!-- Mobile Joysticks -->
    <div id="joystick-left">
        <div class="joystick-knob"></div>
    </div>
    <div id="joystick-right">
        <div class="joystick-knob"></div>
    </div>

    <div id="start-screen" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="title"></h1>
            <p data-i18n="instruction"></p>
            <button onclick="Game.start()" data-i18n="play"></button>
        </div>
    </div>

    <div id="game-over" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="game_over"></h1>
            <p><span data-i18n="final_score"></span><span id="final-score">0</span></p>
            <button onclick="WCGames.restart()" data-i18n="play_again"></button>
        </div>
    </div>

    <div id="game-container"></div>

    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- SDK & Config -->
    <script src="/shared/wcgames-config.js"></script>
    <script src="/shared/wcgames-core.js"></script>
    <script src="/shared/i18n.js"></script>

    <!-- Game Logic -->
    <script src="game.js"></script>
</body>

</html>
