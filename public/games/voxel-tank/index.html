<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voxel Tank - Battle Arena</title>
    <!-- 현대적인 타이포그래피: Inter 폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/wcgames-style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #1a1a1a;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            position: relative;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* UI 오버레이 */
        #hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 5;
            color: white;
        }

        #scoreboard {
            position: absolute;
            top: 20px;
            left: 30px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            color: white;
            font-size: 14px;
            background: rgba(40, 40, 40, 0.2);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 5;
            min-width: 150px;
        }

        .scoreboard-item {
            display: flex;
            justify-content: space-between;
            font-family: inherit;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        }

        .hp-bar-container {
            width: 200px;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        #hp-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff4d4d, #ff8080);
            transition: width 0.3s ease-out;
        }

        #status-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 800;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
            pointer-events: none;
        }

        /* 부스터 바 */
        .booster-bar-container {
            width: 200px;
            height: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
            margin-top: 6px;
        }

        #booster-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
            transition: width 0.1s ease-out;
        }

        #booster-btn {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 80px;
            height: 80px;
            background: rgba(40, 40, 40, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 3px solid rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            display: none;
            /* 데스크톱에서는 숨김 */
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 14px;
            z-index: 1000;
            /* 항상 위에 표시하기 위한 높은 z-index */
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
            transition: all 0.2s ease;
        }

        #booster-btn:active,
        #booster-btn.active {
            transform: scale(0.85);
            /* 더 뚜렷한 크기 조절 */
            background: rgba(0, 210, 255, 0.5);
            border-color: #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
        }

        @media (max-width: 1024px),
        (pointer: coarse) {
            #booster-btn {
                display: flex;
            }
        }

        #upgrade-hud {
            margin-top: 6px;
            display: flex;
            gap: 4px;
            /* 더 좁은 간격 */
            pointer-events: none;
            z-index: 5;
        }

        .upgrade-item {
            display: flex;
            align-items: center;
            gap: 0px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 2px 6px;
            /* 최소화된 패딩 */
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            min-width: 72px;
            /* 매우 좁게 설정 */
            justify-content: center;
        }

        .upgrade-item.level-up {
            transform: scale(1.08);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .upgrade-label {
            font-size: 9px;
            /* 작은 폰트 */
            font-weight: 900;
            letter-spacing: -0.2px;
            text-transform: uppercase;
            width: auto;
            margin-right: 3px;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
        }

        .upgrade-gauge {
            display: flex;
            gap: 1px;
            padding: 0 2px;
        }

        .gauge-dot {
            width: 3px;
            height: 10px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 0px;
            transition: all 0.3s ease;
        }

        .gauge-dot.active {
            background: currentColor;
            box-shadow: 1px 0 4px currentColor;
        }

        .level-text {
            display: none;
            /* 요구 사항에 따라 숨김 */
        }

        /* 업그레이드별 색상 */
        #up-cannon {
            color: #ff4d4d;
        }

        #up-speed {
            color: #ffcc00;
        }

        #up-armor {
            color: #4d79ff;
        }

        /* 모바일 컨트롤 */
        #joystick-left,
        #joystick-right {
            display: none;
        }

        #joystick-left {
            left: 80px;
        }

        #joystick-right {
            right: 80px;
        }

        /* 데스크톱(정밀 포인터)에서는 모바일 컨트롤 숨김 */
        @media (pointer: fine) {

            #joystick-left,
            #joystick-right {
                display: none;
            }
        }

        .joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* 조준점(크로스헤어) */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: none;
            /* 필요한 특정 모드에서만 표시 */
        }

        #minimap {
            position: absolute;
            top: 20px;
            right: 30px;
            width: 100px;
            height: 100px;
            background: rgba(40, 40, 40, 0.2);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
            display: block;
        }

        /* HUD HP 바 (스크린 스페이스) */
        #hp-bars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 4;
            /* 메인 HUD 아래, 캔버스 위 */
            overflow: hidden;
        }

        .hp-hud {
            position: absolute;
            width: 50px;
            /* 약간 더 넓게 */
            height: 8px;
            /* 약간 더 두껍게 */
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            transform: translate(-50%, -50%);
            display: none;
            /* JS를 통해 표시됨 */
            padding: 1.5px;
            box-sizing: border-box;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            z-index: 5;
            transition: opacity 0.2s ease-in-out;
        }

        .hp-hud-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            border-radius: 2px;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
            box-shadow: 0 0 4px rgba(46, 204, 113, 0.5);
        }

        .booster-hud {
            width: 100%;
            height: 4px;
            /* HP보다 얇게 설정 */
            background: rgba(0, 0, 0, 0.4);
            border-radius: 2px;
            margin-top: 2px;
            overflow: hidden;
            box-sizing: border-box;
        }

        .booster-hud-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border-radius: 1px;
            transition: width 0.1s ease-out;
            box-shadow: 0 0 4px rgba(0, 210, 255, 0.5);
        }

        .hp-hud-name {
            position: absolute;
            top: -16px;
            /* 바 위에 표시 */
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: 700;
            color: white;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.9);
            white-space: nowrap;
            letter-spacing: 0.2px;
            font-family: 'Inter', sans-serif;
            pointer-events: none;
            opacity: 0.9;
        }
    </style>
</head>

<body class="wcg-ready">
    <div id="hp-bars-container"></div>
    <div id="hud">
        <div id="upgrade-hud">
            <div class="upgrade-item" id="up-cannon">
                <span class="upgrade-label" data-i18n="cannon">CANNON</span>
                <div class="upgrade-gauge">
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                </div>
            </div>
            <div class="upgrade-item" id="up-speed">
                <span class="upgrade-label" data-i18n="speed">SPEED</span>
                <div class="upgrade-gauge">
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                </div>
            </div>
            <div class="upgrade-item" id="up-armor">
                <span class="upgrade-label" data-i18n="armor">ARMOR</span>
                <div class="upgrade-gauge">
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                    <div class="gauge-dot"></div>
                </div>
            </div>
        </div>
    </div>
    <div id="scoreboard"></div>
    <canvas id="minimap" width="100" height="100"></canvas>

    <!-- 모바일 조이스틱 -->
    <div id="joystick-left">
        <div class="joystick-knob"></div>
    </div>

    <!-- 모바일 부스터 버튼 -->
    <button id="booster-btn">BOOST</button>

    <div id="start-screen" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="title"></h1>
            <p data-i18n="instruction"></p>
            <button onclick="Game.start()" data-i18n="play"></button>
        </div>
    </div>

    <div id="game-over" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="game_over"></h1>
            <p><span data-i18n="final_score"></span><span id="final-score">0</span></p>
            <button onclick="WCGames.restart()" data-i18n="play_again"></button>
        </div>
    </div>

    <div id="game-container"></div>

    <!-- ES 모듈을 위한 Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>




    <!-- SDK 및 설정 -->
    <script src="/shared/wcgames-config.js"></script>
    <script src="/shared/wcgames-core.js"></script>
    <script src="/shared/i18n.js"></script>

    <!-- 게임 로직 -->
    <script type="module" src="game.js"></script>
</body>


</html>
