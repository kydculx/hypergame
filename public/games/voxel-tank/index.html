<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>탱크 온라인</title>
    <link rel="stylesheet" href="/shared/wcgames-style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #1a1a1a;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            position: relative;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* UI Overlays */
        #hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 5;
            color: white;
        }

        #scoreboard {
            position: absolute;
            top: 20px;
            left: 30px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            color: white;
            font-size: 14px;
            background: rgba(40, 40, 40, 0.2);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 5;
            min-width: 150px;
        }

        .scoreboard-item {
            display: flex;
            justify-content: space-between;
            font-family: inherit;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        }

        .hp-bar-container {
            width: 200px;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        #hp-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff4d4d, #ff8080);
            transition: width 0.3s ease-out;
        }

        #status-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 800;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
            pointer-events: none;
        }

        #upgrade-hud {
            margin-top: 10px;
            display: flex;
            gap: 12px;
            pointer-events: none;
            z-index: 5;
        }

        .upgrade-item {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            min-width: 95px;
        }

        .upgrade-item.level-up {
            transform: scale(1.08);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .upgrade-label {
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0px;
            text-transform: uppercase;
            width: 28px;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
        }

        .upgrade-gauge {
            display: flex;
            gap: 1px;
            padding: 0 2px;
        }

        .gauge-dot {
            width: 3px;
            height: 10px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 0px;
            transition: all 0.3s ease;
        }

        .gauge-dot.active {
            background: currentColor;
            box-shadow: 1px 0 4px currentColor;
        }

        .level-text {
            font-size: 11px;
            font-weight: 900;
            font-family: 'JetBrains Mono', monospace;
            min-width: 10px;
            text-align: right;
            opacity: 0.9;
        }

        /* Upgrade Specific Colors */
        #up-cannon { color: #ff4d4d; }
        #up-speed  { color: #ffcc00; }
        #up-armor  { color: #4d79ff; }

        /* Mobile Controls */
        #joystick-left,
        #joystick-right {
            display: none;
        }

        #joystick-left {
            left: 80px;
        }

        #joystick-right {
            right: 80px;
        }

        /* Hide mobile controls on desktop (precise pointers) */
        @media (pointer: fine) {

            #joystick-left,
            #joystick-right {
                display: none;
            }
        }

        .joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: none;
            /* Only show in specific modes if needed */
        }

        #minimap {
            position: absolute;
            top: 20px;
            right: 30px;
            width: 100px;
            height: 100px;
            background: rgba(40, 40, 40, 0.2);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
            display: block;
        }
    </style>
</head>

<body class="wcg-ready">
    <div id="hud">
        <div class="hp-bar-container">
            <div id="hp-fill"></div>
            <div id="status-text">100</div>
        </div>
        <div id="upgrade-hud">
            <div class="upgrade-item" id="up-cannon">
                <span class="upgrade-label" data-i18n="cannon">CANNON</span>
                <div class="upgrade-gauge">
                    <div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div>
                </div>
                <span class="level-text">0</span>
            </div>
            <div class="upgrade-item" id="up-speed">
                <span class="upgrade-label" data-i18n="speed">SPEED</span>
                <div class="upgrade-gauge">
                    <div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div>
                </div>
                <span class="level-text">0</span>
            </div>
            <div class="upgrade-item" id="up-armor">
                <span class="upgrade-label" data-i18n="armor">ARMOR</span>
                <div class="upgrade-gauge">
                    <div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div><div class="gauge-dot"></div>
                </div>
                <span class="level-text">0</span>
            </div>
        </div>
    </div>
    <div id="scoreboard"></div>
    <canvas id="minimap" width="100" height="100"></canvas>

    <!-- Mobile Joysticks -->
    <div id="joystick-left">
        <div class="joystick-knob"></div>
    </div>

    <div id="start-screen" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="title"></h1>
            <p data-i18n="instruction"></p>
            <button onclick="Game.start()" data-i18n="play"></button>
        </div>
    </div>

    <div id="game-over" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="game_over"></h1>
            <p><span data-i18n="final_score"></span><span id="final-score">0</span></p>
            <button onclick="WCGames.restart()" data-i18n="play_again"></button>
        </div>
    </div>

    <div id="game-container"></div>

    <!-- Import Map for ES Modules -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


    <!-- SDK & Config -->
    <script src="/shared/wcgames-config.js"></script>
    <script src="/shared/wcgames-core.js"></script>
    <script src="/shared/i18n.js"></script>

    <!-- Game Logic -->
    <script type="module" src="game.js"></script>
</body>


</html>
