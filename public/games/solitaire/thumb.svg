<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background: Deep Velvet Emerald -->
    <radialGradient id="velvet" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1b4d3e" />
      <stop offset="100%" stop-color="#0a1a14" />
    </radialGradient>
    
    <!-- Gold Gradient for Borders and Details -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700" />
      <stop offset="50%" stop-color="#b8860b" />
      <stop offset="100%" stop-color="#8b6508" />
    </linearGradient>
    
    <!-- Card Surface Gradient -->
    <linearGradient id="cardSurface" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f0f0f0" />
    </linearGradient>
    
    <!-- Heavy Drop Shadow for depth -->
    <filter id="premiumShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="15" flood-opacity="0.8" />
    </filter>
    
    <!-- Inner Glow for buttons or elements -->
    <filter id="innerGlow">
      <feFlood flood-color="#ffd700" flood-opacity="0.3" result="glowColor"/>
      <feComposite in="glowColor" in2="SourceGraphic" operator="in" />
      <feGaussianBlur stdDeviation="2" />
    </feFlood>
  </defs>

  <!-- Main Background -->
  <rect width="512" height="512" rx="64" fill="url(#velvet)" />
  
  <!-- Ornate Gold Outer Border -->
  <rect x="16" y="16" width="480" height="480" rx="48" fill="none" stroke="url(#gold)" stroke-width="8" opacity="0.8" />
  <rect x="32" y="32" width="448" height="448" rx="32" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.4" />

  <!-- Back Card: Deep Navy Diamond Pattern -->
  <g transform="translate(180, 100) rotate(15)" filter="url(#premiumShadow)">
    <rect width="180" height="260" rx="12" fill="#1a2a4a" stroke="#ffffff" stroke-width="4" />
    <!-- Subtle Diamond Pattern on Back -->
    <rect x="20" y="20" width="140" height="220" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <path d="M90,110 L105,130 L90,150 L75,130 Z" fill="rgba(255,255,255,0.2)" />
  </g>

  <!-- Front Card: Ace of Spades -->
  <g transform="translate(140, 140) rotate(-5)" filter="url(#premiumShadow)">
    <rect width="180" height="260" rx="12" fill="url(#cardSurface)" stroke="#ffffff" stroke-width="2" />
    
    <!-- Corner Rank -->
    <text x="15" y="45" font-family="serif" font-size="40" font-weight="900" fill="#1a1a1a">A</text>
    <text x="15" y="80" font-family="serif" font-size="30" fill="#1a1a1a">♠</text>
    
    <text x="165" y="215" font-family="serif" font-size="40" font-weight="900" fill="#1a1a1a" transform="rotate(180 165 215)">A</text>
    <text x="165" y="180" font-family="serif" font-size="30" fill="#1a1a1a" transform="rotate(180 165 180)">♠</text>
    
    <!-- Center Spade Symbol (Ornate) -->
    <g transform="translate(90, 130) scale(4)">
      <path d="M 0,-10 C -5,-5 -10,0 -10,5 C -10,10 -5,12 0,12 C 5,12 10,10 10,5 C 10,0 5,-5 0,-10" fill="#1a1a1a" />
      <path d="M -2,12 L 2,12 L 0,6 Z" fill="#1a1a1a" />
    </g>
  </g>

  <!-- Solitaire Text (Gold Metallic) -->
  <text x="256" y="460" font-family="'Pretendard', sans-serif" font-size="56" font-weight="900" text-anchor="middle" fill="url(#gold)" style="filter: drop-shadow(0 4px 10px rgba(0,0,0,0.8)); letter-spacing: 4px;">SOLITAIRE</text>
  
</svg>
