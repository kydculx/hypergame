<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solitaire</title>
    <link rel="stylesheet" href="/shared/wcgames-style.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="wcg-ready">
    <div class="vignette"></div>

    <div id="ui-layer">
        <div class="stats-box">
            <span style="opacity: 0.6; font-size: 12px; font-weight: 800; letter-spacing: 0.05em;">TIME</span>
            <span id="timer">00:00</span>
        </div>
    </div>
    <div id="controls-layer">
        <button id="btn-undo" class="control-btn" onclick="CardManager.undo()">
            <span data-i18n="undo">Undo</span>
            <span id="undo-count">3</span>
        </button>
        <button id="btn-restart" class="control-btn" onclick="Engine.restart()">
            <span data-i18n="restart">Restart</span>
        </button>
        <button id="btn-autoplay" class="control-btn wcg-admin-only" onclick="AISolver.toggle()"
            style="background: rgba(46, 204, 113, 0.1); border-color: rgba(46, 204, 113, 0.4); display: none;">
            <span id="autoplay-text">Auto Play</span>
        </button>
        <button id="btn-test-clear" class="control-btn wcg-admin-only" onclick="window.TEST_WIN()"
            style="background: rgba(231, 76, 60, 0.1); border-color: rgba(231, 76, 60, 0.4); display: none;">
            Test Clear
        </button>
    </div>

    <!-- Start / Tutorial Screen -->
    <div id="start-screen" class="wcg-overlay wcg-visible">
        <div class="wcg-popup casino-style">
            <h1 data-i18n="title">Solitaire</h1>
            <p data-i18n="instruction">Arrange the cards.</p>
            <button onclick="Engine.startGame()" data-i18n="play">Play</button>
        </div>
    </div>

    <!-- Game Over / Clear Screen -->
    <div id="game-over" class="wcg-overlay">
        <div class="wcg-popup casino-style">
            <h1 data-i18n="game_over">Clear!</h1>
            <p><span data-i18n="final_score">Time: </span><span id="final-time">0</span>s</p>
            <button onclick="Engine.restart()" data-i18n="play_again">Play Again</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- SDK & Logic -->
    <script src="/shared/wcgames-core.js"></script>
    <script type="module" src="./js/main.js"></script>
    <script src="/shared/i18n.js"></script>
</body>

</html>
