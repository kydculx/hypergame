<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Zigzag path tiles -->
  <g transform="translate(60, 60)" filter="url(#glow)">
    <!-- Row of zigzag tiles -->
    <polygon points="50,0 100,25 50,50 0,25" fill="#0ea5e9"/>
    <polygon points="100,25 150,50 100,75 50,50" fill="#06b6d4"/>
    <polygon points="150,50 200,75 150,100 100,75" fill="#0ea5e9"/>
    <polygon points="200,75 250,100 200,125 150,100" fill="#06b6d4"/>
    <polygon points="250,100 300,125 250,150 200,125" fill="#0ea5e9"/>
    <polygon points="300,125 350,150 300,175 250,150" fill="#06b6d4" opacity="0.5"/>
  </g>

  <!-- Ball on path -->
  <circle cx="210" cy="135" r="8" fill="#fff" filter="url(#glow)"/>
  <circle cx="210" cy="135" r="4" fill="#f59e0b"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="250" x2="400" y2="250" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
</svg>
