<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZigZag - Hyper Casual</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #a9cce3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            overscroll-behavior: none;
            touch-action: none;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            pointer-events: none;
            z-index: 10;
        }

        #score {
            font-size: 64px;
            font-weight: 800;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.1);
            color: #ffffff;
        }


        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            display: none;
            pointer-events: auto;
            z-index: 20;
            min-width: 200px;
        }

        h1 {
            color: #333;
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        p {
            color: #666;
            margin: 0 0 20px 0;
            font-size: 16px;
        }

        #final-score {
            color: #e74c3c;
            font-weight: bold;
            font-size: 24px;
        }

        button {
            background: #3498db;
            border: none;
            padding: 15px 40px;
            color: white;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 0 #2980b9;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        button:hover {
            background: #2980b9;
        }

        #start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            z-index: 30;
            min-width: 250px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .start-btn {
            background: #3498db;
            border: none;
            padding: 15px 40px;
            color: white;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 0 #2980b9;
        }

        .start-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
    </style>


    <!-- WCGames Popup Theming -->
    <style id="wcgames-popup-theme">
        :root {
            --theme-color: #8b5cf6 !important;
            --theme-glow: rgba(139, 92, 246, 0.4) !important;
        }

        /* Strict override for the overlay containers */
        .wcg-overlay {
            position: fixed !important;
            inset: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            max-width: none !important;
            background: rgba(10, 11, 26, 0.7) !important;
            backdrop-filter: blur(5px) !important;
            -webkit-backdrop-filter: blur(5px) !important;
            display: flex !important;
            /* Force flex, we manage vis via opacity */
            align-items: center !important;
            justify-content: center !important;
            z-index: 9999 !important;
            opacity: 0 !important;
            pointer-events: none !important;
            transition: opacity 0.3s ease !important;
            border: none !important;
            transform: none !important;
            padding: 0 !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            margin: 0 !important;
            text-align: center !important;
        }

        /* ONLY show if has .wcg-visible */
        .wcg-overlay.wcg-visible {
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        /* The Glassmorphism Popup Box */
        .wcg-popup {
            background: rgba(15, 17, 35, 0.85) !important;
            backdrop-filter: blur(16px) !important;
            -webkit-backdrop-filter: blur(16px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 24px !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 40px var(--theme-glow) !important;
            padding: 40px 30px !important;
            width: 85% !important;
            max-width: 400px !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            transform: scale(0.95) translateY(10px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
            box-sizing: border-box !important;
        }

        /* Popup entry animation */
        .wcg-overlay.wcg-visible .wcg-popup {
            transform: scale(1) translateY(0);
        }

        /* Typography inside popup */
        .wcg-popup h1,
        .wcg-popup h2,
        .wcg-popup .title {
            font-family: 'Inter', 'Orbitron', 'Segoe UI', sans-serif !important;
            font-size: 36px !important;
            font-weight: 900 !important;
            margin: 0 0 16px 0 !important;
            color: #fff !important;
            background: linear-gradient(to bottom right, #fff, var(--theme-color)) !important;
            -webkit-background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            filter: drop-shadow(0 0 10px var(--theme-glow)) !important;
            line-height: 1.2 !important;
            border: none !important;
        }

        .wcg-popup p,
        .wcg-popup .instructions,
        .wcg-popup div[style*="font-size: 24px"],
        .wcg-popup div:not(.title):not(.btn) {
            font-family: 'Inter', sans-serif !important;
            font-size: 16px !important;
            color: #cbd5e1 !important;
            line-height: 1.6 !important;
            margin: 0 0 32px 0 !important;
            max-width: 100% !important;
            text-shadow: none !important;
            font-weight: 400 !important;
            background: none !important;
            -webkit-text-fill-color: initial !important;
            filter: none !important;
        }

        .wcg-popup div[style*="font-size: 24px"] {
            font-size: 20px !important;
            color: #fff !important;
            font-weight: 700 !important;
            margin-bottom: 30px !important;
        }

        .wcg-popup div[style*="font-size: 24px"] span,
        .wcg-popup #final-score {
            color: var(--theme-color) !important;
        }

        /* Buttons */
        .wcg-popup button,
        .wcg-popup .btn,
        .wcg-popup .start-btn,
        .wcg-popup .btn-start,
        .wcg-popup .btn-restart {
            font-family: 'Inter', 'Orbitron', sans-serif !important;
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid var(--theme-color) !important;
            color: #fff !important;
            font-size: 18px !important;
            font-weight: 700 !important;
            padding: 16px 40px !important;
            border-radius: 100px !important;
            cursor: pointer !important;
            letter-spacing: 1px !important;
            box-shadow: 0 0 20px var(--theme-glow), inset 0 0 10px var(--theme-glow) !important;
            transition: all 0.2s ease !important;
            margin: 0 !important;
            width: 100% !important;
            max-width: 250px !important;
            -webkit-text-fill-color: initial !important;
        }

        .wcg-popup button:hover,
        .wcg-popup .btn:hover,
        .wcg-popup .start-btn:hover,
        .wcg-popup .btn-start:hover,
        .wcg-popup .btn-restart:hover {
            background: var(--theme-color) !important;
            color: #0f1123 !important;
            box-shadow: 0 0 30px var(--theme-color), inset 0 0 15px rgba(255, 255, 255, 0.5) !important;
            transform: scale(1.05) translateY(-2px) !important;
        }

        .wcg-popup button:active,
        .wcg-popup .btn:active,
        .wcg-popup .start-btn:active,
        .wcg-popup .btn-start:active,
        .wcg-popup .btn-restart:active {
            transform: scale(0.95) !important;
        }

        /* Anti-FOUC safeguard: hide target popups until themed */
        body:not(.wcg-ready) #start-screen,
        body:not(.wcg-ready) #game-over,
        body:not(.wcg-ready) #game-over-screen {
            opacity: 0 !important;
            pointer-events: none !important;
            visibility: hidden !important;
        }
    </style>
    <!-- End WCGames Popup Theming -->
</head>

<body class="wcg-ready">
    <div id="ui">
        <div id="score">0</div>
    </div>

    <div id="start-screen" class="wcg-overlay wcg-visible" style="display: flex;">
        <div class="wcg-popup">
            <h1 data-i18n="title">ZIGZAG ROLL</h1>
            <p data-i18n="instruction">Tap to switch direction.<br>Stay on the wall and collect crystals!</p>
            <button class="start-btn" onclick="startGame()" data-i18n="play">PLAY</button>
        </div>
    </div>

    <div id="game-over" class="wcg-overlay" style="display: none;">
        <div class="wcg-popup">
            <h1 data-i18n="game_over">GAME OVER</h1>
            <p><span data-i18n="final_score">Score: </span><span id="final-score">0</span></p>
            <button class="start-btn" onclick="restartGame()" data-i18n="play_again">RETRY</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game Configuration
        const PLATFORM_SIZE = 3;
        const BALL_RADIUS = 0.5;
        const BALL_SPEED_BASE = 0.15;
        const CAMERA_OFFSET = { x: 20, y: 20, z: 20 };
        const COLORS = {
            background: 0xa9cce3,
            ball: 0xe74c3c,
            platform: 0xe5e8e8, // Off-white
            platformHighlight: 0xffffff, // Pure white
            shadow: 0xd6eaf8,
            crystal: 0xf1c40f
        };

        let scene, camera, renderer;
        let ball;
        let platforms = [];
        let crystals = [];
        let particles, particleData;
        let score = 0;
        let gameState = 'START'; // START, PLAYING, OVER
        let direction = 'x'; // 'x' or 'z'
        let speed = BALL_SPEED_BASE;
        let lastPlatformPos = { x: 0, y: 0, z: 0 };
        let frames = 0;
        let targetCameraPos = { x: 0, y: 0, z: 0 };

        // Shared Materials for Performance
        const crystalMaterial = new THREE.MeshPhongMaterial({
            color: COLORS.crystal,
            emissive: 0x444400,
            shininess: 100
        });

        // Audio System
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        init();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'switch') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'crystal') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, now);
                osc.frequency.linearRampToValueAtTime(1760, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'gameover') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            }
        }

        function init() {
            // Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(COLORS.background);
            scene.fog = new THREE.Fog(COLORS.background, 20, 60);

            // Camera (Orthographic for Isometric view)
            const aspect = window.innerWidth / window.innerHeight;
            const d = 20;
            camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
            camera.position.set(CAMERA_OFFSET.x, CAMERA_OFFSET.y, CAMERA_OFFSET.z);
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            dirLight.position.set(20, 50, 30);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 100;
            dirLight.shadow.camera.left = -30;
            dirLight.shadow.camera.right = 30;
            dirLight.shadow.camera.top = 30;
            dirLight.shadow.camera.bottom = -30;
            scene.add(dirLight);

            // Init Game Objects
            createBall();

            // Initial Platform Generation
            createPlatform(0, 0, 0);
            for (let i = 0; i < 20; i++) {
                spawnNextPlatform();
            }

            initClouds();

            // Events
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('pointerdown', handleInput);
            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (gameState === 'PLAYING') handleInput();
                }
            });

            // Start Loop
            animate();

            // Notify Parent
            window.parent.postMessage({ type: 'GAME_READY' }, '*');
        }

        function createBall() {
            const geometry = new THREE.SphereGeometry(BALL_RADIUS, 32, 32);
            const material = new THREE.MeshPhongMaterial({ color: COLORS.ball, shininess: 50 });
            ball = new THREE.Mesh(geometry, material);
            ball.position.set(0, BALL_RADIUS + PLATFORM_SIZE / 2, 0); // Sit on top of platform
            ball.castShadow = true;
            scene.add(ball);
        }

        function initClouds() {
            const count = 100;
            const geo = new THREE.IcosahedronGeometry(0.15, 0);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 });
            particles = new THREE.InstancedMesh(geo, mat, count);
            particleData = [];

            const dummy = new THREE.Object3D();
            for (let i = 0; i < count; i++) {
                const x = (Math.random() - 0.5) * 100;
                const y = Math.random() * 40 - 10;
                const z = (Math.random() - 0.5) * 100;
                dummy.position.set(x, y, z);
                dummy.updateMatrix();
                particles.setMatrixAt(i, dummy.matrix);

                particleData.push({
                    x, y, z,
                    yspeed: 0.01 + Math.random() * 0.03,
                    offset: Math.random() * Math.PI * 2
                });
            }
            scene.add(particles);
        }

        function updateParticles() {
            if (!particles) return;
            const dummy = new THREE.Object3D();
            for (let i = 0; i < particleData.length; i++) {
                const p = particleData[i];
                p.y -= p.yspeed;

                // Wrap around particles correctly in relation to the ball
                if (p.y < -20) p.y = 20;

                const drift = Math.sin(Date.now() * 0.001 + p.offset) * 0.3;
                dummy.position.set(p.x + drift, p.y, p.z);
                dummy.updateMatrix();
                particles.setMatrixAt(i, dummy.matrix);
            }
            particles.instanceMatrix.needsUpdate = true;
        }

        function createPlatform(x, y, z) {
            const geometry = new THREE.BoxGeometry(PLATFORM_SIZE, PLATFORM_SIZE, PLATFORM_SIZE);
            const material = new THREE.MeshLambertMaterial({ color: COLORS.platform });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, y, z);
            mesh.receiveShadow = true;
            scene.add(mesh);
            platforms.push(mesh);
            lastPlatformPos = { x, y, z };

            // Decoration / Shadow block
            const shadowGeo = new THREE.BoxGeometry(PLATFORM_SIZE, PLATFORM_SIZE * 2, PLATFORM_SIZE);
            const shadowMat = new THREE.MeshBasicMaterial({ color: COLORS.shadow });
            const shadowMesh = new THREE.Mesh(shadowGeo, shadowMat);
            shadowMesh.position.set(x, y - PLATFORM_SIZE * 1.5, z);
            scene.add(shadowMesh);
            mesh.userData.shadow = shadowMesh; // Link to remove later

            // Chance to spawn crystal (10%)
            if (Math.random() < 0.15 && frames > 5) {
                createCrystal(x, y + PLATFORM_SIZE / 2 + 1, z);
            }
        }

        function createCrystal(x, y, z) {
            const geometry = new THREE.OctahedronGeometry(0.6);
            const mesh = new THREE.Mesh(geometry, crystalMaterial);
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            scene.add(mesh);
            crystals.push(mesh);
        }

        function safeRemove(obj) {
            if (!obj) return;
            if (obj.geometry) obj.geometry.dispose();
            // Don't dispose shared material
            if (obj.material && obj.material !== crystalMaterial) {
                if (Array.isArray(obj.material)) {
                    obj.material.forEach(m => m.dispose());
                } else {
                    obj.material.dispose();
                }
            }
            scene.remove(obj);
        }

        function spawnNextPlatform() {
            frames++;
            let isX = Math.random() > 0.5;

            // Force straight path for first 15 blocks to align with initial ball direction
            if (platforms.length < 15) {
                isX = true;
            }

            const newX = lastPlatformPos.x + (isX ? PLATFORM_SIZE : 0);
            const newZ = lastPlatformPos.z + (isX ? 0 : -PLATFORM_SIZE); // Move -Z (forward/right visually)

            createPlatform(newX, lastPlatformPos.y, newZ);
        }

        function handleInput() {
            if (gameState !== 'PLAYING') return;
            direction = direction === 'x' ? 'z' : 'x';
            playSound('switch');
        }

        function gameOver() {
            if (gameState === 'OVER') return;
            gameState = 'OVER';
            playSound('gameover');

            const gameOverScreen = document.getElementById('game-over');
            gameOverScreen.style.setProperty('display', 'flex', 'important');
            gameOverScreen.offsetHeight; // trigger reflow
            gameOverScreen.classList.add('wcg-visible');

            document.getElementById('final-score').textContent = score;
            window.parent.postMessage({ type: 'GAME_OVER', payload: { score } }, '*');
        }

        function restartGame() {
            // 1. Hide Game Over Screen
            const gameOverScreen = document.getElementById('game-over');
            gameOverScreen.style.setProperty('display', 'none', 'important');
            gameOverScreen.classList.remove('wcg-visible');

            // 2. Clean up 3D objects
            platforms.forEach(p => {
                if (p.userData && p.userData.shadow) safeRemove(p.userData.shadow);
                safeRemove(p);
            });
            crystals.forEach(c => safeRemove(c));

            // 3. Reset state
            platforms = [];
            crystals = [];
            score = 0;
            frames = 0;
            direction = 'x';
            speed = 0.15;

            document.getElementById('score').textContent = score;

            // 4. Reset Ball & Camera
            ball.position.set(0, PLATFORM_SIZE / 2 + BALL_RADIUS, 0);
            camera.position.set(CAMERA_OFFSET.x, CAMERA_OFFSET.y, CAMERA_OFFSET.z);
            targetCameraPos = { x: 0, y: 0, z: 0 };

            // 5. Generate initial path
            createPlatform(0, 0, 0);
            for (let i = 0; i < 25; i++) {
                spawnNextPlatform();
            }

            gameState = 'PLAYING';
        }

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const startScreen = document.getElementById('start-screen');
            startScreen.style.setProperty('display', 'none', 'important');
            startScreen.classList.remove('wcg-visible');

            gameState = 'PLAYING';
        }

        function onWindowResize() {
            const aspect = window.innerWidth / window.innerHeight;
            const d = 20;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (gameState === 'PLAYING') {
                // Move Ball
                const moveSpeed = speed;
                if (direction === 'x') ball.position.x += moveSpeed;
                else ball.position.z -= moveSpeed;

                // Speed up slightly over time
                speed += 0.00005;

                // Update Camera Target
                targetCameraPos.x = ball.position.x + CAMERA_OFFSET.x;
                targetCameraPos.z = ball.position.z + CAMERA_OFFSET.z;

                // Camera Follow (Smooth)
                camera.position.x += (targetCameraPos.x - camera.position.x) * 0.1;
                camera.position.z += (targetCameraPos.z - camera.position.z) * 0.1;

                // Particle movement
                updateParticles();

                // Lerp platform colors back
                platforms.forEach(p => {
                    if (p.userData.highlighted) {
                        p.material.color.lerp(new THREE.Color(COLORS.platform), 0.05);
                    }
                });

                // Collision Detection (Fall off)
                const forgivingTolerance = PLATFORM_SIZE / 2 + BALL_RADIUS * 0.4;
                const currentPlatform = platforms.find(p =>
                    Math.abs(p.position.x - ball.position.x) < forgivingTolerance &&
                    Math.abs(p.position.z - ball.position.z) < forgivingTolerance
                );

                if (!currentPlatform) {
                    // Fall logic
                    ball.position.y -= 0.5;
                    ball.position.x += (direction === 'x' ? moveSpeed : 0);
                    ball.position.z -= (direction === 'z' ? moveSpeed : 0);
                    if (ball.position.y < -10) {
                        gameOver();
                    }
                } else {
                    // Highlight platform
                    currentPlatform.material.color.setHex(COLORS.platformHighlight);
                    currentPlatform.userData.highlighted = true;
                    // Check Crystals
                    for (let i = crystals.length - 1; i >= 0; i--) {
                        const c = crystals[i];
                        const dx = c.position.x - ball.position.x;
                        const dz = c.position.z - ball.position.z;
                        const dist = Math.sqrt(dx * dx + dz * dz);

                        if (dist < 1) {
                            if (c.geometry) c.geometry.dispose(); // Dispose geometry only, shared mat
                            scene.remove(c);
                            crystals.splice(i, 1);
                            score += 2; // Bonus points
                            playSound('crystal');
                            document.getElementById('score').textContent = score;
                            window.parent.postMessage({ type: 'SUBMIT_SCORE', payload: { score } }, '*');
                        } else {
                            // Rotate crystal
                            c.rotation.y += 0.05;
                            c.position.y = (currentPlatform.position.y + PLATFORM_SIZE / 2 + 1) + Math.sin(Date.now() * 0.005) * 0.2;
                        }
                    }

                    // Score calculation based on distance/platforms
                    // Just count distance? Or platforms passed?
                    // Let's increment score when passing platforms
                    if (!currentPlatform.userData.passed) {
                        currentPlatform.userData.passed = true;
                        score++;
                        document.getElementById('score').textContent = score;
                        window.parent.postMessage({ type: 'SUBMIT_SCORE', payload: { score } }, '*');

                        // Spawn new path
                        spawnNextPlatform();
                    }
                }

                // Cleanup old platforms
                if (platforms.length > 50) {
                    const oldP = platforms.shift();
                    if (oldP.userData.shadow) safeRemove(oldP.userData.shadow);
                    safeRemove(oldP);
                }
            } else if (gameState === 'OVER') {
                updateParticles();

                // Fall animation continue
                if (ball.position.y > -50) {
                    ball.position.y -= 0.5;
                    // Camera looks down slightly to watch fall
                    camera.position.y += (CAMERA_OFFSET.y + 10 - camera.position.y) * 0.05;
                }
            }

            renderer.render(scene, camera);
        }
    </script>
