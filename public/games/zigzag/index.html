<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZigZag Roll</title>
    <link rel="stylesheet" href="/shared/wcgames-style.css">
    <style>
        :root {
            --theme-color: #60a5fa;
            --theme-glow: rgba(96, 165, 250, 0.5);
        }

        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(180deg, #1a1a3e 0%, #2d3a8c 30%, #5b8def 60%, #87ceeb 85%, #d4ecff 100%);
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        canvas {
            display: block;
            position: relative;
            z-index: 5;
        }

        #ui {
            position: absolute;
            top: 40px;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        #score {
            font-size: 64px;
            font-weight: 900;
            text-shadow: 0 0 20px var(--theme-glow);
            color: #ffffff;
        }
    </style>
    <script src="/shared/wcgames-config.js"></script>
    <script src="/shared/wcgames-core.js"></script>
</head>

<body>
    <!-- Aurora Background Layers -->
    <div class="aurora-bg">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2" style="background: var(--theme-color); opacity: 0.3;"></div>
        <div class="aurora-blob blob-3"></div>
    </div>
    <div class="glass-overlay"></div>

    <div id="ui">
        <div id="score">0</div>
    </div>

    <div id="start-screen" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="title">ZIGZAG ROLL</h1>
            <p data-i18n="instruction">Tap to switch direction.<br>Stay on the wall!</p>
            <button onclick="WCGames.start()" data-i18n="play">ROLL</button>
        </div>
    </div>

    <div id="game-over" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="game_over">GAME OVER</h1>
            <p><span data-i18n="final_score">Score: </span><span id="final-score">0</span></p>
            <button onclick="WCGames.restart()" data-i18n="play_again">RETRY</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Audio Manager
        class AudioManager {
            constructor() { this.ctx = null; }
            init() {
                if (this.ctx) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
            play(freq, type, dur, vol) {
                if (!this.ctx) return;
                if (this.ctx.state === 'suspended') this.ctx.resume();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                if (Array.isArray(freq)) {
                    osc.frequency.setValueAtTime(freq[0], this.ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(freq[1], this.ctx.currentTime + dur);
                } else {
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                }
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + dur);
            }
            tap() { this.play(800, 'sine', 0.08, 0.2); }
            score(n) { this.play(300 + (n % 20) * 15, 'sine', 0.12, 0.15); }
            crystal() {
                this.play(1200, 'sine', 0.15, 0.2);
                setTimeout(() => this.play(1500, 'sine', 0.15, 0.15), 60);
            }
            fall() { this.play([400, 100], 'triangle', 0.4, 0.2); }
            gameOver() { this.play([300, 80], 'sawtooth', 0.5, 0.25); }
        }
        const audio = new AudioManager();

        const PLAT_SIZE = 3, PLAT_HEIGHT = 9, BASE_SPEED = 12; // PLAT_SIZE = width/depth, PLAT_HEIGHT = vertical
        let scene, camera, renderer, ball, platforms = [], crystals = [], direction = 'x', score = 0, isGameOver = false, isStarted = false;
        let lastPos = { x: 0, y: 0, z: 0 };
        let clock = new THREE.Clock();

        // FPS Throttling for 60fps
        let lastTime = 0;
        const fpsInterval = 1000 / 60;

        let platformCount = 0;
        let crystalGeo, crystalMat;

        let cloudParticles;
        let trail = [];
        let ballLight;
        const trailColors = [0xf472b6, 0xfb7185, 0xfda4af, 0xffffff, 0xc084fc];

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x87ceeb, 0.012);

            const aspect = window.innerWidth / window.innerHeight, d = 20;
            camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
            camera.position.set(17, 20, 20); camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000000, 0);
            document.body.appendChild(renderer.domElement);

            // Soft sky lighting (no harsh reflections)
            const ambient = new THREE.AmbientLight(0xc9e8ff, 1.0); scene.add(ambient);
            const sunLight = new THREE.DirectionalLight(0xfff4e0, 0.3);
            sunLight.position.set(30, 60, 20); scene.add(sunLight);
            const fillLight = new THREE.DirectionalLight(0x87ceeb, 0.15);
            fillLight.position.set(-20, 10, -10); scene.add(fillLight);

            // Cloud particles below the path
            createClouds();

            // Ball — glowing pink sphere
            const ballGeo = new THREE.SphereGeometry(0.8, 32, 32);
            const ballMat = new THREE.MeshPhongMaterial({
                color: 0xf472b6,
                emissive: 0xec4899,
                emissiveIntensity: 0.3,
                shininess: 120
            });
            ball = new THREE.Mesh(ballGeo, ballMat);
            ball.position.set(0, PLAT_HEIGHT / 2 + 0.8, 0);
            scene.add(ball);

            // Glow light attached to ball
            ballLight = new THREE.PointLight(0xf472b6, 2, 15);
            ballLight.position.copy(ball.position);
            scene.add(ballLight);

            // Crystal Geometry & Material (Diamond shape)
            crystalGeo = new THREE.OctahedronGeometry(0.6, 0);
            crystalMat = new THREE.MeshPhongMaterial({
                color: 0xf1c40f,
                emissive: 0xf1c40f,
                emissiveIntensity: 0.5,
                shininess: 100,
                transparent: true,
                opacity: 0.9
            });

            reset();

            window.addEventListener('resize', onResize);
            window.addEventListener('pointerdown', () => {
                if (isStarted && !isGameOver) {
                    direction = direction === 'x' ? 'z' : 'x';
                    spawnBurst(8);
                    audio.tap();
                }
            });
            requestAnimationFrame(animate);
        }

        function createClouds() {
            const cloudCount = 60;
            const cloudGeo = new THREE.SphereGeometry(1, 8, 8);
            const cloudMat = new THREE.MeshLambertMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.35
            });
            cloudParticles = new THREE.Group();
            for (let i = 0; i < cloudCount; i++) {
                const cloud = new THREE.Mesh(cloudGeo, cloudMat.clone());
                cloud.position.set(
                    (Math.random() - 0.5) * 120,
                    -(PLAT_HEIGHT / 2) - 4 - Math.random() * 15,
                    (Math.random() - 0.5) * 120
                );
                const s = 1.5 + Math.random() * 3;
                cloud.scale.set(s * 1.5, s * 0.5, s);
                cloud.material.opacity = 0.15 + Math.random() * 0.25;
                cloudParticles.add(cloud);
            }
            scene.add(cloudParticles);
        }

        function createPlatform(x, y, z) {
            const geo = new THREE.BoxGeometry(PLAT_SIZE, PLAT_HEIGHT, PLAT_SIZE);
            const mat = new THREE.MeshLambertMaterial({ color: 0x6b7c9d });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);

            // Side glow planes (hidden by default)
            const sideMat = new THREE.MeshBasicMaterial({
                color: 0xf472b6, transparent: true, opacity: 0, side: THREE.DoubleSide
            });
            const sideGroup = new THREE.Group();
            const halfW = PLAT_SIZE / 2 + 0.02;
            const halfH = PLAT_HEIGHT / 2;
            // Front & Back (Z faces)
            const planeZ = new THREE.PlaneGeometry(PLAT_SIZE, PLAT_HEIGHT);
            const f = new THREE.Mesh(planeZ, sideMat.clone()); f.position.set(0, 0, halfW); sideGroup.add(f);
            const b = new THREE.Mesh(planeZ, sideMat.clone()); b.position.set(0, 0, -halfW); sideGroup.add(b);
            // Left & Right (X faces)
            const planeX = new THREE.PlaneGeometry(PLAT_SIZE, PLAT_HEIGHT);
            const l = new THREE.Mesh(planeX, sideMat.clone()); l.position.set(-halfW, 0, 0); l.rotation.y = Math.PI / 2; sideGroup.add(l);
            const r = new THREE.Mesh(planeX, sideMat.clone()); r.position.set(halfW, 0, 0); r.rotation.y = Math.PI / 2; sideGroup.add(r);
            sideGroup.position.copy(mesh.position);
            scene.add(sideGroup);
            mesh.userData.sideGroup = sideGroup;

            platforms.push(mesh);
            lastPos = { x, y, z };

            // Randomly spawn crystal on new platforms (except the starting ones)
            if (platformCount > 10 && Math.random() > 0.8) {
                const crystal = new THREE.Mesh(crystalGeo, crystalMat);
                crystal.position.set(x, PLAT_HEIGHT / 2 + 0.8, z);
                scene.add(crystal);
                crystals.push(crystal);
            }
        }

        function spawnPlatform() {
            platformCount++;
            const isX = platformCount <= 10 ? true : Math.random() > 0.5;
            createPlatform(lastPos.x + (isX ? PLAT_SIZE : 0), 0, lastPos.z + (isX ? 0 : -PLAT_SIZE));
        }

        function onResize() {
            const aspect = window.innerWidth / window.innerHeight, d = 20;
            camera.left = -d * aspect; camera.right = d * aspect; camera.top = d; camera.bottom = -d;
            camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function spawnBurst(count) {
            for (let i = 0; i < count; i++) {
                const size = 0.15 + Math.random() * 0.35;
                const geo = new THREE.SphereGeometry(size, 6, 6);
                const color = trailColors[Math.floor(Math.random() * trailColors.length)];
                const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1.0 });
                const t = new THREE.Mesh(geo, mat);
                t.position.copy(ball.position);
                scene.add(t);
                const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
                const speed = 3 + Math.random() * 5;
                trail.push({
                    mesh: t,
                    life: 0.5 + Math.random() * 0.5,
                    vx: Math.cos(angle) * speed,
                    vy: 2 + Math.random() * 5,
                    vz: Math.sin(angle) * speed
                });
            }
        }

        function animate(timestamp) {
            requestAnimationFrame(animate);

            if (!lastTime) lastTime = timestamp;
            const elapsed = timestamp - lastTime;

            if (elapsed < fpsInterval) return;

            lastTime = timestamp - (elapsed % fpsInterval);

            const delta = clock.getDelta();

            if (isStarted && !isGameOver) {
                const onPlatform = platforms.some(p =>
                    Math.abs(p.position.x - ball.position.x) < (PLAT_SIZE / 2 + 0.3) &&
                    Math.abs(p.position.z - ball.position.z) < (PLAT_SIZE / 2 + 0.3)
                );

                if (!onPlatform) {
                    // Falling - stop horizontal movement, only fall down
                    ball.position.y -= 25 * delta;
                    ball.rotation.x += delta * 8;
                    if (ball.position.y < -(PLAT_HEIGHT / 2 + 5)) endGame();
                } else {
                    // On platform - move horizontally
                    const moveDist = BASE_SPEED * delta;
                    if (direction === 'x') {
                        ball.position.x += moveDist;
                        ball.rotation.z -= moveDist / 0.8; // Roll based on ball radius
                    } else {
                        ball.position.z -= moveDist;
                        ball.rotation.x -= moveDist / 0.8;
                    }

                    const p = platforms.find(p => !p.passed &&
                        Math.abs(p.position.x - ball.position.x) < 0.8 &&
                        Math.abs(p.position.z - ball.position.z) < 0.8
                    );
                    if (p) {
                        p.passed = true;
                        score++;
                        document.getElementById('score').textContent = score;
                        spawnPlatform();
                        audio.score(score);
                    }
                }

                // Platform side glow — vertical faces light up near the ball
                const glowRadius = PLAT_SIZE * 3;
                platforms.forEach(p => {
                    const dx = Math.abs(p.position.x - ball.position.x);
                    const dz = Math.abs(p.position.z - ball.position.z);
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    if (p.userData.sideGroup) {
                        const targetOpacity = dist < glowRadius ? (1 - dist / glowRadius) * 0.6 : 0;
                        p.userData.sideGroup.children.forEach(s => {
                            s.material.opacity = targetOpacity;
                        });
                    }
                });

                // Ball glow follows ball
                ballLight.position.copy(ball.position);
                ballLight.position.y += 1;

                // Spawn trail particles
                if (trail.length < 40) {
                    for (let j = 0; j < 2; j++) {
                        const size = 0.1 + Math.random() * 0.3;
                        const geo = new THREE.SphereGeometry(size, 6, 6);
                        const color = trailColors[Math.floor(Math.random() * trailColors.length)];
                        const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.8 });
                        const t = new THREE.Mesh(geo, mat);
                        t.position.copy(ball.position);
                        t.position.x += (Math.random() - 0.5) * 0.5;
                        t.position.z += (Math.random() - 0.5) * 0.5;
                        scene.add(t);
                        trail.push({
                            mesh: t,
                            life: 0.6 + Math.random() * 0.4,
                            vx: (Math.random() - 0.5) * 2,
                            vy: Math.random() * 3,
                            vz: (Math.random() - 0.5) * 2
                        });
                    }
                }
                // Update trail particles
                for (let i = trail.length - 1; i >= 0; i--) {
                    const p = trail[i];
                    p.life -= delta * 2;
                    p.mesh.scale.multiplyScalar(0.96);
                    p.mesh.material.opacity = Math.max(0, p.life * 0.7);
                    p.mesh.position.x += p.vx * delta;
                    p.mesh.position.y += p.vy * delta;
                    p.mesh.position.z += p.vz * delta;
                    p.vy -= delta * 8; // gravity
                    if (p.life <= 0) {
                        scene.remove(p.mesh);
                        trail.splice(i, 1);
                    }
                }

                // Follow ball smoothly
                const targetCameraX = ball.position.x + 20;
                const targetCameraZ = ball.position.z + 20;
                camera.position.x += (targetCameraX - camera.position.x) * (delta * 5);
                camera.position.z += (targetCameraZ - camera.position.z) * (delta * 5);

                // Clouds follow the ball
                if (cloudParticles) {
                    cloudParticles.position.x += (ball.position.x - cloudParticles.position.x) * (delta * 2);
                    cloudParticles.position.z += (ball.position.z - cloudParticles.position.z) * (delta * 2);
                }

                // Ensure there are always enough platforms ahead
                const aheadCount = platforms.filter(p =>
                    p.position.x > ball.position.x || p.position.z < ball.position.z
                ).length;
                while (aheadCount < 20 && platforms.length < 80) {
                    spawnPlatform();
                }

                // Crystal interaction
                crystals.forEach((c, index) => {
                    c.rotation.y += delta * 3;
                    if (Math.abs(c.position.x - ball.position.x) < 1.2 && Math.abs(c.position.z - ball.position.z) < 1.2) {
                        scene.remove(c);
                        crystals.splice(index, 1);
                        score += 5;
                        document.getElementById('score').textContent = score;
                        audio.crystal();
                    }
                });

                // Cleanup far behind
                while (platforms.length > 0) {
                    const p = platforms[0];
                    if (p.position.x < ball.position.x - 25 && p.position.z > ball.position.z + 25) {
                        platforms.shift();
                        if (p.userData.sideGroup) scene.remove(p.userData.sideGroup);
                        scene.remove(p);
                    } else {
                        break;
                    }
                }
                crystals.forEach((c, index) => {
                    if (c.position.x < ball.position.x - 20 || c.position.z > ball.position.z + 20) {
                        scene.remove(c);
                        crystals.splice(index, 1);
                    }
                });
            }
            renderer.render(scene, camera);
        }

        function endGame() {
            if (isGameOver) return;
            isGameOver = true;
            audio.gameOver();
            document.getElementById('final-score').textContent = score;
            WCGames.gameOver(score);
        }

        function reset() {
            platforms.forEach(p => {
                if (p.userData.sideGroup) scene.remove(p.userData.sideGroup);
                scene.remove(p);
            });
            platforms = [];
            crystals.forEach(c => scene.remove(c));
            crystals = [];
            trail.forEach(t => scene.remove(t.mesh));
            trail = [];
            score = 0;
            document.getElementById('score').textContent = '0';
            ball.position.set(0, PLAT_HEIGHT / 2 + 0.8, 0);
            camera.position.set(20, 20, 20);
            platformCount = 0;
            createPlatform(0, 0, 0);
            for (let i = 0; i < 30; i++) spawnPlatform();
            direction = 'x';
            isGameOver = false;
        }

        WCGames.init({
            id: 'zigzag',
            onStart: () => {
                audio.init();
                isStarted = true;
                reset();
                clock.start();
            }
        });

        init();

        // Prevent context menu globally
        window.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
    <script src="/shared/i18n.js"></script>
</body>

</html>
