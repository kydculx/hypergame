<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Domino Match</title>
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/wcgames-style.css">
    <style>
        :root {
            --theme-color: #e63946;
            --theme-glow: rgba(230, 57, 70, 0.4);
        }

        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(160deg, #ffecd2 0%, #fcb69f 50%, #ff9a9e 100%);
            font-family: 'Bubblegum Sans', cursive;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: none;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10000;
        }

        #score {
            font-size: 72px;
            color: #fff;
            text-shadow:
                3px 3px 0 #e63946,
                -1px -1px 0 #f72585,
                0 4px 8px rgba(0, 0, 0, 0.25);
            letter-spacing: 2px;
        }

        #combo {
            font-size: 22px;
            color: #fff;
            background: linear-gradient(135deg, #ffb703, #f72585);
            display: none;
            padding: 4px 16px;
            border-radius: 20px;
            margin: 8px auto 0;
            width: fit-content;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
        }

        #controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            gap: 16px;
            z-index: 10;
        }

        .control-btn {
            border-radius: 22px;
            box-sizing: border-box;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            padding: 8px;
            width: 80px;
            height: 110px;
            border: 3px solid rgba(255, 255, 255, 0.5);
        }

        .control-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 rgba(0, 0, 0, 0) !important;
        }

        .control-btn svg {
            filter: drop-shadow(1px 2px 2px rgba(0, 0, 0, 0.25));
        }

        .btn-s {
            background: linear-gradient(180deg, #7ddaf5, #4cc9f0);
            box-shadow: 0 6px 0 #3ba0c0, 0 10px 12px rgba(0, 0, 0, 0.2);
        }

        .btn-s svg {
            height: 30px;
            width: auto;
        }

        .btn-m {
            background: linear-gradient(180deg, #ff5da0, #f72585);
            box-shadow: 0 6px 0 #bd1b65, 0 10px 12px rgba(0, 0, 0, 0.2);
        }

        .btn-m svg {
            height: 58px;
            width: auto;
        }

        .btn-l {
            background: linear-gradient(180deg, #ffd24d, #ffb703);
            box-shadow: 0 6px 0 #c28b02, 0 10px 12px rgba(0, 0, 0, 0.2);
        }

        .btn-l svg {
            height: 90px;
            width: auto;
        }

        /* Toy Store Popup Overrides */
        .wcg-overlay {
            background: rgba(255, 220, 200, 0.85) !important;
            backdrop-filter: blur(8px);
        }

        .wcg-popup {
            background: linear-gradient(160deg, #fff9f0, #ffe8d6) !important;
            border: 4px solid #e63946 !important;
            border-radius: 24px !important;
            box-shadow: 0 8px 0 #c0392b, 0 16px 30px rgba(0, 0, 0, 0.2) !important;
        }

        .wcg-popup h1 {
            color: #e63946 !important;
            text-shadow: 2px 2px 0 #ffb703 !important;
            font-family: 'Bubblegum Sans', cursive !important;
        }

        .wcg-popup p {
            color: #555 !important;
        }

        .wcg-popup button {
            background: linear-gradient(180deg, #ff6b6b, #e63946) !important;
            color: #fff !important;
            border: none !important;
            border-radius: 16px !important;
            padding: 14px 36px !important;
            font-family: 'Bubblegum Sans', cursive !important;
            font-size: 20px !important;
            box-shadow: 0 5px 0 #c0392b !important;
        }

        .wcg-popup button:active {
            transform: translateY(4px) !important;
            box-shadow: 0 1px 0 #c0392b !important;
        }
    </style>
    <script src="/shared/wcgames-core.js"></script>
</head>

<body>
    <div id="ui">
        <div id="score">0</div>
        <div id="combo">Combo x1</div>
    </div>

    <div id="controls">
        <div class="control-btn btn-s" id="btn-s">
            <svg viewBox="0 0 20 30" fill="none">
                <circle cx="10" cy="5" r="4.5" fill="white" />
                <rect x="5" y="10" width="10" height="10" rx="2" fill="white" />
                <rect x="5.5" y="21" width="4" height="9" rx="1.5" fill="white" />
                <rect x="10.5" y="21" width="4" height="9" rx="1.5" fill="white" />
                <circle cx="8" cy="5" r="0.9" fill="#333" />
                <circle cx="12" cy="5" r="0.9" fill="#333" />
            </svg>
        </div>
        <div class="control-btn btn-m" id="btn-m">
            <svg viewBox="0 0 30 53" fill="none">
                <circle cx="15" cy="7" r="6" fill="white" />
                <rect x="8" y="14" width="14" height="20" rx="3" fill="white" />
                <rect x="8.5" y="35" width="5" height="18" rx="2" fill="white" />
                <rect x="16.5" y="35" width="5" height="18" rx="2" fill="white" />
                <rect x="2" y="16" width="4.5" height="13" rx="2" fill="white" />
                <rect x="23.5" y="16" width="4.5" height="13" rx="2" fill="white" />
                <circle cx="12.5" cy="7" r="1.2" fill="#333" />
                <circle cx="17.5" cy="7" r="1.2" fill="#333" />
            </svg>
        </div>
        <div class="control-btn btn-l" id="btn-l">
            <svg viewBox="0 0 40 81" fill="none">
                <circle cx="20" cy="9" r="8" fill="white" />
                <rect x="9" y="18" width="22" height="32" rx="4" fill="white" />
                <rect x="10" y="51" width="7.5" height="30" rx="3" fill="white" />
                <rect x="22.5" y="51" width="7.5" height="30" rx="3" fill="white" />
                <rect x="1" y="21" width="6" height="20" rx="3" fill="white" />
                <rect x="33" y="21" width="6" height="20" rx="3" fill="white" />
                <circle cx="16" cy="9" r="1.6" fill="#333" />
                <circle cx="24" cy="9" r="1.6" fill="#333" />
            </svg>
        </div>
    </div>

    <div id="start-screen" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="title">DOMINO MATCH</h1>
            <p data-i18n="instruction">Choose the right domino size<br>to bridge the gap!</p>
            <button onclick="WCGames.start()" data-i18n="play">PLAY</button>
        </div>
    </div>

    <div id="game-over" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="game_over">GAME OVER!</h1>
            <p><span data-i18n="final_score">Score: </span><span id="final-score">0</span></p>
            <button onclick="WCGames.restart()" data-i18n="play_again">RETRY</button>
        </div>
    </div>

    <!-- Include Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ============================================================
        // Audio System (Web Audio API for rich synthesized sounds)
        // ============================================================
        class AudioManager {
            constructor() {
                this.ctx = null;
                this.comboNote = 0;
                // Pentatonic music box scale (2 octaves)
                this.scale = [523.25, 587.33, 659.25, 783.99, 880.00, 1046.50, 1174.66, 1318.51, 1567.98, 1760.00];
            }
            init() {
                if (this.ctx) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }

            // Xylophone-like tone (triangle + harmonic shimmer)
            playXylophone(freq, duration, vol = 0.12) {
                if (!this.ctx) return;
                if (this.ctx.state === 'suspended') this.ctx.resume();
                const t = this.ctx.currentTime;
                const osc1 = this.ctx.createOscillator();
                const gain1 = this.ctx.createGain();
                osc1.type = 'triangle';
                osc1.frequency.value = freq;
                gain1.gain.setValueAtTime(vol, t);
                gain1.gain.exponentialRampToValueAtTime(0.001, t + duration);
                osc1.connect(gain1);
                gain1.connect(this.ctx.destination);
                osc1.start(t);
                osc1.stop(t + duration);

                // Shimmer overtone (3x freq)
                const osc2 = this.ctx.createOscillator();
                const gain2 = this.ctx.createGain();
                osc2.type = 'sine';
                osc2.frequency.value = freq * 3;
                gain2.gain.setValueAtTime(vol * 0.3, t);
                gain2.gain.exponentialRampToValueAtTime(0.001, t + duration * 0.5);
                osc2.connect(gain2);
                gain2.connect(this.ctx.destination);
                osc2.start(t);
                osc2.stop(t + duration);
            }

            // Bright toy "pop" when placing
            playPlace() {
                this.playXylophone(880, 0.15, 0.1);
            }

            // Wooden block clack
            playClack() {
                if (!this.ctx) return;
                if (this.ctx.state === 'suspended') this.ctx.resume();
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 1200;
                filter.Q.value = 2;
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, t);
                osc.frequency.exponentialRampToValueAtTime(2000, t + 0.02);
                gain.gain.setValueAtTime(0.25, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(t);
                osc.stop(t + 0.06);
            }

            // Music box ascending note
            playSuccess() {
                const degree = Math.min(this.comboNote, this.scale.length - 1);
                this.playXylophone(this.scale[degree], 0.35, 0.15);
                this.comboNote++;
            }

            resetCombo() {
                this.comboNote = 0;
            }

            // Toy trombone "wah-wah"
            playFail() {
                if (!this.ctx) return;
                if (this.ctx.state === 'suspended') this.ctx.resume();
                const t = this.ctx.currentTime;
                const osc1 = this.ctx.createOscillator();
                const gain1 = this.ctx.createGain();
                osc1.type = 'triangle';
                osc1.frequency.setValueAtTime(400, t);
                osc1.frequency.exponentialRampToValueAtTime(250, t + 0.25);
                gain1.gain.setValueAtTime(0.2, t);
                gain1.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                osc1.connect(gain1);
                gain1.connect(this.ctx.destination);
                osc1.start(t);
                osc1.stop(t + 0.3);

                const osc2 = this.ctx.createOscillator();
                const gain2 = this.ctx.createGain();
                osc2.type = 'triangle';
                osc2.frequency.setValueAtTime(300, t + 0.2);
                osc2.frequency.exponentialRampToValueAtTime(150, t + 0.6);
                gain2.gain.setValueAtTime(0.001, t);
                gain2.gain.linearRampToValueAtTime(0.2, t + 0.2);
                gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
                osc2.connect(gain2);
                gain2.connect(this.ctx.destination);
                osc2.start(t);
                osc2.stop(t + 0.6);
            }
        }
        const audio = new AudioManager();

        // ============================================================
        // Game State & Config
        // ============================================================
        let gameState = 'START';
        let score = 0;
        let combo = 0;

        const dominos = [];
        let currentFocusIndex = 0;
        let cameraLookAtX = 0;
        let cameraLookAtZ = 0;
        let cameraYaw = 0;

        // --- GAME SETTINGS ---
        const BASE_FALL_SPEED = 0.04;
        const BASE_FOV = 10;              // 줌 레벨 (낮을수록 가까이)
        const CAMERA_OFFSET = { x: 30, y: 45, z: 30 };

        // Collision Settings
        const HIT_CHECK_ANGLE = -0.8;     // 충돌 판정 시작 각도 (라디안)
        const HIT_TOLERANCE = 0.6;        // 키 vs 거리 여유값 (높을수록 관대)
        const HIT_LEAN_ANGLE = -1.5;      // 성공 시 기댐 각도

        // Path Curve Settings
        const TURN_CHANCE = 0.5;          // 방향 전환 확률 (0~1)
        const TURN_MIN_COUNT = 10;         // 전환 시작 최소 도미노 수
        const TURN_STRENGTH = 2.5;        // 전환 시 각도 변화량
        const DRIFT_AMOUNT = 0.3;         // 매 스텝 미세 흔들림
        const MAX_YAW = 5.2;              // 최대 곡선 각도 (라디안)
        const YAW_LERP_SPEED = 0.2;       // 보간 속도 (높을수록 급커브)
        const PATH_SOFT_LIMIT = 8;        // 부드러운 경계 복귀 시작
        const PATH_HARD_LIMIT = 12;       // 강제 경계 복귀

        // Domino Config
        const BASE_COLOR = 0xe0e0e0;

        const SIZES = {
            'S': { color: 0x4cc9f0, height: 2, gap: 1.9, fallSpeed: BASE_FALL_SPEED },
            'M': { color: 0xf72585, height: 3, gap: 2.9, fallSpeed: BASE_FALL_SPEED - 0.01 },
            'L': { color: 0xffb703, height: 4, gap: 3.9, fallSpeed: BASE_FALL_SPEED - 0.02 }
        };

        // ============================================================
        // Three.js Setup
        // ============================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xfff5ee);


        const REF_ASPECT = 16 / 9;
        const aspect = window.innerWidth / window.innerHeight;

        // Horizontal FOV Lock (same as Geometry Dash)
        function calcLockedFOV(asp) {
            const halfVFOVRad = (BASE_FOV / 2) * Math.PI / 180;
            const tanHalfHFOV = Math.tan(halfVFOVRad) * REF_ASPECT;
            const newHalfVFOVRad = Math.atan(tanHalfHFOV / asp);
            return (newHalfVFOVRad * 2) * 180 / Math.PI;
        }

        const camera = new THREE.PerspectiveCamera(calcLockedFOV(aspect), aspect, 0.1, 1000);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, -10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);
        scene.add(dirLight.target);

        // ============================================================
        // Toy Store Environment
        // ============================================================

        // --- Wooden Floor ---
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshPhysicalMaterial({
            color: 0xdeb887,       // BurlyWood
            metalness: 0.0,
            roughness: 0.7
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.05;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- Colorful Toy Particles ---
        const TOY_COLORS = [0xe63946, 0x4cc9f0, 0xffb703, 0x06d6a0, 0xf72585, 0x7209b7];
        const toyGeos = [
            new THREE.BoxGeometry(0.18, 0.18, 0.18),          // Cubes
            new THREE.SphereGeometry(0.10, 8, 8),              // Balls
            new THREE.OctahedronGeometry(0.12, 0),             // Diamonds
            new THREE.TetrahedronGeometry(0.14, 0),            // Pyramids
        ];

        const particleCount = 50;  // Per color group
        const dummy = new THREE.Object3D();
        const allParticleGroups = [];
        const particleData = [];

        TOY_COLORS.forEach((color, ci) => {
            const geo = toyGeos[ci % toyGeos.length];
            const mat = new THREE.MeshPhysicalMaterial({
                color: color,
                metalness: 0.1,
                roughness: 0.3,
                clearcoat: 0.8,
                transparent: true,
                opacity: 0.7
            });
            const mesh = new THREE.InstancedMesh(geo, mat, particleCount);

            for (let i = 0; i < particleCount; i++) {
                const x = (Math.random() - 0.5) * 80;
                const y = Math.random() * 30 + 2;
                const z = (Math.random() - 0.5) * 80;
                const scale = 0.6 + Math.random() * 1.2;

                dummy.position.set(x, y, z);
                dummy.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                dummy.scale.set(scale, scale, scale);
                dummy.updateMatrix();
                mesh.setMatrixAt(i, dummy.matrix);

                particleData.push({
                    group: ci,
                    idx: i,
                    x, y, z, scale,
                    rx: dummy.rotation.x, ry: dummy.rotation.y, rz: dummy.rotation.z,
                    rspeed: (Math.random() - 0.5) * 0.015,
                    yspeed: 0.005 + Math.random() * 0.015,
                    amp: 0.1 + Math.random() * 0.3,
                    phase: Math.random() * Math.PI * 2
                });
            }

            scene.add(mesh);
            allParticleGroups.push(mesh);
        });

        // --- Scattered Toy Blocks (static decoration) ---
        const blockColors = [0xe63946, 0x4cc9f0, 0xffb703, 0x06d6a0, 0xf72585, 0x7209b7, 0xff6b6b, 0x48bfe3];
        const toyBlocks = [];

        for (let i = 0; i < 40; i++) {
            const size = 0.3 + Math.random() * 0.6;
            const bGeo = Math.random() > 0.5
                ? new THREE.BoxGeometry(size, size, size)
                : new THREE.CylinderGeometry(size * 0.5, size * 0.5, size, 8);
            const bMat = new THREE.MeshPhysicalMaterial({
                color: blockColors[Math.floor(Math.random() * blockColors.length)],
                metalness: 0.05,
                roughness: 0.4,
                clearcoat: 0.5
            });
            const block = new THREE.Mesh(bGeo, bMat);
            const angle = Math.random() * Math.PI * 2;
            const dist = 6 + Math.random() * 12;
            block.position.set(
                Math.cos(angle) * dist,
                size / 2,
                Math.sin(angle) * dist
            );
            block.rotation.set(
                Math.random() * 0.3,
                Math.random() * Math.PI * 2,
                Math.random() * 0.3
            );
            block.castShadow = true;
            block.receiveShadow = true;
            scene.add(block);
            toyBlocks.push(block);
        }

        // ============================================================
        // Human Figure Builder
        // ============================================================
        const SKIN_COLOR = 0xffdbac;
        const SHOE_COLOR = 0x333333;

        function buildHumanParts(h, outfitColor, isGapTarget) {
            // Proportions scaled to total height h
            const headR = h * 0.10;
            const bodyH = h * 0.32;
            const bodyTopW = h * 0.10;
            const bodyBotW = h * 0.12;
            const legH = h * 0.28;
            const legR = h * 0.04;
            const armH = h * 0.26;
            const armR = h * 0.03;
            const footH = h * 0.04;
            const neckGap = h * 0.02;

            const parts = [];

            // --- Materials ---
            let outfitMat, skinMat, shoeMat;
            if (isGapTarget) {
                // Ghost wireframe for gap slots
                const wireMat = new THREE.MeshBasicMaterial({
                    color: 0x9ca3af,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.35
                });
                outfitMat = wireMat;
                skinMat = wireMat;
                shoeMat = wireMat;
            } else {
                outfitMat = new THREE.MeshPhysicalMaterial({
                    color: outfitColor,
                    metalness: 0.1,
                    roughness: 0.35,
                    clearcoat: 0.6,
                    clearcoatRoughness: 0.2
                });
                skinMat = new THREE.MeshPhysicalMaterial({
                    color: SKIN_COLOR,
                    metalness: 0.0,
                    roughness: 0.6
                });
                shoeMat = new THREE.MeshPhysicalMaterial({
                    color: SHOE_COLOR,
                    metalness: 0.1,
                    roughness: 0.4
                });
            }

            // --- Feet (shoes) ---
            const shoeGeo = new THREE.BoxGeometry(legR * 3, footH, legR * 4);
            const leftShoe = new THREE.Mesh(shoeGeo, shoeMat);
            leftShoe.position.set(-bodyBotW * 0.4, footH / 2, legR * 0.5);
            leftShoe.castShadow = !isGapTarget;
            parts.push(leftShoe);

            const rightShoe = new THREE.Mesh(shoeGeo, shoeMat);
            rightShoe.position.set(bodyBotW * 0.4, footH / 2, legR * 0.5);
            rightShoe.castShadow = !isGapTarget;
            parts.push(rightShoe);

            // --- Legs ---
            const legGeo = new THREE.CylinderGeometry(legR, legR * 1.1, legH, 8);
            const leftLeg = new THREE.Mesh(legGeo, outfitMat);
            leftLeg.position.set(-bodyBotW * 0.4, footH + legH / 2, 0);
            leftLeg.castShadow = !isGapTarget;
            parts.push(leftLeg);

            const rightLeg = new THREE.Mesh(legGeo, outfitMat);
            rightLeg.position.set(bodyBotW * 0.4, footH + legH / 2, 0);
            rightLeg.castShadow = !isGapTarget;
            parts.push(rightLeg);

            // --- Body (torso) ---
            const bodyGeo = new THREE.CylinderGeometry(bodyTopW, bodyBotW, bodyH, 10);
            const body = new THREE.Mesh(bodyGeo, outfitMat);
            body.position.set(0, footH + legH + bodyH / 2, 0);
            body.castShadow = !isGapTarget;
            parts.push(body);

            // --- Arms ---
            const armGeo = new THREE.CylinderGeometry(armR, armR * 1.1, armH, 8);
            const leftArm = new THREE.Mesh(armGeo, skinMat);
            leftArm.position.set(-bodyBotW - armR * 2.5, footH + legH + bodyH * 0.55, 0);
            leftArm.rotation.z = 0.15;
            leftArm.castShadow = !isGapTarget;
            parts.push(leftArm);

            const rightArm = new THREE.Mesh(armGeo, skinMat);
            rightArm.position.set(bodyBotW + armR * 2.5, footH + legH + bodyH * 0.55, 0);
            rightArm.rotation.z = -0.15;
            rightArm.castShadow = !isGapTarget;
            parts.push(rightArm);

            // --- Hands (small spheres) ---
            const handGeo = new THREE.SphereGeometry(armR * 1.3, 8, 8);
            const leftHand = new THREE.Mesh(handGeo, skinMat);
            leftHand.position.set(
                leftArm.position.x - Math.sin(0.15) * armH / 2,
                leftArm.position.y - Math.cos(0.15) * armH / 2,
                0
            );
            parts.push(leftHand);

            const rightHand = new THREE.Mesh(handGeo, skinMat);
            rightHand.position.set(
                rightArm.position.x + Math.sin(0.15) * armH / 2,
                rightArm.position.y - Math.cos(0.15) * armH / 2,
                0
            );
            parts.push(rightHand);

            // --- Head ---
            const headGeo = new THREE.SphereGeometry(headR, 14, 14);
            const head = new THREE.Mesh(headGeo, skinMat);
            const headY = footH + legH + bodyH + neckGap + headR;
            head.position.set(0, headY, 0);
            head.castShadow = !isGapTarget;
            parts.push(head);

            // --- Eyes (two tiny dark spheres) ---
            if (!isGapTarget) {
                const eyeGeo = new THREE.SphereGeometry(headR * 0.15, 8, 8);
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
                const eyeY = headY + headR * 0.1;
                const eyeZ = headR * 0.85;

                const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
                leftEye.position.set(-headR * 0.3, eyeY, eyeZ);
                parts.push(leftEye);

                const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
                rightEye.position.set(headR * 0.3, eyeY, eyeZ);
                parts.push(rightEye);

                // --- Mouth (small curve hint — a tiny flattened sphere) ---
                const mouthGeo = new THREE.SphereGeometry(headR * 0.12, 8, 4);
                const mouthMat = new THREE.MeshBasicMaterial({ color: 0xcc6666 });
                const mouth = new THREE.Mesh(mouthGeo, mouthMat);
                mouth.position.set(0, headY - headR * 0.25, eyeZ);
                mouth.scale.set(2, 0.6, 0.5);
                parts.push(mouth);
            }

            return { parts, outfitMat, skinMat, shoeMat };
        }

        // ============================================================
        // Domino Class (Human Figure)
        // ============================================================
        class Domino {
            constructor(x, z, yaw, sizeType, isGapTarget = false, targetReqSize = null, speedMultiplier = 1.0) {
                this.x = x;
                this.z = z;
                this.yaw = yaw;
                this.sizeType = sizeType;
                this.config = SIZES[sizeType];
                this.isGapTarget = isGapTarget;
                this.isActive = !isGapTarget;
                this.targetReqSize = targetReqSize;

                this.effectiveFallSpeed = this.config.fallSpeed * speedMultiplier;

                this.state = 'IDLE';
                this.angle = 0;
                this.targetAngle = -(Math.PI / 2 - 0.2);

                // Build human figure as a Group
                const outfitColor = isGapTarget ? 0xcccccc : this.config.color;
                const built = buildHumanParts(this.config.height, outfitColor, isGapTarget);
                this.bodyParts = built.parts;
                this.outfitMat = built.outfitMat;
                this.skinMat = built.skinMat;
                this.shoeMat = built.shoeMat;

                this.mesh = new THREE.Group();
                this.bodyParts.forEach(p => this.mesh.add(p));
                this.mesh.position.set(x, 0, z);
                this.mesh.rotation.y = yaw;

                // Shadow track underneath
                const trackGeo = new THREE.PlaneGeometry(this.config.height * 1.5, this.config.gap * 1.5);
                const trackMat = new THREE.ShadowMaterial({ opacity: 0.5 });

                this.trackMesh = new THREE.Mesh(trackGeo, trackMat);
                this.trackMesh.rotation.x = -Math.PI / 2;
                this.trackMesh.rotation.z = -yaw;
                this.trackMesh.position.set(x, -0.01 - (Math.random() * 0.01), z);
                this.trackMesh.receiveShadow = true;

                if (!isGapTarget) {
                    scene.add(this.trackMesh);
                }

                scene.add(this.mesh);
            }

            place(playerChosenSize) {
                if (this.state !== 'IDLE' || !this.isGapTarget) return false;

                this.sizeType = playerChosenSize;
                this.config = SIZES[playerChosenSize];

                // Remove old ghost body parts
                while (this.mesh.children.length > 0) {
                    const child = this.mesh.children[0];
                    this.mesh.remove(child);
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) child.material.dispose();
                }

                // Build new solid human with chosen size & color
                const built = buildHumanParts(this.config.height, this.config.color, false);
                this.bodyParts = built.parts;
                this.outfitMat = built.outfitMat;
                this.skinMat = built.skinMat;
                this.shoeMat = built.shoeMat;
                this.bodyParts.forEach(p => this.mesh.add(p));

                this.isGapTarget = false;
                this.wasGapTarget = true;
                this.isActive = true;

                scene.add(this.trackMesh);

                audio.playPlace();
                return true;
            }

            triggerFall() {
                if (this.state !== 'IDLE' || !this.isActive) return;
                this.state = 'FALLING';
                this.hitNext = false;
            }

            update() {
                if (this.state === 'FALLING') {
                    this.angle -= this.effectiveFallSpeed;

                    this.mesh.rotation.set(0, this.yaw, 0);
                    this.mesh.rotateX(this.angle);

                    if (this.angle < HIT_CHECK_ANGLE && !this.hitNext) {
                        this.hitNext = true;

                        const myIdx = dominos.indexOf(this);
                        const nextDomino = dominos[myIdx + 1];

                        if (nextDomino && nextDomino.state === 'IDLE') {
                            const dx = nextDomino.x - this.x;
                            const dz = nextDomino.z - this.z;
                            const dist = Math.sqrt(dx * dx + dz * dz);

                            if (this.config.height < dist - HIT_TOLERANCE || !nextDomino.isActive || (nextDomino.targetReqSize && nextDomino.targetReqSize !== nextDomino.sizeType)) {
                                this.targetAngle = -Math.PI / 2;
                                audio.playClack();
                                triggerGameOver();
                            } else {
                                this.targetAngle = HIT_LEAN_ANGLE;

                                score += 1;
                                document.getElementById('score').textContent = score;
                                WCGames.submitScore(score);

                                if (nextDomino.wasGapTarget) {
                                    document.getElementById('score').classList.add('pop');
                                    setTimeout(() => document.getElementById('score').classList.remove('pop'), 200);
                                    audio.playSuccess();
                                }

                                nextDomino.triggerFall();
                                audio.playClack();
                            }
                        } else if (!nextDomino) {
                            this.targetAngle = -Math.PI / 2;
                            audio.playClack();
                            triggerGameOver();
                        }
                    }

                    if (this.targetAngle !== undefined && this.angle <= this.targetAngle) {
                        this.angle = this.targetAngle;
                        this.mesh.rotation.set(0, this.yaw, 0);
                        this.mesh.rotateX(this.angle);
                        this.state = 'FALLEN';
                    }
                }
            }

            dispose() {
                scene.remove(this.mesh);
                if (this.trackMesh) scene.remove(this.trackMesh);
                this.mesh.traverse(child => {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) child.material.dispose();
                });
                if (this.trackMesh) {
                    this.trackMesh.geometry.dispose();
                    this.trackMesh.material.dispose();
                }
            }
        }

        // ============================================================
        // Level Generation
        // ============================================================
        let lastX = 0;
        let lastZ = 0;
        let lastYaw = 0;
        let targetYaw = 0;
        let currentSize = 'M';
        let streak = 0;
        let streakTarget = 1 + Math.floor(Math.random() * 4);
        let totalGenerated = 0;

        function generateLevel(paramLength = 100) {
            dominos.forEach(d => d.dispose());
            dominos.length = 0;
            lastX = 0;
            lastZ = 0;
            lastYaw = 0;
            targetYaw = 0;
            totalGenerated = 0;

            currentSize = ['S', 'M', 'L'][Math.floor(Math.random() * 3)];
            streak = 0;
            streakTarget = 1 + Math.floor(Math.random() * 4);

            dominos.push(new Domino(lastX, lastZ, lastYaw, currentSize, false));
            totalGenerated++;

            spawnDominos(paramLength);
        }

        function spawnDominos(count) {
            for (let i = 0; i < count; i++) {
                totalGenerated++;

                let gapProbability = 0;
                if (totalGenerated > 10) {
                    gapProbability = Math.min(0.45, 0.15 + (totalGenerated * 0.002));
                }

                let speedMultiplier = Math.min(2.5, 1.0 + (totalGenerated * 0.005));

                // Randomize size: change after a random run length (1~4)
                streak++;
                if (streak >= streakTarget) {
                    const others = ['S', 'M', 'L'].filter(s => s !== currentSize);
                    currentSize = others[Math.floor(Math.random() * others.length)];
                    streak = 0;
                    streakTarget = 1 + Math.floor(Math.random() * 4); // Next run: 1~4
                }

                let prevSize = dominos[dominos.length - 1].targetReqSize || dominos[dominos.length - 1].sizeType;
                let gap = SIZES[prevSize].gap;

                // Path curving
                if (Math.random() < TURN_CHANCE && totalGenerated > TURN_MIN_COUNT) {
                    targetYaw += (Math.random() - 0.5) * TURN_STRENGTH;
                }
                targetYaw += (Math.random() - 0.5) * DRIFT_AMOUNT;

                targetYaw = Math.max(-MAX_YAW, Math.min(MAX_YAW, targetYaw));

                if (lastX > PATH_SOFT_LIMIT) {
                    targetYaw = Math.max(0.2, targetYaw);
                } else if (lastX < -PATH_SOFT_LIMIT) {
                    targetYaw = Math.min(-0.2, targetYaw);
                }

                if (lastX > PATH_HARD_LIMIT) {
                    targetYaw = 1.0;
                } else if (lastX < -PATH_HARD_LIMIT) {
                    targetYaw = -1.0;
                }

                lastYaw += (targetYaw - lastYaw) * YAW_LERP_SPEED;

                lastX += -Math.sin(lastYaw) * gap;
                lastZ += -Math.cos(lastYaw) * gap;

                const isTurningSharply = Math.abs(targetYaw - lastYaw) > 0.5;
                const isTarget = Math.random() < gapProbability && streak > 0 && !isTurningSharply;

                if (isTarget) {
                    dominos.push(new Domino(lastX, lastZ, lastYaw, prevSize, true, prevSize, speedMultiplier));
                    streak = 0;
                } else {
                    dominos.push(new Domino(lastX, lastZ, lastYaw, currentSize, false, null, speedMultiplier));
                    streak++;
                }
            }
        }

        // ============================================================
        // Game Over & Restart (via WCGames)
        // ============================================================
        function triggerGameOver() {
            if (gameState === 'OVER') return;
            gameState = 'OVER';
            audio.playFail();
            WCGames.gameOver(score);
        }

        function startGame() {
            gameState = 'PLAYING';
            generateLevel(100);

            // Snap camera to the first domino instantly
            if (dominos.length > 0) {
                const firstD = dominos[0];
                cameraLookAtX = firstD.x;
                cameraLookAtZ = firstD.z;
                cameraYaw = firstD.yaw;
                camera.position.set(cameraLookAtX + CAMERA_OFFSET.x, CAMERA_OFFSET.y, cameraLookAtZ + CAMERA_OFFSET.z);
                camera.lookAt(cameraLookAtX, 2, cameraLookAtZ);
            }

            // Kick off the first domino
            audio.init();
            audio.resetCombo();
            setTimeout(() => {
                if (dominos.length > 0) dominos[0].triggerFall();
            }, 500);
        }

        function restartGame() {
            // Reset score & UI
            score = 0;
            combo = 0;
            currentFocusIndex = 0;
            document.getElementById('score').textContent = score;

            // Reset Audio Combo
            audio.resetCombo();

            // Generate new level
            generateLevel(100);

            // Instantly snap camera to start
            if (dominos.length > 0) {
                const firstD = dominos[0];
                cameraLookAtX = firstD.x;
                cameraLookAtZ = firstD.z;
                cameraYaw = firstD.yaw;
                camera.position.set(cameraLookAtX + CAMERA_OFFSET.x, CAMERA_OFFSET.y, cameraLookAtZ + CAMERA_OFFSET.z);
                camera.lookAt(cameraLookAtX, 2, cameraLookAtZ);

                // Start falling
                setTimeout(() => {
                    if (dominos.length > 0) dominos[0].triggerFall();
                }, 500);
            }

            gameState = 'PLAYING';
        }

        // ============================================================
        // Player Input
        // ============================================================
        function handlePlayerInput(sizeStr) {
            if (gameState !== 'PLAYING') return;

            let targetIdx = -1;
            for (let i = currentFocusIndex; i < dominos.length; i++) {
                if (dominos[i].isGapTarget) {
                    targetIdx = i;
                    break;
                }
            }

            if (targetIdx !== -1) {
                const targetDomino = dominos[targetIdx];
                targetDomino.place(sizeStr);
                audio.playPlace();
            }
        }

        // ============================================================
        // Camera
        // ============================================================
        function updateFocusCamera() {
            if (currentFocusIndex >= dominos.length) return;

            let leadDomino = dominos[0];
            for (let i = 0; i < dominos.length; i++) {
                if (dominos[i].state !== 'IDLE') {
                    leadDomino = dominos[i];
                    currentFocusIndex = i;
                } else {
                    break;
                }
            }

            let targetX = leadDomino.x;
            let targetZ = leadDomino.z;
            let tgtYaw = leadDomino.yaw;

            cameraLookAtX += (targetX - cameraLookAtX) * 0.04;
            cameraLookAtZ += (targetZ - cameraLookAtZ) * 0.04;
            cameraYaw += (tgtYaw - cameraYaw) * 0.04;

            dirLight.position.set(cameraLookAtX + 20, 30, cameraLookAtZ - 20);
            dirLight.target.position.set(cameraLookAtX, 0, cameraLookAtZ);
            dirLight.target.updateMatrixWorld();

            camera.position.x = cameraLookAtX + CAMERA_OFFSET.x;
            camera.position.y = CAMERA_OFFSET.y;
            camera.position.z = cameraLookAtZ + CAMERA_OFFSET.z;

            camera.lookAt(cameraLookAtX, 2, cameraLookAtZ);
        }

        // ============================================================
        // Input Listeners
        // ============================================================
        const btnS = document.getElementById('btn-s');
        const btnM = document.getElementById('btn-m');
        const btnL = document.getElementById('btn-l');

        btnS.addEventListener('pointerdown', (e) => { e.preventDefault(); handlePlayerInput('S'); });
        btnM.addEventListener('pointerdown', (e) => { e.preventDefault(); handlePlayerInput('M'); });
        btnL.addEventListener('pointerdown', (e) => { e.preventDefault(); handlePlayerInput('L'); });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyZ' || e.code === 'ArrowLeft') handlePlayerInput('S');
            if (e.code === 'KeyX' || e.code === 'ArrowDown') handlePlayerInput('M');
            if (e.code === 'KeyC' || e.code === 'ArrowRight') handlePlayerInput('L');
        });

        window.addEventListener('resize', () => {
            const newAspect = window.innerWidth / window.innerHeight;
            camera.aspect = newAspect;
            camera.fov = calcLockedFOV(newAspect);
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============================================================
        // Animation Loop
        // ============================================================
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            // Animate Toy Particles (multi-group)
            const totalParticles = particleData.length;
            for (let i = 0; i < totalParticles; i++) {
                let pd = particleData[i];
                pd.y += pd.yspeed;
                pd.rx += pd.rspeed;
                pd.ry += pd.rspeed;

                if (pd.y > 35) pd.y = 2;

                let curX = pd.x + Math.sin(time + pd.phase) * pd.amp;
                let curZ = pd.z + Math.cos(time + pd.phase) * pd.amp;

                if (curX < cameraLookAtX - 40) pd.x += 80;
                if (curX > cameraLookAtX + 40) pd.x -= 80;
                if (curZ < cameraLookAtZ - 40) pd.z += 80;
                if (curZ > cameraLookAtZ + 40) pd.z -= 80;

                dummy.position.set(curX, pd.y, curZ);
                dummy.rotation.set(pd.rx, pd.ry, pd.rz);
                dummy.scale.set(pd.scale, pd.scale, pd.scale);
                dummy.updateMatrix();
                allParticleGroups[pd.group].setMatrixAt(pd.idx, dummy.matrix);
            }
            allParticleGroups.forEach(g => { g.instanceMatrix.needsUpdate = true; });

            // Move floor and toy blocks to follow camera
            floor.position.x = cameraLookAtX;
            floor.position.z = cameraLookAtZ;

            if (gameState === 'PLAYING') {
                dominos.forEach(d => d.update());
                updateFocusCamera();

                // Endless Generation
                if (dominos.length - currentFocusIndex < 30) {
                    spawnDominos(20);
                }

                // Cleanup old dominos behind camera
                if (currentFocusIndex > 20) {
                    const toRemove = dominos.splice(0, 10);
                    toRemove.forEach(d => d.dispose());
                    currentFocusIndex -= 10;
                }

            } else if (gameState === 'START') {
                // Pan camera slowly around the first domino
                if (dominos.length > 0) {
                    const firstD = dominos[0];
                    const t = Date.now() * 0.0005;

                    cameraLookAtX = firstD.x;
                    cameraLookAtZ = firstD.z;

                    const panX = Math.sin(t) * 10;
                    const panZ = Math.cos(t) * 10;

                    camera.position.x = cameraLookAtX + CAMERA_OFFSET.x + panX;
                    camera.position.y = CAMERA_OFFSET.y;
                    camera.position.z = cameraLookAtZ + CAMERA_OFFSET.z + panZ;
                    camera.lookAt(cameraLookAtX, 2, cameraLookAtZ);
                }
            }

            renderer.render(scene, camera);
        }

        // ============================================================
        // WCGames Core Integration
        // ============================================================
        WCGames.init({
            id: 'domino',
            onStart: () => {
                audio.init();
                startGame();
            },
            onRestart: () => {
                restartGame();
            },
            onGameOver: (s) => {
                gameState = 'OVER';
            }
        });

        generateLevel(20); // Initial background state for start screen
        animate();
    </script>
