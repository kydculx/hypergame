<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffecd2"/>
      <stop offset="50%" stop-color="#fcb69f"/>
      <stop offset="100%" stop-color="#ff9a9e"/>
    </linearGradient>
    <linearGradient id="floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#deb887"/>
      <stop offset="100%" stop-color="#c4a06a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Wooden Floor -->
  <rect x="0" y="200" width="400" height="100" fill="url(#floor)" opacity="0.6"/>
  <line x1="0" y1="200" x2="400" y2="200" stroke="#b8956a" stroke-width="1" opacity="0.4"/>

  <!-- Toy blocks scattered -->
  <rect x="30" y="220" width="18" height="18" rx="3" fill="#4cc9f0" opacity="0.4" transform="rotate(15,39,229)"/>
  <rect x="340" y="230" width="14" height="14" rx="3" fill="#f72585" opacity="0.4" transform="rotate(-20,347,237)"/>
  <circle cx="370" cy="210" r="7" fill="#ffb703" opacity="0.3"/>

  <!-- Human Figures (S, M, L) standing like dominos -->
  <g filter="url(#shadow)">
    <!-- Small (Cyan) - tilted/fallen -->
    <g transform="translate(80, 110) rotate(55, 15, 70)">
      <circle cx="15" cy="10" r="9" fill="#4cc9f0"/>
      <rect x="6" y="20" width="18" height="22" rx="4" fill="#4cc9f0"/>
      <rect x="7" y="43" width="7" height="18" rx="3" fill="#4cc9f0"/>
      <rect x="17" y="43" width="7" height="18" rx="3" fill="#4cc9f0"/>
      <circle cx="12" cy="10" r="1.8" fill="#fff"/>
      <circle cx="18" cy="10" r="1.8" fill="#fff"/>
    </g>

    <!-- Medium (Pink) - slightly tilted -->
    <g transform="translate(170, 65) rotate(25, 18, 90)">
      <circle cx="18" cy="10" r="11" fill="#f72585"/>
      <rect x="7" y="22" width="22" height="30" rx="5" fill="#f72585"/>
      <rect x="8" y="53" width="8" height="26" rx="3" fill="#f72585"/>
      <rect x="20" y="53" width="8" height="26" rx="3" fill="#f72585"/>
      <rect x="0" y="25" width="6" height="18" rx="3" fill="#f72585"/>
      <rect x="30" y="25" width="6" height="18" rx="3" fill="#f72585"/>
      <circle cx="14" cy="10" r="2.2" fill="#fff"/>
      <circle cx="22" cy="10" r="2.2" fill="#fff"/>
    </g>

    <!-- Large (Gold) - standing upright -->
    <g transform="translate(275, 40)">
      <circle cx="22" cy="12" r="14" fill="#ffb703"/>
      <rect x="8" y="27" width="28" height="40" rx="6" fill="#ffb703"/>
      <rect x="10" y="68" width="10" height="34" rx="4" fill="#ffb703"/>
      <rect x="24" y="68" width="10" height="34" rx="4" fill="#ffb703"/>
      <rect x="0" y="32" width="7" height="22" rx="3" fill="#ffb703"/>
      <rect x="37" y="32" width="7" height="22" rx="3" fill="#ffb703"/>
      <circle cx="17" cy="12" r="2.8" fill="#fff"/>
      <circle cx="27" cy="12" r="2.8" fill="#fff"/>
    </g>
  </g>

  <!-- Decorative stars -->
  <text x="50" y="60" font-size="20" opacity="0.3">⭐</text>
  <text x="320" y="50" font-size="16" opacity="0.25">✨</text>
  <text x="200" y="35" font-size="14" opacity="0.2">🎀</text>
</svg>
