<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WCGames - Geometry Dash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/wcgames-style.css">
    <style>
        /* --- DESIGN SYSTEM --- */
        :root {
            --accent: #00f3ff;
            --bg: #000;
            --surface: #111;
            --text: #fff;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        /* --- BACKGROUND LAYERS --- */
        .grid-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #0a0a2a 0%, #000 100%);
            z-index: -2;
        }

        .grid-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, var(--bg) 80%);
        }

        canvas {
            display: block;
            z-index: 5;
            position: relative;
        }

        /* --- HUD & UI --- */
        #ui {
            position: fixed;
            top: 40px;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        #score {
            font-size: 80px;
            font-weight: 900;
            color: #fff;
            letter-spacing: -2px;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.8), 0 0 40px rgba(0, 243, 255, 0.4);
            transition: transform 0.1s ease-out;
        }

        /* --- OVERLAYS & POPUPS --- */
        .wcg-overlay {
            background: rgba(5, 5, 15, 0.8);
            backdrop-filter: blur(10px);
        }

        .wcg-popup {
            background: rgba(10, 10, 30, 0.4);
            border: 1px solid rgba(0, 243, 255, 0.3);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.1), inset 0 0 20px rgba(0, 243, 255, 0.05);
            padding: 50px;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .wcg-popup::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f3ff, transparent);
            animation: scan 3s infinite;
        }

        @keyframes scan {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .wcg-popup h1 {
            font-size: 42px;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #00f3ff, #ff00ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            font-weight: 900;
        }

        .wcg-popup p {
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 35px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 1px;
        }

        .wcg-popup button {
            background: transparent;
            border: 1px solid #00f3ff;
            color: #00f3ff;
            padding: 15px 50px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
        }

        .wcg-popup button:hover {
            background: #00f3ff;
            color: #000;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.6);
            transform: translateY(-3px);
        }
    </style>
    <script src="/shared/wcgames-core.js"></script>
</head>

<body>
    <div class="grid-bg"></div>

    <!-- HUD -->
    <div id="ui">
        <div id="score">0</div>
    </div>

    <!-- SYSTEM OVERLAYS -->
    <div id="start-screen" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="title">GEOMETRIC DASH</h1>
            <p data-i18n="instruction">Tap or Space to jump.<br>Master the geometry.</p>
            <button onclick="WCGames.start()" data-i18n="play">INITIATE</button>
        </div>
    </div>

    <div id="game-over" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="game_over">SYSTEM HALT</h1>
            <p><span data-i18n="final_score">Final Score: </span><span id="final-score">0</span></p>
            <button onclick="WCGames.restart()" data-i18n="play_again">REBOOT</button>
        </div>
    </div>

    <!-- ENGINE DEPENDENCIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
        /**
         * GEOMETRIC DASH - MAIN ENGINE
         * Organised Refactoring v2
         */

        /* --- 1. CONFIGURATION & CONSTANTS --- */
        const COLORS = {
            bg: 0x000000,
            accents: [0x00f3ff, 0xff00ff, 0xffcc00, 0x00ff66],
            player: 0xffffff,
            spike: 0xff3366,
            grid: 0x00f3ff,
            obstacles: [0xff3366, 0xff9933, 0x33ff99, 0x9933ff, 0x00ccff, 0xffff33]
        };

        const CONFIG = {
            playerXRatio: 0.00,
            baseZ: 12,
            BPM: 140
        };

        const BEAT_LEN = 60 / CONFIG.BPM;

        /* --- 2. GLOBAL STATE --- */
        let scene, camera, renderer, player, playerContainer;
        let obstacles = [], particles = [], echoes = [], dataStorm = [], backgroundBuildings = [], trail = [], streaks = [];
        let score = 0, gameState = 'START', sector = 0;
        let velocityY = 0, isGrounded = true;
        let cameraShake = 0, time = 0, beatTimer = 0, beatPulse = 0;
        let targetZ = CONFIG.baseZ;
        let worldGroup, composer;

        /* --- 3. GEOMETRY TEMPLATES --- */
        const spikeGeo = new THREE.ConeGeometry(0.5, 1, 4);
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const octaGeo = new THREE.OctahedronGeometry(0.6);
        const icosaGeo = new THREE.IcosahedronGeometry(0.6);
        const tetraGeo = new THREE.TetrahedronGeometry(0.7);

        /* --- 4. AUDIO ENGINE --- */
        class SoundManager {
            constructor() {
                this.ctx = null;
                this.master = null;
                this.isMuted = false;
                this.initialized = false;
            }

            init() {
                if (this.initialized) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.master = this.ctx.createGain();
                this.master.connect(this.ctx.destination);
                this.master.gain.value = 0.3;
                this.initialized = true;
                this.startMusic();
            }

            playJump() {
                if (!this.initialized || this.isMuted) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, this.ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                osc.connect(gain);
                gain.connect(this.master);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.15);
            }

            playHalt() {
                if (!this.initialized || this.isMuted) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.5);
                osc.connect(gain);
                gain.connect(this.master);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.5);
            }

            playPulse(isKick = false) {
                if (!this.initialized || this.isMuted) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.frequency.setValueAtTime(isKick ? 100 : 200, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(isKick ? 0.4 : 0.1, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(this.master);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.1);
            }

            startMusic() {
                setInterval(() => {
                    if (gameState !== 'PLAYING' || this.isMuted) return;
                    this.playPulse(true); // Kick Beat

                    const notes = [55, 65, 73, 82];
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(notes[sector % notes.length], this.ctx.currentTime);
                    gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.4);
                    osc.connect(gain);
                    gain.connect(this.master);
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.4);
                }, BEAT_LEN * 1000);
            }
        }

        const sound = new SoundManager();

        /* --- 5. INITIALIZATION & RESIZE --- */
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(COLORS.bg);

            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.PerspectiveCamera(60, aspect, 0.1, 1000);
            camera.position.set(0, 2, CONFIG.baseZ);
            camera.lookAt(-4, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.fog = new THREE.FogExp2(0x050510, 0.02);

            // Post-processing: Neon Bloom
            const renderScene = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                1.3, // Slightly reduced strength for global glow
                0.4, // Radius
                0.15 // Lower threshold for global neon effect
            );
            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // World Lighting
            const ambient = new THREE.AmbientLight(0x4040ff, 0.4);
            scene.add(ambient);
            const dirLight = new THREE.DirectionalLight(0xff00ff, 0.8);
            dirLight.position.set(5, 5, 5);
            scene.add(dirLight);

            worldGroup = new THREE.Group();
            scene.add(worldGroup);

            // Circuit Grid Floor
            createCircuitFloor();

            // Background Skyscrapers
            createBackgroundCity();

            for (let i = 0; i < 60; i++) spawnDataPoint();

            // Player Setup
            playerContainer = new THREE.Group();
            playerContainer.position.set(-6, -1.5, 0);

            // Neon Player Redesign
            const playerCore = new THREE.Mesh(boxGeo, new THREE.MeshStandardMaterial({
                color: 0x00ffff,
                emissive: 0x00ffff,
                emissiveIntensity: 2.5
            }));
            const playerShell = new THREE.Mesh(boxGeo, new THREE.MeshStandardMaterial({
                color: 0xff00ff,
                wireframe: true,
                transparent: true,
                opacity: 0.8
            }));
            playerShell.scale.setScalar(1.1);

            player = new THREE.Group();
            player.add(playerCore);
            player.add(playerShell);

            playerContainer.add(player);
            scene.add(playerContainer);

            // Global Events
            window.addEventListener('pointerdown', jump);
            window.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); jump(); } });
            window.addEventListener('resize', resize);

            resize();
            animate();
        }

        function resize() {
            const aspect = window.innerWidth / window.innerHeight;
            camera.aspect = aspect;

            const targetBaseVFOV = 60;
            const targetBaseAspect = 1.777;
            const halfVFOVRad = THREE.MathUtils.degToRad(targetBaseVFOV / 2);
            const targetTanHalfHFOV = Math.tan(halfVFOVRad) * targetBaseAspect;
            const newHalfVFOVRad = Math.atan(targetTanHalfHFOV / aspect);
            camera.fov = THREE.MathUtils.radToDeg(newHalfVFOVRad * 2);
            camera.updateProjectionMatrix();

            renderer.setSize(window.innerWidth, window.innerHeight);

            const heightAtZ = 2 * Math.tan(newHalfVFOVRad) * CONFIG.baseZ;
            const widthAtZ = heightAtZ * aspect;
            playerContainer.position.x = (-4 - widthAtZ / 2) + (widthAtZ * CONFIG.playerXRatio);
        }

        /* --- 6. ENVIRONMENT GENERATION --- */
        function createCircuitFloor() {
            // 1. Deep Space Foundation (Solid to avoid sorting issues)
            const baseGeo = new THREE.PlaneGeometry(200, 20);
            const baseMat = new THREE.MeshBasicMaterial({ color: 0x010108 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.rotation.x = -Math.PI / 2;
            base.position.y = -2.1;
            worldGroup.add(base);

            // 2. The Energy Road (Solid base)
            const roadGeo = new THREE.PlaneGeometry(200, 4.6);
            const roadMat = new THREE.MeshStandardMaterial({
                color: 0x1a0033,
                emissive: 0x1a0033,
                emissiveIntensity: 0.5
            });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.y = -2.05;
            worldGroup.add(road);

            // 3. Digital Grid (Subtle glow)
            const gridGeo = new THREE.PlaneGeometry(200, 4.2, 80, 2);
            const gridMat = new THREE.MeshStandardMaterial({
                color: 0x00ffff,
                emissive: 0x00ffff,
                emissiveIntensity: 3,
                wireframe: true,
                transparent: true,
                opacity: 0.3
            });
            const grid = new THREE.Mesh(gridGeo, gridMat);
            grid.rotation.x = -Math.PI / 2;
            grid.position.y = -2.03;
            worldGroup.add(grid);
            worldGroup.userData.roadGrid = grid; // For animation

            // 4. Neon Rails
            const railGeo = new THREE.BoxGeometry(200, 0.15, 0.15);
            const railMatL = new THREE.MeshStandardMaterial({ color: 0x00f3ff, emissive: 0x00f3ff, emissiveIntensity: 8 });
            const railMatR = new THREE.MeshStandardMaterial({ color: 0xff00ff, emissive: 0xff00ff, emissiveIntensity: 8 });

            const leftL = new THREE.Mesh(railGeo, railMatL);
            leftL.position.set(0, -2, -2.2);
            worldGroup.add(leftL);

            const rightL = new THREE.Mesh(railGeo, railMatR);
            rightL.position.set(0, -2, 2.2);
            worldGroup.add(rightL);

            // 5. Central Energy Core
            const coreGeo = new THREE.PlaneGeometry(200, 0.1);
            const coreMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 12 });
            const core = new THREE.Mesh(coreGeo, coreMat);
            core.rotation.x = -Math.PI / 2;
            core.position.y = -2.02;
            worldGroup.add(core);

            worldGroup.renderOrder = 0;
        }



        function createBackgroundCity() {
            const buildingMat = new THREE.MeshStandardMaterial({
                color: 0x050515,
                roughness: 0.1,
                metalness: 1.0
            });

            for (let i = 0; i < 35; i++) { // Increased count
                const h = 8 + Math.random() * 35; // Taller buildings
                const w = 4 + Math.random() * 6;
                const geo = new THREE.BoxGeometry(w, h, w);
                const building = new THREE.Mesh(geo, buildingMat);

                building.position.set(
                    (Math.random() - 0.5) * 150,
                    h / 2 - 2.5,
                    -20 - Math.random() * 50
                );

                // Neon Accents on Buildings
                if (Math.random() > 0.4) {
                    const accentColor = COLORS.accents[Math.floor(Math.random() * COLORS.accents.length)];
                    const stripeGeo = new THREE.PlaneGeometry(w + 0.1, 0.2);
                    const stripeMat = new THREE.MeshStandardMaterial({
                        color: accentColor,
                        emissive: accentColor,
                        emissiveIntensity: 5
                    });

                    // Add vertical or horizontal glowing stripes
                    for (let j = 0; j < 3; j++) {
                        const stripe = new THREE.Mesh(stripeGeo, stripeMat);
                        stripe.position.y = (Math.random() - 0.5) * h;
                        stripe.position.z = w / 2 + 0.1;
                        building.add(stripe);
                    }
                }

                // Holographic Billboards
                if (Math.random() > 0.8) {
                    const billboardGeo = new THREE.PlaneGeometry(6, 4);
                    const billboardMat = new THREE.MeshBasicMaterial({
                        color: 0x00ffff,
                        transparent: true,
                        opacity: 0.4,
                        side: THREE.DoubleSide,
                        wireframe: true
                    });
                    const billboard = new THREE.Mesh(billboardGeo, billboardMat);
                    billboard.position.set(w / 2 + 2, h / 2, 0);
                    billboard.rotation.y = Math.PI / 2;
                    building.add(billboard);
                }

                const wire = new THREE.LineSegments(
                    new THREE.EdgesGeometry(geo),
                    new THREE.LineBasicMaterial({
                        color: 0x00ffff,
                        transparent: true,
                        opacity: 0.2
                    })
                );
                building.add(wire);
                worldGroup.add(building);
                backgroundBuildings.push(building);
            }

            // Flying Vehicles (Energy Streaks)
            streaks = []; // Reset streaks array
            for (let i = 0; i < 15; i++) {
                const streakGeo = new THREE.BoxGeometry(2, 0.2, 0.2);
                const streakMat = new THREE.MeshStandardMaterial({
                    color: 0x00ffff,
                    emissive: 0x00ffff,
                    emissiveIntensity: 10
                });
                const streak = new THREE.Mesh(streakGeo, streakMat);
                streak.position.set(
                    (Math.random() - 0.5) * 200,
                    10 + Math.random() * 30,
                    -30 - Math.random() * 40
                );
                streak.userData = { speed: 0.2 + Math.random() * 0.5, isStreak: true };
                scene.add(streak);
                backgroundBuildings.push(streak);
                streaks.push(streak);
            }
        }

        function spawnDataPoint() {
            const size = Math.random() * 0.6 + 0.2;
            const geo = Math.random() > 0.5 ? new THREE.IcosahedronGeometry(size, 0) : new THREE.TetrahedronGeometry(size, 0);
            const mat = new THREE.MeshBasicMaterial({ color: COLORS.accents[sector % 4], wireframe: true, transparent: true, opacity: 0.15 });
            const m = new THREE.Mesh(geo, mat);
            m.position.set((Math.random() - 0.5) * 120, Math.random() * 40 - 10, -10 - Math.random() * 40);
            m.userData = { rot: (Math.random() - 0.5) * 0.015 };
            scene.add(m);
            dataStorm.push(m);
        }

        function spawnParticles(x, y, count, color, isExplosion = false) {
            for (let i = 0; i < count; i++) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.15), new THREE.MeshStandardMaterial({
                    color: color,
                    emissive: color,
                    emissiveIntensity: 2,
                    transparent: true
                }));
                p.position.set(x, y, (Math.random() - 0.5) * 1);
                const v = isExplosion ?
                    new THREE.Vector3((Math.random() - 0.5) * 0.4, (Math.random() - 0.5) * 0.4, (Math.random() - 0.5) * 0.4) :
                    new THREE.Vector3((Math.random() - 0.8) * 0.2, Math.random() * 0.2, 0);
                p.userData = { vel: v, life: 1.0 };
                scene.add(p);
                particles.push(p);
            }
        }

        function updateTrail() {
            if (gameState !== 'PLAYING') return;

            // Collect position
            trail.push({ x: playerContainer.position.x, y: playerContainer.position.y });
            if (trail.length > 20) {
                const old = trail.shift();
            }

            // Draw trail (simple spheres/cubes for that "energy" look)
            const colors = [0xff0000, 0xff7f00, 0xffff00, 0x00ff00, 0x0000ff, 0x4b0082, 0x9400d3];
            if (time % 2 === 0) { // Throttle
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), new THREE.MeshStandardMaterial({
                    color: colors[Math.floor(time * 10) % colors.length],
                    emissive: colors[Math.floor(time * 10) % colors.length],
                    emissiveIntensity: 2,
                    transparent: true,
                    opacity: 0.6
                }));
                p.position.set(playerContainer.position.x - 0.5, playerContainer.position.y, 0);
                p.userData = { life: 1.0, vel: new THREE.Vector3(-0.05, (Math.random() - 0.5) * 0.02, 0) };
                scene.add(p);
                particles.push(p);
            }
        }

        function spawnEcho() {
            const e = player.clone();
            e.position.copy(playerContainer.position);
            e.rotation.copy(player.rotation);
            e.material = new THREE.MeshBasicMaterial({ color: COLORS.accents[sector % 4], transparent: true, opacity: 0.3, wireframe: true });
            scene.add(e);
            echoes.push(e);
        }

        function spawnObstacle(x) {
            const types = [
                { geo: spikeGeo, isSpike: true },
                { geo: boxGeo, isSpike: false },
                { geo: octaGeo, isSpike: false },
                { geo: icosaGeo, isSpike: false },
                { geo: tetraGeo, isSpike: false }
            ];
            const type = types[Math.floor(Math.random() * types.length)];
            const color = COLORS.obstacles[Math.floor(Math.random() * COLORS.obstacles.length)];

            // Solid/Matte Material for depth clarity
            const mat = new THREE.MeshStandardMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 2.0,
                metalness: 0.8,
                roughness: 0.2
            });

            const m = new THREE.Mesh(type.geo, mat);
            const wire = new THREE.Mesh(type.geo, new THREE.MeshStandardMaterial({
                color: 0xffffff,
                wireframe: true,
                transparent: true,
                opacity: 0.8 // Much more visible
            }));
            wire.scale.set(1.05, 1.05, 1.05);
            m.add(wire);

            m.position.set(x, -1.5, 0);
            if (!type.isSpike) m.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            else m.rotation.y = Math.PI / 4;

            scene.add(m);
            m.renderOrder = 10; // Ensure rendered after road
            obstacles.push(m);
        }

        /* --- 7. GAMEPLAY MECHANICS --- */
        function jump() {
            sound.init();
            if (gameState !== 'PLAYING' || !isGrounded) return;

            const speed = 0.18 + (score / 50000);
            const speedScale = speed / 0.18;
            velocityY = 0.28 * speedScale;
            isGrounded = false;
            cameraShake = 0.1;
            spawnParticles(playerContainer.position.x, playerContainer.position.y - 0.5, 6, COLORS.accents[sector % 4]);
            sound.playJump();
        }

        function onGameOver() {
            if (gameState === 'OVER') return;
            gameState = 'OVER';
            cameraShake = 0.6;
            player.visible = false;
            spawnParticles(playerContainer.position.x, playerContainer.position.y, 30, COLORS.spike, true);

            document.getElementById('game-over').classList.add('visible');
            document.getElementById('final-score').textContent = Math.floor(score);

            sound.playHalt();
            WCGames.gameOver(Math.floor(score));
        }

        /* --- 8. MAIN ENGINE LOOP --- */
        function animate() {
            requestAnimationFrame(animate);
            const dt = 1 / 60;
            time += dt;

            // BPM Engine
            beatTimer += dt;
            if (beatTimer >= BEAT_LEN) {
                beatTimer = 0;
                beatPulse = 1.0;
                if (gameState === 'PLAYING') spawnEcho();
            }
            beatPulse *= 0.92;

            if (gameState === 'PLAYING') {
                const speed = 0.18 + (score / 50000);
                const speedScale = speed / 0.18;

                // Physics Scaling
                const dynamicGravity = 0.016 * Math.pow(speedScale, 2);
                velocityY -= dynamicGravity;
                playerContainer.position.y += velocityY;

                if (playerContainer.position.y <= -1.5) {
                    if (velocityY < -0.1) cameraShake = 0.05;
                    playerContainer.position.y = -1.5; velocityY = 0; isGrounded = true;
                    player.rotation.z = Math.round(player.rotation.z / (Math.PI / 2)) * (Math.PI / 2);
                } else {
                    player.rotation.z -= 0.15 * speedScale;
                }

                // Progression & UI
                score += speed * 10;
                document.getElementById('score').textContent = Math.floor(score);
                document.getElementById('score').style.transform = `scale(${1 + beatPulse * 0.2})`;

                const newSector = Math.floor(score / 5000);
                if (newSector !== sector) {
                    sector = newSector;
                    const c = COLORS.accents[sector % 4];
                    document.documentElement.style.setProperty('--accent', '#' + c.toString(16).padStart(6, '0'));

                    // Update city wireframes & billboards color
                    backgroundBuildings.forEach(b => {
                        b.traverse(node => {
                            if (node.isMesh && node.material && node.material.color && !node.userData.isCore) {
                                if (node.material.color.setHex) node.material.color.setHex(c);
                            }
                        });
                    });
                }

                updateTrail();

                // Road Grid Animation
                if (worldGroup.userData.roadGrid) {
                    worldGroup.userData.roadGrid.position.x = (worldGroup.userData.roadGrid.position.x - speed * 0.5) % 5;
                }

                // Object Management
                backgroundBuildings.forEach(b => {
                    if (b.userData.speed) {
                        // Flying Vehicle movement
                        b.position.x -= b.userData.speed;
                        if (b.position.x < -100) b.position.x = 100;
                    } else {
                        // Standard building parallax
                        b.position.x -= 0.02;
                        if (b.position.x < -100) b.position.x = 100;
                    }
                });

                if (obstacles.length === 0 || obstacles[obstacles.length - 1].position.x < 20) {
                    spawnObstacle(obstacles.length === 0 ? 15 : obstacles[obstacles.length - 1].position.x + 10 + Math.random() * 8);
                }

                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const o = obstacles[i];
                    o.position.x -= speed;
                    if (o.position.x < -25) { scene.remove(o); obstacles.splice(i, 1); }
                    else if (playerContainer.position.distanceTo(o.position) < 0.8) onGameOver();
                }
            }

            // FX Updates
            particles.forEach((p, i) => {
                p.position.add(p.userData.vel);
                p.userData.life -= 0.02;
                p.material.opacity = p.userData.life;
                if (p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); }
            });

            echoes.forEach((e, i) => {
                e.material.opacity -= 0.02;
                e.scale.multiplyScalar(1.02);
                if (e.material.opacity <= 0) { scene.remove(e); echoes.splice(i, 1); }
            });

            dataStorm.forEach(m => {
                m.rotation.y += m.userData.rot;
                m.rotation.x += m.userData.rot * 0.5;
                m.position.x -= 0.08;
                if (m.position.x < -100) m.position.x = 100;
                m.material.opacity = (0.1 + beatPulse * 0.2);
                m.material.color.setHex(COLORS.accents[sector % 4]);
            });



            // Camera System
            const shakeOffset = (Math.random() - 0.5) * cameraShake;
            camera.position.set(shakeOffset, 2 + shakeOffset, CONFIG.baseZ);
            cameraShake *= 0.9;

            if (composer) composer.render();
            else renderer.render(scene, camera);
        }

        /* --- 9. SYSTEM INTEGRATION --- */
        WCGames.init({
            id: 'geometry',
            onStart: () => {
                gameState = 'PLAYING'; player.visible = true; playerContainer.position.y = -1.5;
                document.getElementById('start-screen').classList.remove('visible');
            },
            onRestart: () => {
                obstacles.forEach(o => scene.remove(o));
                particles.forEach(p => scene.remove(p));
                echoes.forEach(e => scene.remove(e));
                streaks.forEach(s => scene.remove(s));
                obstacles = []; particles = []; echoes = []; streaks = []; score = 0; sector = 0; gameState = 'PLAYING';
                playerContainer.position.y = 5; player.visible = true;
                document.getElementById('game-over').classList.remove('visible');
            }
        });

        init();

        // Prevent context menu globally
        window.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
    <script src="/shared/i18n.js"></script>
</body>

</html>
