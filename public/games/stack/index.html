<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stack Tower - Hyper Casual</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a0c;
            /* Matches Helix Jump base */
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            pointer-events: none;
            z-index: 10;
        }

        #score {
            font-size: 64px;
            /* Consistent with Helix */
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* Aurora Background */
        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0a0a0c 100%);
        }

        .aurora-blob {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            mix-blend-mode: screen;
            animation: move 20s infinite alternate ease-in-out;
        }

        .blob-1 {
            background: #0ea5e9;
            top: -100px;
            left: -100px;
            animation-duration: 25s;
        }

        .blob-2 {
            background: #3b82f6;
            bottom: -100px;
            right: -100px;
            animation-duration: 30s;
            animation-delay: -5s;
        }

        .blob-3 {
            background: #06b6d4;
            top: 40%;
            left: 30%;
            width: 400px;
            height: 400px;
            animation-duration: 22s;
            animation-delay: -10s;
        }

        @keyframes move {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(100px, 50px) scale(1.2);
            }
        }

        .glass-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background:
                url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)"/></svg>'),
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.02) 0px, rgba(255, 255, 255, 0.02) 1px, transparent 1px, transparent 4px);
            opacity: 0.15;
            mix-blend-mode: overlay;
        }
    </style>
    <link rel="stylesheet" href="/shared/wcgames-style.css">
    <style>
        :root {
            --theme-color: #0ea5e9;
            --theme-glow: rgba(14, 165, 233, 0.4);
        }
    </style>
    <script src="/shared/wcgames-config.js"></script>
    <script src="/shared/wcgames-core.js"></script>
</head>

<body class="">
    <!-- Aurora Background Layers -->
    <div class="aurora-bg">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2"></div>
        <div class="aurora-blob blob-3"></div>
    </div>
    <div class="glass-overlay"></div>

    <div id="ui">
        <div id="score">0</div>
    </div>
    <div id="combo-ui" class="wcg-combo">PERFECT</div>

    <div id="start-screen" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="title">STACK TOWER</h1>
            <p data-i18n="instruction">Tap to stack the blocks!</p>
            <button onclick="WCGames.start()" data-i18n="play">PLAY</button>
        </div>
    </div>

    <div id="game-over" class="wcg-overlay">
        <div class="wcg-popup">
            <h1 data-i18n="game_over">GAME OVER</h1>
            <p><span data-i18n="final_score">Score: </span><span id="final-score">0</span></p>
            <button onclick="WCGames.restart()" data-i18n="play_again">RETRY</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game Constants
        const BOX_HEIGHT = 1;
        const INITIAL_WIDTH = 4.4;
        const INITIAL_DEPTH = 4.4;
        const PRE_STACK_COUNT = 15;
        const CAMERA_HEIGHT_OFFSET = 14; // How high camera sits above tower base
        const CAMERA_LOOK_DELTA = 10;   // Vertical distance to look-at target (keep 10 for 45deg)
        const GAMEOVER_BLOCK_OFFSET = -4; // Adjust tower vertical position during game over (in blocks)
        const GAMEOVER_ZOOM = 0.45;      // Constant scale for game over view
        const PERFECT_EXPANSION_TOTAL = 2.0; // Fixed units the ripple expands by

        let scene, camera, renderer;
        let stack = [];
        let debris = [];
        let activeBlock = null;
        let direction = 'x';
        let speed = 0.15;
        let gameState = 'START'; // START, PLAYING, OVER
        let score = 0;
        let targetCameraY = CAMERA_HEIGHT_OFFSET;
        let targetCameraZoom = 1; // For game over zoom out
        let currentCameraZoom = 1;
        let perfectStreak = 0;

        // Particle System variables
        let particles, particleData;

        // Audio Manager
        class AudioManager {
            constructor() {
                this.ctx = null;
            }
            init() {
                if (this.ctx) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
            playNote(freq, type, duration, volume) {
                if (!this.ctx) return;
                if (this.ctx.state === 'suspended') this.ctx.resume();

                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();

                osc.type = type;

                // Frequency slide for game over
                if (Array.isArray(freq)) {
                    osc.frequency.setValueAtTime(freq[0], this.ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(freq[1], this.ctx.currentTime + duration);
                } else {
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                }

                gain.gain.setValueAtTime(volume, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);

                osc.connect(gain);
                gain.connect(this.ctx.destination);

                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            }
        }
        const audio = new AudioManager();

        init();

        function init() {
            scene = new THREE.Scene();

            // Foundation logic: Add bricks below y=0 to create a pillar effect

            // Premium background color (Deep Midnight)
            // scene.background = new THREE.Color(0x34495e); // Use CSS background instead

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            // Camera (Orthographic for that classic stack look)
            const aspect = window.innerWidth / window.innerHeight;
            const d = 10;
            camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 0.1, 1000);
            camera.position.set(10, 10, 10);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000000, 0); // Transparent canvas
            document.body.appendChild(renderer.domElement);

            // Foundation
            for (let i = -PRE_STACK_COUNT; i <= 0; i++) {
                addBlock(0, i * BOX_HEIGHT, 0, INITIAL_WIDTH, INITIAL_DEPTH, false, i);
            }

            // Ambient Snow Particles
            initParticles();

            // Spawn the first moving block immediately so it's visible at start
            startNewRound();

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('pointerdown', handleAction);
            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (gameState === 'PLAYING') handleAction();
                }
            });

            // Start animation loop
            animate();
        }

        function addBlock(x, y, z, width, depth, isActive, colorIndex = null) {
            const indexForColor = colorIndex !== null ? colorIndex : score;
            const color = new THREE.Color(`hsl(${indexForColor * 10 + 200}, 70%, 60%)`);
            const geometry = new THREE.BoxGeometry(width, BOX_HEIGHT, depth);
            const material = new THREE.MeshStandardMaterial({ color });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, y, z);
            scene.add(mesh);

            const block = { mesh, width, depth, spawnPos: isActive ? mesh.position[direction] : 0 };
            if (isActive) {
                activeBlock = block;
            } else {
                stack.push(block);
            }
            return block;
        }


        function handleAction() {
            audio.init();
            if (gameState !== 'PLAYING') return;

            // Guard: prevent immediate placement if the block is still at the extreme edge (prevents accidental holds)
            if (activeBlock && Math.abs(activeBlock.mesh.position[direction]) > 14.5) return;

            // Place Block
            const topBlock = stack[stack.length - 1];
            const diff = activeBlock.mesh.position[direction] - topBlock.mesh.position[direction];
            const dimension = direction === 'x' ? 'width' : 'depth';
            const overlap = activeBlock[dimension] - Math.abs(diff);

            if (overlap <= 0) {
                gameOver();
                return;
            }

            // Sound feedback
            const isPerfect = Math.abs(diff) < 0.15;
            const baseFreq = 220 + (score * 20);

            if (isPerfect) {
                // Snapping logic: No slicing, no debris
                activeBlock.mesh.position[direction] = topBlock.mesh.position[direction];

                perfectStreak++;
                audio.playNote(baseFreq * (1 + perfectStreak * 0.1), 'sine', 0.2, 0.3);
                createPerfectFlash(activeBlock.mesh.position.x, activeBlock.mesh.position.y, activeBlock.mesh.position.z, activeBlock.width, activeBlock.depth);

                // Show Perfect UI
                const comboEl = document.getElementById('combo-ui');
                comboEl.textContent = perfectStreak > 1 ? `PERFECT x${perfectStreak}` : "PERFECT";
                comboEl.classList.remove('wcg-visible'); // Reset transition
                void comboEl.offsetWidth; // Trigger reflow
                comboEl.classList.add('wcg-visible');

                // Auto hide after 1s
                if (window.comboTimeout) clearTimeout(window.comboTimeout);
                window.comboTimeout = setTimeout(() => {
                    comboEl.classList.remove('wcg-visible');
                }, 1000);
            } else {
                perfectStreak = 0;
                audio.playNote(baseFreq, 'triangle', 0.1, 0.3);

                // Slice block logic
                const originalWidth = activeBlock.width;
                const originalDepth = activeBlock.depth;

                const newWidth = direction === 'x' ? overlap : originalWidth;
                const newDepth = direction === 'z' ? overlap : originalDepth;
                const newX = direction === 'x' ? topBlock.mesh.position.x + diff / 2 : activeBlock.mesh.position.x;
                const newZ = direction === 'z' ? topBlock.mesh.position.z + diff / 2 : activeBlock.mesh.position.z;

                // Recreate geometry instead of scale to maintain correct world sizing for next block
                activeBlock.mesh.geometry.dispose();
                activeBlock.mesh.geometry = new THREE.BoxGeometry(newWidth, BOX_HEIGHT, newDepth);

                activeBlock.mesh.position.x = newX;
                activeBlock.mesh.position.z = newZ;

                activeBlock.width = newWidth;
                activeBlock.depth = newDepth;

                // Add debris (falling part)
                const debrisWidth = direction === 'x' ? originalWidth - newWidth : newWidth;
                const debrisDepth = direction === 'z' ? originalDepth - newDepth : newDepth;
                const debrisX = direction === 'x'
                    ? (diff > 0 ? newX + newWidth / 2 + debrisWidth / 2 : newX - newWidth / 2 - debrisWidth / 2)
                    : newX;
                const debrisZ = direction === 'z'
                    ? (diff > 0 ? newZ + newDepth / 2 + debrisDepth / 2 : newZ - newDepth / 2 - debrisDepth / 2)
                    : newZ;

                addDebris(debrisX, activeBlock.mesh.position.y, debrisZ, debrisWidth, debrisDepth, activeBlock.mesh.material.color, diff);
            }

            stack.push(activeBlock);
            score++;
            document.getElementById('score').textContent = score;
            WCGames.submitScore(score);

            // Increase speed slightly, always reset direction to positive for next spawn
            speed = Math.abs(speed) + 0.002;

            startNewRound();
        }

        function createPerfectFlash(x, y, z, w, d) {
            const flashColor = activeBlock.mesh.material.color.clone().multiplyScalar(1.2).addScalar(0.1);

            // Thin ripple plane at the interface between blocks
            // Starts at the exact size of the perfected block
            const geo = new THREE.PlaneGeometry(w, d);
            const mat = new THREE.MeshBasicMaterial({ color: flashColor, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
            const mesh = new THREE.Mesh(geo, mat);

            // Position it exactly between the blocks
            mesh.position.set(x, y - BOX_HEIGHT / 2, z);
            mesh.rotation.x = Math.PI / 2;
            scene.add(mesh);

            debris.push({
                mesh,
                initialW: w,
                initialD: d,
                velocity: { y: 0, r: 0 },
                isFlash: true,
                life: 1.0
            });
        }

        function startNewRound() {
            const topBlock = stack[stack.length - 1];
            direction = direction === 'x' ? 'z' : 'x';

            const x = topBlock.mesh.position.x;
            const z = topBlock.mesh.position.z;
            const y = (stack.length - PRE_STACK_COUNT) * BOX_HEIGHT;

            addBlock(x, y, z, topBlock.width, topBlock.depth, true);

            // Move camera up via Lerp - uses offset to shift tower down naturally
            targetCameraY = (stack.length - PRE_STACK_COUNT) * BOX_HEIGHT + CAMERA_HEIGHT_OFFSET;
        }


        function gameOver() {
            gameState = 'OVER';
            audio.playNote([440, 110], 'sawtooth', 0.5, 0.3);

            // Fixed zoom regardless of block count for consistent look
            targetCameraZoom = GAMEOVER_ZOOM;

            // Precise Isometric Math for bottom-edge alignment:
            // The Y scaling factor for this camera orientation is approx 0.942.
            // Formula: Y_camera = (10.61 / Zoom) - 5.5
            targetCameraY = (10.61 / targetCameraZoom) - 5.5 - (GAMEOVER_BLOCK_OFFSET * BOX_HEIGHT);

            WCGames.gameOver(score);
        }

        function restartGame() {
            // 1. Hide Game Over Screen
            const gameOverScreen = document.getElementById('game-over');
            gameOverScreen.style.display = 'none';
            gameOverScreen.classList.remove('wcg-visible');

            // 2. Clean up old 3D objects
            stack.forEach(b => safeRemove(b.mesh));
            debris.forEach(d => safeRemove(d.mesh));
            if (activeBlock) safeRemove(activeBlock.mesh);

            // 3. Reset internal state
            stack = [];
            debris = [];
            activeBlock = null;
            direction = 'x';
            speed = 0.15;
            score = 0;
            perfectStreak = 0;
            targetCameraY = CAMERA_HEIGHT_OFFSET;
            targetCameraZoom = 1;
            currentCameraZoom = 1;

            document.getElementById('score').textContent = score;

            // 4. Reset camera immediately
            camera.position.y = CAMERA_HEIGHT_OFFSET;
            camera.zoom = 1;
            camera.updateProjectionMatrix();

            // 5. Build base foundation
            for (let i = -PRE_STACK_COUNT; i <= 0; i++) {
                addBlock(0, i * BOX_HEIGHT, 0, INITIAL_WIDTH, INITIAL_DEPTH, false, i);
            }

            // 6. Direct to PLAYING state
            gameState = 'PLAYING';
            startNewRound();
        }



        function onWindowResize() {
            const aspect = window.innerWidth / window.innerHeight;
            const d = 10;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function addDebris(x, y, z, width, depth, color, diff) {
            const geometry = new THREE.BoxGeometry(width, BOX_HEIGHT, depth);
            const material = new THREE.MeshStandardMaterial({ color });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, y, z);
            scene.add(mesh);

            // Give it a subtle initial push in the direction it was cut
            const vx = direction === 'x' ? diff * 0.1 : 0;
            const vz = direction === 'z' ? diff * 0.1 : 0;
            debris.push({ mesh, velocity: { x: vx, y: 0, z: vz, r: (Math.random() - 0.5) * 0.1 } });
        }

        function safeRemove(obj) {
            if (!obj) return;
            if (obj.geometry) obj.geometry.dispose();
            if (obj.material) {
                if (Array.isArray(obj.material)) {
                    obj.material.forEach(m => m.dispose());
                } else {
                    obj.material.dispose();
                }
            }
            scene.remove(obj);
        }

        function initParticles() {
            const count = 100;
            const geo = new THREE.IcosahedronGeometry(0.1, 0);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
            particles = new THREE.InstancedMesh(geo, mat, count);
            particleData = [];

            const dummy = new THREE.Object3D();
            for (let i = 0; i < count; i++) {
                const x = (Math.random() - 0.5) * 40;
                const y = Math.random() * 40;
                const z = (Math.random() - 0.5) * 40;
                dummy.position.set(x, y, z);
                dummy.updateMatrix();
                particles.setMatrixAt(i, dummy.matrix);

                particleData.push({
                    x, y, z,
                    yspeed: 0.02 + Math.random() * 0.05,
                    offset: Math.random() * Math.PI * 2
                });
            }
            scene.add(particles);
        }

        function updateParticles() {
            if (!particles) return;
            const dummy = new THREE.Object3D();
            for (let i = 0; i < particleData.length; i++) {
                const p = particleData[i];
                p.y -= p.yspeed;
                if (p.y < (camera.position.y - 15)) p.y = camera.position.y + 25;

                const sineX = Math.sin(Date.now() * 0.001 + p.offset) * 0.5;

                dummy.position.set(p.x + sineX, p.y, p.z);
                dummy.updateMatrix();
                particles.setMatrixAt(i, dummy.matrix);
            }
            particles.instanceMatrix.needsUpdate = true;
        }

        function animate() {
            requestAnimationFrame(animate);
            updateParticles();

            if (gameState === 'PLAYING' && activeBlock) {
                activeBlock.mesh.position[direction] += speed;

                const dimension = direction === 'x' ? 'width' : 'depth';
                const bound = Math.max(4, activeBlock[dimension] * 1.2);
                const dist = activeBlock.mesh.position[direction] - activeBlock.spawnPos;

                if (Math.abs(dist) > bound) {
                    // Snap to bound and reverse
                    activeBlock.mesh.position[direction] = activeBlock.spawnPos + (bound * Math.sign(dist));
                    speed *= -1;
                }
            }

            // Smooth Camera Y & Zoom
            camera.position.y += (targetCameraY - camera.position.y) * 0.1;

            // Perspective-safe baseline shift: Maintain constant angle
            // by keeping a fixed vertical delta between camera and look target.
            camera.lookAt(0, camera.position.y - CAMERA_LOOK_DELTA, 0);

            if (gameState === 'OVER') {
                // Sync zoom speed (0.1) with position speed (0.1) for jitter-free transition
                currentCameraZoom += (targetCameraZoom - currentCameraZoom) * 0.1;
                camera.zoom = currentCameraZoom;
                camera.updateProjectionMatrix();
            }

            // Debris physics
            for (let i = debris.length - 1; i >= 0; i--) {
                const d = debris[i];
                if (d.isFlash) {
                    d.life -= 0.03;

                    // Absolute expansion: grow by exactly PERFECT_EXPANSION_TOTAL units
                    const growth = (1 - d.life) * PERFECT_EXPANSION_TOTAL;
                    const scaleX = (d.initialW + growth) / d.initialW;
                    const scaleY = (d.initialD + growth) / d.initialD;

                    d.mesh.scale.set(scaleX, scaleY, 1);
                    d.mesh.material.opacity = d.life;

                    if (d.life <= 0) {
                        safeRemove(d.mesh);
                        debris.splice(i, 1);
                    }
                } else {
                    d.velocity.y -= 0.02; // Gravity
                    d.mesh.position.x += d.velocity.x || 0;
                    d.mesh.position.y += d.velocity.y;
                    d.mesh.position.z += d.velocity.z || 0;
                    d.mesh.rotation.x += d.velocity.r;
                    d.mesh.rotation.z += d.velocity.r;

                    if (d.mesh.position.y < targetCameraY - 20) {
                        safeRemove(d.mesh);
                        debris.splice(i, 1);
                    }
                }
            }

            renderer.render(scene, camera);
        }
    </script>
    <!-- Bottom Banner Container -->
    <style>
        #bottom-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: none;
            /* hidden for now */
            justify-content: center;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 0;
        }

        #bottom-banner .adsbygoogle {
            display: inline-block;
            width: 320px;
            height: 50px;
        }

        @media(min-width: 768px) {
            #bottom-banner .adsbygoogle {
                width: 728px;
                height: 90px;
            }
        }
    </style>
    <div id="bottom-banner" style="display: none !important;">
        <!-- AdSense will be injected dynamically by WCGames.setupAdSense() -->
        <ins class="adsbygoogle" style="display:inline-block" data-ad-slot="8181343233"></ins>
    </div>

    <script src="/shared/i18n.js"></script>

    <script>
        WCGames.init({
            id: 'stack-tower',
            onStart: () => {
                audio.init();
                gameState = 'PLAYING';
            },
            onRestart: () => {
                restartGame();
            },
            onGameOver: (s) => {
                gameState = 'OVER';
            }
        });

        // Prevent context menu globally
        window.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>

</body>

</html>
