<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#3a3a4a"/>
      <stop offset="100%" stop-color="#1a1a24"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Stack of blocks - isometric -->
  <g transform="translate(200, 230) scale(2.2)" filter="url(#shadow)">
    <!-- Block 1 (bottom) -->
    <polygon points="0,-12 40,0 0,12 -40,0" fill="#5cb8e6"/>
    <polygon points="-40,0 0,12 0,28 -40,16" fill="#3a8bb6"/>
    <polygon points="0,12 40,0 40,16 0,28" fill="#4faae0"/>

    <!-- Block 2 -->
    <g transform="translate(0, -18)">
      <polygon points="0,-12 40,0 0,12 -40,0" fill="#5c9be6"/>
      <polygon points="-40,0 0,12 0,28 -40,16" fill="#3a6cb6"/>
      <polygon points="0,12 40,0 40,16 0,28" fill="#4f8ee0"/>
    </g>

    <!-- Block 3 -->
    <g transform="translate(0, -36)">
      <polygon points="0,-12 40,0 0,12 -40,0" fill="#7c6be6"/>
      <polygon points="-40,0 0,12 0,28 -40,16" fill="#5a4ab6"/>
      <polygon points="0,12 40,0 40,16 0,28" fill="#6d5ee0"/>
    </g>

    <!-- Block 4 (about to land) -->
    <g transform="translate(8, -58)" opacity="0.9">
      <polygon points="0,-12 40,0 0,12 -40,0" fill="#e65c8a"/>
      <polygon points="-40,0 0,12 0,28 -40,16" fill="#b63a5e"/>
      <polygon points="0,12 40,0 40,16 0,28" fill="#e04f7a"/>
    </g>
  </g>
</svg>
